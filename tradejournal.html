              <td style={{...tdStyle,fontFamily:"var(--mono)",color:"var(--text2)",fontSize:"11px",whiteSpace:"nowrap"}}>{t.date}{isNew&&<span style={{marginLeft:"6px",fontSize:"8px",padding:"1px 5px",borderRadius:"3px",background:"rgba(201,168,76,0.15)",color:"#d4b85c",fontWeight:700,verticalAlign:"middle",letterSpacing:"0.04em"}}>NEW</span>}<br/><span style={{color:"var(--text4)"}}>{t.time}</span></td>
              <td style={{...tdStyle,fontWeight:600,color:"var(--text)"}}><div style={{display:"flex",alignItems:"center",gap:"8px"}}><div style={{position:"relative",flexShrink:0}}><CryptoIcon pair={t.pair} size={24}/>{t.source&&t.source!=="manual"&&<div style={{position:"absolute",bottom:"-2px",right:"-4px",borderRadius:"3px",overflow:"hidden",border:"1.5px solid var(--bg3)"}}><ExchangeIcon name={t.source} size={11}/></div>}</div><span>{t.pair}</span></div></td>
              <td style={{...tdStyle,fontFamily:"var(--mono)",fontSize:"11px",color:"var(--text2)",textAlign:"center"}}>{t.entry&&parseFloat(t.entry)?fmt(t.entry):<NA/>}</td>
              <td style={{...tdStyle,fontFamily:"var(--mono)",fontSize:"11px",color:"var(--text2)",textAlign:"center"}}>{t.exit&&parseFloat(t.exit)?fmt(t.exit):<NA/>}</td>
              <td style={{...tdStyle,fontFamily:"var(--mono)",fontSize:"10px",color:"var(--text3)",textAlign:"center"}}>{fmtSize(t)||<NA/>}</td>
              <td style={{...tdStyle,textAlign:"center"}}>
                <span style={{padding:"3px 10px",borderRadius:"4px",fontSize:"10px",fontWeight:700,background:t.direction==="long"?"rgba(46,170,111,0.12)":"rgba(224,85,85,0.12)",color:t.direction==="long"?"#2eaa6f":"#e05555"}}>{t.direction.toUpperCase()}</span>
              </td>
              <td style={{...tdStyle,fontFamily:"var(--mono)",fontWeight:700,fontSize:"12px",color:isW?"var(--green)":isL?"var(--red)":"var(--text3)"}}>{!isNaN(pnlN)?`${pnlN>=0?"+":""}$${fmt(pnlN)}`:<NA/>}</td>
              {/* v7 NEW: R-multiple cell */}
              <td style={{...tdStyle,textAlign:"center"}}>
                {rMult!==null?<span className={`r-chip ${rMult>0?"r-pos":rMult<0?"r-neg":"r-zero"}`}>{rMult>=0?"+":""}{rMult.toFixed(1)}R</span>:<span style={{color:"var(--text5)",fontSize:"9px"}}>–</span>}
              </td>
              <td style={tdStyle}>{hasLayers?layers.map((l,li)=>{const confs=(l.confirmations||[l.confirmation].filter(Boolean));const fpLabel=l.setup==="Fill Play"&&l.fillPlayType?` · ${l.fillPlayType}`:"";return <span key={li} style={{...tagStyle2("rgba(201,168,76,0.1)","#C9A84C")}}>{l.timeframe}{l.setup?" · "+l.setup:""}{fpLabel}{confs.length>0?" · "+confs.join("+"):""}</span>}):(t.setupTags||[]).length>0?(t.setupTags||[]).map(s=><span key={s} style={tagStyle2("rgba(201,168,76,0.08)","#C9A84C")}>{s}</span>):<button onClick={e=>{e.stopPropagation();onQuickTag&&onQuickTag(t)}} style={{fontSize:"10px",padding:"2px 8px",borderRadius:"3px",border:"1px dashed var(--border4)",background:"transparent",color:"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>+ tag</button>}</td>
              <td style={tdStyle}>{getSessionTags(t.date,t.time).map(s=>{const c=SESSION_COLORS[s]||SESSION_COLORS["Off-session"];return <span key={s} style={tagStyle2(c.bg,c.text)}>{s}</span>})}</td>
              <td style={tdStyle}>{(t.emotionTags||[]).map(s=><span key={s} style={tagStyle2(isNegEmotion(s)?"var(--red2)":"var(--green2)",isNegEmotion(s)?"var(--red)":"var(--green)")}>{s}</span>)}</td>
              <td style={tdStyle}><button onClick={e=>{e.stopPropagation();onDelete(t.id)}} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"12px",padding:"2px 4px"}}>✕</button></td>
            </tr>);
          })}
        </tbody>
      </table>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",fontSize:"11px",color:"var(--text4)",fontFamily:"var(--mono)"}}>
      <span>Trades: {sorted.length}{search?` (gefilterd)`:""}</span>
      <span>Return: <span style={{color:totalPnl>=0?"var(--green)":"var(--red)",fontWeight:600}}>{totalPnl>=0?"+":""}${fmt(totalPnl)}</span></span>
    </div>
  </div>);
}


// ============ TRADE FORM ============
function TradeForm({trade,setTrade,onSave,onCancel,tagConfig,config,accounts}){
  const toggle=(f,tag)=>setTrade(p=>({...p,[f]:p[f].includes(tag)?p[f].filter(t=>t!==tag):[...p[f],tag]}));
  const fRef=useRef();
  const handleSS=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setTrade(p=>({...p,screenshot:ev.target.result}));r.readAsDataURL(f)};
  const gt=(k)=>tagConfig[k]||DEFAULT_TAGS[k]||[];
  const[sizeInputMode,setSizeInputMode]=useState(()=>localStorage.getItem("tj_sizeInputMode")||"usdt");

  const sourceOptions=[{id:"manual",label:"✏️ Handmatig",color:"var(--text3)"}];
  Object.entries(ExchangeAPI).forEach(([key,ex])=>{if(config?.exchanges?.[key]?.apiKey)sourceOptions.push({id:key,label:ex.name,color:ex.color})});
  (accounts||[]).forEach(a=>{if(!sourceOptions.find(s=>s.id===a.name))sourceOptions.push({id:a.name,label:"✏️ "+a.name,color:"var(--text3)"})});

  return(<div style={{animation:"fadeIn .3s ease",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"24px",border:"1px solid var(--glass-border)"}}>
    {/* Account selector */}
    <div style={{marginBottom:"1rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>ACCOUNT / EXCHANGE</div>
      <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
        {sourceOptions.map(opt=>{const active=(trade.source||"manual")===opt.id;return(<button key={opt.id} onClick={()=>setTrade(p=>({...p,source:opt.id}))} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"11px",fontWeight:600,border:`1px solid ${active?opt.color||"#C9A84C":"var(--border3)"}`,background:active?`${opt.color||"#C9A84C"}15`:"transparent",color:active?opt.color||"#C9A84C":"var(--text4)",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"5px"}}>{!opt.id.startsWith("✏")&&opt.id!=="manual"&&<ExchangeIcon name={opt.id} size={14}/>}{opt.label}</button>);})}
      </div>
    </div>

    {/* Date/Time/Pair */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"1rem"}}>
      <div><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>DATUM</div><input type="date" value={trade.date} onChange={e=>setTrade(p=>({...p,date:e.target.value}))} style={iStyle}/></div>
      <div><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>TIJD</div><input type="time" value={trade.time} onChange={e=>setTrade(p=>({...p,time:e.target.value}))} style={iStyle}/></div>
      <div><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>PAIR</div>
        <div style={{display:"flex",gap:0}}>
          <input type="text" value={(trade.pair||"").split("/")[0]||""} onChange={e=>{const base=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"");const quote=(trade.pair||"").split("/")[1]||config.defaultQuote||"USDT";setTrade(p=>({...p,pair:base+"/"+quote}))}} style={{...iStyle,borderRadius:"4px 0 0 4px",borderRight:"none",flex:1}} placeholder="BTC"/>
          <select value={(trade.pair||"").split("/")[1]||config.defaultQuote||"USDT"} onChange={e=>{const base=(trade.pair||"").split("/")[0]||"BTC";setTrade(p=>({...p,pair:base+"/"+e.target.value}))}} style={{...iStyle,borderRadius:"0 4px 4px 0",width:"80px",cursor:"pointer",color:"var(--gold)",fontWeight:600,fontSize:"11px"}}>
            <option value="USDT">USDT</option><option value="USDC">USDC</option><option value="USD">USD</option>
          </select>
        </div>
      </div>
    </div>

    {/* Direction */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,marginBottom:"1rem",borderRadius:"8px",overflow:"hidden",border:"1px solid rgba(54,58,69,0.7)"}}>
      {["long","short"].map(dir=>(<button key={dir} onClick={()=>setTrade(p=>({...p,direction:dir}))} style={{padding:"10px",border:"none",fontSize:"14px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:trade.direction===dir?(dir==="long"?"var(--green2)":"var(--red2)"):"transparent",color:trade.direction===dir?(dir==="long"?"var(--green)":"var(--red)"):"var(--text4)",boxShadow:trade.direction===dir?`inset 0 0 0 1px ${dir==="long"?"var(--green3)":"var(--red3)"}`:"none"}}>{dir.toUpperCase()}</button>))}
    </div>

    {/* Auto session tag */}
    {(()=>{const st=getSessionTags(trade.date,trade.time);return st.length>0?(<div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"1rem"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Sessie</span>{st.map(s=>{const c=SESSION_COLORS[s]||SESSION_COLORS["Off-session"];return(<span key={s} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:600,border:`1px solid ${c.border}`,background:c.bg,color:c.text}}>{s}</span>)})}<span style={{fontSize:"9px",color:"var(--text5)",fontFamily:"var(--mono)",marginLeft:"4px"}}>auto (CET)</span></div>):null})()}

    {/* Entry/SL/Exit/Size/PNL */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"12px",marginBottom:"1rem"}}>
      {[["entry","ENTRY"],["stopLoss","STOP LOSS"],["exit","EXIT"]].map(([k,l])=>(<div key={k}><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>{l}</div><input type="text" value={trade[k]} onChange={e=>{const v=e.target.value;setTrade(p=>({...p,[k]:v,manualOverrides:[...new Set([...(p.manualOverrides||[]),k])]}))}} style={{...iStyle,color:isEmpty(trade[k])?"#4b5563":"var(--text)"}} placeholder="N/A"/></div>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"12px"}}>
      {(()=>{
        const asset=(trade.pair||"BTC/USDT").split("/")[0]||"BTC";
        const toggleInput=()=>{const next=sizeInputMode==="usdt"?"asset":"usdt";setSizeInputMode(next);localStorage.setItem("tj_sizeInputMode",next)};
        const handleSizeChange=(v)=>{
          const entry=parseFloat(trade.entry);
          if(sizeInputMode==="usdt"){const updates={positionSize:v,manualOverrides:[...new Set([...(trade.manualOverrides||[]),"positionSize"])]};if(entry>0&&parseFloat(v)>0)updates.positionSizeAsset=String(parseFloat((parseFloat(v)/entry).toFixed(8)));setTrade(p=>({...p,...updates}));}
          else{const updates={positionSizeAsset:v,manualOverrides:[...new Set([...(trade.manualOverrides||[]),"positionSize"])]};if(entry>0&&parseFloat(v)>0)updates.positionSize=String(parseFloat((parseFloat(v)*entry).toFixed(2)));setTrade(p=>({...p,...updates}));}
        };
        return(<div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"6px"}}><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:500}}>POSITIE ({sizeInputMode==="usdt"?"$":asset})</div><button onClick={toggleInput} style={{fontSize:"9px",padding:"2px 6px",borderRadius:"3px",border:"1px solid var(--border3)",background:"transparent",color:"var(--gold)",cursor:"pointer",fontFamily:"var(--mono)"}}>{sizeInputMode==="usdt"?"→ "+asset:"→ USDT"}</button></div><input type="text" value={sizeInputMode==="usdt"?(trade.positionSize||""):(trade.positionSizeAsset||"")} onChange={e=>handleSizeChange(e.target.value)} style={{...iStyle,color:isEmpty(sizeInputMode==="usdt"?trade.positionSize:trade.positionSizeAsset)?"#4b5563":"var(--text)"}} placeholder="N/A"/></div>);
      })()}
      {[["pnl","PNL ($)"],["fees","FEES ($)"]].map(([k,l])=>(<div key={k}><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>{l}</div><input type="text" value={trade[k]} onChange={e=>{const v=e.target.value;setTrade(p=>({...p,[k]:v,manualOverrides:[...new Set([...(p.manualOverrides||[]),k])]}))}} style={{...iStyle,color:isEmpty(trade[k])?"#4b5563":"var(--text)"}} placeholder="N/A"/></div>))}
    </div>

    {/* Auto PNL calc */}
    {(()=>{const e=parseFloat(trade.entry);const ex=parseFloat(trade.exit);const sz=parseFloat(trade.positionSize);const fees=parseFloat(trade.fees)||0;if(e>0&&ex>0&&sz>0&&!(trade.manualOverrides||[]).includes("pnl")){const raw=trade.direction==="long"?(ex-e)*sz/e:(e-ex)*sz/e;const net2=raw-fees;if(trade.pnl!==""&&Math.abs(parseFloat(trade.pnl)-net2)>0.01||trade.pnl===""){return(<div style={{marginBottom:"12px"}}><button onClick={()=>setTrade(p=>({...p,pnl:net2.toFixed(2)}))} style={{fontSize:"10px",padding:"4px 12px",borderRadius:"5px",border:"1px solid var(--blue2)",background:"rgba(201,168,76,0.12)",color:"#C9A84C",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>💡 PNL berekenen: {net2>=0?"+":""}${fmt(net2)} {fees>0?`(na $${fmt(fees)} fees)`:""} → Toepassen</button></div>)}}return null;})()}

    {/* Status */}
    <div style={{display:"flex",gap:"12px",alignItems:"center",marginBottom:"1.5rem"}}>
      <div>
        <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>STATUS</div>
        <div style={{display:"flex",gap:0,borderRadius:"6px",overflow:"hidden",border:"1px solid var(--border3)"}}>
          {["closed","open"].map(s=>(<button key={s} onClick={()=>setTrade(p=>({...p,status:s}))} style={{padding:"6px 14px",border:"none",fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",background:trade.status===s?(s==="open"?"rgba(201,168,76,0.1)":"rgba(42,46,57,0.7)"):"transparent",color:trade.status===s?(s==="open"?"#C9A84C":"var(--text)"):"var(--text4)"}}>{s==="open"?"Open":"Closed"}</button>))}
        </div>
      </div>
    </div>

    {/* Setup Layers */}
    <div style={{borderTop:"1px solid var(--border2)",paddingTop:"1.5rem",marginBottom:"0.5rem"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Setup lagen (top-down)</div>
        <button onClick={()=>setTrade(p=>({...p,layers:[...(p.layers||[]),{...EMPTY_LAYER,id:uid()}]}))} style={{fontSize:"11px",padding:"4px 10px",borderRadius:"5px",border:"1px dashed var(--border5)",background:"transparent",color:"#C9A84C",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>+ Laag toevoegen</button>
      </div>
      {(trade.layers||[]).length===0&&<div style={{background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.15)",borderRadius:"8px",padding:"14px 16px",marginBottom:"12px",fontSize:"12px",color:"#C9A84C",lineHeight:1.6}}>Voeg setup lagen toe in top-down volgorde. Begin met het hoogste timeframe (bias) en eindig met je entry timeframe.</div>}
      {(trade.layers||[]).map((layer,i)=>{
        const tfIdx=TF_ORDER.indexOf(layer.timeframe);
        const prevTfIdx=i>0?TF_ORDER.indexOf((trade.layers||[])[i-1]?.timeframe):-1;
        const orderWarn=i>0&&tfIdx>=0&&prevTfIdx>=0&&tfIdx<prevTfIdx;
        return(<div key={layer.id||i} style={{background:orderWarn?"rgba(201,168,76,0.04)":"rgba(42,46,57,0.3)",borderRadius:"8px",border:`1px solid ${orderWarn?"rgba(201,168,76,0.2)":"var(--border2)"}`,padding:"12px",marginBottom:"6px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"8px"}}>
            <span style={{fontSize:"11px",color:"var(--text4)",fontWeight:700,fontFamily:"var(--mono)",width:"20px"}}>{i+1}.</span>
            {i>0&&<button onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];[l[i-1],l[i]]=[l[i],l[i-1]];return{...p,layers:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>▲</button>}
            {i<(trade.layers||[]).length-1&&<button onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];[l[i],l[i+1]]=[l[i+1],l[i]];return{...p,layers:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>▼</button>}
            <div style={{flex:1}}/>
            {orderWarn&&<span style={{fontSize:"10px",color:"var(--amber)",fontWeight:500}}>⚠ Niet top-down</span>}
            <button onClick={()=>setTrade(p=>({...p,layers:(p.layers||[]).filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>✕</button>
          </div>
          <div style={{display:"grid",gap:"10px"}}>
            <div><div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>TIMEFRAME</div><div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{gt("timeframeTags").map(tf=>{const sel=layer.timeframe===tf;return(<button key={tf} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],timeframe:sel?"":tf};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#7c3aed":"var(--border3)"}`,background:sel?"rgba(124,58,237,0.2)":"transparent",color:sel?"#a78bfa":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{tf}</button>)})}</div></div>
            <div>
                <div style={{fontSize:"9px",color:"#C9A84C",marginBottom:"6px",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>Setup</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"4px"}}>{gt("setupTags").map(s=>{const sel=layer.setup===s;return(<button key={s} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],setup:sel?"":s,fillPlayType:s!=="Fill Play"?undefined:l[i].fillPlayType};return{...p,layers:l}})} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"rgba(201,168,76,0.45)":"rgba(201,168,76,0.15)"}`,background:sel?"rgba(201,168,76,0.12)":"transparent",color:sel?"#C9A84C":"rgba(255,255,255,0.35)",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{s}</button>)})}</div>
                {layer.setup==="Fill Play"&&<div style={{marginTop:"6px",padding:"9px 12px",background:"rgba(201,168,76,0.05)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"6px",borderLeft:"2px solid #C9A84C",borderTopLeftRadius:"0",borderBottomLeftRadius:"0"}}>
                  <div style={{fontSize:"9px",color:"#C9A84C",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"7px"}}>Type</div>
                  <div style={{display:"flex",gap:"6px"}}>{["Directe Play","Backtest Play"].map(fp=>{const fsel=layer.fillPlayType===fp;return(<button key={fp} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],fillPlayType:fsel?undefined:fp};return{...p,layers:l}})} style={{padding:"5px 16px",borderRadius:"6px",fontSize:"11px",fontWeight:700,border:`1px solid ${fsel?"#C9A84C":"rgba(201,168,76,0.2)"}`,background:fsel?"#C9A84C":"transparent",color:fsel?"#000000":"rgba(201,168,76,0.6)",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{fp}</button>)})}</div>
                </div>}
              </div>
            <div><div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>CONFIRMATIE(S)</div><div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{gt("confirmationTags").map(c=>{const sel=(layer.confirmations||[layer.confirmation].filter(Boolean)).includes(c);return(<button key={c} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];const cur=l[i].confirmations||[l[i].confirmation].filter(Boolean);l[i]={...l[i],confirmations:sel?cur.filter(x=>x!==c):[...cur,c],confirmation:undefined};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#0d9488":"var(--border3)"}`,background:sel?"rgba(13,148,136,0.2)":"transparent",color:sel?"#2eaa6f":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{c}</button>)})}</div></div>
            <div><div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>ROL</div><div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{ROLE_OPTIONS.map(r=>{const sel=layer.role===r;return(<button key={r} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],role:sel?"Bias":r};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#d97706":"var(--border3)"}`,background:sel?"rgba(201,168,76,0.2)":"transparent",color:sel?"#c9a84c":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{r}</button>)})}</div></div>
          </div>
        </div>);
      })}
      <div style={{marginTop:"16px"}}/>
      {/* Emotions */}
      <div style={{marginBottom:"1rem"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"8px"}}>Emoties</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          <div><div style={{fontSize:"10px",color:"var(--red)",fontWeight:600,marginBottom:"6px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCross size={14}/> Negatief</div><div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{gt("emotionTags").filter(t=>isNegEmotion(t)).map(tag=>{const a=(trade.emotionTags||[]).includes(tag);return(<button key={tag} onClick={()=>toggle("emotionTags",tag)} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:500,border:`1px solid ${a?"#dc2626":"rgba(54,58,69,0.7)"}`,background:a?"rgba(220,122,122,0.14)":"transparent",color:a?"#e05555":"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>{tag}</button>)})}</div></div>

function applyFilters(trades,filters){
  return trades.filter(t=>{
    if(filters.source&&filters.source!=="all"&&(t.source||"manual")!==filters.source)return false;
    if(filters.pair&&filters.pair!=="all"&&t.pair!==filters.pair)return false;
    if(filters.quote&&filters.quote!=="all"&&(t.pair||"").split("/")[1]!==filters.quote)return false;
    if(filters.direction&&filters.direction!=="all"&&t.direction!==filters.direction)return false;
    if(filters.status&&filters.status!=="all"&&(t.status||"closed")!==filters.status)return false;
    if(filters.dateFrom&&t.date<filters.dateFrom)return false;
    if(filters.dateTo&&t.date>filters.dateTo)return false;
    if(filters.result&&filters.result!=="all"){const pnl=parseFloat(t.pnl);if(isNaN(pnl))return false;if(filters.result==="win"&&pnl<=0)return false;if(filters.result==="loss"&&pnl>=0)return false;}
    if(filters.setupTags?.length>0&&!filters.setupTags.some(s=>(t.setupTags||[]).includes(s)))return false;
    if(filters.confirmationTags?.length>0&&!filters.confirmationTags.some(c=>(t.confirmationTags||[]).includes(c)))return false;
    if(filters.emotionTags?.length>0&&!filters.emotionTags.some(e=>(t.emotionTags||[]).includes(e)))return false;
    if(filters.mistakeTags?.length>0&&!filters.mistakeTags.some(m=>(t.mistakeTags||[]).includes(m)))return false;
    if(filters.sessionTags?.length>0){const st=getSessionTags(t.date,t.time);if(!filters.sessionTags.some(s=>st.includes(s)))return false}
    return true;
  });
}

// ============ CALENDAR ============
function Calendar({trades}){
  const closed=trades.filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  const[monthOffset,setMonthOffset]=useState(0);
  const[calView,setCalView]=useState("month");
  const now=new Date();
  const viewToggle=(<div style={{display:"flex",gap:"4px",background:"rgba(255,255,255,0.10)",borderRadius:"6px",padding:"3px"}}>{["week","month","year"].map(v=>(<button key={v} onClick={()=>{setCalView(v);setMonthOffset(0)}} style={{padding:"5px 14px",borderRadius:"5px",border:"none",fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",background:calView===v?"rgba(201,168,76,0.12)":"transparent",color:calView===v?"#C9A84C":"var(--text4)"}}>{v==="week"?"Week":v==="month"?"Maand":"Jaar"}</button>))}</div>);
  const navBtn=(dir)=>(<button onClick={()=>setMonthOffset(p=>p+dir)} style={{background:"transparent",border:"1px solid var(--border3)",color:"var(--text3)",borderRadius:"6px",padding:"6px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:"14px"}}>{dir<0?"◂":"▸"}</button>);
  
  if(calView==="year"){
    const viewYear=now.getFullYear()+monthOffset;
    const monthlyPnl=Array.from({length:12},(_,m)=>{let pnl=0,n=0;closed.forEach(t=>{const d=new Date(t.date);if(d.getFullYear()===viewYear&&d.getMonth()===m){pnl+=parseFloat(t.pnl);n++}});return{pnl,n,label:new Date(viewYear,m).toLocaleString("nl-NL",{month:"short"})}});
    const yearPnl=monthlyPnl.reduce((s,d)=>s+d.pnl,0);const yearTrades=monthlyPnl.reduce((s,d)=>s+d.n,0);
    const yrG=monthlyPnl.filter(d=>d.pnl>0).length;const yrR=monthlyPnl.filter(d=>d.pnl<0).length;
    const yearMaxAbs=Math.max(...monthlyPnl.map(d=>Math.abs(d.pnl)),1);
    return(<div style={{animation:"fadeIn .3s ease"}}><div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:"12px",marginBottom:"1.5rem"}}><Stat label="Jaar PNL" value={`$${fmt(yearPnl)}`} color={yearPnl>=0?"var(--green)":"var(--red)"} sub={`${yearTrades} trades`}/><Stat label="Groene maanden" value={yrG} color="var(--green)"/><Stat label="Rode maanden" value={yrR} color="var(--red)"/><Stat label="Actieve maanden" value={monthlyPnl.filter(d=>d.n>0).length} sub="van 12"/></div><div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>{navBtn(-1)}<div style={{display:"flex",alignItems:"center",gap:"16px"}}><div style={{fontSize:"15px",fontWeight:600}}>{viewYear}</div>{viewToggle}</div>{navBtn(1)}</div><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}}>{monthlyPnl.map((d,i)=>{const hasTrade=d.n>0;const pos=d.pnl>=0;const intensity=hasTrade?Math.min(Math.abs(d.pnl)/yearMaxAbs,1):0;return(<div key={i} style={{borderRadius:"8px",padding:"16px 12px",textAlign:"center",background:hasTrade?(pos?`rgba(42,181,135,${0.05+intensity*0.15})`:`rgba(212,106,106,${0.05+intensity*0.15})`):"rgba(42,46,57,0.3)",border:`1px solid ${hasTrade?(pos?"rgba(46,170,111,0.14)":"rgba(220,122,122,0.14)"):"var(--border1)"}`}}><div style={{fontSize:"12px",color:hasTrade?"var(--text2)":"var(--text4)",fontWeight:600,marginBottom:"8px",textTransform:"capitalize"}}>{d.label}</div>{hasTrade&&<><div style={{fontSize:"15px",fontFamily:"var(--mono)",fontWeight:700,color:pos?"var(--green)":"var(--red)"}}>{d.pnl>=0?"+":""}${fmt(d.pnl)}</div><div style={{fontSize:"10px",color:"var(--text4)",marginTop:"4px"}}>{d.n} trades</div></>}</div>)})}</div></div></div>);
  }

  const viewDate=new Date(now.getFullYear(),now.getMonth()+monthOffset,1);
  const year=viewDate.getFullYear();const month=viewDate.getMonth();
  const monthName=viewDate.toLocaleString("nl-NL",{month:"long",year:"numeric"});
  const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();const startDay=(firstDay+6)%7;
  const dayPnl={};closed.forEach(t=>{const d=new Date(t.date);if(d.getFullYear()===year&&d.getMonth()===month){const day=d.getDate();if(!dayPnl[day])dayPnl[day]={pnl:0,n:0};dayPnl[day].pnl+=parseFloat(t.pnl);dayPnl[day].n++}});
  const monthPnl=Object.values(dayPnl).reduce((s,d)=>s+d.pnl,0);const monthTrades=Object.values(dayPnl).reduce((s,d)=>s+d.n,0);
  const greenDays=Object.values(dayPnl).filter(d=>d.pnl>0).length;const redDays=Object.values(dayPnl).filter(d=>d.pnl<0).length;
  const maxAbs=Math.max(...Object.values(dayPnl).map(d=>Math.abs(d.pnl)),1);
  const cells=[];for(let i=0;i<startDay;i++)cells.push(null);for(let d=1;d<=daysInMonth;d++)cells.push(d);
  return(<div style={{animation:"fadeIn .3s ease"}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:"12px",marginBottom:"1.5rem"}}>
      <Stat label="Maand PNL" value={`$${fmt(monthPnl)}`} color={monthPnl>=0?"var(--green)":"var(--red)"} sub={`${monthTrades} trades`}/>
      <Stat label="Groene dagen" value={greenDays} color="var(--green)"/>
      <Stat label="Rode dagen" value={redDays} color="var(--red)"/>
      <Stat label="Tradingdagen" value={greenDays+redDays} sub={`van ${daysInMonth}`}/>
    </div>
    <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>{navBtn(-1)}<div style={{display:"flex",alignItems:"center",gap:"16px"}}><div style={{fontSize:"15px",fontWeight:600,textTransform:"capitalize"}}>{monthName}</div>{viewToggle}</div>{navBtn(1)}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"4px"}}>
        {["Ma","Di","Wo","Do","Vr","Za","Zo"].map(d=>(<div key={d} style={{textAlign:"center",fontSize:"10px",color:"var(--text4)",fontWeight:600,padding:"6px 0",textTransform:"uppercase"}}>{d}</div>))}
        {cells.map((day,i)=>{if(day===null)return <div key={`e${i}`}/>;const data=dayPnl[day];const hasTrade=!!data;const pos=data?.pnl>=0;const intensity=hasTrade?Math.min(Math.abs(data.pnl)/maxAbs,1):0;return(<div key={day} style={{borderRadius:"6px",padding:"8px 6px",textAlign:"center",minHeight:"60px",background:hasTrade?(pos?`rgba(42,181,135,${0.05+intensity*0.15})`:`rgba(212,106,106,${0.05+intensity*0.15})`):"rgba(42,46,57,0.3)",border:`1px solid ${hasTrade?(pos?"rgba(46,170,111,0.14)":"rgba(220,122,122,0.14)"):"var(--border1)"}`}}><div style={{fontSize:"11px",color:hasTrade?"var(--text2)":"var(--text4)",fontWeight:500,marginBottom:"4px"}}>{day}</div>{hasTrade&&<><div style={{fontSize:"12px",fontFamily:"var(--mono)",fontWeight:700,color:pos?"var(--green)":"var(--red)"}}>{data.pnl>=0?"+":""}${fmt(data.pnl)}</div><div style={{fontSize:"9px",color:"var(--text4)",marginTop:"2px"}}>{data.n} trade{data.n>1?"s":""}</div></>}</div>)})}
      </div>
    </div>
  </div>);
}

// ============ SIMPLE TP TIMELINE ============
function TPTimeline({trade,config}){
  const tpLevels=(trade.tpLevels||[]).filter(t=>parseFloat(t.price)>0);
  if(!tpLevels.length&&!parseFloat(trade.takeProfit))return(<div style={{textAlign:"center",padding:"1.5rem",fontSize:"12px",color:"var(--text4)"}}>Geen TP niveaus ingesteld voor deze trade.</div>);
  const entry=parseFloat(trade.entry)||0;
  const sl=parseFloat(trade.stopLoss)||0;
  const allTPs=tpLevels.length?tpLevels:[{price:trade.takeProfit,pct:"100",status:"open",actualPrice:""}];
  const prices=[entry,sl,...allTPs.map(t=>parseFloat(t.price)||0)].filter(p=>p>0);
  const minP=Math.min(...prices)*0.998;const maxP=Math.max(...prices)*1.002;const range=maxP-minP||1;
  const pos=p=>((p-minP)/range)*100;
  return(<div style={{padding:"20px",background:"rgba(42,46,57,0.3)",borderRadius:"8px",marginTop:"12px"}}>
    <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",fontWeight:600,marginBottom:"16px"}}>TP Tijdlijn</div>
    <div style={{position:"relative",height:"40px",margin:"0 20px"}}>
      <div style={{position:"absolute",top:"50%",left:0,right:0,height:"2px",background:"rgba(255,255,255,0.1)",transform:"translateY(-50%)"}}/>
      {sl>0&&<div style={{position:"absolute",top:0,bottom:0,left:`${pos(sl)}%`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"2px",height:"100%",background:"var(--red)"}}/>
        <div style={{position:"absolute",bottom:"-18px",fontSize:"9px",color:"var(--red)",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>SL ${fmt(sl)}</div>
      </div>}
      {entry>0&&<div style={{position:"absolute",top:0,bottom:0,left:`${pos(entry)}%`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"2px",height:"100%",background:"#C9A84C"}}/>
        <div style={{position:"absolute",bottom:"-18px",fontSize:"9px",color:"#C9A84C",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>E ${fmt(entry)}</div>
      </div>}
      {allTPs.map((tp,i)=>{const p=parseFloat(tp.price)||0;if(!p)return null;const hit=tp.status==="hit";return(<div key={i} style={{position:"absolute",top:0,bottom:0,left:`${pos(p)}%`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"2px",height:"100%",background:hit?"var(--green)":"rgba(46,170,111,0.4)"}}/>
        <div style={{position:"absolute",top:"-18px",fontSize:"9px",color:hit?"var(--green)":"var(--text4)",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>TP{i+1} ${fmt(p)}{hit&&" ✓"}</div>
      </div>);})}
    </div>
  </div>);
}


// ============ MAIN APP (v7: storage warning + keyboard shortcuts) ============
function App(){
  const[trades,setTrades]=useState([]);
  const[tradesLoaded,setTradesLoaded]=useState(false);

  // v9: Laad trades uit IndexedDB bij start (migreer van localStorage indien nodig)
  useEffect(function(){
    idbLoadAllTrades().then(function(idbTrades){
      if(idbTrades&&idbTrades.length>0){
        // IndexedDB heeft data - gebruik dat
        setTrades(idbTrades.map(function(t){return Object.assign({},EMPTY_TRADE,t);}));
        setTradesLoaded(true);
      } else {
        // Geen IDB data - probeer localStorage (migratie)
        try{
          var ls=localStorage.getItem("tj_trades");
          if(ls){
            var parsed=JSON.parse(ls);
            var migrated=parsed.map(function(t){return Object.assign({},EMPTY_TRADE,t);});
            setTrades(migrated);
            // Sla meteen op in IDB
            idbSaveAllTrades(migrated);
          }
        }catch(e){}
        setTradesLoaded(true);
      }
    }).catch(function(){
      // IDB volledig mislukt - val terug op localStorage
      try{
        var ls2=localStorage.getItem("tj_trades");
        if(ls2)setTrades(JSON.parse(ls2).map(function(t){return Object.assign({},EMPTY_TRADE,t);}));
      }catch(e){}
      setTradesLoaded(true);
    });
  },[]);
;
  const[config,setConfig]=useState(()=>{try{const d=localStorage.getItem("tj_config");return d?JSON.parse(d):{defaultQuote:"USDT",exchanges:{},theme:"morani"}}catch{return{defaultQuote:"USDT",exchanges:{},theme:"morani"}}});
  const[accounts,setAccounts]=useState(()=>{try{const d=localStorage.getItem("tj_accounts");return d?JSON.parse(d):[]}catch{return[]}});
  const[tagConfig,setTagConfig]=useState(()=>{try{const d=localStorage.getItem("tj_tags");return d?JSON.parse(d):DEFAULT_TAGS}catch{return DEFAULT_TAGS}});
  const[tab,setTab]=useState("dashboard");
  const[editTrade,setEditTrade]=useState(null);
  const[newTrade,setNewTrade]=useState(null);
  const[filters,setFilters]=useState({source:"all",pair:"all",quote:"all",direction:"all",status:"all",dateFrom:"",dateTo:"",setupTags:[],confirmationTags:[],emotionTags:[],mistakeTags:[],timeframeTags:[],sessionTags:[],leverage:"all",result:"all"});
  const[toast,setToast]=useState(null);
  const[mobileOpen,setMobileOpen]=useState(false);
  const[importDragOver,setImportDragOver]=useState(false);
  // v7 NEW: storage usage tracking
  const[storageUsage,setStorageUsage]=useState(()=>getStorageUsage());
  const[showPdf,setShowPdf]=useState(false);
  const[showWelcome,setShowWelcome]=useState(function(){try{return!localStorage.getItem("tj_welcomed");}catch(e){return false;}});

  const showToast=(msg,type="success",data=null)=>{setToast({msg,type,data,id:Date.now()});setTimeout(()=>setToast(null),5000)};

  const newEmptyTrade=()=>({...EMPTY_TRADE,id:uid(),date:new Date().toISOString().split("T")[0],time:new Date().toTimeString().slice(0,5)});

  // v9: IndexedDB als primaire opslag (onbeperkt), localStorage als fallback
  useEffect(()=>{
    if(!tradesLoaded)return;
    idbSaveAllTrades(trades).then(function(ok){
      if(!ok)console.warn("IndexedDB save mislukt, val terug op localStorage");
    });
    // Probeer ook localStorage als backup (faalt stil bij vol)
    try{
      var small=trades.map(function(t){return Object.assign({},t,{screenshot:null});});
      localStorage.setItem("tj_trades",JSON.stringify(small));
    }catch(e){}
    setStorageUsage(getStorageUsage());
  },[trades,tradesLoaded]);

  useEffect(()=>{try{localStorage.setItem("tj_config",JSON.stringify(config))}catch{}},[config]);
  useEffect(()=>{try{localStorage.setItem("tj_accounts",JSON.stringify(accounts))}catch{}},[accounts]);
  useEffect(()=>{try{localStorage.setItem("tj_tags",JSON.stringify(tagConfig))}catch{}},[tagConfig]);

  const navigate=(page)=>{setTab(page);setMobileOpen(false)};

  // v7 NEW: keyboard shortcuts
  useKeyboardShortcuts(navigate,setNewTrade,newEmptyTrade,editTrade);

  const saveTrade=(trade)=>{
    const isNew=!trades.find(t=>t.id===trade.id);

  const bulkTag=(ids,field,tag)=>setTrades(p=>p.map(t=>{if(!ids.includes(t.id))return t;const arr=t[field]||[];if(arr.includes(tag))return t;return{...t,[field]:[...arr,tag]}}));
  const importTrades=(newOnes)=>{setTrades(p=>{const ex=new Set(p.map(t=>t.id));const fresh=newOnes.filter(t=>!ex.has(t.id));return[...fresh,...p]});showToast(`${newOnes.length} trades geïmporteerd`)};

  const handleDrop=useCallback((e)=>{e.preventDefault();setImportDragOver(false);const f=e.dataTransfer.files[0];if(!f||!f.name.endsWith(".json"))return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const trList=d.trades||d;if(!Array.isArray(trList)){showToast("Ongeldig formaat","error");return}importTrades(trList.map(t=>({...EMPTY_TRADE,...t,id:t.id||uid(),highestPrice:t.highestPrice||"",lowestPrice:t.lowestPrice||""})))}catch{showToast("Fout bij importeren","error")}};r.readAsText(f)},[trades]);
  const handleDragOver=useCallback((e)=>{e.preventDefault();setImportDragOver(true)},[]);
  const handleDragLeave=useCallback(()=>setImportDragOver(false),[]);

  const exportTrades=()=>{const blob=new Blob([JSON.stringify({version:7,exportDate:new Date().toISOString(),trades},null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`morani-trades-v7-${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(url);showToast(`${trades.length} trades geëxporteerd`)};

  const theme=config.theme||"morani";
  useEffect(()=>{document.body.className=`theme-${theme}`},[theme]);

  const filteredTrades=applyFilters(trades,filters);

  const TABS=[
    {id:"dashboard",label:"Dashboard",icon:"📊"},
    {id:"trades",label:"Trades",icon:"📋"},
    {id:"analytics",label:"Analytics",icon:"📈"},
    {id:"review",label:"Review",icon:"🔍"},
    {id:"calendar",label:"Kalender",icon:"📅"},
    {id:"accounts",label:"Accounts",icon:"🔗"},
    {id:"tags",label:"Tags",icon:"🏷"},
    {id:"help",label:"Help",icon:"❓"},
  ];

  return(
    <div onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave} style={{minHeight:"100vh",position:"relative"}}>
      {showWelcome&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{background:"#0a0a0a",border:"1px solid rgba(201,168,76,0.3)",borderRadius:"16px",padding:"36px 32px",width:"100%",maxWidth:"520px",textAlign:"center"}}>
          <div style={{fontSize:"32px",marginBottom:"16px"}}>📊</div>
          <h2 style={{fontSize:"22px",fontWeight:800,color:"#C9A84C",marginBottom:"12px",fontFamily:"var(--font)"}}>Welkom bij de Morani Trading Journal</h2>
          <p style={{fontSize:"14px",color:"rgba(255,255,255,0.75)",lineHeight:1.7,marginBottom:"20px"}}>
            Jouw persoonlijke trading dashboard — gebouwd op de Morani methodologie. Log trades, analyseer patronen en word een consistentere trader.
          </p>
          <div style={{background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"10px",padding:"14px 18px",marginBottom:"20px",textAlign:"left"}}>
            <div style={{fontSize:"11px",color:"#C9A84C",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"10px"}}>Wat je moet weten</div>
            {[
              ["🔒","100% privé","Alle data blijft lokaal in jouw browser. Niemand anders kan jouw trades zien."],
              ["♾️","Onbeperkte opslag","Trades worden opgeslagen in IndexedDB — geen 5MB limiet meer. Log zoveel je wilt."],
              ["💾","Maak backups","Exporteer regelmatig via de Export-knop. Bij browserreset of nieuw apparaat heb je anders geen data."],
              ["🔗","Exchange koppeling","Koppel MEXC, Blofin of Kraken Futures via Accounts voor automatische import."]
            ].map(function(item){return(
              <div key={item[0]} style={{display:"flex",gap:"10px",marginBottom:"8px",alignItems:"flex-start"}}>
                <span style={{fontSize:"16px",flexShrink:0}}>{item[0]}</span>
                <div><div style={{fontSize:"12px",fontWeight:700,color:"rgba(255,255,255,0.9)",marginBottom:"2px"}}>{item[1]}</div><div style={{fontSize:"11px",color:"rgba(255,255,255,0.5)",lineHeight:1.5}}>{item[2]}</div></div>
              </div>
            );} )}
          </div>
          <button onClick={function(){try{localStorage.setItem("tj_welcomed","1");}catch(e){}setShowWelcome(false);}} style={{padding:"12px 36px",borderRadius:"10px",border:"1px solid rgba(201,168,76,0.5)",background:"#C9A84C",color:"#000",fontSize:"15px",fontWeight:800,cursor:"pointer",fontFamily:"var(--font)",letterSpacing:"0.02em"}}>
            Start met loggen
          </button>
        </div>
      </div>}
      {importDragOver&&<div style={{position:"fixed",inset:0,background:"rgba(201,168,76,0.15)",border:"3px dashed var(--blue2)",borderRadius:"8px",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn .2s ease"}}><div style={{textAlign:"center",color:"#C9A84C",fontWeight:700,fontSize:"20px"}}>📂 Drop JSON bestand om te importeren</div></div>}

      {/* Topbar */}
      <div className="tj-topbar" style={{position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"0"}}>
          <a className="morani-link" href="https://www.moranitraden.nl" target="_blank" rel="noopener noreferrer">
            <div className="tj-logo">
              <div style={{display:"flex",flexDirection:"column",gap:"2px"}}>
                <div style={{fontSize:"11px",fontWeight:700,letterSpacing:"0.18em",fontFamily:"var(--font)",color:"var(--tj-text-color,#ffffff)",textShadow:"var(--tj-text-shadow,0 0 12px rgba(201,168,76,0.5), 0 0 28px rgba(201,168,76,0.2))"}}>TRADING JOURNAL</div>
                <div style={{fontSize:"8px",color:"rgba(201,168,76,0.55)",letterSpacing:"0.14em",fontFamily:"var(--font)"}}>built by Zaratras · powered by Morani</div>
              </div>
            </div>
          </a>
          <nav className="tj-tabs" aria-label="Main navigation">
            {TABS.slice(0,5).map(t=>(<button key={t.id} className={`tj-tab${tab===t.id?" active":""}`} onClick={()=>navigate(t.id)}><span>{t.icon}</span>{t.label}</button>))}
            <button className={`tj-tab${["accounts","tags","help"].includes(tab)?" active":""}`} onClick={()=>navigate("accounts")}><span>⚙</span>Instellingen</button>
          </nav>
        </div>
        <div className="tj-right-btns" style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <button onClick={()=>{setNewTrade(newEmptyTrade());navigate("new")}} style={{padding:"7px 14px",borderRadius:"var(--radius)",border:"1px solid var(--blue2)",background:"rgba(201,168,76,0.12)",color:"#C9A84C",fontSize:"12px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,display:"flex",alignItems:"center",gap:"6px"}}><span>+</span> Trade <span className="kbd" style={{fontSize:"9px",borderColor:"rgba(201,168,76,0.4)"}}>N</span></button>
          <button onClick={exportTrades} title="Exporteer alle trades">Export</button>
          <button onClick={()=>setConfig(p=>({...p,theme:p.theme==="morani"?"light":"morani"}))}>🌙</button>
          <div className="hamburger" onClick={()=>setMobileOpen(true)}>☰</div>
        </div>
      </div>

      {/* Mobile menu */}
      {mobileOpen&&<><div className="mobile-menu-overlay" onClick={()=>setMobileOpen(false)}/><div className="mobile-menu"><button className="mobile-menu-close" onClick={()=>setMobileOpen(false)}>✕</button><div className="mm-logo"></div>
        {TABS.map(t=>(<button key={t.id} className={`mm-item${tab===t.id?" active":""}`} onClick={()=>navigate(t.id)}>{t.icon} {t.label}</button>))}
        <div className="mm-sep"/>
        <button className="mm-item" onClick={()=>{setNewTrade(newEmptyTrade());navigate("new");setMobileOpen(false)}}>+ Nieuwe trade</button>
        <button className="mm-item" onClick={exportTrades}>↓ Export JSON</button>
      </div></>}

      {/* Toast */}
      {toast&&<div style={{position:"fixed",bottom:"24px",right:"24px",zIndex:1000,padding:"12px 20px",borderRadius:"var(--radius-lg)",background:toast.type==="error"?"rgba(210,50,50,0.9)":"rgba(30,40,55,0.95)",border:`1px solid ${toast.type==="error"?"rgba(239,83,80,0.4)":"rgba(54,58,69,0.9)"}`,color:"#fff",fontSize:"13px",fontWeight:500,display:"flex",alignItems:"center",gap:"12px",animation:"slideDown .3s ease",backdropFilter:"blur(12px)",boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>
        <span>{toast.type==="error"?"❌":"✓"} {toast.msg}</span>
        {toast.data&&<button onClick={()=>{setTrades(p=>[toast.data,...p]);setToast(null)}} style={{fontSize:"11px",color:"#C9A84C",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",padding:"0",textDecoration:"underline"}}>Ongedaan maken</button>}
        <button onClick={()=>setToast(null)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.6)",cursor:"pointer",fontSize:"14px",padding:"0",lineHeight:1}}>✕</button>
      </div>}

      {/* Content */}
      <div className="tj-content" style={{padding:"24px 28px",maxWidth:"1320px",margin:"0 auto"}}>
        {/* Filter bar for trade views */}
        {["trades","analytics","review","calendar"].includes(tab)&&!editTrade&&!newTrade&&<FilterBar trades={filteredTrades} allTrades={trades} filters={filters} setFilters={setFilters} config={config} accounts={accounts}/>}

        {/* Sub-nav for settings */}
        {["accounts","tags","help"].includes(tab)&&<div style={{display:"flex",gap:"4px",marginBottom:"16px"}}>
          {[["accounts","🔗 Accounts"],["tags","🏷 Tags"],["help","❓ Help"]].map(([id,label])=>(<button key={id} onClick={()=>setTab(id)} style={{padding:"6px 14px",borderRadius:"6px",border:"none",background:tab===id?"rgba(201,168,76,0.12)":"transparent",color:tab===id?"#C9A84C":"var(--text4)",fontSize:"12px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{label}</button>))}
        </div>}

        {/* New trade */}
        {(tab==="new"&&newTrade)&&<>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}}>
            <div style={{fontSize:"16px",fontWeight:700}}>Nieuwe trade</div>
            <button onClick={()=>{setNewTrade(null);navigate("trades")}} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"14px"}}>✕</button>
          </div>
          <TradeForm trade={newTrade} setTrade={setNewTrade} onSave={()=>saveTrade(newTrade)} onCancel={()=>{setNewTrade(null);navigate("trades")}} tagConfig={tagConfig} config={config} accounts={accounts}/>
        </>}

        {/* Edit modal */}
        {editTrade&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,overflowY:"auto",padding:"20px",animation:"fadeIn .2s ease"}} onClick={e=>{if(e.target===e.currentTarget)setEditTrade(null)}}>
          <div style={{maxWidth:"760px",margin:"0 auto",position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <div style={{fontSize:"16px",fontWeight:700,color:"var(--text)"}}>Trade bewerken</div>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>{if(confirm("TP tijdlijn laden?")){}}} style={{display:"none"}}/>
                <button onClick={()=>setEditTrade(null)} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"14px",padding:"4px"}}>✕</button>
              </div>
            </div>
            <TradeForm trade={editTrade} setTrade={setEditTrade} onSave={()=>saveTrade(editTrade)} onCancel={()=>setEditTrade(null)} tagConfig={tagConfig} config={config} accounts={accounts}/>
            <TPTimeline trade={editTrade} config={config}/>
          </div>
        </div>}

        {/* Main content routing */}
        {tab==="dashboard"&&<Dashboard trades={filteredTrades} config={config} accounts={accounts} onReport={()=>setShowPdf(true)} storageUsage={storageUsage}/>}
        {tab==="trades"&&!editTrade&&<TradeList trades={filteredTrades} onEdit={setEditTrade} onDelete={deleteTrade} onBulkDelete={bulkDelete} onBulkTag={bulkTag} showToast={showToast} tagConfig={tagConfig}/>}
        {tab==="analytics"&&<Analytics trades={filteredTrades}/>}
        {tab==="review"&&<ReviewDashboard trades={filteredTrades}/>}
        {tab==="calendar"&&<Calendar trades={filteredTrades}/>}
        {tab==="accounts"&&<AccountsHub config={config} setConfig={setConfig} accounts={accounts} setAccounts={setAccounts} showToast={showToast} trades={trades} importTrades={importTrades}/>}
        {tab==="tags"&&<TagManager tagConfig={tagConfig} setTagConfig={setTagConfig} trades={trades} setTrades={setTrades} showToast={showToast}/>}
        {tab==="help"&&<HelpPage/>}
      </div>

      {/* Footer hint */}
      <div style={{textAlign:"center",padding:"8px 0 16px",fontSize:"10px",color:"var(--text5)"}}>
        <span className="kbd">N</span> Nieuw &nbsp; <span className="kbd">T</span> Trades &nbsp; <span className="kbd">D</span> Dashboard &nbsp; Drag & drop JSON om te importeren
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
