<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncJournal v9.0.0</title>
<meta name="app-version" content="9.0.0">
<meta name="app-name" content="SyncJournal">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--text:#ffffff;--text2:rgba(255,255,255,0.9);--text3:rgba(255,255,255,0.6);--text4:rgba(255,255,255,0.38);--text5:rgba(255,255,255,0.22);
--green:#2eaa6f;--green2:rgba(46,170,111,0.12);--green3:rgba(46,170,111,0.2);
--red:#e05555;--red2:rgba(224,85,85,0.12);--red3:rgba(224,85,85,0.2);
--blue:#C9A84C;--blue2:#C9A84C;--blue3:rgba(201,168,76,0.12);--blue4:rgba(201,168,76,0.08);
--amber:#C9A84C;--amber2:rgba(201,168,76,0.12);--orange:#C9A84C;--orange2:rgba(201,168,76,0.12);
--teal:#2eaa6f;--teal2:rgba(46,170,111,0.1);
--purple:#C9A84C;--purple2:rgba(201,168,76,0.1);
--radius:10px;--radius-lg:14px;
--font:'Outfit',sans-serif;--mono:'Outfit',monospace;
--gold:#C9A84C;--gold-dim:rgba(201,168,76,0.07);--gold-border:rgba(201,168,76,0.28);
--stat-fs:clamp(18px,2vw,26px);--stat-label-fs:clamp(10px,1vw,12px);
--content-pad:clamp(16px,2vw,28px);
--c-win:#2eaa6f;--c-loss:#e05555;--c-long:#2eaa6f;--c-short:#e05555;
--c-tokyo:#C9A84C;--c-london:#8a9fc0;--c-ny:#9a8acc;--c-off:#666672;--c-weekend:#b07090;
--c-neutral:#6a7a8a;
--bg:#000000;--bg2:#0a0a0a;--bg3:#0f0f0f;--bg4:#141414;
--glass:rgba(255,255,255,0.03);--glass-border:rgba(201,168,76,0.18);--glass-border-accent:rgba(201,168,76,0.28);
--glass-blur:none;
--border1:rgba(201,168,76,0.08);--border2:rgba(201,168,76,0.12);--border3:rgba(201,168,76,0.18);--border4:rgba(201,168,76,0.22);--border5:rgba(201,168,76,0.28);--border6:rgba(201,168,76,0.35);
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;letter-spacing:0.01em}
body::before,body::after{display:none;content:'';position:fixed;pointer-events:none}
body.theme-morani{
--bg:#000000;--bg2:#080808;--bg3:#0c0c0c;--bg4:#111111;
--glass:rgba(255,255,255,0.02);--glass-border:rgba(201,168,76,0.2);--glass-border-accent:rgba(201,168,76,0.3);
--glass-blur:blur(28px);
--border1:rgba(201,168,76,0.07);--border2:rgba(201,168,76,0.12);--border3:rgba(201,168,76,0.18);--border4:rgba(201,168,76,0.24);--border5:rgba(201,168,76,0.3);--border6:rgba(201,168,76,0.38);
background:#0d0f14}
body.theme-light{
--bg:#f8f6f1;--bg2:#ffffff;--bg3:#f0ede6;--bg4:#e8e4dc;
--text:#111111;--text2:#2d2d2d;--text3:#555555;--text4:#777777;--text5:#999999;
--gold:#8B6914;--gold-dim:rgba(139,105,20,0.08);--gold-border:rgba(139,105,20,0.3);
--amber:#8B6914;--amber2:rgba(139,105,20,0.1);--blue:#8B6914;--blue2:#8B6914;--blue3:rgba(139,105,20,0.1);--blue4:rgba(139,105,20,0.07);--purple:#8B6914;--purple2:rgba(139,105,20,0.08);--orange:#8B6914;--orange2:rgba(139,105,20,0.1);
--glass:#ffffff;--glass-border:rgba(139,105,20,0.18);--glass-border-accent:rgba(139,105,20,0.28);
--glass-blur:blur(20px);
--border1:rgba(0,0,0,0.06);--border2:rgba(0,0,0,0.09);--border3:rgba(0,0,0,0.13);--border4:rgba(139,105,20,0.22);--border5:rgba(139,105,20,0.3);--border6:rgba(139,105,20,0.4);
--green:#1e8a57;--green2:rgba(30,138,87,0.1);--green3:rgba(30,138,87,0.18);
--red:#c04040;--red2:rgba(192,64,64,0.1);--red3:rgba(192,64,64,0.18);
--c-win:#1e8a57;--c-loss:#c04040;--c-long:#1e8a57;--c-short:#c04040;
background:#f8f6f1;color:#111111;--tj-text-color:#1a0e00;--tj-text-shadow:0 0 6px rgba(139,105,20,0.2)}
body.theme-morani::before{display:block;inset:0;z-index:-1;background:
  radial-gradient(ellipse 700px 500px at 80% 0%,rgba(201,168,76,0.12) 0%,transparent 65%),
  radial-gradient(ellipse 400px 300px at 10% 90%,rgba(201,168,76,0.06) 0%,transparent 65%);
  filter:blur(40px)}
body.theme-morani::after{display:block;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(201,168,76,0.4) 20%,rgba(201,168,76,0.7) 50%,rgba(201,168,76,0.4) 80%,transparent 95%);z-index:1001}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border4);border-radius:3px}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes logoShimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 3px rgba(201,168,76,0.1))}50%{filter:drop-shadow(0 0 12px rgba(46,170,111,0.4))}}
.spinner{width:16px;height:16px;border:2px solid rgba(201,168,76,0.2);border-top-color:#C9A84C;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.tj-topbar{height:64px;background:var(--glass);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-bottom:1px solid rgba(201,168,76,0.2);transition:all .2s}
.theme-light .tj-topbar{background:linear-gradient(135deg,rgba(139,105,20,0.06) 0%,rgba(248,246,241,0.98) 100%);border-bottom:1px solid rgba(139,105,20,0.18);backdrop-filter:blur(16px)}
.tj-logo{cursor:pointer;display:flex;align-items:center;gap:12px}
.tj-logo:hover .tj-logo-text{filter:drop-shadow(0 0 8px rgba(201,168,76,0.5))}
.tj-logo img{display:none}
.tj-logo:hover img{transform:scale(1.04)}
.tj-logo-text{font-size:22px!important;font-weight:800;letter-spacing:0.04em;background:linear-gradient(90deg,#C9A84C,#d4b86a,#C9A84C);background-size:300% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:logoShimmer 6s linear infinite;font-family:var(--font)}
.tj-logo-sub{font-size:8px;color:var(--text4);font-family:var(--mono);letter-spacing:0.14em;margin-top:-2px}
.tj-tabs{display:flex;gap:2px;margin-left:8px}
.tj-tab{padding:0 16px!important;height:64px!important;display:flex;align-items:center;font-size:13.5px!important;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;color:var(--text4);cursor:pointer;font-family:var(--font);transition:all .2s ease;position:relative;letter-spacing:0.01em}
.tj-tab:hover{color:var(--text);background:rgba(201,168,76,0.04)}
.tj-tab.active,.tj-tab[data-active="true"]{color:var(--text)!important;font-weight:600;border-bottom-color:transparent}
.tj-tab.active::after,.tj-tab[data-active="true"]::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:2px;background:#C9A84C;border-radius:0}
.tj-tab span{margin-right:6px;font-size:13px;opacity:0.75}
.tj-right-btns{display:flex;align-items:center;gap:8px}
.tj-right-btns button{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border3);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .2s;font-weight:500}
.tj-right-btns button:hover{border-color:var(--gold-border);color:var(--text);background:var(--gold-dim)}
.hamburger{display:none;background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:8px;line-height:1}
.mobile-menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:999;animation:fadeIn .2s ease}
.mobile-menu{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--bg2);border-right:1px solid var(--border3);z-index:1000;animation:slideIn .25s ease;padding:16px 0;overflow-y:auto}
.mobile-menu-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer}
.mobile-menu .mm-item{display:block;width:100%;padding:13px 20px;border:none;background:none;color:var(--text3);font-size:14px;text-align:left;cursor:pointer;font-family:var(--font);transition:background .1s;font-weight:500}
.mobile-menu .mm-item:hover,.mobile-menu .mm-item.active{background:rgba(201,168,76,0.07);color:#C9A84C}
.mobile-menu .mm-sep{height:1px;background:var(--border2);margin:8px 16px}
.mobile-menu .mm-logo{padding:8px 20px 16px;display:flex;align-items:center;gap:10px}
.resp-grid-stats{display:grid;gap:14px}
@media(min-width:901px){.resp-grid-stats{grid-template-columns:repeat(4,1fr)}}
@media(min-width:601px) and (max-width:900px){.resp-grid-stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.resp-grid-stats{grid-template-columns:1fr}}
.resp-grid-donuts{display:grid;gap:16px}
@media(min-width:769px){.resp-grid-donuts{grid-template-columns:repeat(3,1fr)}}
@media(min-width:601px) and (max-width:768px){.resp-grid-donuts{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.resp-grid-donuts{grid-template-columns:1fr}}
.resp-grid-2col{display:grid;gap:18px}
@media(min-width:769px){.resp-grid-2col{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.resp-grid-2col{grid-template-columns:1fr}}
@media(max-width:1200px){.tj-topbar .tj-tabs{gap:0}.tj-topbar .tj-tab{padding:0 10px;font-size:12px}.tj-topbar .tj-tab span{display:none}.tj-content{padding:14px 18px!important}}
@media(max-width:900px){.hamburger{display:block}.tj-topbar .tj-tabs{display:none!important}.tj-topbar .tj-right-btns{gap:4px}.tj-content{padding:12px 14px!important}}
@media(max-width:600px){.hamburger{display:block}.tj-topbar{height:48px!important;padding:0 12px!important}.tj-topbar .tj-tabs{display:none!important}.tj-topbar .tj-right-btns{display:none!important}.tj-topbar .tj-logo img{height:30px!important}.tj-topbar .tj-logo-text{font-size:15px!important}.tj-topbar .tj-logo-sub{display:none}.tj-content{padding:10px!important}}
@media(pointer:coarse){button{min-height:44px}.tj-tab{min-height:48px}.mm-item{min-height:48px}}
.morani-link{text-decoration:none;transition:filter .2s}
.morani-link:hover{filter:drop-shadow(0 0 6px rgba(201,168,76,0.4))}
/* v7 NEW: search bar */
.search-bar{width:100%;padding:10px 14px 10px 38px;border-radius:var(--radius);border:1px solid var(--border3);background:var(--glass);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s}
.search-bar:focus{border-color:var(--gold-border)}
.search-wrapper{position:relative;margin-bottom:12px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text4);pointer-events:none}
/* v7 NEW: storage warning bar */
.storage-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:var(--radius);background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);margin-bottom:12px;font-size:12px;color:var(--amber)}
.storage-bar.critical{background:rgba(239,83,80,0.1);border-color:rgba(239,83,80,0.25);color:var(--red)}
/* v7 NEW: MAE/MFE badge */
/* v7 NEW: R-multiple chip */
.r-chip{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-weight:700}
.r-pos{background:rgba(46,170,111,0.15);color:var(--green)}
.r-neg{background:rgba(239,83,80,0.15);color:var(--red)}
.r-zero{background:rgba(255,255,255,0.08);color:var(--text4)}
/* v7 NEW: expectancy highlight */
.exp-positive{color:#2eaa6f;font-weight:700}
.exp-negative{color:#e05555;font-weight:700}
/* v7 NEW: keyboard shortcut hint */
.kbd{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid var(--border4);background:rgba(255,255,255,0.06);color:var(--text4);font-family:var(--mono)}

.theme-light .stat-card,.theme-light [style*="var(--glass)"]{background:#ffffff}
.theme-light .tj-content{background:#f8f6f1}
.theme-light .r-chip.r-zero{background:rgba(26,26,26,0.08);color:rgba(26,26,26,0.5)}
.theme-light .search-bar{background:#ffffff;color:#1a1a1a;border-color:rgba(139,105,20,0.2)}
.theme-light .search-bar:focus{border-color:rgba(139,105,20,0.4)}
.theme-light table{background:#ffffff}
.theme-light .tj-tab{color:rgba(26,26,26,0.5)}
.theme-light .tj-tab:hover{color:#1a1a1a;background:rgba(139,105,20,0.05)}
.theme-light .tj-tab.active,.theme-light .tj-tab[data-active="true"]{color:#1a1a1a}
.theme-light .mm-item{color:rgba(26,26,26,0.6)}
.theme-light .mm-item:hover,.theme-light .mm-item.active{background:rgba(139,105,20,0.06);color:#8B6914}
.theme-light .mobile-menu{background:#ffffff;border-right:1px solid rgba(139,105,20,0.15)}
.theme-light select option{background:#ffffff;color:#1a1a1a}
.theme-light input,.theme-light textarea,.theme-light select{background:#ffffff;color:#1a1a1a;border-color:rgba(139,105,20,0.2)}
.theme-light input:focus,.theme-light textarea:focus,.theme-light select:focus{border-color:rgba(139,105,20,0.45)}
.theme-light input::placeholder,.theme-light textarea::placeholder{color:rgba(26,26,26,0.35)}
.theme-light .tj-right-btns button{color:rgba(26,26,26,0.6);border-color:rgba(139,105,20,0.2)}
.theme-light .tj-right-btns button:hover{color:#1a1a1a;background:rgba(139,105,20,0.06)}
.theme-light button[style*="background:var(--gold"]{background:#8B6914!important}
.theme-light .welcome-modal-bg{background:rgba(248,246,241,0.92)!important}
.theme-light .welcome-modal{background:#ffffff!important;border-color:rgba(139,105,20,0.25)!important}

/* ===== LIGHT THEME COMPREHENSIVE OVERRIDES ===== */
.theme-light body{color:#111111}

/* Progress bars & chart backgrounds */
.theme-light [style*="rgba(255,255,255,0.10)"]{background:rgba(0,0,0,0.06)!important}
.theme-light [style*="rgba(255,255,255,0.08)"]{background:rgba(0,0,0,0.05)!important}
.theme-light [style*="rgba(255,255,255,0.05)"]{background:rgba(0,0,0,0.04)!important}
.theme-light [style*="rgba(255,255,255,0.03)"]{background:rgba(0,0,0,0.03)!important}
.theme-light [style*="rgba(255,255,255,0.02)"]{background:rgba(0,0,0,0.02)!important}

/* Cards and panels */
.theme-light [style*="background:var(--glass)"]{background:#ffffff!important;border-color:rgba(0,0,0,0.09)!important}

.theme-light [style*="background:rgba(30,35,4"]{background:#f0ede6!important}

/* Text colors that are hardcoded white-based */
.theme-light [style*="color:var(--text3)"]{color:#555555!important}
.theme-light [style*="color:var(--text4)"]{color:#777777!important}
.theme-light [style*="color:var(--text5)"]{color:#999999!important}
.theme-light [style*="color:rgba(255,255,255,0.9)"]{color:#111111!important}
.theme-light [style*="color:rgba(255,255,255,0.85)"]{color:#222222!important}
.theme-light [style*="color:rgba(255,255,255,0.75)"]{color:#333333!important}
.theme-light [style*="color:rgba(255,255,255,0.6)"]{color:#555555!important}
.theme-light [style*="color:rgba(255,255,255,0.5)"]{color:#666666!important}
.theme-light [style*="color:rgba(255,255,255,0.4)"]{color:#777777!important}
.theme-light [style*="color:rgba(255,255,255,0.3)"]{color:#888888!important}

/* Tables */
.theme-light table{background:#ffffff;color:#111111}
.theme-light th{color:#8B6914!important;border-bottom-color:rgba(0,0,0,0.1)!important}

.theme-light tr:hover td{background:rgba(139,105,20,0.04)!important}

/* Trade row status badges */
.theme-light [style*="background:rgba(46,170,111,0.12)"]{background:rgba(30,138,87,0.12)!important}
.theme-light [style*="background:rgba(224,85,85,0.12)"]{background:rgba(192,64,64,0.12)!important}
.theme-light [style*="background:rgba(201,168,76,0.12)"]{background:rgba(139,105,20,0.12)!important}
.theme-light [style*="background:rgba(201,168,76,0.08)"]{background:rgba(139,105,20,0.08)!important}

/* TP Timeline line */
.theme-light [style*="background:rgba(255,255,255,0.15)"]{background:rgba(0,0,0,0.12)!important}
.theme-light [style*="background:rgba(255,255,255,0.2)"]{background:rgba(0,0,0,0.14)!important}

/* Toggle switches bg */

/* Toast */

/* Welcome modal */
.theme-light [style*="background:rgba(0,0,0,0.85)"]{background:rgba(248,246,241,0.95)!important}
.theme-light [style*="background:#0a0a0a"]{background:#ffffff!important}
.theme-light [style*="background:rgba(201,168,76,0.06)"]{background:rgba(139,105,20,0.06)!important}

.theme-light canvas{filter:none}

/* Section headers */

/* Stat cards */
.theme-light [style*="background:rgba(255,255,255,0.04)"]{background:#ffffff!important}
.theme-light [style*="background:rgba(255,255,255,0.06)"]{background:#ffffff!important}

/* Filter bar and misc */
.theme-light [style*="background:rgba(201,168,76,0.07)"]{background:rgba(139,105,20,0.06)!important}
.theme-light [style*="background:rgba(201,168,76,0.05)"]{background:rgba(139,105,20,0.05)!important}

.theme-light .hamburger{color:#555555}

.theme-light [style*="color:rgba(201,168,76,0.5)"]{color:rgba(139,105,20,0.65)!important}
/* ===== END LIGHT THEME ===== */
.theme-light .tj-tab{color:#444444!important}
.theme-light .tj-tab{color:#444444!important}
.theme-light .tj-tab:hover{color:#111111!important;background:rgba(139,105,20,0.06)!important}
.theme-light .tj-tab.active,.theme-light .tj-tab[data-active="true"]{color:#111111!important;font-weight:600!important}
.theme-light .tj-tab.active::after,.theme-light .tj-tab[data-active="true"]::after{background:#8B6914!important}

/* Calendar win cells — warm white + left gold-green accent */
.theme-light [style*="background:rgba(42,181,135"]{
  background:#ffffff!important;
  border-left:3px solid #1e8a57!important;
  border-top-color:rgba(30,138,87,0.15)!important;
  border-right-color:rgba(30,138,87,0.15)!important;
  border-bottom-color:rgba(30,138,87,0.15)!important;
  box-shadow:0 1px 4px rgba(30,138,87,0.08)!important
}

/* Calendar loss cells — warm white + left red accent */
.theme-light [style*="background:rgba(212,106,106"]{
  background:#ffffff!important;
  border-left:3px solid #c04040!important;
  border-top-color:rgba(192,64,64,0.15)!important;

function getSessionTags(date,time){
  if(!date||!time)return[];
  const dt=new Date(date+"T"+(time.length===5?time+":00":time));
  if(isNaN(dt.getTime()))return[];
  const cetParts=new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/Amsterdam",hour:"numeric",minute:"numeric",weekday:"short",hour12:false}).formatToParts(dt);
  const h=parseInt(cetParts.find(p=>p.type==="hour")?.value||"0");
  const m=parseInt(cetParts.find(p=>p.type==="minute")?.value||"0");
  const hm=h*60+m;
  const wd=cetParts.find(p=>p.type==="weekday")?.value?.toLowerCase()||"";
  if(wd==="sat"||wd==="sun")return["Weekend"];
  if(hm>=930&&hm<1320)return["New York"];
  if(hm>=540&&hm<930)return["London"];
  if(hm>=120&&hm<480)return["Tokyo"];
  return["Off-session"];
}

// v7 FIX: localStorage quota monitoring
function getStorageUsage(){
  try{
    let total=0;
    for(const key of Object.keys(localStorage)){
      total+=((localStorage[key]||"").length+(key||"").length)*2;
    }
    return{bytes:total,pct:total/(5*1024*1024)*100};
  }catch{return{bytes:0,pct:0}}
}

function safeSave(key,data){
  try{
    const json=JSON.stringify(data);
    localStorage.setItem(key,json);
    return{ok:true,usage:getStorageUsage()};
  }catch(e){
    if(e.name==="QuotaExceededError"||e.code===22){
      return{ok:false,error:"quota",usage:getStorageUsage()};
    }
    return{ok:false,error:e.message,usage:getStorageUsage()};
  }
}

// ============ IndexedDB voor trade opslag (geen grootteLimiet) ============
function openTradesDB(){
  return new Promise(function(res,rej){
    var req=indexedDB.open("morani_trades_v1",1);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains("trades"))
        db.createObjectStore("trades",{keyPath:"id"});
    };
    req.onsuccess=function(e){res(e.target.result);};
    req.onerror=function(){rej(req.error);};
  });
}
function idbSaveAllTrades(trades){
  return openTradesDB().then(function(db){
    return new Promise(function(res){
      var tx=db.transaction("trades","readwrite");
      var store=tx.objectStore("trades");
      store.clear();
      trades.forEach(function(t){
        var clean=Object.assign({},t);
        // Keep screenshots only as idb: references, not raw base64
        if(clean.screenshot&&clean.screenshot.startsWith("data:"))
          clean.screenshot=null;
        store.put(clean);
      });
      tx.oncomplete=function(){res(true);};
      tx.onerror=function(){res(false);};
    });
  }).catch(function(){return false;});
}
function idbLoadAllTrades(){
  return openTradesDB().then(function(db){
    return new Promise(function(res,rej){
      var tx=db.transaction("trades","readonly");
      var req=tx.objectStore("trades").getAll();
      req.onsuccess=function(){res(req.result||[]);};
      req.onerror=function(){rej(req.error);};
    });
  }).catch(function(){return null;});
}


// ============ R-MULTIPLE CALCULATION ============
// v7 NEW: Calculate actual R-multiple for a trade
function calcRMultiple(trade){
  const entry=parseFloat(trade.entry);
  const sl=parseFloat(trade.stopLoss);
  const pnlVal=parseFloat(trade.pnl);
  if(!entry||!sl||sl===entry||isNaN(pnlVal))return null;
  // Position size in base currency (contracts or lots)
  const size=parseFloat(trade.positionSize)||1;
  const risk=Math.abs(entry-sl);
  // Risk in USDT = risk × size / entry (for linear contracts)
  const riskUsdt=risk*size/entry;
  if(riskUsdt<=0)return null;
  return pnlVal/riskUsdt;
}

// v7 NEW: Keyboard shortcut overlay
function useKeyboardShortcuts(navigate,setNewTrade,newEmptyTrade,editTrade){
  useEffect(()=>{
    const handler=(e)=>{
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
      if(e.key==="n"||e.key==="N"){e.preventDefault();if(!editTrade){setNewTrade(newEmptyTrade());navigate("new")}}
      if(e.key==="t"||e.key==="T"){e.preventDefault();navigate("trades")}
      if(e.key==="d"||e.key==="D"){e.preventDefault();navigate("dashboard")}
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[navigate,setNewTrade,newEmptyTrade,editTrade]);
}

// ============ v7: TAG MANAGER (FIXED) ============
function TagManager({tagConfig,setTagConfig,trades,setTrades,showToast}){
  const[renaming,setRenaming]=useState(null);
  const[renameVal,setRenameVal]=useState("");
  const[adding,setAdding]=useState(null);
  const[addVal,setAddVal]=useState("");

  const getTags=(catKey)=>tagConfig[catKey]||DEFAULT_TAGS[catKey]||[];

  const addTag=(catKey)=>{
    if(!addVal.trim())return;
    const current=getTags(catKey);
    if(current.includes(addVal.trim())){showToast("Tag bestaat al","error");return}
    setTagConfig(p=>({...p,[catKey]:[...current,addVal.trim()]}));
    setAddVal("");setAdding(null);showToast("Tag toegevoegd");
  };

  const removeTag=(catKey,tag)=>{
    const usedCount=trades.filter(t=>(t[catKey]||[]).includes(tag)).length;
    const msg=usedCount>0?`"${tag}" verwijderen? Wordt nog getoond op ${usedCount} bestaande trade${usedCount>1?"s":""}.`:`"${tag}" verwijderen?`;
    if(!confirm(msg))return;
    setTagConfig(p=>({...p,[catKey]:getTags(catKey).filter(t=>t!==tag)}));
    showToast(`Tag "${tag}" verwijderd`);
  };

  const startRename=(catKey,tag)=>{setRenaming({catKey,tag});setRenameVal(tag)};

  // v7 FIX: Actually rename tag in all trades
  const doRename=()=>{
    if(!renaming||!renameVal.trim())return;
    const{catKey,tag}=renaming;
    if(renameVal.trim()===tag){setRenaming(null);return}
    if(getTags(catKey).includes(renameVal.trim())){showToast("Tag naam bestaat al","error");return}
    const newTag=renameVal.trim();
    // Update tagConfig
    setTagConfig(p=>({...p,[catKey]:getTags(catKey).map(t=>t===tag?newTag:t)}));
    // v7 FIX: Update all trades that use this tag
    setTrades(p=>p.map(t=>{
      const arr=t[catKey]||[];
      if(!arr.includes(tag))return t;
      return{...t,[catKey]:arr.map(x=>x===tag?newTag:x)};
    }));
    showToast(`"${tag}" hernoemd naar "${newTag}" in alle trades`);
    setRenaming(null);
  };

  return(
    <div style={{animation:"fadeIn .3s ease",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"24px",border:"1px solid var(--glass-border)"}}>
      <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"1.5rem"}}>Tag categorieën beheren</div>

      {TAG_CATEGORIES.map(cat=>{
        const c=COLORS[cat.color]||COLORS.blue;
        const tags=getTags(cat.key);
        const isAdding=adding===cat.key;

        const renderTag=(tag)=>{
          const isRenaming=renaming?.catKey===cat.key&&renaming?.tag===tag;
          const usedCount=trades.filter(t=>(t[cat.key]||[]).includes(tag)).length;
          const isEmo=cat.key==="emotionTags";
          const neg=isEmo&&isNegEmotion(tag);
          const tagBorder=isEmo?(neg?"rgba(220,122,122,0.28)":"rgba(46,170,111,0.28)"):`${c.border}40`;
          const tagBg=isEmo?(neg?"rgba(239,83,80,0.1)":"rgba(46,170,111,0.1)"):c.bg;
          const tagColor=isEmo?(neg?"#e05555":CHART_COLORS.win):c.text;
          if(isRenaming)return(
            <form key={tag} onSubmit={e=>{e.preventDefault();doRename()}} style={{display:"flex",gap:"4px",alignItems:"center"}}>
              <input autoFocus value={renameVal} onChange={e=>setRenameVal(e.target.value)} style={{...iStyle,width:"140px",padding:"5px 10px",fontSize:"12px"}}/>
              <button type="submit" style={{padding:"5px 8px",borderRadius:"5px",border:`1px solid ${tagBorder}`,background:tagBg,color:tagColor,fontSize:"11px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>OK</button>
              <button type="button" onClick={()=>setRenaming(null)} style={{padding:"5px 8px",borderRadius:"5px",border:"none",background:"transparent",color:"var(--text4)",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>Annuleer</button>
            </form>
          );
          return(
            <div key={tag} style={{display:"flex",alignItems:"center",gap:"2px",padding:"4px 4px 4px 10px",borderRadius:"6px",border:`1px solid ${tagBorder}`,background:tagBg,fontSize:"12px",color:tagColor,fontWeight:500}}>
              <span style={{cursor:"pointer"}} onClick={()=>startRename(cat.key,tag)} title="Klik om te hernoemen">{tag}</span>
              <span style={{fontSize:"9px",color:"var(--text4)",marginLeft:"4px",fontFamily:"var(--mono)"}}>{usedCount>0?`${usedCount}x`:""}</span>
              <button onClick={()=>removeTag(cat.key,tag)} style={{background:"none",border:"none",color:tagColor,cursor:"pointer",fontSize:"12px",padding:"2px 4px",opacity:0.5}} title="Verwijder">✕</button>
            </div>
          );
        };

        if(cat.key==="emotionTags"){
          const negTags=tags.filter(t=>isNegEmotion(t));
          const posTags=tags.filter(t=>!isNegEmotion(t));
          const isAddingNeg=adding==="emo_neg";const isAddingPos=adding==="emo_pos";
          return(
            <div key={cat.key} style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"16px",border:"1px solid var(--border1)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
                <div style={{fontSize:"13px",fontWeight:600,color:c.text}}>Emoties</div>
                <span style={{fontSize:"11px",color:"var(--text4)",fontFamily:"var(--mono)"}}>{tags.length} tags</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px"}}>
                <div>
                  <div style={{fontSize:"10px",color:"var(--red)",fontWeight:600,marginBottom:"8px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCross size={14}/> Negatief</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"8px"}}>{negTags.map(renderTag)}</div>
                  {!isAddingNeg&&<button onClick={()=>{setAdding("emo_neg");setAddVal("")}} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"12px",border:"1px dashed rgba(220,122,122,0.28)",background:"transparent",color:"var(--red)",cursor:"pointer",fontFamily:"inherit"}}>+ Negatief</button>}
                  {isAddingNeg&&<form onSubmit={e=>{e.preventDefault();if(!addVal.trim())return;const cur=getTags("emotionTags");if(cur.includes(addVal.trim())){showToast("Tag bestaat al","error");return}setTagConfig(p=>({...p,emotionTags:[...cur,addVal.trim()]}));EMOTIONS_NEG.push(addVal.trim());setAddVal("");setAdding(null);showToast("Negatieve emotie toegevoegd")}} style={{display:"flex",gap:"6px",marginTop:"4px"}}>
                    <input autoFocus value={addVal} onChange={e=>setAddVal(e.target.value)} placeholder="Nieuwe negatieve emotie..." style={{...iStyle,width:"160px",padding:"6px 10px",fontSize:"12px"}}/>
                    <button type="submit" style={{padding:"6px 12px",borderRadius:"6px",border:"1px solid rgba(220,122,122,0.28)",background:"rgba(239,83,80,0.1)",color:"#e05555",fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+</button>
                    <button type="button" onClick={()=>setAdding(null)} style={{padding:"6px 8px",borderRadius:"6px",border:"none",background:"transparent",color:"var(--text4)",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
                  </form>}
                </div>
                <div>
                  <div style={{fontSize:"10px",color:"var(--green)",fontWeight:600,marginBottom:"8px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCheck size={14}/> Positief</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"8px"}}>{posTags.map(renderTag)}</div>
                  {!isAddingPos&&<button onClick={()=>{setAdding("emo_pos");setAddVal("")}} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"12px",border:"1px dashed rgba(46,170,111,0.28)",background:"transparent",color:"var(--green)",cursor:"pointer",fontFamily:"inherit"}}>+ Positief</button>}
                  {isAddingPos&&<form onSubmit={e=>{e.preventDefault();if(!addVal.trim())return;const cur=getTags("emotionTags");if(cur.includes(addVal.trim())){showToast("Tag bestaat al","error");return}setTagConfig(p=>({...p,emotionTags:[...cur,addVal.trim()]}));setAddVal("");setAdding(null);showToast("Positieve emotie toegevoegd")}} style={{display:"flex",gap:"6px",marginTop:"4px"}}>
                    <input autoFocus value={addVal} onChange={e=>setAddVal(e.target.value)} placeholder="Nieuwe positieve emotie..." style={{...iStyle,width:"160px",padding:"6px 10px",fontSize:"12px"}}/>
                    <button type="submit" style={{padding:"6px 12px",borderRadius:"6px",border:"1px solid rgba(46,170,111,0.28)",background:"rgba(46,170,111,0.1)",color:CHART_COLORS.win,fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+</button>
                    <button type="button" onClick={()=>setAdding(null)} style={{padding:"6px 8px",borderRadius:"6px",border:"none",background:"transparent",color:"var(--text4)",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
                  </form>}
                </div>
              </div>
            </div>
          );
        }

        return(
          <div key={cat.key} style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"16px",border:"1px solid var(--border1)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <div style={{fontSize:"13px",fontWeight:600,color:c.text}}>{cat.label}</div>

function DashboardEquityChart({allDates,totalLine,exLines,exColors,showPerEx,pgExchanges}){
  const canvasRef=React.useRef(null);const chartRef=React.useRef(null);
  const fmtDate2=(d)=>{const p=(d||"").split("-");return p.length===3?`${p[2]}/${p[1]}`:d};
  React.useEffect(()=>{
    if(!canvasRef.current)return;
    // v7 FIX: destroy existing chart safely
    if(chartRef.current){try{chartRef.current.destroy()}catch{}chartRef.current=null}
    const ctx=canvasRef.current.getContext("2d");
    const labels=allDates.map(fmtDate2);const datasets=[];
    if(showPerEx){
      Object.entries(exLines).forEach(([ex,line])=>{const color=exColors[ex]||"#C9A84C";const grad=ctx.createLinearGradient(0,0,0,220);grad.addColorStop(0,color+"30");grad.addColorStop(1,color+"03");datasets.push({label:ex,data:line.map(d=>d.cum),borderColor:color,backgroundColor:grad,borderWidth:2,fill:true,tension:0.35,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:color})});
      datasets.push({label:"Totaal",data:totalLine.map(d=>d.cum),borderColor:"rgba(255,255,255,0.35)",backgroundColor:"transparent",borderWidth:1.5,borderDash:[6,4],fill:false,tension:0.35,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:"#fff"});
    }else{
      const greenGrad=ctx.createLinearGradient(0,0,0,220);greenGrad.addColorStop(0,"rgba(46,170,111,0.22)");greenGrad.addColorStop(1,"rgba(46,170,111,0.03)");
      const redGrad=ctx.createLinearGradient(0,0,0,220);redGrad.addColorStop(0,"rgba(220,122,122,0.03)");redGrad.addColorStop(1,"rgba(220,122,122,0.22)");
      const cumData=totalLine.map(d=>d.cum);
      datasets.push({label:"_pos",data:cumData,borderColor:"transparent",backgroundColor:greenGrad,borderWidth:0,fill:{target:{value:0},above:greenGrad,below:"transparent"},tension:0.35,pointRadius:0,pointHoverRadius:0});
      datasets.push({label:"_neg",data:cumData,borderColor:"transparent",backgroundColor:redGrad,borderWidth:0,fill:{target:{value:0},above:"transparent",below:redGrad},tension:0.35,pointRadius:0,pointHoverRadius:0});
      datasets.push({label:"PNL",data:cumData,borderColor:"transparent",backgroundColor:"transparent",borderWidth:2,fill:false,tension:0.35,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:"#fff",pointHoverBorderWidth:2,
        segment:{borderColor:function(c2){const v0=c2.p0.parsed.y;const v1=c2.p1.parsed.y;if(v0>=0&&v1>=0)return CHART_COLORS.win;if(v0<0&&v1<0)return"#d46a6a";return v1>=0?CHART_COLORS.win:CHART_COLORS.loss}}});
    }
    chartRef.current=new Chart(ctx,{type:"line",data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(10,12,18,0.9)",borderColor:"rgba(54,58,69,0.9)",borderWidth:1,titleFont:{family:"'JetBrains Mono',monospace",size:11},bodyFont:{family:"'JetBrains Mono',monospace",size:11},titleColor:"#c0c5cd",bodyColor:"#f5f5f7",padding:10,cornerRadius:6,filter:function(item){return!item.dataset.label.startsWith("_")},callbacks:{label:function(c2){const v=c2.parsed.y;return` ${c2.dataset.label}: ${v>=0?"+":""}$${v.toLocaleString("nl-NL",{minimumFractionDigits:2,maximumFractionDigits:2})}`}}}},
      scales:{x:{grid:{color:"rgba(255,255,255,0.10)"},ticks:{color:"#939aa5",font:{family:"'JetBrains Mono',monospace",size:9},maxTicksLimit:8,maxRotation:0},border:{display:false}},y:{grid:{color:"rgba(255,255,255,0.10)"},ticks:{color:"#939aa5",font:{family:"'JetBrains Mono',monospace",size:9},callback:function(v){return"$"+v.toLocaleString("nl-NL",{minimumFractionDigits:0,maximumFractionDigits:0})}},border:{display:false}}}}});
    return()=>{if(chartRef.current){try{chartRef.current.destroy()}catch{}chartRef.current=null}};
  },[JSON.stringify(allDates),showPerEx,JSON.stringify(pgExchanges)]);
  return(<div style={{height:"220px",position:"relative"}}><canvas ref={canvasRef}/></div>);
}

// ============ DASHBOARD ============
function Dashboard({trades,config,accounts,onReport,storageUsage}){
  const[balances,setBalances]=useState(null);
  const[balLoading,setBalLoading]=useState(false);
  const{prefs:lp,toggle:lpToggle,reset:lpReset}=useLayoutPrefs("dashboard");
  const[lpOpen,setLpOpen]=useState(false);
  const LP_SECTIONS=[
    {label:"Stat cards",items:[
      {key:"pnl",label:"Netto PNL"},{key:"winrate",label:"Winrate"},
      {key:"pf",label:"Profit Factor"},{key:"rr",label:"R:R Verhouding"},
      {key:"expectancy",label:"Expectancy (v7 nieuw)"},
      {key:"avgWin",label:"Gem. Winst"},{key:"avgLoss",label:"Gem. Verlies"},
      {key:"fees",label:"Totaal Fees"},{key:"rating",label:"Gem. Rating"}
    ]},
    {label:"Grafieken & secties",items:[
      {key:"accountValue",label:"Account Waarde"},{key:"equityChart",label:"Equity Grafiek"},
      {key:"setupPerf",label:"Setup Performance"},{key:"emotionPerf",label:"Emotie Performance"},
      {key:"sessionPerf",label:"Sessie Performance"},{key:"foutenPerf",label:"Top Fouten"}
    ]}
  ];
  const priv=!lp.accountValue;
  const fmtP=(v)=>priv?"***,**":(typeof v==="number"?`$${fmt(v)}`:v);

  const fetchBalances=useCallback(async()=>{
    if(balLoading)return;setBalLoading(true);
    const results={};
    for(const[exKey,ex]of Object.entries(ExchangeAPI)){
      const cfg=config?.exchanges?.[exKey]||{};
      if(!cfg.apiKey||!cfg.apiSecret)continue;
      try{const r=ex.needsPassphrase?await ex.testConnection(cfg.apiKey,cfg.apiSecret,cfg.passphrase):await ex.testConnection(cfg.apiKey,cfg.apiSecret);if(r.success)results[exKey]=parseFloat(r.balance)||0}catch{}
    }
    setBalances(Object.keys(results).length>0?results:null);setBalLoading(false);
  },[config]);

  useEffect(()=>{if(config?.exchanges)fetchBalances()},[]);

  if(!trades.length)return(<div style={{textAlign:"center",padding:"4rem 2rem",color:"var(--text3)"}}>
    <div style={{fontSize:"48px",marginBottom:"1rem",opacity:0.3}}>📊</div>
    <div style={{fontSize:"16px",fontWeight:500,marginBottom:"8px"}}>Nog geen trades</div>
    <div style={{fontSize:"13px"}}>Voeg je eerste trade toe of importeer via API.</div>
    <div style={{marginTop:"12px",fontSize:"11px",color:"var(--text4)"}}>Sneltoetsen: <span className="kbd">N</span> Nieuwe trade · <span className="kbd">T</span> Trades · <span className="kbd">D</span> Dashboard</div>
  </div>);

  const closed=trades.filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  const totalPnl=closed.reduce((s,t)=>s+parseFloat(t.pnl),0);
  const totalFees=closed.reduce((s,t)=>s+(parseFloat(t.fees)||0),0);
  const net=totalPnl;
  const wins=closed.filter(t=>parseFloat(t.pnl)>0);
  const losses=closed.filter(t=>parseFloat(t.pnl)<0);
  const wr=closed.length>0?(wins.length/closed.length)*100:0;
  const avgW=wins.length?wins.reduce((s,t)=>s+parseFloat(t.pnl),0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+parseFloat(t.pnl),0)/losses.length):0;
  const grossW=wins.reduce((s,t)=>s+parseFloat(t.pnl),0);
  const grossL=Math.abs(losses.reduce((s,t)=>s+parseFloat(t.pnl),0));
  const pf=grossL>0?grossW/grossL:(wins.length>0?Infinity:0);
  const rr=avgL>0?(avgW/avgL):(avgW>0?Infinity:0);
  const rated=trades.filter(t=>t.rating>0);
  const avgR=rated.length?rated.reduce((s,t)=>s+t.rating,0)/rated.length:0;
  // v7 NEW: Expectancy
  const expectancy=calcExpectancy(closed);

  const[pgExchanges,setPgExchanges]=useState(["all"]);
  const[pgPeriod,setPgPeriod]=useState("all");
  const[pgUnit,setPgUnit]=useState("usdt");

  const setupPerf={};closed.forEach(t=>(t.setupTags||[]).forEach(tag=>{if(!setupPerf[tag])setupPerf[tag]={w:0,l:0,pnl:0,n:0};setupPerf[tag].n++;setupPerf[tag].pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?setupPerf[tag].w++:setupPerf[tag].l++}));
  const emoPerf={};closed.forEach(t=>(t.emotionTags||[]).forEach(tag=>{if(!emoPerf[tag])emoPerf[tag]={w:0,l:0,pnl:0,n:0};emoPerf[tag].n++;emoPerf[tag].pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?emoPerf[tag].w++:emoPerf[tag].l++}));
  const mistakeC={};trades.forEach(t=>(t.mistakeTags||[]).forEach(tag=>{mistakeC[tag]=(mistakeC[tag]||0)+1}));
  const topMistakes=Object.entries(mistakeC).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const byDay={};closed.forEach(t=>{if(!byDay[t.date])byDay[t.date]=[];byDay[t.date].push(t)});
  const dailyPnl=Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,ts])=>({date:d,pnl:ts.reduce((s,t)=>s+parseFloat(t.pnl),0),n:ts.length}));
  let cum=0;const eq=dailyPnl.map(d=>{cum+=d.pnl;return{...d,cum}});

  return(<div style={{animation:"fadeIn .3s ease"}}>
    {/* v7 NEW: storage warning */}
    <StorageWarning usage={storageUsage}/>

    {/* Portfolio waarde header */}
    {(()=>{
      const exColors2={"mexc":"#00b897","blofin":"#6366f1","kraken":"#7b61ff"};
      const manualBal=(accounts||[]).reduce((s,a)=>s+a.balance,0);
      const totalBal=balances?Object.values(balances).reduce((s,v)=>s+v,0)+manualBal:((accounts||[]).length>0?manualBal:null);
      return(<div style={{background:"rgba(201,168,76,0.04)",borderRadius:"var(--radius-lg)",padding:"20px 24px",marginBottom:"1.5rem",border:"1px solid rgba(201,168,76,0.15)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:"10px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600,marginBottom:"6px",display:"flex",alignItems:"center",gap:"8px"}}>Account waarde (live) <button onClick={()=>lpToggle("accountValue")} style={{background:"none",border:"none",cursor:"pointer",fontSize:"13px",color:"var(--text4)",padding:"0",lineHeight:1}} title={priv?"Toon bedragen":"Verberg bedragen"}>{priv?"👁‍🗨":"👁"}</button></div>
            {totalBal!==null?<div style={{fontSize:"32px",fontWeight:700,fontFamily:"var(--mono)",color:"var(--text)",letterSpacing:"-0.03em"}}>{priv?"$***,**":`$${fmt(totalBal)}`}</div>
              :<div style={{fontSize:"20px",fontWeight:600,color:"var(--text4)"}}>{balLoading?<span style={{display:"inline-flex",alignItems:"center",gap:"8px"}}><span className="spinner"/>Ophalen...</span>:"Voeg een account toe"}</div>}
            <div style={{fontSize:"10px",color:"var(--text4)",marginTop:"4px"}}>Gerealiseerde winst: <span style={{color:priv?"var(--text4)":net>=0?"var(--green)":"var(--red)",fontWeight:600}}>{priv?"***,**":`${net>=0?"+":"−"}$${fmt(Math.abs(net))}`}</span> · {closed.length} trades</div>
            {/* v7 NEW: Expectancy in header */}
            {expectancy!==null&&<div style={{fontSize:"10px",color:"var(--text4)",marginTop:"2px"}}>Expectancy: <span style={{color:expectancy>=0?"var(--green)":"var(--red)",fontWeight:600,fontFamily:"var(--mono)"}}>{expectancy>=0?"+":""}${fmt(expectancy)}</span> / trade</div>}
          </div>
          <div style={{textAlign:"right"}}>
            {balances&&Object.entries(balances).map(([ex,bal])=>(
              <div key={ex} style={{display:"flex",alignItems:"center",gap:"8px",justifyContent:"flex-end",marginBottom:"4px"}}>
                <ExchangeIcon name={ex} size={16}/>
                <span style={{fontSize:"11px",color:"var(--text3)"}}>{exName(ex)}</span>
                <span style={{fontSize:"13px",fontFamily:"var(--mono)",fontWeight:600,color:"var(--text)"}}>{priv?"$***,**":`$${fmt(bal)}`}</span>
              </div>
            ))}
            {(accounts||[]).map(a=>(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:"8px",justifyContent:"flex-end",marginBottom:"4px"}}>
                <span style={{fontSize:"12px"}}>✏️</span>
                <span style={{fontSize:"11px",color:"var(--text3)"}}>{a.name}</span>
                <span style={{fontSize:"13px",fontFamily:"var(--mono)",fontWeight:600,color:"var(--text)"}}>{priv?"$***,**":`$${fmt(a.balance)}`}</span>
              </div>
            ))}
            {balances&&<button onClick={fetchBalances} disabled={balLoading} style={{marginTop:"6px",fontSize:"9px",padding:"3px 8px",borderRadius:"4px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text4)",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"4px",marginLeft:"auto"}}>{balLoading?<span className="spinner" style={{width:"10px",height:"10px"}}/>:"⟳"} Ververs</button>}
          </div>
        </div>
      </div>);
    })()}

    {onReport&&closed.length>0&&<div style={{display:"flex",justifyContent:"flex-end",marginBottom:"12px",gap:"8px"}}>
      <button onClick={onReport} style={{padding:"6px 14px",borderRadius:"var(--radius)",border:"1px solid var(--gold-border)",background:"var(--gold-dim)",color:"var(--gold)",fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"6px"}}>📄 Genereer rapport</button>
      <LayoutGear onClick={()=>setLpOpen(true)}/>
    </div>}
    <LayoutPanel open={lpOpen} onClose={()=>setLpOpen(false)} sections={LP_SECTIONS} prefs={lp} toggle={lpToggle} reset={lpReset}/>

    {/* Stat cards - v7: added Expectancy */}
    {(()=>{const cards=[
      [lp.pnl,<Stat key="pnl" label="Netto PNL" value={`$${fmt(net)}`} color={net>=0?"var(--green)":"var(--red)"} sub={`${closed.length} trades`}/>],
      [lp.winrate,<Stat key="wr" label="Winrate" value={pct(wr)} color={wr>=50?"var(--green)":"var(--red)"} sub={`${wins.length}W / ${losses.length}L`}/>],
      [lp.pf,<Stat key="pf" label="Profit factor" value={pf===Infinity?"∞":pf.toFixed(2)} color={pf>=1.5?"var(--green)":pf>=1?"var(--amber)":"var(--red)"}/>],
      [lp.rr,<Stat key="rr" label="R:R verhouding" value={rr===Infinity?"∞":rr.toFixed(2)} color={rr>=1.5?"var(--green)":rr>=1?"var(--amber)":"var(--red)"} sub={`${fmt(avgW)} / ${fmt(avgL)}`}/>],
      // v7 NEW: Expectancy stat card
      [lp.expectancy,<Stat key="exp" label="Expectancy" value={expectancy!==null?(expectancy>=0?"+":"")+`$${fmt(expectancy)}`:""} color={expectancy!==null?(expectancy>=0?"var(--green)":"var(--red)"):"var(--text3)"} sub="per trade"/>],
      [lp.avgWin,<Stat key="aw" label="Gem. winst" value={`$${fmt(avgW)}`} color="var(--green)"/>],
      [lp.avgLoss,<Stat key="al" label="Gem. verlies" value={`-$${fmt(avgL)}`} color="var(--red)"/>],
      [lp.fees,<Stat key="fees" label="Totaal fees" value={`$${fmt(totalFees)}`} color="var(--amber)"/>],
      [lp.rating,<Stat key="rat" label="Gem. rating" value={avgR>0?avgR.toFixed(1)+" ★":"--"} color="var(--amber)"/>],
    ].filter(c=>c[0]);
    return cards.length>0?<div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(cards.length,4)},minmax(0,1fr))`,gap:"12px",marginBottom:"1.5rem"}}>{cards.map(c=>c[1])}</div>:null})()}

    {/* Equity chart (unchanged from original) */}
    {lp.equityChart&&eq.length>1&&(()=>{
      const btcPrice=85000;
      const toUnit=(v)=>pgUnit==="btc"?v/btcPrice:v;
      const unitLabel=pgUnit==="btc"?"₿":"$";
      const unitFmt=(v)=>pgUnit==="btc"?v.toFixed(6):fmt(v);
      const sources=[...new Set(closed.map(t=>t.source||"manual"))];
      const toggleEx=(s)=>{if(s==="all")return setPgExchanges(["all"]);setPgExchanges(p=>{const next=p.filter(x=>x!=="all");const has=next.includes(s);const updated=has?next.filter(x=>x!==s):[...next,s];return updated.length===0?["all"]:updated})};
      const now=new Date();
      const periodStart=pgPeriod==="1w"?new Date(now-7*864e5):pgPeriod==="1m"?new Date(now-30*864e5):pgPeriod==="3m"?new Date(now-90*864e5):pgPeriod==="mtd"?new Date(now.getFullYear(),now.getMonth(),1):pgPeriod==="ytd"?new Date(now.getFullYear(),0,1):null;
      const periodTrades=periodStart?closed.filter(t=>new Date(t.date)>=periodStart):closed;
      const filteredByEx=pgExchanges.includes("all")?periodTrades:periodTrades.filter(t=>pgExchanges.includes(t.source||"manual"));
      const exColors={"mexc":"#00b897","blofin":"#6366f1","kraken":"#7b61ff","manual":"#C9A84C","csv":"#9ca3af"};
      const showPerEx=!pgExchanges.includes("all")&&pgExchanges.length>1;
      const allDates=[...new Set(filteredByEx.map(t=>t.date))].sort();
      let totalCum=0;
      const totalLine=allDates.map(d=>{const dayPnl2=filteredByEx.filter(t=>t.date===d).reduce((s,t)=>s+parseFloat(t.pnl),0);totalCum+=dayPnl2;return{date:d,cum:totalCum}});
      const exLines={};
      if(showPerEx){pgExchanges.forEach(ex=>{let c2=0;exLines[ex]=allDates.map(d=>{const dp=periodTrades.filter(t=>t.date===d&&(t.source||"manual")===ex).reduce((s,t)=>s+parseFloat(t.pnl),0);c2+=dp;return{date:d,cum:c2}})})}
      const totalFiltered=filteredByEx.reduce((s,t)=>s+parseFloat(t.pnl),0);
      const exPnl={};sources.forEach(s=>{exPnl[s]=filteredByEx.filter(t=>(t.source||"manual")===s).reduce((a,t)=>a+parseFloat(t.pnl),0)});
      const chipStyle=(active)=>({padding:"4px 10px",borderRadius:"5px",fontSize:"10px",fontWeight:600,border:`1px solid ${active?"#C9A84C":"var(--border3)"}`,background:active?"rgba(201,168,76,0.12)":"transparent",color:active?"#C9A84C":"var(--text4)",cursor:"pointer",fontFamily:"inherit",transition:"all .12s"});
      return(<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"1.5rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"16px"}}>
          <div>
            <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"4px"}}>Gerealiseerde winst</div>
            <div style={{fontSize:"28px",fontWeight:700,fontFamily:"var(--mono)",color:totalFiltered>=0?"var(--green)":"var(--red)",letterSpacing:"-0.02em"}}>{totalFiltered>=0?"+":""}{unitLabel}{unitFmt(toUnit(totalFiltered))}</div>
            <div style={{fontSize:"11px",color:"var(--text4)",fontFamily:"var(--mono)",marginTop:"2px"}}>{filteredByEx.length} trades{pgPeriod!=="all"?` · ${pgPeriod.toUpperCase()}`:""}</div>
          </div>
          <button onClick={()=>setPgUnit(p=>p==="usdt"?"btc":"usdt")} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"10px",fontWeight:700,border:"1px solid var(--border3)",background:pgUnit==="btc"?"rgba(201,168,76,0.15)":"transparent",color:pgUnit==="btc"?"#c9a84c":"var(--text4)",cursor:"pointer",fontFamily:"var(--mono)"}}>{pgUnit==="usdt"?"₿ BTC":"$ USD"}</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexWrap:"wrap",gap:"8px"}}>
          <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
            <button onClick={()=>toggleEx("all")} style={chipStyle(pgExchanges.includes("all"))}>Alle</button>
            {sources.map(s=><button key={s} onClick={()=>toggleEx(s)} style={{...chipStyle(pgExchanges.includes(s)),borderColor:pgExchanges.includes(s)?exColors[s]||"#C9A84C":"var(--border3)",color:pgExchanges.includes(s)?exColors[s]||"#C9A84C":"var(--text4)",background:pgExchanges.includes(s)?`${exColors[s]||"#C9A84C"}15`:"transparent"}}>{s}</button>)}
          </div>
          <div style={{display:"flex",gap:"3px"}}>
            {[["1w","1W"],["1m","1M"],["mtd","Maand"],["3m","3M"],["ytd","YTD"],["all","All"]].map(([k,l])=>(
              <button key={k} onClick={()=>setPgPeriod(k)} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"9px",fontWeight:600,border:"none",background:pgPeriod===k?"rgba(201,168,76,0.12)":"transparent",color:pgPeriod===k?"#C9A84C":"var(--text4)",cursor:"pointer",fontFamily:"var(--mono)"}}>{l}</button>
            ))}
          </div>
        </div>
        {sources.length>1&&<div style={{display:"flex",gap:"16px",marginBottom:"12px",flexWrap:"wrap",alignItems:"center"}}>
          {sources.filter(s=>pgExchanges.includes("all")||pgExchanges.includes(s)).map(s=>{const v=exPnl[s]||0;const isActive=showPerEx&&pgExchanges.includes(s);return(
            <div key={s} style={{display:"flex",alignItems:"center",gap:"6px"}}>
              {isActive?<div style={{width:"16px",height:"3px",borderRadius:"2px",background:exColors[s]||"#C9A84C"}}/>:<div style={{width:"8px",height:"8px",borderRadius:"2px",background:exColors[s]||"#C9A84C"}}/>}
              <span style={{fontSize:"11px",color:isActive?exColors[s]||"#C9A84C":"var(--text3)",fontWeight:isActive?600:400}}>{exName(s)}</span>
              <span style={{fontSize:"11px",fontFamily:"var(--mono)",fontWeight:600,color:v>=0?"var(--green)":"var(--red)"}}>{v>=0?"+":""}{unitLabel}{unitFmt(toUnit(v))}</span>
            </div>
          )})}
        </div>}
        {totalLine.length>1&&<DashboardEquityChart allDates={allDates} totalLine={totalLine} exLines={exLines} exColors={exColors} showPerEx={showPerEx} pgExchanges={pgExchanges}/>}
      </div>);
    })()}

    {/* Setup performance */}
    {lp.setupPerf&&(Object.keys(setupPerf).length>0?<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"1.5rem"}}>
      <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"14px"}}>Setup performance</div>
      {Object.entries(setupPerf).sort((a,b)=>b[1].pnl-a[1].pnl).map(([tag,d])=>{const wr2=d.n>0?d.w/d.n*100:0;const mx=Math.max(...Object.values(setupPerf).map(x=>Math.abs(x.pnl)),1);const w=Math.abs(d.pnl)/mx*100;const pos=d.pnl>=0;return(<div key={tag} style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}><div style={{width:"80px",fontSize:"12px",color:"var(--text2)",fontWeight:500}}>{tag}</div><div style={{flex:1,height:"24px",background:"rgba(255,255,255,0.10)",borderRadius:"4px",position:"relative",overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(w,2)}%`,background:pos?"rgba(46,170,111,0.28)":"rgba(220,122,122,0.28)",borderRadius:"4px"}}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:"8px",fontSize:"11px",fontFamily:"var(--mono)",color:pos?"var(--green)":"var(--red)",fontWeight:600}}>{d.pnl>=0?"+":""}${fmt(d.pnl)}</div></div><div style={{width:"40px",fontSize:"10px",color:"var(--text3)",textAlign:"right",fontFamily:"var(--mono)"}}>{d.n}x</div><div style={{width:"45px",fontSize:"10px",color:wr2>=50?"var(--green)":"var(--red)",textAlign:"right",fontFamily:"var(--mono)"}}>{wr2.toFixed(0)}%</div></div>)})}
    </div>:null)}

    {/* Session performance */}
    {lp.sessionPerf&&(()=>{
      const sessPerf={};ALL_SESSIONS.forEach(s=>sessPerf[s]={w:0,l:0,pnl:0,n:0});
      closed.forEach(t=>{const st=getSessionTags(t.date,t.time);const p=parseFloat(t.pnl);st.forEach(s=>{if(!sessPerf[s])sessPerf[s]={w:0,l:0,pnl:0,n:0};sessPerf[s].n++;sessPerf[s].pnl+=p;p>0?sessPerf[s].w++:sessPerf[s].l++})});
      const hasSess=Object.values(sessPerf).some(d=>d.n>0);
      if(!hasSess)return null;
      const sessMax=Math.max(...Object.values(sessPerf).map(d=>Math.abs(d.pnl)),1);
      return(<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"1.5rem"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"14px"}}>Performance per sessie (CET)</div>
        {ALL_SESSIONS.filter(s=>sessPerf[s].n>0).map(s=>{
          const d=sessPerf[s];const wr=d.n>0?d.w/d.n*100:0;
          const grossW=closed.filter(t=>getSessionTags(t.date,t.time).includes(s)&&parseFloat(t.pnl)>0).reduce((a,t)=>a+parseFloat(t.pnl),0);
          const grossL=Math.abs(closed.filter(t=>getSessionTags(t.date,t.time).includes(s)&&parseFloat(t.pnl)<0).reduce((a,t)=>a+parseFloat(t.pnl),0));
          const profitFactor=grossL>0?grossW/grossL:(grossW>0?Infinity:0);
          const w=Math.abs(d.pnl)/sessMax*100;const pos=d.pnl>=0;
          const c=SESSION_COLORS[s]||SESSION_COLORS["Off-session"];
          return(<div key={s} style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
            <div style={{width:"90px",display:"flex",alignItems:"center",gap:"6px"}}><div style={{width:"8px",height:"8px",borderRadius:"2px",background:c.text,flexShrink:0}}/><span style={{fontSize:"12px",color:c.text,fontWeight:600}}>{s}</span></div>
            <div style={{flex:1,height:"24px",background:"rgba(255,255,255,0.10)",borderRadius:"4px",position:"relative",overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(w,2)}%`,background:pos?`${c.text}30`:`rgba(220,122,122,0.28)`,borderRadius:"4px"}}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:"8px",fontSize:"11px",fontFamily:"var(--mono)",color:pos?"var(--green)":"var(--red)",fontWeight:600}}>{d.pnl>=0?"+":""}${fmt(d.pnl)}</div></div>
            <div style={{width:"40px",fontSize:"10px",color:"var(--text3)",textAlign:"right",fontFamily:"var(--mono)"}}>{d.n}x</div>
            <div style={{width:"45px",fontSize:"10px",color:wr>=50?"var(--green)":"var(--red)",textAlign:"right",fontFamily:"var(--mono)"}}>{wr.toFixed(0)}%</div>
            <div style={{width:"45px",fontSize:"10px",color:profitFactor>=1.5?"var(--green)":profitFactor>=1?"var(--amber)":"var(--red)",textAlign:"right",fontFamily:"var(--mono)"}}>{profitFactor===Infinity?"∞":profitFactor.toFixed(2)}</div>
          </div>);
        })}
      </div>);
    })()}

    {/* Fouten + Emotie performance */}
    <div style={{display:"grid",gridTemplateColumns:lp.foutenPerf&&lp.emotionPerf?"1fr 1fr":"1fr",gap:"16px"}}>
      {lp.foutenPerf&&topMistakes.length>0&&<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"12px"}}>Top fouten</div>
        {topMistakes.map(([tag,n])=>(<div key={tag} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border1)",fontSize:"13px"}}><span style={{color:"var(--orange)"}}>{tag}</span><span style={{fontFamily:"var(--mono)",color:"var(--text3)"}}>{n}x</span></div>))}
      </div>}
      {lp.emotionPerf&&Object.keys(emoPerf).length>0&&<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"12px"}}>Performance per emotie</div>
        {Object.entries(emoPerf).sort((a,b)=>b[1].pnl-a[1].pnl).map(([tag,d])=>(<div key={tag} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border1)",fontSize:"13px"}}>
          <span style={{color:isNegEmotion(tag)?"var(--red)":"var(--green)",fontWeight:500,display:"flex",alignItems:"center",gap:"5px"}}>{isNegEmotion(tag)?<GlowCross size={14}/>:<GlowCheck size={14}/>} {tag}</span>
          <div style={{display:"flex",gap:"16px",alignItems:"center"}}><span style={{color:"var(--text3)",fontSize:"11px"}}>{pct(d.n>0?d.w/d.n*100:0)} WR</span><span style={{fontFamily:"var(--mono)",fontWeight:600,fontSize:"13px",color:d.pnl>=0?"var(--green)":"var(--red)"}}>${fmt(d.pnl)}</span></div>
        </div>))}
      </div>}
    </div>
  </div>);
}


// ============ TRADE LIST (v7: with search) ============
function TradeList({trades,onEdit,onDelete,onQuickTag,onBulkDelete,onBulkTag,showToast,tagConfig}){
  const[sortField,setSortField]=useState("date");
  const[sortDir,setSortDir]=useState("desc");
  const[selected,setSelected]=useState(new Set());
  const[bulkAction,setBulkAction]=useState(null);
  const[sizeMode,setSizeMode]=useState(()=>localStorage.getItem("tj_sizeMode")||"usdt");
  // v7 NEW: search state
  const[search,setSearch]=useState("");

  const toggleSizeMode=()=>{const next=sizeMode==="usdt"?"asset":"usdt";setSizeMode(next);localStorage.setItem("tj_sizeMode",next)};
  const fmtSize=(t)=>{
    const sz=parseFloat(t.positionSize);if(!sz||isNaN(sz))return null;
    if(sizeMode==="asset"){
      const asset=(t.pair||"").split("/")[0]||"";
      if(t.positionSizeAsset&&parseFloat(t.positionSizeAsset)>0)return `${parseFloat(parseFloat(t.positionSizeAsset).toFixed(8))} ${asset}`;
      const entry=parseFloat(t.entry);
      if(entry>0){const assetSize=sz/entry;return `${parseFloat(assetSize.toFixed(8))} ${asset}`}
      return `${parseFloat(sz.toFixed(8))} ${asset}`;
    }
    return `$${fmt(sz)}`;
  };

  if(!trades.length)return(<div style={{textAlign:"center",padding:"4rem 2rem",color:"var(--text3)"}}>
    <div style={{fontSize:"48px",marginBottom:"1rem",opacity:0.3}}>📋</div>
    <div style={{fontSize:"16px",fontWeight:500,marginBottom:"8px"}}>Geen trades gevonden</div>
    <div style={{marginTop:"8px",fontSize:"11px",color:"var(--text4)"}}><span className="kbd">N</span> Nieuwe trade toevoegen</div>
  </div>);

  // v7 NEW: search filter (debounced on state)
  const searchLower=search.toLowerCase().trim();
  const searchFiltered=searchLower?trades.filter(t=>{
    if((t.pair||"").toLowerCase().includes(searchLower))return true;
    if((t.notes||"").toLowerCase().includes(searchLower))return true;
    if((t.date||"").includes(searchLower))return true;
    if([...(t.setupTags||[]),...(t.confirmationTags||[]),...(t.emotionTags||[]),...(t.mistakeTags||[])].some(s=>s.toLowerCase().includes(searchLower)))return true;
    // R-multiple search e.g. "2R" or "+2R"
    const rMult=calcRMultiple(t);
    if(rMult!==null&&(`${rMult.toFixed(1)}R`).includes(searchLower))return true;
    return false;
  }):trades;

  const sorted=[...searchFiltered].sort((a,b)=>{
    if(a.status==="open"&&b.status!=="open")return -1;
    if(b.status==="open"&&a.status!=="open")return 1;
    let va,vb;
    if(sortField==="date"){va=`${a.date}T${a.time}`;vb=`${b.date}T${b.time}`}
    else if(sortField==="pnl"){va=parseFloat(a.pnl)||0;vb=parseFloat(b.pnl)||0}
    else if(sortField==="pair"){va=(a.pair||"").split("/")[0];vb=(b.pair||"").split("/")[0]}
    else{va=a[sortField]||"";vb=b[sortField]||""}
    if(typeof va==="number")return sortDir==="asc"?va-vb:vb-va;
    return sortDir==="asc"?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
  });

  const toggleSort=f=>{if(sortField===f)setSortDir(p=>p==="asc"?"desc":"asc");else{setSortField(f);setSortDir("desc")}};
  const thStyle={padding:"8px 6px",fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.04em",cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",borderBottom:"1px solid var(--border2)"};
  const arrow=f=>sortField===f?(sortDir==="asc"?" ▴":" ▾"):"";

  const totalPnl=sorted.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
  const wins=sorted.filter(t=>parseFloat(t.pnl)>0).length;
  const toggleSelect=(id,e)=>{e.stopPropagation();setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n})};
  const toggleAll=()=>{if(selected.size===sorted.length)setSelected(new Set());else setSelected(new Set(sorted.map(t=>t.id)))};
  const selCount=selected.size;

  const bulkDelete=()=>{if(!confirm(`${selCount} trades verwijderen?`))return;onBulkDelete([...selected]);setSelected(new Set());showToast(`${selCount} trades verwijderd`)};
  const bulkExportJSON=()=>{const data=sorted.filter(t=>selected.has(t.id));const blob=new Blob([JSON.stringify({version:7,exportDate:new Date().toISOString(),trades:data},null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`trades-${data.length}-${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(url);showToast(`${data.length} trades geëxporteerd`)};
  const bulkExportCSV=()=>{const data=sorted.filter(t=>selected.has(t.id));const headers=["date","time","pair","direction","entry","exit","pnl","fees","leverage","source","setupTags","emotionTags","mistakeTags","highestPrice","lowestPrice"];const rows=data.map(t=>headers.map(h=>Array.isArray(t[h])?(t[h]||[]).join(";"):String(t[h]||"")).join(","));const csv=[headers.join(","),...rows].join("\n");const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`trades-${data.length}-${new Date().toISOString().split("T")[0]}.csv`;a.click();URL.revokeObjectURL(url);showToast(`${data.length} trades geëxporteerd (CSV)`)};

      <div style={{fontSize:"12px",color:"var(--text3)"}}>

        <span style={{margin:"0 8px",color:"var(--text5)"}}>|</span>
        <span style={{color:totalPnl>=0?"var(--green)":"var(--red)",fontFamily:"var(--mono)",fontWeight:600}}>{totalPnl>=0?"+":""}${fmt(totalPnl)}</span>
        <span style={{margin:"0 8px",color:"var(--text5)"}}>|</span>
        WR: {sorted.length>0?((wins/sorted.length)*100).toFixed(0):"0"}%
      </div>
    </div>

    {/* Bulk bar */}
    {selCount>0&&<div style={{display:"flex",alignItems:"center",gap:"8px",padding:"10px 16px",marginBottom:"12px",borderRadius:"var(--radius)",background:"rgba(201,168,76,0.12)",border:"1px solid rgba(201,168,76,0.2)",animation:"slideDown .2s ease",flexWrap:"wrap"}}>
      <span style={{fontSize:"12px",color:"#C9A84C",fontWeight:600}}>{selCount} trade{selCount>1?"s":""} geselecteerd</span>
      <div style={{width:"1px",height:"16px",background:"rgba(201,168,76,0.2)"}}/>

      <div style={{flex:1}}/>

    </div>}

    {/* Bulk tag panel */}
    {bulkAction==="tag"&&selCount>0&&<div style={{padding:"14px 16px",marginBottom:"12px",borderRadius:"var(--radius)",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",border:"1px solid var(--border2)",animation:"slideDown .2s ease"}}>

              </td>
              <td style={tdStyle}>
                {t.status==="open"?<span style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:700,background:"rgba(201,168,76,0.1)",color:"#C9A84C",display:"inline-flex",alignItems:"center",gap:"5px"}}><span style={{width:"6px",height:"6px",borderRadius:"50%",background:"#C9A84C",animation:"pulse 2s ease-in-out infinite"}}/>OPEN</span>
