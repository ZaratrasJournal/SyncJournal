    {/* S4: Verdelingen — Donut charts + tabbed detail */}
    {(()=>{
      // Gradient color pairs for donut segments
      // Gradient color pairs for donut segments
      const GRAD_MAP={
        "#32c495":["#34d399","#2dd4bf"],"#3ee0a8":["#34d399","#2dd4bf"],"rgba(50,196,149":["#34d399","#2dd4bf"],
        "#dc7a7a":["#f87171","#fbbf24"],"#ff8585":["#f87171","#fbbf24"],"rgba(220,122,122":["#f87171","#fbbf24"],
        "#d4ad5c":["#d4ad5c","#fbbf24"],"rgba(212,173,92":["#d4ad5c","#fbbf24"],
        "#6a9fd0":["#60a5fa","#38bdf8"],"rgba(106,159,208":["#60a5fa","#38bdf8"],
        "#9a8acc":["#a78bfa","#c084fc"],"rgba(154,138,204":["#a78bfa","#c084fc"],
        "#8a8a90":["#7a7a80","#9a9aa0"],"rgba(138,138,144":["#7a7a80","#9a9aa0"],
        "#cc7a9a":["#bf6a8a","#e879a0"],"rgba(204,122,154":["#bf6a8a","#e879a0"],
        "#70b0ff":["#60a5fa","#38bdf8"],
      };
      const getGradPair=(c)=>{for(const[k,v]of Object.entries(GRAD_MAP)){if(c&&c.startsWith(k))return v}return[c||"#888",c||"#aaa"]};

      // Custom SVG Donut component (replaces Chart.js doughnut)
      const Donut=({title,labels,data,colors,centerText,centerSub})=>{
        const[hovered,setHovered]=useState(-1);
        const[tip,setTip]=useState(null);
        const uid2=React.useRef("d"+Math.random().toString(36).slice(2,8)).current;
        
        const total=data.reduce((s,v)=>s+Math.abs(v),0);
        if(total===0)return(<div style={{flex:1,minWidth:"160px",textAlign:"center",padding:"40px 0"}}><div style={{fontSize:"10px",color:"var(--text4)"}}>{title}: geen data</div></div>);
        
        const sz=100,cx=sz/2,cy=sz/2,r=37,sw=12;
        const circ=2*Math.PI*r;
        const gapDeg=2.5;
        const nonZero=data.filter(v=>Math.abs(v)>0).length;
        const availDeg=360-(gapDeg*nonZero);
        const minDeg=availDeg*0.03; // 3% minimum for clickability
        
        let offset=0;
        const segs=[];
        data.forEach((v,i)=>{
          const pct=total>0?Math.abs(v)/total:0;
          let deg=pct*availDeg;
          if(deg<0.3)return;
          if(deg<minDeg)deg=minDeg; // enforce minimum segment size
          const dashLen=(deg/360)*circ;
          const dashGap=circ-dashLen;
          const rot=offset-90;
          segs.push({i,deg,dashLen,dashGap,rot,pct,val:v,label:labels[i],color:colors[i]});
          offset+=deg+gapDeg;
        });
        
        const onSeg=(e,seg)=>{
          if(!seg){setHovered(-1);setTip(null);return}
          setHovered(seg.i);
          const rect=e.currentTarget.closest("svg").getBoundingClientRect();
          const pctStr=(seg.pct*100).toFixed(1);
          const valStr=metric==="pnl"?(seg.val>=0?"+":"")+"$"+fmt(seg.val):seg.val.toFixed(1)+(metric==="wr"?"%":"");
          setTip({x:e.clientX-rect.left,y:e.clientY-rect.top,label:seg.label,val:valStr,pct:pctStr});
        };
        
        return(<div style={{flex:1,minWidth:"160px"}}>
          <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:500,marginBottom:"10px",textAlign:"center"}}>{title}</div>
          <div style={{position:"relative",display:"flex",justifyContent:"center"}}>
            <svg viewBox={"0 0 "+sz+" "+sz} style={{overflow:"visible",width:"100%",maxWidth:"200px",height:"auto"}}>
              <defs>
                {segs.map(s=>{const[c1,c2]=getGradPair(s.color);return(
                  <linearGradient key={uid2+"g"+s.i} id={uid2+"g"+s.i} x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stopColor={c1}/><stop offset="100%" stopColor={c2}/>
                  </linearGradient>
                )})}
              </defs>
              <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={sw}/>
              {segs.map(s=>{
                const isH=hovered===s.i;
                const isDim=hovered>=0&&!isH;
                const ang=(s.rot+90+s.deg/2)*Math.PI/180;
                const px=isH?Math.cos(ang)*4:0;
                const py=isH?Math.sin(ang)*4:0;
                return(<circle key={s.i}
                  cx={cx} cy={cy} r={r}
                  fill="none"
                  stroke={"url(#"+uid2+"g"+s.i+")"}
                  strokeWidth={isH?sw+2:sw}
                  strokeDasharray={s.dashLen+" "+s.dashGap}
                  strokeLinecap="round"
                  transform={"rotate("+s.rot+" "+cx+" "+cy+") translate("+px+" "+py+")"}
                  style={{opacity:isDim?0.3:1,transition:"all .2s ease-out",cursor:"pointer"}}
                  onMouseEnter={e=>onSeg(e,s)}
                  onMouseMove={e=>{if(hovered===s.i){const rc=e.currentTarget.closest("svg").getBoundingClientRect();setTip(t=>t?{...t,x:e.clientX-rc.left,y:e.clientY-rc.top}:t)}}}
                  onMouseLeave={()=>onSeg(null,null)}
                  onClick={e=>onSeg(e,s)}
                />)
              })}
              <text x={cx} y={cy-2} textAnchor="middle" fill="var(--text)" style={{fontSize:"13px",fontFamily:"var(--mono)",fontWeight:700}}>{centerText}</text>
              {centerSub&&<text x={cx} y={cy+10} textAnchor="middle" fill="var(--text4)" style={{fontSize:"7px",fontFamily:"var(--font)"}}>{centerSub}</text>}
            </svg>
            {tip&&<div style={{position:"absolute",left:Math.min(tip.x+8,120),top:tip.y-48,background:"rgba(10,12,18,0.92)",border:"1px solid rgba(212,184,92,0.15)",borderRadius:"8px",padding:"8px 12px",pointerEvents:"none",zIndex:10,whiteSpace:"nowrap"}}>
              <div style={{fontSize:"11px",fontWeight:600,color:"var(--text)",marginBottom:"2px"}}>{tip.label}</div>
              <div style={{fontSize:"10px",fontFamily:"var(--mono)",color:"var(--text2)"}}>{tip.val}  ·  {tip.pct}%</div>
            </div>}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:"8px",marginTop:"10px"}}>
            {segs.map(s=>{const[c1,c2]=getGradPair(s.color);return(
              <div key={s.label} style={{display:"flex",alignItems:"center",gap:"4px",fontSize:"10px",color:"var(--text3)",cursor:"pointer",opacity:hovered>=0&&hovered!==s.i?0.4:1,transition:"opacity .15s"}} onMouseEnter={()=>setHovered(s.i)} onMouseLeave={()=>setHovered(-1)}>
                <div style={{width:"7px",height:"7px",borderRadius:"2px",background:"linear-gradient(135deg,"+c1+","+c2+")",flexShrink:0}}/>
                {s.label}
              </div>
            )})}
          </div>
        </div>);
      };

      // Win/Loss/Open data
      const winCount=curTrades.filter(t=>parseFloat(t.pnl)>0).length;
      const lossCount=curTrades.filter(t=>parseFloat(t.pnl)<0).length;
      const openCount=curTrades.filter(t=>t.status==="open").length;
      const wlData=metric==="pnl"?[curTrades.filter(t=>parseFloat(t.pnl)>0).reduce((s,t)=>s+parseFloat(t.pnl),0),Math.abs(curTrades.filter(t=>parseFloat(t.pnl)<0).reduce((s,t)=>s+parseFloat(t.pnl),0))]:[winCount,lossCount];
      if(openCount>0)wlData.push(metric==="pnl"?0:openCount);
      const wlLabels=openCount>0?["Win","Loss","Open"]:["Win","Loss"];
      const wlColors=openCount>0?[CHART_COLORS.win,CHART_COLORS.loss,CHART_COLORS.open]:[CHART_COLORS.win,CHART_COLORS.loss];
      const wrPct=curTrades.length>0?((winCount/curTrades.length)*100).toFixed(0)+"%":"–";

      // Long/Short
      const longN=dirDist.long.n;const shortN=dirDist.short.n;
      const lsData=metric==="pnl"?[Math.abs(dirDist.long.pnl),Math.abs(dirDist.short.pnl)]:[longN,shortN];
      const lsLabels=["Long","Short"];const lsColors=[CHART_COLORS.long,CHART_COLORS.short];
      const lsCenter=curTrades.length>0?((longN/curTrades.length)*100).toFixed(0)+"%":"–";

      // Session
      const sessLabels2=ALL_SESSIONS.filter(s=>sessDist[s].n>0);
      const sessColors2=sessLabels2.map(s=>(SESSION_COLORS[s]||SESSION_COLORS["Off-session"]).text);
      const sessData2=sessLabels2.map(s=>metric==="pnl"?Math.abs(sessDist[s].pnl):sessDist[s].n);
      const topSess=sessLabels2.length>0?sessLabels2.reduce((a,b)=>sessDist[b].n>sessDist[a].n?b:a,sessLabels2[0]):"–";

      return(<>
        {/* Donut row */}
        {lp.donuts&&<div className="resp-grid-donuts" style={{display:"grid",gap:"24px",marginBottom:"1.5rem"}}>
          <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"16px",border:"1px solid var(--glass-border)"}}>
            <Donut title="Win / Loss" labels={wlLabels} data={wlData} colors={wlColors} centerText={wrPct} centerSub="winrate"/>
          </div>
          <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"16px",border:"1px solid var(--glass-border)"}}>
            <Donut title="Long / Short" labels={lsLabels} data={lsData} colors={lsColors} centerText={lsCenter} centerSub="long"/>
          </div>
          <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"16px",border:"1px solid var(--glass-border)"}}>
            {sessLabels2.length>0?<Donut title="Sessies" labels={sessLabels2} data={sessData2} colors={sessColors2} centerText={topSess} centerSub="meest actief"/>
            :<div style={{textAlign:"center",padding:"40px 0",fontSize:"11px",color:"var(--text4)"}}>Geen sessie data</div>}
          </div>
        </div>}

        {/* Tabbed detail bars */}
        {lp.distributions&&<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"1.5rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",flexWrap:"wrap",gap:"8px"}}>
            <div style={{display:"flex",gap:"3px",background:"rgba(255,255,255,0.10)",borderRadius:"6px",padding:"3px"}}>
              {[["setups","Setups"],["sessies","Sessies"],["richting","Richting"],["emoties","Emoties"],["fouten","Fouten"],["holdtime","Holdtime"]].map(([k,l])=>(
                <button key={k} onClick={()=>setDistTab(k)} style={{padding:"4px 12px",borderRadius:"5px",border:"none",fontSize:"10px",fontWeight:600,background:distTab===k?"var(--blue3)":"transparent",color:distTab===k?"var(--blue)":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:"3px",background:"rgba(255,255,255,0.10)",borderRadius:"6px",padding:"3px"}}>
              {[["pnl","PNL"],["wr","WR"],["count","#"]].map(([k,l])=>(
                <button key={k} onClick={()=>setMetric(k)} style={{padding:"4px 10px",borderRadius:"5px",border:"none",fontSize:"10px",fontWeight:600,background:metric===k?"var(--blue3)":"transparent",color:metric===k?"var(--blue)":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
              ))}
            </div>
          </div>
          {distTab==="setups"&&(()=>{const max=Math.max(...Object.values(setupDist).map(d=>Math.abs(metricValue2(d))),1);return Object.entries(setupDist).length>0?Object.entries(setupDist).sort((a,b)=>metricValue2(b[1])-metricValue2(a[1])).map(([k,d])=>distBar(k,d,max)):(<div style={{fontSize:"11px",color:"var(--text4)"}}>Geen setup tags in deze periode.</div>)})()}
          {distTab==="sessies"&&(()=>{const max=Math.max(...Object.values(sessDist).filter(d=>d.n>0).map(d=>Math.abs(metricValue2(d))),1);return ALL_SESSIONS.filter(s=>sessDist[s].n>0).map(s=>{const c=SESSION_COLORS[s]||SESSION_COLORS["Off-session"];return distBar(s,sessDist[s],max,c.text)})})()}
          {distTab==="richting"&&(()=>{const max=Math.max(...Object.values(dirDist).map(d=>Math.abs(metricValue2(d))),1);return Object.entries(dirDist).filter(([,d])=>d.n>0).map(([k,d])=>distBar(k.charAt(0).toUpperCase()+k.slice(1),d,max,k==="long"?"var(--green)":"var(--red)"))})()}
          {distTab==="emoties"&&(()=>{const max=Math.max(...Object.values(emoDist).map(d=>Math.abs(metricValue2(d))),1);return Object.entries(emoDist).length>0?Object.entries(emoDist).sort((a,b)=>metricValue2(b[1])-metricValue2(a[1])).map(([k,d])=>distBar(k,d,max,d.neg?"var(--red)":"var(--green)")):(<div style={{fontSize:"11px",color:"var(--text4)"}}>Geen emotie tags in deze periode.</div>)})()}
          {distTab==="fouten"&&(()=>{const max=Math.max(...Object.values(mistDist).map(d=>Math.abs(metricValue2(d))),1);return Object.entries(mistDist).length>0?Object.entries(mistDist).sort((a,b)=>metricValue2(a[1])-metricValue2(b[1])).map(([k,d])=>distBar(k,d,max,"var(--orange)")):(<div style={{fontSize:"11px",color:"var(--text4)"}}>Geen fout-tags in deze periode.</div>)})()}
          {distTab==="holdtime"&&(()=>{const active=holdDist.filter(b=>b.n>0);const max=Math.max(...active.map(d=>Math.abs(metricValue2(d))),1);return active.length>0?active.map(b=>distBar(b.l,b,max)):(<div style={{fontSize:"11px",color:"var(--text4)"}}>Geen holdtime data.</div>)})()}
        </div>}
      </>);
    })()}

    {/* S5: Highlights */}
    {lp.highlights&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"1.5rem"}}>
      {bestTrade&&<div onClick={()=>onEdit(bestTrade)} style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"16px",cursor:"pointer",border:"1px solid rgba(38,166,154,0.1)",transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(50,196,149,0.28)"} onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(38,166,154,0.1)"}>
        <div style={{fontSize:"10px",color:"var(--green)",textTransform:"uppercase",fontWeight:600,marginBottom:"8px",display:"flex",alignItems:"center",gap:"6px"}}><GlowCheck size={16}/> Beste trade</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}><CryptoIcon pair={bestTrade.pair} size={28}/><div style={{fontSize:"14px",fontWeight:700,color:"var(--text)"}}>{bestTrade.pair}</div></div>
            <div style={{fontSize:"10px",color:"var(--text4)",fontFamily:"var(--mono)",marginTop:"2px"}}>{bestTrade.date} · {bestTrade.direction}</div>
            {(bestTrade.layers||[]).length>0&&<div style={{display:"flex",gap:"3px",marginTop:"4px",flexWrap:"wrap"}}>{bestTrade.layers.map((l,i)=><span key={i} style={{fontSize:"8px",padding:"1px 5px",borderRadius:"2px",background:"rgba(124,58,237,0.15)",color:"#a78bfa"}}>{l.timeframe} {l.setup}</span>)}</div>}
          </div>
          <div style={{fontSize:"20px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--green)"}}>+${fmt(parseFloat(bestTrade.pnl))}</div>
        </div>
      </div>}
      {worstTrade&&<div onClick={()=>onEdit(worstTrade)} style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"16px",cursor:"pointer",border:"1px solid rgba(239,83,80,0.1)",transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(220,122,122,0.28)"} onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(239,83,80,0.1)"}>
        <div style={{fontSize:"10px",color:"var(--red)",textTransform:"uppercase",fontWeight:600,marginBottom:"8px",display:"flex",alignItems:"center",gap:"6px"}}><GlowCross size={16}/> Slechtste trade</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}><CryptoIcon pair={worstTrade.pair} size={28}/><div style={{fontSize:"14px",fontWeight:700,color:"var(--text)"}}>{worstTrade.pair}</div></div>
            <div style={{fontSize:"10px",color:"var(--text4)",fontFamily:"var(--mono)",marginTop:"2px"}}>{worstTrade.date} · {worstTrade.direction}</div>
            {(worstTrade.mistakeTags||[]).length>0&&<div style={{display:"flex",gap:"3px",marginTop:"4px",flexWrap:"wrap"}}>{worstTrade.mistakeTags.map(m=><span key={m} style={{fontSize:"8px",padding:"1px 5px",borderRadius:"2px",background:"rgba(245,158,11,0.12)",color:"var(--orange)"}}>{m}</span>)}</div>}
          </div>
          <div style={{fontSize:"20px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--red)"}}>${fmt(parseFloat(worstTrade.pnl))}</div>
        </div>
        <div style={{marginTop:"8px",padding:"8px 10px",background:"rgba(37,99,235,0.06)",borderRadius:"5px",border:"1px solid rgba(37,99,235,0.1)",fontSize:"10px",color:"var(--blue)"}}>💡 Wat ging er mis bij deze trade? Wat zou je anders doen?</div>
      </div>}
    </div>}

    {/* Export */}
    <div style={{display:"flex",gap:"8px",justifyContent:"flex-end"}}>
      <button onClick={()=>{
        const md=`# Review: ${current.label}\n\n**PNL:** ${cur.pnl>=0?"+":""}$${fmt(cur.pnl)} | **WR:** ${cur.wr.toFixed(1)}% | **Trades:** ${cur.n} | **PF:** ${cur.pf===Infinity?"∞":cur.pf.toFixed(2)}\n\n## Wat werkte\n${setups.length>0?"- Beste setup: "+setups[0][0]+" (+$"+fmt(setups[0][1].pnl)+")":""}\n${sessions.length>0?"- Beste sessie: "+sessions[0][0]:""}\n\n## Wat niet werkte\n${mistakes.length>0?"- Duurste fout: "+mistakes[0][0]+" ($"+fmt(mistakes[0][1].pnl)+")":""}\n${negEmo.length>0?"- Duurste emotie: "+negEmo[0][0]+" ($"+fmt(negEmo[0][1].pnl)+")":""}\n\n## Highlights\n${bestTrade?"- Beste: "+bestTrade.pair+" +$"+fmt(parseFloat(bestTrade.pnl)):""}\n${worstTrade?"- Slechtste: "+worstTrade.pair+" $"+fmt(parseFloat(worstTrade.pnl)):""}`;
        navigator.clipboard.writeText(md).then(()=>alert("Markdown gekopieerd naar clipboard!")).catch(()=>{});
      }} style={{padding:"7px 14px",borderRadius:"6px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",fontSize:"11px",fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>📋 Kopieer Markdown</button>
      {onReport&&<button onClick={onReport} style={{padding:"7px 14px",borderRadius:"6px",border:"1px solid var(--gold-border)",background:"var(--gold-dim)",color:"var(--gold)",fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>📄 Genereer rapport</button>}
    </div>
    </>}
  </div>);
}

// ============ ANALYTICS ============
function Analytics({trades}){
  const closed=trades.filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  const[metric,setMetric]=useState("pnl");
  const{prefs:lp,toggle:lpToggle,reset:lpReset}=useLayoutPrefs("analytics");
  const[lpOpen,setLpOpen]=useState(false);
  const LP_SECTIONS=[
    {label:"Analyse secties",items:[
      {key:"longShort",label:"Long vs Short"},{key:"perPair",label:"Per Pair"},{key:"perDay",label:"Per Dag van de Week"},{key:"heatmap",label:"Uur Heatmap"},{key:"streaks",label:"Drawdown & Streaks"},
      {key:"foutAnalyse",label:"Fout-analyse"},{key:"emotionImpact",label:"Emotie-impact Analyse"},{key:"holdtime2",label:"Holdtime Verdeling"},{key:"rr2",label:"R:R Verdeling"},
      {key:"sessionPerf",label:"Sessie Performance"},{key:"layerAnalysis",label:"Layer Analyse"}
    ]},
    {label:"Overig",items:[
      {key:"showTips",label:"💡 Data-tips tonen"}
    ]}
  ];
  if(closed.length<2)return(<div style={{textAlign:"center",padding:"4rem 2rem",color:"var(--text3)"}}>
    <div style={{fontSize:"48px",marginBottom:"1rem",opacity:0.3}}>📈</div>
    <div style={{fontSize:"16px",fontWeight:500,marginBottom:"8px"}}>Minimaal 2 trades nodig</div>
  </div>);

  const DAYS=["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"];
  const BLOCKS=[{l:"Nacht",r:[0,6]},{l:"Ochtend",r:[6,12]},{l:"Middag",r:[12,18]},{l:"Avond",r:[18,24]}];
  
  // Day of week analysis
  const dayPerf={};DAYS.forEach(d=>dayPerf[d]={w:0,l:0,pnl:0,n:0});
  closed.forEach(t=>{const d=new Date(t.date);const dn=DAYS[d.getDay()];dayPerf[dn].n++;dayPerf[dn].pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?dayPerf[dn].w++:dayPerf[dn].l++});
  const dayMax=Math.max(...Object.values(dayPerf).map(d=>Math.abs(d.pnl)),1);

  // Time block analysis
  const timePerf={};BLOCKS.forEach(b=>timePerf[b.l]={w:0,l:0,pnl:0,n:0});
  closed.forEach(t=>{const h=parseInt(t.time?.split(":")[0])||0;const block=BLOCKS.find(b=>h>=b.r[0]&&h<b.r[1]);if(block){const k=block.l;timePerf[k].n++;timePerf[k].pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?timePerf[k].w++:timePerf[k].l++}});

  // Hour heatmap
  const hourData=Array(24).fill(null).map(()=>({n:0,pnl:0,w:0}));
  closed.forEach(t=>{const h=parseInt(t.time?.split(":")[0])||0;hourData[h].n++;hourData[h].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)hourData[h].w++});
  const hourMax=Math.max(...hourData.map(h=>Math.abs(h.pnl)),1);

  // Long vs Short
  const dirs={long:{w:0,l:0,pnl:0,n:0},short:{w:0,l:0,pnl:0,n:0}};
  closed.forEach(t=>{const d=t.direction||"long";if(!dirs[d])dirs[d]={w:0,l:0,pnl:0,n:0};dirs[d].n++;dirs[d].pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?dirs[d].w++:dirs[d].l++});

  // Holdtime analysis
  const holdBuckets=[
    {label:"< 5 min",max:5},{label:"5–30 min",max:30},{label:"30 min–1u",max:60},
    {label:"1–4u",max:240},{label:"4–12u",max:720},{label:"12u+",max:Infinity}
  ];
  const holdPerf=holdBuckets.map(b=>({...b,w:0,l:0,pnl:0,n:0}));
  closed.forEach(t=>{
    let mins=0;
    if(t.openTime&&t.closeTime){
      const open=parseInt(t.openTime);const close=parseInt(t.closeTime);
      if(open>0&&close>open)mins=(close-open)/60000;
    }else if(t.date&&t.time){
      // Estimate from date+time (assume same-day close for trades without explicit times)
      mins=0; // Can't calculate without close time
    }
    if(mins<=0)return;
    const bucket=holdPerf.find(b=>mins<b.max);
    if(bucket){bucket.n++;bucket.pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?bucket.w++:bucket.l++}
  });

  // R:R analysis per setup
  const rrPerSetup={};
  closed.forEach(t=>{
    const entry=parseFloat(t.entry);const exit=parseFloat(t.exit);const sl=parseFloat(t.stopLoss);
    if(!entry||!exit||!sl||sl===entry)return;
    const risk=Math.abs(entry-sl);const reward=Math.abs(exit-entry);
    const rr=risk>0?reward/risk:0;
    (t.setupTags||[]).forEach(tag=>{
      if(!rrPerSetup[tag])rrPerSetup[tag]={totalRR:0,n:0,wins:0,totalWinRR:0,totalLossRR:0};
      rrPerSetup[tag].totalRR+=rr;rrPerSetup[tag].n++;
      if(parseFloat(t.pnl)>0){rrPerSetup[tag].wins++;rrPerSetup[tag].totalWinRR+=rr}
      else{rrPerSetup[tag].totalLossRR+=rr}
    });
    if(!(t.setupTags||[]).length){
      if(!rrPerSetup["(geen setup)"])rrPerSetup["(geen setup)"]={totalRR:0,n:0,wins:0,totalWinRR:0,totalLossRR:0};
      rrPerSetup["(geen setup)"].totalRR+=rr;rrPerSetup["(geen setup)"].n++;
      if(parseFloat(t.pnl)>0){rrPerSetup["(geen setup)"].wins++;rrPerSetup["(geen setup)"].totalWinRR+=rr}
      else{rrPerSetup["(geen setup)"].totalLossRR+=rr}
    }
  });

  // Streaks
  let curW=0,curL=0,maxW=0,maxL=0;
  const sorted=[...closed].sort((a,b)=>`${a.date}T${a.time}`.localeCompare(`${b.date}T${b.time}`));
  sorted.forEach(t=>{if(parseFloat(t.pnl)>0){curW++;curL=0;if(curW>maxW)maxW=curW}else{curL++;curW=0;if(curL>maxL)maxL=curL}});

  // Drawdown
  let peak=0,cumPnl=0,maxDD=0;
  sorted.forEach(t=>{cumPnl+=parseFloat(t.pnl);if(cumPnl>peak)peak=cumPnl;const dd=peak-cumPnl;if(dd>maxDD)maxDD=dd});

  // Pair performance
  const pairPerf={};
  closed.forEach(t=>{const p=t.pair||"?";if(!pairPerf[p])pairPerf[p]={w:0,l:0,pnl:0,n:0};pairPerf[p].n++;pairPerf[p].pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?pairPerf[p].w++:pairPerf[p].l++});

  // Metric toggle component
  const MetricToggle=()=>(<div style={{display:"flex",gap:"3px",background:"rgba(255,255,255,0.10)",borderRadius:"6px",padding:"3px"}}>
    {[["pnl","PNL"],["wr","Winrate"],["count","Trades"]].map(([k,l])=>(
      <button key={k} onClick={()=>setMetric(k)} style={{padding:"5px 14px",borderRadius:"5px",border:"none",fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",background:metric===k?"var(--blue3)":"transparent",color:metric===k?"var(--blue)":"var(--text4)",transition:"all .12s"}}>{l}</button>
    ))}
  </div>);

  // Metric-aware helpers
  const metricValue=(d)=>metric==="pnl"?d.pnl:metric==="wr"?(d.n>0?d.w/d.n*100:0):d.n;
  const metricMax=(items)=>Math.max(...items.map(d=>Math.abs(metricValue(d))),metric==="wr"?100:1);
  const metricFmt=(v)=>metric==="pnl"?`${v>=0?"+":""}$${fmt(v)}`:metric==="wr"?`${v.toFixed(1)}%`:`${v}`;
  const metricColor=(v)=>metric==="pnl"?(v>=0?"var(--green)":"var(--red)"):metric==="wr"?(v>=50?"var(--green)":"var(--red)"):"var(--blue)";
  const metricBarBg=(v)=>metric==="pnl"?(v>=0?"rgba(50,196,149,0.28)":"rgba(220,122,122,0.28)"):metric==="wr"?(v>=50?"rgba(50,196,149,0.28)":"rgba(220,122,122,0.28)"):"rgba(96,165,250,0.25)";

  // Tip component
  const Tip=({text})=>text?(<div style={{marginTop:"12px",padding:"8px 12px",background:"rgba(37,99,235,0.06)",borderRadius:"6px",border:"1px solid rgba(37,99,235,0.1)",fontSize:"11px",color:"var(--blue)",display:"flex",alignItems:"flex-start",gap:"6px",lineHeight:1.5}}>
    <span style={{flexShrink:0}}>💡</span><span>{text}</span>
  </div>):null;

  const section=(title,children,tip)=>(<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"16px"}}>
    <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"14px"}}>{title}</div>{children}{lp.showTips&&tip&&<Tip text={tip}/>}</div>);

  // Data-driven tip generators
  const genTip={
    longShort:()=>{
      const l=dirs.long||{n:0,pnl:0,w:0};const s=dirs.short||{n:0,pnl:0,w:0};
      const total=l.n+s.n;if(total<5)return null;
      const lPct=total>0?(l.n/total*100).toFixed(0):0;const sPct=total>0?(s.n/total*100).toFixed(0):0;
      const lWr=l.n>0?(l.w/l.n*100):0;const sWr=s.n>0?(s.w/s.n*100):0;
      if(Math.abs(lWr-sWr)>15){const best=lWr>sWr?"long":"short";const bWr=Math.max(lWr,sWr).toFixed(0);const wWr=Math.min(lWr,sWr).toFixed(0);return`Je ${best} trades presteren beter (${bWr}% WR vs ${wWr}%). Overweeg meer ${best}-gericht te traden.`}
      if(parseInt(lPct)>80||parseInt(sPct)>80){const dom=parseInt(lPct)>80?"long":"short";return`${dom==="long"?lPct:sPct}% van je trades zijn ${dom}. Kleine sample op de andere kant, wees voorzichtig met conclusies.`}
      return null;
    },
    perPair:()=>{
      const pairs=Object.entries(pairPerf);if(pairs.length<1)return null;
      if(pairs.length===1)return`Je trade alleen ${pairs[0][0]}. Met één asset is het lastig om setup-specifieke conclusies te trekken.`;
      const best=pairs.sort((a,b)=>b[1].pnl-a[1].pnl)[0];const worst=pairs[pairs.length-1];
      if(worst[1].pnl<0&&Math.abs(worst[1].pnl)>10)return`${worst[0]} kost je $${fmt(Math.abs(worst[1].pnl))} over ${worst[1].n} trades. Evalueer of deze asset bij je strategie past.`;
      return null;
    },
    sessionPerf:()=>{
      const active=ALL_SESSIONS.map(s=>{const d={w:0,l:0,pnl:0,n:0};closed.forEach(t=>{if(getSessionTags(t.date,t.time).includes(s)){d.n++;d.pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?d.w++:d.l++}});return[s,d]}).filter(([,d])=>d.n>=3);
      if(active.length<2)return null;
      const best=active.sort((a,b)=>b[1].pnl-a[1].pnl)[0];const worst=active[active.length-1];
      const bWr=best[1].n>0?(best[1].w/best[1].n*100).toFixed(0):0;
      if(worst[1].pnl<0)return`Je presteert het best in ${best[0]} (${bWr}% WR). ${worst[0]} kost je geld. Overweeg selectiever te zijn buiten ${best[0]}.`;
      return`${best[0]} is je sterkste sessie met ${bWr}% winrate over ${best[1].n} trades.`;
    },
    perDay:()=>{
      const active=DAYS.map(d=>[d,dayPerf[d]]).filter(([,d])=>d.n>=3);
      if(active.length<3)return null;
      const best=active.sort((a,b)=>b[1].pnl-a[1].pnl)[0];const worst=active[active.length-1];
      if(worst[1].pnl<0)return`${best[0]} is je beste dag. ${worst[0]} kost je geld ($${fmt(Math.abs(worst[1].pnl))}). Overweeg op ${worst[0]} minder te traden.`;
      return null;
    },
    heatmap:()=>{
      const active=hourData.filter(h=>h.n>=2);if(active.length<4)return null;
      const best=active.sort((a,b)=>b.pnl-a.pnl)[0];const worst=active[active.length-1];
      const bestH=hourData.indexOf(best);const worstH=hourData.indexOf(worst);
      if(worst.pnl<0)return`Je bent het meest winstgevend rond ${bestH}:00. Na ${worstH}:00 daalt je performance. Timing is alles.`;
      return null;
    },
  };

  const bar=(label,d,max)=>{
    const v=metricValue(d);const w=Math.abs(v)/(max||1)*100;const wr=d.n>0?d.w/d.n*100:0;
    return(<div key={label} style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
      <div style={{width:"80px",fontSize:"12px",color:"var(--text2)",fontWeight:500}}>{label}</div>
      <div style={{flex:1,height:"24px",background:"rgba(255,255,255,0.10)",borderRadius:"4px",position:"relative",overflow:"hidden"}}>
        <div style={{height:"100%",width:`${Math.max(w,2)}%`,background:metricBarBg(v),borderRadius:"4px",transition:"width .3s"}}/>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:"8px",fontSize:"11px",fontFamily:"var(--mono)",color:metricColor(v),fontWeight:600}}>
          {metricFmt(v)}
        </div>
      </div>
      <div style={{width:"40px",fontSize:"10px",color:"var(--text3)",textAlign:"right",fontFamily:"var(--mono)"}}>{d.n}x</div>
      <div style={{width:"45px",fontSize:"10px",color:wr>=50?"var(--green)":"var(--red)",textAlign:"right",fontFamily:"var(--mono)"}}>{wr.toFixed(0)}%</div>
    </div>);
  };

  return(<div style={{animation:"fadeIn .3s ease"}}>
    {/* Metric toggle + layout gear */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.5rem"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:"12px",flex:1,marginRight:"16px"}}>
        <Stat label="Netto PNL" value={`$${fmt(closed.reduce((s,t)=>s+parseFloat(t.pnl),0))}`} color={closed.reduce((s,t)=>s+parseFloat(t.pnl),0)>=0?"var(--green)":"var(--red)"}/>
        <Stat label="Winrate" value={`${closed.length?((closed.filter(t=>parseFloat(t.pnl)>0).length/closed.length)*100).toFixed(1):0}%`} color="var(--gold)"/>
        <Stat label="Totaal trades" value={closed.length} color="var(--text)"/>
        <Stat label="Profit Factor" value={`${(()=>{const gw=closed.filter(t=>parseFloat(t.pnl)>0).reduce((s,t)=>s+parseFloat(t.pnl),0);const gl=Math.abs(closed.filter(t=>parseFloat(t.pnl)<0).reduce((s,t)=>s+parseFloat(t.pnl),0));return gl>0?(gw/gl).toFixed(2):"∞"})()}`} color="var(--text2)"/>
      </div>
      <LayoutGear onClick={()=>setLpOpen(true)}/>
    </div>
    <LayoutPanel open={lpOpen} onClose={()=>setLpOpen(false)} sections={LP_SECTIONS} prefs={lp} toggle={lpToggle} reset={lpReset}/>

    <div style={{display:"flex",justifyContent:"flex-end",marginBottom:"1rem"}}><MetricToggle/></div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px"}}>
      {lp.longShort&&section("Long vs Short",<div>
        {Object.entries(dirs).map(([dir,d])=>{
          const max=metricMax(Object.values(dirs));
          return bar(dir.charAt(0).toUpperCase()+dir.slice(1),d,max);
        })}
      </div>,genTip.longShort())}

      {lp.perPair&&section("Per pair",<div>
        {Object.entries(pairPerf).sort((a,b)=>metricValue(b[1])-metricValue(a[1])).map(([p,d])=>{
          const max=metricMax(Object.values(pairPerf));
          return bar(p,d,max);
        })}
      </div>,genTip.perPair())}

      {/* === PERFORMANCE PER SESSIE === */}
      {lp.sessionPerf&&(()=>{
        const sessPerf2={};ALL_SESSIONS.forEach(s=>sessPerf2[s]={w:0,l:0,pnl:0,n:0});
        closed.forEach(t=>{const st=getSessionTags(t.date,t.time);const p=parseFloat(t.pnl);st.forEach(s=>{if(!sessPerf2[s])sessPerf2[s]={w:0,l:0,pnl:0,n:0};sessPerf2[s].n++;sessPerf2[s].pnl+=p;p>0?sessPerf2[s].w++:sessPerf2[s].l++})});
        const active=ALL_SESSIONS.filter(s=>sessPerf2[s].n>0);
        if(active.length===0)return null;
        const max3=metricMax(active.map(s=>sessPerf2[s]));
        return section("Performance per sessie (CET)",<div>
          {active.map(s=>{const c2=SESSION_COLORS[s]||SESSION_COLORS["Off-session"];return bar(<span style={{color:c2.text}}>{s}</span>,sessPerf2[s],max3)})}
        </div>,genTip.sessionPerf());
      })()}


      {lp.perDay&&section("Per dag van de week",<div>
        {DAYS.filter(d=>dayPerf[d].n>0).map(d=>{
          const max=metricMax(Object.values(dayPerf).filter(x=>x.n>0));
          return bar(d.slice(0,2),dayPerf[d],max);
        })}
      </div>,genTip.perDay())}

      {lp.heatmap&&section("Uur heatmap",<div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:"3px"}}>
          {hourData.map((h,i)=>{
            const hd={...h,w:h.w||0};
            const val=metric==="pnl"?h.pnl:metric==="wr"?(h.n>0?h.w/h.n*100:0):h.n;
            const maxH=metric==="pnl"?hourMax:metric==="wr"?100:Math.max(...hourData.map(x=>x.n),1);
            const intensity=h.n>0?Math.min(Math.abs(val)/(maxH||1),1):0;
            const col=metricColor(val);
            const bg=h.n===0?"rgba(42,46,57,0.3)":metric==="count"?`rgba(96,165,250,${0.1+intensity*0.4})`:val>=0?`rgba(42,181,135,${0.1+intensity*0.4})`:`rgba(212,106,106,${0.1+intensity*0.4})`;
            return(<div key={i} title={`${i}:00 — ${h.n} trades, $${fmt(h.pnl)}${h.n>0?`, WR ${(h.n>0?h.w/h.n*100:0).toFixed(0)}%`:""}`} style={{
              height:"32px",borderRadius:"3px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",fontFamily:"var(--mono)",cursor:"pointer",
              background:bg,color:h.n===0?"var(--text5)":col,fontWeight:h.n>0?600:400,
            }}>{i}h</div>);
          })}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:"6px",fontSize:"9px",color:"var(--text4)"}}>
          <span>Nacht</span><span>Ochtend</span><span>Middag</span><span>Avond</span>
        </div>
      </div>,genTip.heatmap())}

      {/* === DRAWDOWN & STREAKS === */}
      {lp.streaks&&section("Drawdown & Streaks",<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px"}}>
        <div style={{textAlign:"center",padding:"10px",background:"var(--bg)",borderRadius:"var(--radius)"}}><div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px"}}>Max Drawdown</div><div style={{fontSize:"18px",fontFamily:"var(--mono)",fontWeight:700,color:maxDD>0?"var(--red)":"var(--text3)"}}>{maxDD>0?"$"+fmt(maxDD):"–"}</div></div>
        <div style={{textAlign:"center",padding:"10px",background:"var(--bg)",borderRadius:"var(--radius)"}}><div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px"}}>Max Win Streak</div><div style={{fontSize:"18px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--green)"}}>{maxW} trades</div></div>

      {/* === R:R ANALYSE === */}
      {lp.rr2&&(()=>{

        // Hit rate: % trades that reached planned R:R

function Calendar({trades}){

    const weekStart=getWeekStart(new Date(now.getTime()+monthOffset*7*24*60*60*1000));

    const weekDayPnl={};weekDays.forEach((wd,i)=>{const key=wd.toISOString().split("T")[0];weekDayPnl[i]={pnl:0,n:0,date:key,label:wd.toLocaleString("nl-NL",{weekday:"short",day:"numeric"})};closed.forEach(t=>{if(t.date===key){weekDayPnl[i].pnl+=parseFloat(t.pnl);weekDayPnl[i].n++}})});
    const weekPnl=Object.values(weekDayPnl).reduce((s,d)=>s+d.pnl,0);const weekTrades=Object.values(weekDayPnl).reduce((s,d)=>s+d.n,0);

}</div>)})}</div></div></div>);

    const yearPnl=monthlyPnl.reduce((s,d)=>s+d.pnl,0);const yearTrades=monthlyPnl.reduce((s,d)=>s+d.n,0);
    const yrG=monthlyPnl.filter(d=>d.pnl>0).length;const yrR=monthlyPnl.filter(d=>d.pnl<0).length;
    const yearMaxAbs=Math.max(...monthlyPnl.map(d=>Math.abs(d.pnl)),1);
    return(<div style={{animation:"fadeIn .3s ease"}}><div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:"12px",marginBottom:"1.5rem"}}><Stat label="Jaar PNL" value={`$${fmt(yearPnl)}`} color={yearPnl>=0?"var(--green)":"var(--red)"} sub={`${yearTrades} trades`}/><Stat label="Groene maanden" value={yrG} color="var(--green)"/><Stat label="Rode maanden" value={yrR} color="var(--red)"/><Stat label="Actieve maanden" value={monthlyPnl.filter(d=>d.n>0).length} sub="van 12"/></div><div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}}>{navBtn(-1)}<div style={{display:"flex",alignItems:"center",gap:"16px"}}><div style={{fontSize:"15px",fontWeight:600}}>{viewYear}</div>{viewToggle}</div>{navBtn(1)}</div><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"8px"}}>{monthlyPnl.map((d,i)=>{const hasTrade=d.n>0;const pos=d.pnl>=0;const intensity=hasTrade?Math.min(Math.abs(d.pnl)/yearMaxAbs,1):0;return(<div key={i} style={{borderRadius:"8px",padding:"16px 12px",textAlign:"center",background:hasTrade?(pos?`rgba(42,181,135,${0.05+intensity*0.15})`:`rgba(212,106,106,${0.05+intensity*0.15})`):"rgba(42,46,57,0.3)",border:`1px solid ${hasTrade?(pos?"rgba(50,196,149,0.14)":"rgba(220,122,122,0.14)"):"var(--border1)"}`}}><div style={{fontSize:"12px",color:hasTrade?"var(--text2)":"var(--text4)",fontWeight:600,marginBottom:"8px",textTransform:"capitalize"}}>{d.label}</div>{hasTrade&&<><div style={{fontSize:"15px",fontFamily:"var(--mono)",fontWeight:700,color:pos?"var(--green)":"var(--red)"}}>{d.pnl>=0?"+":""}${fmt(d.pnl)}</div><div style={{fontSize:"10px",color:"var(--text4)",marginTop:"4px"}}>{d.n} trades</div></>}</div>)})}</div></div></div>);
  }

  // === MONTH VIEW (default) ===
  const viewDate=new Date(now.getFullYear(),now.getMonth()+monthOffset,1);
  const year=viewDate.getFullYear();const month=viewDate.getMonth();
  const monthName=viewDate.toLocaleString("nl-NL",{month:"long",year:"numeric"});
  const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();const startDay=(firstDay+6)%7;
  const dayPnl={};closed.forEach(t=>{const d=new Date(t.date);if(d.getFullYear()===year&&d.getMonth()===month){const day=d.getDate();if(!dayPnl[day])dayPnl[day]={pnl:0,n:0};dayPnl[day].pnl+=parseFloat(t.pnl);dayPnl[day].n++}});
  const monthPnl=Object.values(dayPnl).reduce((s,d)=>s+d.pnl,0);const monthTrades=Object.values(dayPnl).reduce((s,d)=>s+d.n,0);
  const greenDays=Object.values(dayPnl).filter(d=>d.pnl>0).length;const redDays=Object.values(dayPnl).filter(d=>d.pnl<0).length;
  const maxAbs=Math.max(...Object.values(dayPnl).map(d=>Math.abs(d.pnl)),1);
  const cells=[];for(let i=0;i<startDay;i++)cells.push(null);for(let d=1;d<=daysInMonth;d++)cells.push(d);

  return(<div style={{animation:"fadeIn .3s ease"}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:"12px",marginBottom:"1.5rem"}}>
      <Stat label="Maand PNL" value={`$${fmt(monthPnl)}`} color={monthPnl>=0?"var(--green)":"var(--red)"} sub={`${monthTrades} trades`}/>

        {cells.map((day,i)=>{if(day===null)return <div key={`e${i}`}/>;const data=dayPnl[day];const hasTrade=!!data;const pos=data?.pnl>=0;const intensity=hasTrade?Math.min(Math.abs(data.pnl)/maxAbs,1):0;return(<div key={day} style={{borderRadius:"6px",padding:"8px 6px",textAlign:"center",minHeight:"60px",background:hasTrade?(pos?`rgba(42,181,135,${0.05+intensity*0.15})`:`rgba(212,106,106,${0.05+intensity*0.15})`):"rgba(42,46,57,0.3)",border:`1px solid ${hasTrade?(pos?"rgba(50,196,149,0.14)":"rgba(220,122,122,0.14)"):"var(--border1)"}`}}><div style={{fontSize:"11px",color:hasTrade?"var(--text2)":"var(--text4)",fontWeight:500,marginBottom:"4px"}}>{day}</div>{hasTrade&&<><div style={{fontSize:"12px",fontFamily:"var(--mono)",fontWeight:700,color:pos?"var(--green)":"var(--red)"}}>{data.pnl>=0?"+":""}${fmt(data.pnl)}</div><div style={{fontSize:"9px",color:"var(--text4)",marginTop:"2px"}}>{data.n} trade{data.n>1?"s":""}</div></>}</div>)})}
      </div>
