    })()}

    {lp.setupPerf&&(Object.keys(setupPerf).length>0?<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"1.5rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"14px"}}>Setup performance (grafiek)</div>
      {Object.entries(setupPerf).sort((a,b)=>b[1].pnl-a[1].pnl).map(([tag,d])=>{const wr2=d.n>0?d.w/d.n*100:0;const mx=Math.max(...Object.values(setupPerf).map(x=>Math.abs(x.pnl)),1);const w=Math.abs(d.pnl)/mx*100;const pos=d.pnl>=0;return(<div key={tag} style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}><div style={{width:"80px",fontSize:"12px",color:"var(--text2)",fontWeight:500}}>{tag}</div><div style={{flex:1,height:"24px",background:"rgba(255,255,255,0.10)",borderRadius:"4px",position:"relative",overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(w,2)}%`,background:pos?"rgba(50,196,149,0.28)":"rgba(220,122,122,0.28)",borderRadius:"4px"}}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:"8px",fontSize:"11px",fontFamily:"var(--mono)",color:pos?"var(--green)":"var(--red)",fontWeight:600}}>{d.pnl>=0?"+":""}${fmt(d.pnl)}</div></div><div style={{width:"40px",fontSize:"10px",color:"var(--text3)",textAlign:"right",fontFamily:"var(--mono)"}}>{d.n}x</div><div style={{width:"45px",fontSize:"10px",color:wr2>=50?"var(--green)":"var(--red)",textAlign:"right",fontFamily:"var(--mono)"}}>{wr2.toFixed(0)}%</div></div>)})}
    </div>:<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"1.5rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"10px"}}>Setup performance</div>
      <div style={{fontSize:"12px",color:"var(--text4)",lineHeight:1.6}}>Nog geen setup tags. Tag je trades met BOS, MSB, SFP etc. via de trade list (klik op + tag) om hier performance per setup te zien.</div>
    </div>)}

    {/* Session performance */}
    {lp.sessionPerf&&(()=>{
      const sessPerf={};ALL_SESSIONS.forEach(s=>sessPerf[s]={w:0,l:0,pnl:0,n:0});
      closed.forEach(t=>{const st=getSessionTags(t.date,t.time);const p=parseFloat(t.pnl);st.forEach(s=>{if(!sessPerf[s])sessPerf[s]={w:0,l:0,pnl:0,n:0};sessPerf[s].n++;sessPerf[s].pnl+=p;p>0?sessPerf[s].w++:sessPerf[s].l++})});
      const hasSess=Object.values(sessPerf).some(d=>d.n>0);
      if(!hasSess)return null;
      const sessMax=Math.max(...Object.values(sessPerf).map(d=>Math.abs(d.pnl)),1);
      return(<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"1.5rem"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"14px"}}>Performance per sessie (CET)</div>
        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px",paddingBottom:"6px",borderBottom:"1px solid var(--border1)"}}>
          <div style={{width:"90px",fontSize:"9px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Sessie</div>
          <div style={{flex:1,fontSize:"9px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>PNL</div>
          <div style={{width:"40px",fontSize:"9px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",textAlign:"right"}}>Trades</div>
          <div style={{width:"45px",fontSize:"9px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",textAlign:"right"}}>WR</div>
          <div style={{width:"45px",fontSize:"9px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",textAlign:"right"}}>PF</div>
        </div>
        {ALL_SESSIONS.filter(s=>sessPerf[s].n>0).map(s=>{
          const d=sessPerf[s];const wr=d.n>0?d.w/d.n*100:0;
          const grossW=closed.filter(t=>getSessionTags(t.date,t.time).includes(s)&&parseFloat(t.pnl)>0).reduce((a,t)=>a+parseFloat(t.pnl),0);
          const grossL=Math.abs(closed.filter(t=>getSessionTags(t.date,t.time).includes(s)&&parseFloat(t.pnl)<0).reduce((a,t)=>a+parseFloat(t.pnl),0));
          const profitFactor=grossL>0?grossW/grossL:(grossW>0?Infinity:0);
          const w=Math.abs(d.pnl)/sessMax*100;const pos=d.pnl>=0;
          const c=SESSION_COLORS[s]||SESSION_COLORS["Off-session"];
          return(<div key={s} style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
            <div style={{width:"90px",display:"flex",alignItems:"center",gap:"6px"}}>
              <div style={{width:"8px",height:"8px",borderRadius:"2px",background:c.text,flexShrink:0}}/>
              <span style={{fontSize:"12px",color:c.text,fontWeight:600}}>{s}</span>
            </div>
            <div style={{flex:1,height:"24px",background:"rgba(255,255,255,0.10)",borderRadius:"4px",position:"relative",overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.max(w,2)}%`,background:pos?`${c.text}30`:`rgba(220,122,122,0.28)`,borderRadius:"4px"}}/>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:"8px",fontSize:"11px",fontFamily:"var(--mono)",color:pos?"var(--green)":"var(--red)",fontWeight:600}}>{d.pnl>=0?"+":""}${fmt(d.pnl)}</div>
            </div>
            <div style={{width:"40px",fontSize:"10px",color:"var(--text3)",textAlign:"right",fontFamily:"var(--mono)"}}>{d.n}x</div>
            <div style={{width:"45px",fontSize:"10px",color:wr>=50?"var(--green)":"var(--red)",textAlign:"right",fontFamily:"var(--mono)"}}>{wr.toFixed(0)}%</div>
            <div style={{width:"45px",fontSize:"10px",color:profitFactor>=1.5?"var(--green)":profitFactor>=1?"var(--amber)":"var(--red)",textAlign:"right",fontFamily:"var(--mono)"}}>{profitFactor===Infinity?"∞":profitFactor.toFixed(2)}</div>
          </div>);
        })}
      </div>);
    })()}

    <div style={{display:"grid",gridTemplateColumns:lp.foutenPerf&&lp.emotionPerf?"1fr 1fr":"1fr",gap:"16px"}}>
      {lp.foutenPerf&&(topMistakes.length>0?<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"12px"}}>Top fouten</div>
        {topMistakes.map(([tag,n])=>(
          <div key={tag} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border1)",fontSize:"13px"}}>
            <span style={{color:"var(--orange)"}}>{tag}</span>
            <span style={{fontFamily:"var(--mono)",color:"var(--text3)"}}>{n}x</span>
          </div>
        ))}
      </div>:<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"10px"}}>Top fouten</div>
        <div style={{fontSize:"12px",color:"var(--text4)",lineHeight:1.6}}>Nog geen fouten getagd. Markeer fouten als "Te vroeg in", "SL te krap" etc. om patronen te herkennen.</div>
      </div>)}
      {lp.emotionPerf&&(Object.keys(emoPerf).length>0?<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"12px"}}>Performance per emotie</div>
        {Object.entries(emoPerf).sort((a,b)=>b[1].pnl-a[1].pnl).map(([tag,d])=>(
          <div key={tag} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border1)",fontSize:"13px"}}>
            <span style={{color:isNegEmotion(tag)?"var(--red)":"var(--green)",fontWeight:500,display:"flex",alignItems:"center",gap:"5px"}}>{isNegEmotion(tag)?<GlowCross size={14}/>:<GlowCheck size={14}/>} {tag}</span>
            <div style={{display:"flex",gap:"16px",alignItems:"center"}}>
              <span style={{color:"var(--text3)",fontSize:"11px"}}>{pct(d.n>0?d.w/d.n*100:0)} WR</span>
              <span style={{fontFamily:"var(--mono)",fontWeight:600,fontSize:"13px",color:d.pnl>=0?"var(--green)":"var(--red)"}}>${fmt(d.pnl)}</span>
            </div>
          </div>
        ))}
      </div>:<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"10px"}}>Performance per emotie</div>
        <div style={{fontSize:"12px",color:"var(--text4)",lineHeight:1.6}}>Nog geen emoties getagd. Log emoties als "Geduldig", "FOMO" etc. om te zien hoe mindset je resultaat beïnvloedt.</div>
      </div>)}
    </div>
  </div>);
}

// ============ PDF REPORT GENERATOR ============
function PDFReportModal({trades,onClose,tagConfig}){
  const closed=trades.filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  const[template,setTemplate]=useState(null); // null|"basic"|"advanced"
  const[generating,setGenerating]=useState(false);
  const[sections,setSections]=useState([
    {id:"summary",label:"Samenvatting",desc:"PNL, winrate, PF, trade count, R:R",on:true,basic:true},
    {id:"equity",label:"Equity Curve",desc:"Cumulatieve PNL grafiek",on:true,basic:true},
    {id:"pnlday",label:"PNL per dag",desc:"Dagelijkse winst/verlies bars",on:true,basic:true},
    {id:"winloss",label:"Win/Loss verdeling",desc:"Donut win vs loss percentage",on:true,basic:true},
    {id:"longshort",label:"Long/Short verdeling",desc:"Donut long vs short",on:true,basic:true},
    {id:"sessions",label:"Sessie verdeling",desc:"Tokyo, London, New York, Off-session",on:true,basic:false},
    {id:"setups",label:"Setup performance",desc:"PNL en winrate per setup type",on:true,basic:false},
    {id:"emotions",label:"Emotie-impact analyse",desc:"Kosten/baten per emotie-tag",on:true,basic:false},
    {id:"mistakes",label:"Fout-analyse",desc:"Meest kostbare fouten",on:true,basic:false},
    {id:"streaks",label:"Drawdown & Streaks",desc:"Max drawdown, win/loss streaks",on:true,basic:false},
    {id:"bestworse",label:"Beste & slechtste trade",desc:"Details van extreme trades",on:true,basic:true},
    {id:"tradelist",label:"Trade-lijst",desc:"Volledige lijst (kan lang zijn)",on:false,basic:false},
  ]);

  const selectTemplate=(t)=>{setTemplate(t);setSections(s=>s.map(sec=>({...sec,on:t==="advanced"?true:sec.basic})))};
  const toggleSection=(id)=>setSections(s=>s.map(sec=>sec.id===id?{...sec,on:!sec.on}:sec));
  const moveSection=(id,dir)=>{setSections(s=>{const i=s.findIndex(x=>x.id===id);if(i<0||(dir===-1&&i===0)||(dir===1&&i===s.length-1))return s;const next=[...s];[next[i],next[i+dir]]=[next[i+dir],next[i]];return next})};

  const generatePDF=async()=>{
    setGenerating(true);
    try{
      const{jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      const W=210,H=297,M=15;let y=M;
      const gold=[201,168,76],bg=[19,23,34],bg2=[30,34,45],text=[209,212,220],text3=[120,123,134],green=[50,196,149],red=[220,122,122];

      // Helper functions
      const setCol=(c)=>pdf.setTextColor(c[0],c[1],c[2]);
      const rect=(x,yy,w,h,c)=>{pdf.setFillColor(c[0],c[1],c[2]);pdf.rect(x,yy,w,h,"F")};
      const checkPage=()=>{if(y>H-30){pdf.addPage();rect(0,0,W,H,bg);y=M;return true}return false};
      const nl=(h)=>{y+=h||6};

      // Page background
      rect(0,0,W,H,bg);

      // Header: logo area
      rect(M,y,W-2*M,18,bg2);
      pdf.setFont("helvetica","bold");pdf.setFontSize(16);setCol(gold);
      pdf.text("TradeJournal",M+6,y+8);
      pdf.setFontSize(7);setCol(text3);pdf.setFont("helvetica","normal");
      pdf.text("BY ZARATRAS",M+6,y+13);
      pdf.setFontSize(8);setCol(gold);
      pdf.text("powered by MORANI",W-M-6,y+11,{align:"right"});
      y+=22;

      // Title
      pdf.setFont("helvetica","bold");pdf.setFontSize(20);setCol(text);
      pdf.text("Performance Rapport",M,y);nl(8);
      pdf.setFontSize(10);setCol(text3);pdf.setFont("helvetica","normal");
      const now=new Date();
      pdf.text(`Gegenereerd: ${now.toLocaleDateString("nl-NL")} ${now.toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"})} · ${closed.length} trades`,M,y);
      nl(4);
      // Gold line
      rect(M,y,40,0.5,gold);nl(8);

      const activeSections=sections.filter(s=>s.on);

      for(const sec of activeSections){
        checkPage();

        if(sec.id==="summary"){
          const totalPnl=closed.reduce((s,t)=>s+parseFloat(t.pnl),0);
          const wins=closed.filter(t=>parseFloat(t.pnl)>0);
          const losses=closed.filter(t=>parseFloat(t.pnl)<0);
          const wr=closed.length?(wins.length/closed.length*100).toFixed(1):0;
          const grossW=wins.reduce((s,t)=>s+parseFloat(t.pnl),0);
          const grossL=Math.abs(losses.reduce((s,t)=>s+parseFloat(t.pnl),0));
          const pf=grossL>0?(grossW/grossL).toFixed(2):"∞";
          const avgW=wins.length?(grossW/wins.length).toFixed(2):0;
          const avgL=losses.length?(grossL/losses.length).toFixed(2):0;

          pdf.setFont("helvetica","bold");pdf.setFontSize(12);setCol(gold);
          pdf.text("Samenvatting",M,y);nl(8);

          const stats=[
            ["Netto PNL",`$${totalPnl.toFixed(2)}`,totalPnl>=0?green:red],
            ["Winrate",`${wr}%`,gold],
            ["Trades",`${closed.length}`,text],
            ["Profit Factor",pf,parseFloat(pf)>=1?green:red],
            ["Gem. Winst",`$${avgW}`,green],
            ["Gem. Verlies",`-$${avgL}`,red],
            ["Wins",`${wins.length}`,green],
            ["Losses",`${losses.length}`,red],
          ];
          const colW=(W-2*M)/4;
          stats.forEach((st,i)=>{
            const col=i%4;const row=Math.floor(i/4);
            const sx=M+col*colW;const sy=y+row*14;
            rect(sx+0.5,sy-4,colW-1,12,bg2);
            pdf.setFont("helvetica","normal");pdf.setFontSize(7);setCol(text3);
            pdf.text(st[0],sx+3,sy-1);
            pdf.setFont("helvetica","bold");pdf.setFontSize(11);setCol(st[2]);
            pdf.text(st[1],sx+3,sy+5);
          });
          y+=Math.ceil(stats.length/4)*14+6;
        }

        if(sec.id==="bestworse"){
          checkPage();
          pdf.setFont("helvetica","bold");pdf.setFontSize(12);setCol(gold);
          pdf.text("Beste & Slechtste Trade",M,y);nl(8);

          const sorted=[...closed].sort((a,b)=>parseFloat(b.pnl)-parseFloat(a.pnl));
          const best=sorted[0];const worst=sorted[sorted.length-1];
          if(best&&worst){
            [[best,"Beste trade",green],[worst,"Slechtste trade",red]].forEach(([t,label,col],i)=>{
              const bx=M+i*(W-2*M)/2+i;const bw=(W-2*M)/2-1;
              rect(bx,y-4,bw,22,bg2);
              pdf.setFont("helvetica","normal");pdf.setFontSize(8);setCol(text3);
              pdf.text(label,bx+3,y);
              pdf.setFont("helvetica","bold");pdf.setFontSize(12);setCol(col);
              const pnlV=parseFloat(t.pnl);
              pdf.text(`${pnlV>=0?"+":""}$${pnlV.toFixed(2)}`,bx+3,y+7);
              pdf.setFont("helvetica","normal");pdf.setFontSize(7);setCol(text3);
              pdf.text(`${t.pair} · ${t.direction.toUpperCase()} · ${t.date}`,bx+3,y+13);
            });
            y+=26;
          }
        }

        if(sec.id==="winloss"||sec.id==="longshort"||sec.id==="sessions"){
          checkPage();
          const titles={winloss:"Win/Loss Verdeling",longshort:"Long/Short Verdeling",sessions:"Sessie Verdeling"};
          pdf.setFont("helvetica","bold");pdf.setFontSize(12);setCol(gold);
          pdf.text(titles[sec.id],M,y);nl(8);

          let items=[];
          if(sec.id==="winloss"){
            const w=closed.filter(t=>parseFloat(t.pnl)>0).length;const l=closed.length-w;
            items=[{label:"Win",val:w,pct:closed.length?(w/closed.length*100).toFixed(1):0,col:green},{label:"Loss",val:l,pct:closed.length?(l/closed.length*100).toFixed(1):0,col:red}];
          }else if(sec.id==="longshort"){
            const lo=closed.filter(t=>t.direction==="long").length;const sh=closed.length-lo;
            items=[{label:"Long",val:lo,pct:closed.length?(lo/closed.length*100).toFixed(1):0,col:green},{label:"Short",val:sh,pct:closed.length?(sh/closed.length*100).toFixed(1):0,col:red}];
          }else{
            const sess={};closed.forEach(t=>{const s=(t.sessionTag||"Off-session");sess[s]=(sess[s]||0)+1});
            const cols={Tokyo:[201,168,76],London:[91,156,246],"New York":[167,139,250],"Off-session":text3,Weekend:text3};
            items=Object.entries(sess).map(([k,v])=>({label:k,val:v,pct:closed.length?(v/closed.length*100).toFixed(1):0,col:cols[k]||text3}));
          }
          // Draw horizontal bars
          items.forEach((it,i)=>{
            const barW=(W-2*M-60)*parseFloat(it.pct)/100;
            rect(M+50,y-3,barW,6,it.col);
            pdf.setFont("helvetica","normal");pdf.setFontSize(8);setCol(text);
            pdf.text(it.label,M,y+1);
            pdf.setFontSize(7);setCol(text3);
            pdf.text(`${it.val} (${it.pct}%)`,M+55+barW,y+1);
            nl(9);
          });
          nl(4);
        }

        if(sec.id==="setups"){
          checkPage();
          pdf.setFont("helvetica","bold");pdf.setFontSize(12);setCol(gold);
          pdf.text("Setup Performance",M,y);nl(8);
          const setups={};closed.forEach(t=>(t.setupTags||[]).forEach(tag=>{if(!setups[tag])setups[tag]={w:0,l:0,pnl:0,n:0};setups[tag].n++;setups[tag].pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?setups[tag].w++:setups[tag].l++}));
          Object.entries(setups).sort((a,b)=>b[1].pnl-a[1].pnl).forEach(([tag,d])=>{
            checkPage();
            const wr=d.n>0?(d.w/d.n*100:0).toFixed(0):0;
            pdf.setFont("helvetica","bold");pdf.setFontSize(9);setCol(text);
            pdf.text(tag,M,y+1);
            pdf.setFont("helvetica","normal");pdf.setFontSize(8);setCol(d.pnl>=0?green:red);
            pdf.text(`$${d.pnl.toFixed(2)}`,M+40,y+1);
            setCol(text3);pdf.setFontSize(7);
            pdf.text(`${d.n} trades · ${wr}% WR`,M+75,y+1);
            nl(7);
          });
          nl(4);
        }

        if(sec.id==="streaks"){
          checkPage();
          pdf.setFont("helvetica","bold");pdf.setFontSize(12);setCol(gold);
          pdf.text("Drawdown & Streaks",M,y);nl(8);
          let peak=0,cum=0,maxDD=0,curW=0,curL=0,maxW=0,maxL=0;
          [...closed].sort((a,b)=>`${a.date}T${a.time}`.localeCompare(`${b.date}T${b.time}`)).forEach(t=>{
            cum+=parseFloat(t.pnl);if(cum>peak)peak=cum;const dd=peak-cum;if(dd>maxDD)maxDD=dd;
            if(parseFloat(t.pnl)>0){curW++;curL=0;if(curW>maxW)maxW=curW}else{curL++;curW=0;if(curL>maxL)maxL=curL}
          });
          [[`Max Drawdown: $${maxDD.toFixed(2)}`,red],[`Max Win Streak: ${maxW} trades`,green],[`Max Loss Streak: ${maxL} trades`,red]].forEach(([txt,col])=>{
            pdf.setFont("helvetica","normal");pdf.setFontSize(9);setCol(col);
            pdf.text(txt,M,y);nl(6);
          });
          nl(4);
        }

        if(sec.id==="tradelist"){
          checkPage();
          pdf.setFont("helvetica","bold");pdf.setFontSize(12);setCol(gold);
          pdf.text("Trade Lijst",M,y);nl(8);
          // Headers
          pdf.setFontSize(7);setCol(text3);pdf.setFont("helvetica","bold");
          pdf.text("Datum",M,y);pdf.text("Pair",M+28,y);pdf.text("Side",M+55,y);pdf.text("Entry",M+72,y);pdf.text("Exit",M+95,y);pdf.text("PNL",M+118,y);
          nl(5);rect(M,y-2,W-2*M,0.3,text3);nl(3);
          pdf.setFont("helvetica","normal");
          [...closed].sort((a,b)=>`${b.date}T${b.time}`.localeCompare(`${a.date}T${a.time}`)).forEach(t=>{
            if(checkPage()){
              pdf.setFontSize(7);setCol(text3);pdf.setFont("helvetica","bold");
              pdf.text("Datum",M,y);pdf.text("Pair",M+28,y);pdf.text("Side",M+55,y);pdf.text("Entry",M+72,y);pdf.text("Exit",M+95,y);pdf.text("PNL",M+118,y);
              nl(5);rect(M,y-2,W-2*M,0.3,text3);nl(3);pdf.setFont("helvetica","normal");
            }
            const pnlV=parseFloat(t.pnl);
            pdf.setFontSize(7);setCol(text3);
            pdf.text(`${t.date} ${t.time||""}`,M,y);
            setCol(text);pdf.text(t.pair||"",M+28,y);
            setCol(t.direction==="long"?green:red);pdf.text((t.direction||"").toUpperCase(),M+55,y);
            setCol(text3);pdf.text(t.entry?`$${parseFloat(t.entry).toFixed(0)}`:"",M+72,y);
            pdf.text(t.exit?`$${parseFloat(t.exit).toFixed(0)}`:"",M+95,y);
            setCol(pnlV>=0?green:red);pdf.text(`${pnlV>=0?"+":""}$${pnlV.toFixed(2)}`,M+118,y);
            nl(5);
          });
          nl(4);
        }
      }

      // Footer on each page
      const pageCount=pdf.getNumberOfPages();
      for(let p=1;p<=pageCount;p++){
        pdf.setPage(p);
        // Gold line
        rect(M,H-12,W-2*M,0.4,gold);
        pdf.setFont("helvetica","normal");pdf.setFontSize(7);setCol(text3);
        pdf.text(`Pagina ${p} van ${pageCount}`,M,H-7);
        setCol(gold);pdf.setFontSize(8);
        pdf.text("powered by MORANI",W-M,H-7,{align:"right"});
      }

      const dateStr=now.toISOString().split("T")[0];
      pdf.save(`TradeJournal_Rapport_${dateStr}.pdf`);
    }catch(err){console.error("PDF error:",err);alert("Fout bij genereren: "+err.message)}
    setGenerating(false);
  };

  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,animation:"fadeIn .2s ease"}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:"var(--bg2)",borderRadius:"var(--radius-lg)",padding:"24px",width:"540px",maxHeight:"80vh",overflowY:"auto",border:"1px solid var(--border3)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <div style={{fontSize:"16px",fontWeight:700}}>📄 Rapport genereren</div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"16px"}}>✕</button>
      </div>

      {!template&&<div>
        <div style={{fontSize:"12px",color:"var(--text3)",marginBottom:"12px"}}>Kies een template:</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          <button onClick={()=>selectTemplate("basic")} style={{padding:"16px",borderRadius:"var(--radius-lg)",border:"1px solid var(--border3)",background:"rgba(20,22,30,0.5)",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text)",marginBottom:"4px"}}>Basic</div>
            <div style={{fontSize:"11px",color:"var(--text4)",lineHeight:1.4}}>Kerncijfers, equity curve, win/loss, beste & slechtste trade</div>
          </button>
          <button onClick={()=>selectTemplate("advanced")} style={{padding:"16px",borderRadius:"var(--radius-lg)",border:"1px solid var(--gold-border)",background:"var(--gold-dim)",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
            <div style={{fontSize:"14px",fontWeight:700,color:"var(--gold)",marginBottom:"4px"}}>Geavanceerd</div>
            <div style={{fontSize:"11px",color:"var(--text3)",lineHeight:1.4}}>Alles + setup analyse, sessies, emoties, fouten, streaks</div>
          </button>
        </div>
      </div>}

      {template&&<div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
          <button onClick={()=>setTemplate(null)} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"12px",fontFamily:"inherit"}}>← Terug</button>
          <span style={{fontSize:"12px",color:"var(--text3)"}}>Template: <strong style={{color:"var(--gold)"}}>{template==="basic"?"Basic":"Geavanceerd"}</strong></span>
        </div>
        <div style={{fontSize:"11px",color:"var(--text4)",marginBottom:"8px"}}>Selecteer secties:</div>
        <div style={{maxHeight:"300px",overflowY:"auto",marginBottom:"12px"}}>
          {sections.map((sec,i)=>(
            <div key={sec.id} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 8px",borderRadius:"var(--radius)",background:sec.on?"rgba(41,98,255,0.04)":"transparent",marginBottom:"2px"}}>
              <button onClick={()=>moveSection(sec.id,-1)} disabled={i===0} style={{background:"none",border:"none",color:i===0?"var(--text5)":"var(--text4)",cursor:"pointer",fontSize:"10px",padding:"2px"}}>▲</button>
              <button onClick={()=>moveSection(sec.id,1)} disabled={i===sections.length-1} style={{background:"none",border:"none",color:i===sections.length-1?"var(--text5)":"var(--text4)",cursor:"pointer",fontSize:"10px",padding:"2px"}}>▼</button>
              <div onClick={()=>toggleSection(sec.id)} style={{width:"16px",height:"16px",borderRadius:"3px",border:`1px solid ${sec.on?"var(--blue2)":"var(--border3)"}`,background:sec.on?"var(--blue2)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",color:"#fff",cursor:"pointer",flexShrink:0}}>{sec.on?"✓":""}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:"12px",fontWeight:600,color:sec.on?"var(--text)":"var(--text4)"}}>{sec.label}</div>
                <div style={{fontSize:"10px",color:"var(--text4)"}}>{sec.desc}</div>
              </div>
            </div>
          ))}
        </div>
        <button onClick={generatePDF} disabled={generating||!sections.some(s=>s.on)} style={{width:"100%",padding:"10px",borderRadius:"var(--radius)",border:"none",background:generating?"var(--bg4)":"var(--gold)",color:generating?"var(--text3)":"#0c0d12",fontSize:"13px",fontWeight:700,cursor:generating?"default":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}}>
          {generating&&<span className="spinner" style={{width:"14px",height:"14px",borderTopColor:"var(--gold)"}}/>}
          {generating?"Rapport wordt opgesteld...":"Genereer PDF rapport"}
        </button>
      </div>}
    </div>
  </div>);
}

// ============ HELP / FAQ ============
function HelpPage(){

    {cat:"Setups & Lagen",items:[

      {q:"Hoe voeg ik lagen toe?",a:"In het trade-formulier, klik '+ Laag toevoegen'. Selecteer per laag: Timeframe, Setup, Confirmatie(s), Rol. Je kunt ook via Quick Tag snel lagen toevoegen."},
      {q:"Wat betekent de top-down waarschuwing?",a:"Als je lagen niet in top-down volgorde staan (bijv. 4H boven Daily), verschijnt een oranje waarschuwing. Gebruik de pijltjes om lagen te herordenen."},
      {q:"Hoe werkt de layer-aware analytics?",a:"Als minimaal 2 trades lagen hebben, verschijnen in Analytics extra secties: TF x Setup winrate, TF x Confirmatie performance, Setup x TF heatmap en Top-down flow paden."},

    {cat:"Tags",items:[
      {q:"Welke tag-categorieen zijn er?",a:"Setup Type (BOS, MSB, SFP, F2R, F2L), Confirmaties (Liquidity Sweep, OB, FVG, Divergence), Emoties (negatief: FOMO, Overconfident, Tilt / positief: Geduldig, Kalm), Fouten (Te vroeg in, SL te krap, Overtrading), en Timeframe."},

      {q:"Wat is de privacy mode?",a:"Zet 'Account Waarde (toon bedragen)' uit in het layout panel, of klik het oog-icoon naast 'Account Waarde'. Alle saldo's worden vervangen door ***,**. Trade performance blijft zichtbaar."},
      {q:"Wat toont de donut-grafieken?",a:"Drie SVG donuts met gradient kleuren: Win/Loss, Long/Short, en Sessie verdeling. Hover over een segment om details te zien (waarde en percentage). De legend is ook interactief."},

      {q:"Hoe pas ik de analytics layout aan?",a:"Klik het tandwiel rechtsboven. Secties aan/uit zetten via het slide-in panel. Voorkeuren worden opgeslagen."},
    ]},
    {cat:"Review",items:[
      {q:"Hoe gebruik ik Review?",a:"Kies een periode (Dag/Week/Maand/YTD/Jaar/Custom) en blader met pijltjes. Zet 'Vergelijk' aan voor delta's met de vorige periode. Filter per exchange."},
      {q:"Wat toont Wat werkte / Wat niet werkte?",a:"Links: beste setup, sessie en emotie. Rechts: slechtste setup, duurste fout en duurste negatieve emotie. Gebaseerd op de geselecteerde periode."},

    ]},
    {cat:"Import & Export",items:[

      {q:"Hoe werkt CSV import?",a:"Klik 'CSV' op de exchange kaart. Upload een bestand. Formaat wordt automatisch gedetecteerd. Sorteerbare preview voor selectie."},
    ]},
    {cat:"Backup & Data",items:[
      {q:"Hoe maak ik een backup?",a:"Accounts pagina, 'Backup exporteren (.json)'. Downloadt trades, tags, accounts, instellingen en layout-voorkeuren als een JSON bestand."},
      {q:"Hoe herstel ik een backup?",a:"Accounts pagina, 'Backup importeren'. Duplicaten worden overgeslagen op basis van trade ID."},
      {q:"Waar wordt mijn data opgeslagen?",a:"In je browser's localStorage. Niets wordt naar een server gestuurd. Maak regelmatig backups."},
    ]},
    {cat:"Instellingen",items:[
      {q:"Waar stel ik API keys in?",a:"Accounts pagina, klik op de exchange kaart om uit te klappen, dan 'API keys'. Test en opslaan."},
      {q:"Hoe start ik de proxy?",a:"Run 'python proxy.py' in je terminal. Draait op http://127.0.0.1:8765. Handelt HMAC signing af voor alle exchanges. Zonder proxy: alleen handmatige trades en CSV."},
      {q:"Hoe pas ik de pagina-indeling aan?",a:"Klik het tandwiel op Dashboard, Analytics of Review. Slide-in panel met aan/uit toggles per sectie. Voorkeuren worden per pagina opgeslagen."},
      {q:"Wat is het verschil tussen Classic en Morani thema?",a:"Classic: standaard donker thema. Morani Signature: glasmorfisme, gradient orbs, gouden accenten. Wissel via Accounts, Instellingen."},

  const filtered=search.trim()?FAQ.map(cat=>({...cat,items:cat.items.filter(item=>item.q.toLowerCase().includes(search.toLowerCase())||item.a.toLowerCase().includes(search.toLowerCase()))})).filter(cat=>cat.items.length>0):FAQ;

  const toggle=(id)=>setOpenId(p=>p===id?null:id);

  return(<div style={{animation:"fadeIn .3s ease",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"24px",border:"1px solid var(--glass-border)"}}>
    <div style={{marginBottom:"1.5rem"}}>
      <div style={{fontSize:"18px",fontWeight:700,color:"var(--text)",marginBottom:"4px"}}>Help & FAQ</div>
      <div style={{fontSize:"12px",color:"var(--text4)"}}>Alles over TradeJournal v4</div>
    </div>

    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek in FAQ..." style={{width:"100%",padding:"10px 14px",borderRadius:"8px",border:"1px solid var(--border3)",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",color:"var(--text)",fontSize:"13px",fontFamily:"inherit",marginBottom:"1.5rem",outline:"none"}}/>

    {filtered.length===0&&<div style={{textAlign:"center",padding:"2rem",color:"var(--text4)",fontSize:"13px"}}>Geen resultaten voor "{search}"</div>}

    {filtered.map(cat=>(
      <div key={cat.cat} style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"11px",color:"var(--blue)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:"8px",paddingBottom:"6px",borderBottom:"1px solid var(--border2)"}}>{cat.cat}</div>
        {cat.items.map((item,i)=>{
          const id=cat.cat+i;const isOpen=openId===id;
          return(<div key={id} style={{borderBottom:"1px solid var(--border1)"}}>
            <button onClick={()=>toggle(id)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",background:"none",border:"none",color:"var(--text2)",fontSize:"13px",fontWeight:500,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
              <span>{item.q}</span>
              <span style={{color:"var(--text4)",fontSize:"14px",transition:"transform .15s",transform:isOpen?"rotate(45deg)":"none",flexShrink:0,marginLeft:"12px"}}>+</span>
            </button>
            {isOpen&&<div style={{padding:"0 0 14px",fontSize:"12px",color:"var(--text3)",lineHeight:1.7,animation:"fadeIn .15s ease"}}>{item.a}</div>}
          </div>);
        })}
      </div>
    ))}
  </div>);
}

// ============ REVIEW DASHBOARD ============
function ReviewCharts({eqLine,dailyArr,compare,prevEqLine,showEquity=true,showPnlDay=true}){
  const eqRef=useRef(null);const eqC=useRef(null);
  const pnlRef=useRef(null);const pnlC=useRef(null);

  useEffect(()=>{
    if(eqC.current){eqC.current.destroy();eqC.current=null}
    if(eqRef.current&&eqLine.length>1){
      const ctx=eqRef.current.getContext("2d");
      const labels=eqLine.map(d=>{const p=d.date.split("-");return p[2]+"/"+p[1]});
      const cumData=eqLine.map(d=>d.cum);
      const ds=[];
      const gG=ctx.createLinearGradient(0,0,0,180);gG.addColorStop(0,"rgba(50,196,149,0.22)");gG.addColorStop(1,"rgba(50,196,149,0.03)");
      const rG=ctx.createLinearGradient(0,0,0,180);rG.addColorStop(0,"rgba(220,122,122,0.03)");rG.addColorStop(1,"rgba(220,122,122,0.22)");
      ds.push({label:"_pos",data:cumData,borderColor:"transparent",backgroundColor:gG,borderWidth:0,fill:{target:{value:0},above:gG,below:"transparent"},tension:0.35,pointRadius:0,pointHoverRadius:0});
      ds.push({label:"_neg",data:cumData,borderColor:"transparent",backgroundColor:rG,borderWidth:0,fill:{target:{value:0},above:"transparent",below:rG},tension:0.35,pointRadius:0,pointHoverRadius:0});
      ds.push({label:"PNL",data:cumData,borderColor:CHART_COLORS.win,backgroundColor:"transparent",borderWidth:2,fill:false,tension:0.35,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:"#fff",pointHoverBorderWidth:2,
        segment:{borderColor:function(c2){const v0=c2.p0.parsed.y;const v1=c2.p1.parsed.y;if(v0>=0&&v1>=0)return CHART_COLORS.win;if(v0<0&&v1<0)return"#d46a6a";return v1>=0?CHART_COLORS.win:CHART_COLORS.loss}}});
      if(compare&&prevEqLine&&prevEqLine.length>1){
        ds.push({label:"Vorige",data:prevEqLine.map(d=>d.cum),borderColor:"rgba(78,82,93,0.7)",backgroundColor:"transparent",borderWidth:1.5,borderDash:[6,4],fill:false,tension:0.35,pointRadius:0,pointHoverRadius:3});
      }
      eqC.current=new Chart(ctx,{type:"line",data:{labels,datasets:ds},options:{
        responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
        plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(10,12,18,0.9)",borderColor:"rgba(54,58,69,0.9)",borderWidth:1,titleFont:{family:"'JetBrains Mono',monospace",size:10},bodyFont:{family:"'JetBrains Mono',monospace",size:10},titleColor:"#c0c5cd",bodyColor:"#f5f5f7",padding:8,cornerRadius:6,
          filter:function(item){return!item.dataset.label.startsWith("_")},
          callbacks:{label:function(c2){const v=c2.parsed.y;return` ${c2.dataset.label}: ${v>=0?"+":""}$${v.toLocaleString("nl-NL",{minimumFractionDigits:2,maximumFractionDigits:2})}`}}}},
        scales:{x:{grid:{color:"rgba(255,255,255,0.10)",drawBorder:false},ticks:{color:"#939aa5",font:{family:"'JetBrains Mono',monospace",size:8},maxTicksLimit:7,maxRotation:0},border:{display:false}},
          y:{grid:{color:"rgba(255,255,255,0.10)",drawBorder:false},ticks:{color:"#939aa5",font:{family:"'JetBrains Mono',monospace",size:8},callback:function(v){return"$"+v.toLocaleString("nl-NL",{minimumFractionDigits:0,maximumFractionDigits:0})}},border:{display:false}}}
      }});
    }
    if(pnlC.current){pnlC.current.destroy();pnlC.current=null}
    if(pnlRef.current&&dailyArr.length>0){
      const ctx2=pnlRef.current.getContext("2d");
      const labels2=dailyArr.map(([d])=>{const p=d.split("-");return p[2]+"/"+p[1]});
      const barData=dailyArr.map(([,v])=>v.pnl);
      const colors2=barData.map(v=>v>=0?"rgba(50,196,149,0.65)":"rgba(220,122,122,0.65)");
      const borders2=barData.map(v=>v>=0?CHART_COLORS.win:CHART_COLORS.loss);
      pnlC.current=new Chart(ctx2,{type:"bar",data:{labels:labels2,datasets:[
        {label:"PNL",data:barData,backgroundColor:colors2,borderColor:borders2,borderWidth:1,borderRadius:3}
      ]},options:{
        responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
        plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(10,12,18,0.9)",borderColor:"rgba(54,58,69,0.9)",borderWidth:1,titleFont:{family:"'JetBrains Mono',monospace",size:10},bodyFont:{family:"'JetBrains Mono',monospace",size:10},titleColor:"#c0c5cd",bodyColor:"#f5f5f7",padding:8,cornerRadius:6,
          callbacks:{label:function(c2){const v=c2.parsed.y;const i=c2.dataIndex;const n=dailyArr[i]?dailyArr[i][1].n:0;return` ${v>=0?"+":""}$${v.toLocaleString("nl-NL",{minimumFractionDigits:2,maximumFractionDigits:2})} (${n} trades)`}}}},
        scales:{x:{grid:{color:"rgba(255,255,255,0.10)",drawBorder:false},ticks:{color:"#939aa5",font:{family:"'JetBrains Mono',monospace",size:8},maxTicksLimit:7,maxRotation:0},border:{display:false}},
          y:{grid:{color:"rgba(255,255,255,0.10)",drawBorder:false},ticks:{color:"#939aa5",font:{family:"'JetBrains Mono',monospace",size:8},callback:function(v){return"$"+v.toLocaleString("nl-NL",{minimumFractionDigits:0,maximumFractionDigits:0})}},border:{display:false}}}
      }});
    }
    return()=>{if(eqC.current)eqC.current.destroy();if(pnlC.current)pnlC.current.destroy()};
  },[eqLine,dailyArr,compare,prevEqLine]);

  if(!showEquity&&!showPnlDay)return null;

    </div>}

      <div style={{fontSize:"10px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:500,marginBottom:"10px"}}>PNL per dag</div>
      <div style={{height:"180px"}}>{dailyArr.length>0?<canvas ref={pnlRef}/>:<div style={{fontSize:"11px",color:"var(--text4)",padding:"40px 0",textAlign:"center"}}>Geen data</div>}</div>
    </div>}
  </div>);
}

function ReviewDashboard({trades,onEdit,tagConfig,onReport}){
  const closed=trades.filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  const[periodType,setPeriodType]=useState("month");
  const[periodOffset,setPeriodOffset]=useState(0);
  const[compare,setCompare]=useState(false);
  const[distTab,setDistTab]=useState("setups");
  const[metric,setMetric]=useState("pnl");
  const[customFrom,setCustomFrom]=useState("");
  const[customTo,setCustomTo]=useState("");
  const[revExchange,setRevExchange]=useState("all");
  const{prefs:lp,toggle:lpToggle,reset:lpReset}=useLayoutPrefs("review");
  const[lpOpen,setLpOpen]=useState(false);
  const LP_SECTIONS=[

      {key:"scorecard",label:"Scorecard (stat cards)"},{key:"equityCurve",label:"Equity Curve"},{key:"pnlPerDay",label:"PNL per Dag"},
      {key:"whatWorked",label:"Wat Werkte / Wat Niet Werkte"},{key:"donuts",label:"Donut-grafieken"},
      {key:"distributions",label:"Verdelingen (tabs)"},{key:"highlights",label:"Highlights (beste/slechtste trade)"}
    ]}

  const sources=[...new Set(closed.map(t=>t.source||"manual"))];
  const exColors3={"mexc":"#00b897","blofin":"#6366f1","kraken":"#7b61ff","manual":"#5B9CF6","csv":"#9ca3af"};

  // Period calculation
  const now=new Date();
  const getPeriodRange=(type,offset)=>{
    const d=new Date(now);
    if(type==="day"){d.setDate(d.getDate()+offset);return{from:new Date(d.getFullYear(),d.getMonth(),d.getDate()),to:new Date(d.getFullYear(),d.getMonth(),d.getDate(),23,59,59),label:d.toLocaleDateString("nl-NL",{weekday:"short",day:"numeric",month:"short"})}}
    if(type==="week"){const day=d.getDay()||7;d.setDate(d.getDate()-day+1+offset*7);const from=new Date(d);const to=new Date(d);to.setDate(to.getDate()+6);to.setHours(23,59,59);return{from,to,label:`Week ${Math.ceil((from.getDate()+new Date(from.getFullYear(),from.getMonth(),1).getDay())/7)} · ${from.toLocaleDateString("nl-NL",{day:"numeric",month:"short"})} – ${to.toLocaleDateString("nl-NL",{day:"numeric",month:"short"})}`}}
    if(type==="month"){const m=new Date(d.getFullYear(),d.getMonth()+offset,1);const to=new Date(d.getFullYear(),d.getMonth()+offset+1,0,23,59,59);return{from:m,to,label:m.toLocaleDateString("nl-NL",{month:"long",year:"numeric"})}}
    if(type==="ytd"){const y=d.getFullYear()+offset;return{from:new Date(y,0,1),to:offset===0?now:new Date(y,11,31,23,59,59),label:`YTD ${y}`}}
    if(type==="year"){const y=d.getFullYear()+offset;return{from:new Date(y,0,1),to:new Date(y,11,31,23,59,59),label:`${y}`}}
    if(type==="custom"&&customFrom&&customTo){return{from:new Date(customFrom),to:new Date(customTo+"T23:59:59"),label:`${customFrom} – ${customTo}`}}
    return{from:new Date(0),to:now,label:"Alles"};
  };
  const current=getPeriodRange(periodType,periodOffset);
  const prev=getPeriodRange(periodType,periodOffset-1);

  const filterByRange=(trds,range)=>trds.filter(t=>{const d=new Date(t.date);return d>=range.from&&d<=range.to});
  const filterByEx=(trds)=>revExchange==="all"?trds:trds.filter(t=>(t.source||"manual")===revExchange);
  const curTrades=filterByEx(filterByRange(closed,current));
  const prevTrades=compare?filterByEx(filterByRange(closed,prev)):[];

  // Stats helper
  const calcStats=(tr)=>{
    const n=tr.length;const pnl=tr.reduce((s,t)=>s+parseFloat(t.pnl),0);
    const w=tr.filter(t=>parseFloat(t.pnl)>0).length;const l=n-w;
    const wr=n>0?(w/n)*100:0;const grossW=tr.filter(t=>parseFloat(t.pnl)>0).reduce((s,t)=>s+parseFloat(t.pnl),0);
    const grossL=Math.abs(tr.filter(t=>parseFloat(t.pnl)<0).reduce((s,t)=>s+parseFloat(t.pnl),0));
    const pf=grossL>0?grossW/grossL:(grossW>0?Infinity:0);
    const avgW=w>0?grossW/w:0;const avgL=l>0?grossL/l:0;const rr=avgL>0?avgW/avgL:0;
    let peak2=0,cum2=0,maxDD2=0;const sorted2=[...tr].sort((a,b)=>`${a.date}T${a.time}`.localeCompare(`${b.date}T${b.time}`));
    sorted2.forEach(t=>{cum2+=parseFloat(t.pnl);if(cum2>peak2)peak2=cum2;const dd=peak2-cum2;if(dd>maxDD2)maxDD2=dd});
    return{n,pnl,w,l,wr,pf,rr,maxDD:maxDD2,grossW,grossL,avgW,avgL};
  };
  const cur=calcStats(curTrades);
  const prv=compare?calcStats(prevTrades):null;

  if(closed.length===0)return(<div style={{textAlign:"center",padding:"4rem 2rem",color:"var(--text3)"}}>
    <div style={{fontSize:"48px",marginBottom:"1rem",opacity:0.3}}>◉</div>

  </div>);

  // Delta display
  const delta=(curVal,prevVal,suffix,invert)=>{
    if(!prv)return null;
    const diff=curVal-prevVal;const good=invert?diff<0:diff>0;
    return(<span style={{fontSize:"9px",fontFamily:"var(--mono)",color:good?"var(--green)":"var(--red)",marginLeft:"4px"}}>{diff>=0?"+":""}{suffix==="$"?"$"+fmt(Math.abs(diff)):diff.toFixed(1)+suffix}</span>);
  };

  // Best/worst helpers
  const bestSetup=(tr)=>{const s={};tr.forEach(t=>(t.setupTags||[]).forEach(tag=>{if(!s[tag])s[tag]={pnl:0,w:0,n:0};s[tag].n++;s[tag].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)s[tag].w++}));return Object.entries(s).sort((a,b)=>b[1].pnl-a[1].pnl)};
  const bestSession=(tr)=>{const s={};ALL_SESSIONS.forEach(ss=>s[ss]={pnl:0,w:0,n:0});tr.forEach(t=>{const st=getSessionTags(t.date,t.time);st.forEach(ss=>{s[ss].n++;s[ss].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)s[ss].w++})});return Object.entries(s).filter(([,d])=>d.n>0).sort((a,b)=>b[1].pnl-a[1].pnl)};
  const bestTrade=curTrades.length>0?[...curTrades].sort((a,b)=>parseFloat(b.pnl)-parseFloat(a.pnl))[0]:null;
  const worstTrade=curTrades.length>0?[...curTrades].sort((a,b)=>parseFloat(a.pnl)-parseFloat(b.pnl))[0]:null;
  const topMistakes2=(tr)=>{const s={};tr.forEach(t=>(t.mistakeTags||[]).forEach(tag=>{if(!s[tag])s[tag]={pnl:0,n:0};s[tag].n++;s[tag].pnl+=parseFloat(t.pnl)}));return Object.entries(s).sort((a,b)=>a[1].pnl-b[1].pnl)};
  const topEmotions=(tr,neg)=>{const s={};tr.forEach(t=>(t.emotionTags||[]).filter(e=>neg?isNegEmotion(e):!isNegEmotion(e)).forEach(tag=>{if(!s[tag])s[tag]={pnl:0,w:0,n:0};s[tag].n++;s[tag].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)s[tag].w++}));return Object.entries(s).sort((a,b)=>neg?a[1].pnl-b[1].pnl:b[1].pnl-a[1].pnl)};

  const setups=bestSetup(curTrades);const sessions=bestSession(curTrades);
  const mistakes=topMistakes2(curTrades);const negEmo=topEmotions(curTrades,true);const posEmo=topEmotions(curTrades,false);

  // PNL per day for bar chart
  const dailyPnl2={};curTrades.forEach(t=>{const d=t.date;if(!dailyPnl2[d])dailyPnl2[d]={pnl:0,n:0};dailyPnl2[d].pnl+=parseFloat(t.pnl);dailyPnl2[d].n++});
  const dailyArr=Object.entries(dailyPnl2).sort(([a],[b])=>a.localeCompare(b));
  const dailyMax=Math.max(...dailyArr.map(([,d])=>Math.abs(d.pnl)),1);

  // Equity for period
  let cumEq=0;const eqLine=dailyArr.map(([d,v])=>{cumEq+=v.pnl;return{date:d,cum:cumEq}});
  let prevCumEq=0;
  const prevDaily={};prevTrades.forEach(t=>{const d=t.date;if(!prevDaily[d])prevDaily[d]={pnl:0};prevDaily[d].pnl+=parseFloat(t.pnl)});
  const prevEqLine=Object.entries(prevDaily).sort(([a],[b])=>a.localeCompare(b)).map(([d,v])=>{prevCumEq+=v.pnl;return{date:d,cum:prevCumEq}});

  const statCard=(label,value,prevVal,suffix,invert,color)=>(<div style={{background:"rgba(255,255,255,0.10)",borderRadius:"6px",padding:"10px 12px",minWidth:0}}>

  </div>);

  // Distribution helpers
  const metricValue2=(d)=>metric==="pnl"?d.pnl:metric==="wr"?(d.n>0?d.w/d.n*100:0):d.n;
  const metricFmt2=(v)=>metric==="pnl"?`${v>=0?"+":""}$${fmt(v)}`:metric==="wr"?`${v.toFixed(0)}%`:`${v}`;
  const metricColor2=(v)=>metric==="pnl"?(v>=0?"var(--green)":"var(--red)"):metric==="wr"?(v>=50?"var(--green)":"var(--red)"):"var(--blue)";
  const distBar=(label,d,max,color)=>{const v=metricValue2(d);const w=Math.abs(v)/(max||1)*100;const wr=d.n>0?d.w/d.n*100:0;

      <div style={{flex:1,height:"20px",background:"rgba(255,255,255,0.10)",borderRadius:"4px",position:"relative",overflow:"hidden"}}>

        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:"8px",fontSize:"10px",fontFamily:"var(--mono)",color:metricColor2(v),fontWeight:600}}>{metricFmt2(v)}</div>

    </div>)};

  // Build distribution data
  const setupDist={};curTrades.forEach(t=>(t.setupTags||[]).forEach(s=>{if(!setupDist[s])setupDist[s]={pnl:0,w:0,n:0};setupDist[s].n++;setupDist[s].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)setupDist[s].w++}));
  const sessDist={};ALL_SESSIONS.forEach(s=>sessDist[s]={pnl:0,w:0,n:0});curTrades.forEach(t=>{getSessionTags(t.date,t.time).forEach(s=>{sessDist[s].n++;sessDist[s].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)sessDist[s].w++})});
  const dirDist={long:{pnl:0,w:0,n:0},short:{pnl:0,w:0,n:0}};curTrades.forEach(t=>{const d=t.direction||"long";dirDist[d].n++;dirDist[d].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)dirDist[d].w++});
  const emoDist={};curTrades.forEach(t=>(t.emotionTags||[]).forEach(e=>{if(!emoDist[e])emoDist[e]={pnl:0,w:0,n:0,neg:isNegEmotion(e)};emoDist[e].n++;emoDist[e].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)emoDist[e].w++}));
  const mistDist={};curTrades.forEach(t=>(t.mistakeTags||[]).forEach(m=>{if(!mistDist[m])mistDist[m]={pnl:0,w:0,n:0};mistDist[m].n++;mistDist[m].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)mistDist[m].w++}));
  const HOLD_BUCKETS=[{l:"< 5m",min:0,max:5*6e4},{l:"5–30m",min:5*6e4,max:30*6e4},{l:"30m–1u",min:30*6e4,max:36e5},{l:"1–4u",min:36e5,max:144e5},{l:"4–12u",min:144e5,max:432e5},{l:"12u+",min:432e5,max:Infinity}];
  const holdDist=HOLD_BUCKETS.map(b=>{const tr=curTrades.filter(t=>{const o=parseInt(t.openTime)||0;const c2=parseInt(t.closeTime)||0;const h=c2>o?c2-o:0;return h>=b.min&&h<b.max&&h>0});return{...b,pnl:tr.reduce((s,t)=>s+parseFloat(t.pnl),0),w:tr.filter(t=>parseFloat(t.pnl)>0).length,n:tr.length}});

          <div style={{textAlign:"right"}}><div style={{fontSize:"12px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--red)"}}>${fmt(negEmo[0][1].pnl)}</div><div style={{fontSize:"9px",color:"var(--text4)"}}>{negEmo[0][1].n}x</div></div>
        </div>}
