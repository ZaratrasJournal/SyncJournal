    {quickTagTrade&&(()=>{
      const layers=quickTagTrade.layers||[];
      const syncFlatTags=(trade,newLayers)=>{
        const setups=new Set(trade.setupTags||[]);const confs=new Set(trade.confirmationTags||[]);const tfs=new Set(trade.timeframeTags||[]);
        newLayers.forEach(l=>{if(l.setup)setups.add(l.setup);(l.confirmations||[]).forEach(c=>confs.add(c));if(l.timeframe)tfs.add(l.timeframe)});
        return{...trade,layers:newLayers,setupTags:[...setups],confirmationTags:[...confs],timeframeTags:[...tfs]};
      };
      const addLayer=(layer)=>{
        const updated=[...layers,layer];
        setTrades(p=>p.map(t=>t.id===quickTagTrade.id?syncFlatTags(t,updated):t));
        setQuickTagTrade(p=>p?syncFlatTags(p,updated):null);
      };
      const removeLayer=(idx)=>{
        const updated=layers.filter((_,i)=>i!==idx);
        setTrades(p=>p.map(t=>t.id===quickTagTrade.id?{...t,layers:updated}:t));
        setQuickTagTrade(p=>p?{...p,layers:updated}:null);
      };
      const moveLayer=(idx,dir)=>{
        const updated=[...layers];
        const ni=idx+dir;
        if(ni<0||ni>=updated.length)return;
        [updated[idx],updated[ni]]=[updated[ni],updated[idx]];
        setTrades(p=>p.map(t=>t.id===quickTagTrade.id?{...t,layers:updated}:t));
        setQuickTagTrade(p=>p?{...p,layers:updated}:null);
      };

            <div style={{fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600}}>Setup lagen (top-down)</div>
            <button onClick={()=>addLayer({...EMPTY_LAYER,id:uid()})} style={{fontSize:"10px",padding:"4px 10px",borderRadius:"5px",border:"1px dashed var(--border5)",background:"transparent",color:"var(--blue)",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>+ Laag</button>
          </div>
          
          {layers.length===0&&<div style={{fontSize:"11px",color:"var(--text5)",padding:"6px 0"}}>Klik "+ Laag" om een setup laag toe te voegen.</div>}

          {layers.map((layer,i)=>{
            const tfIdx=TF_ORDER.indexOf(layer.timeframe);
            const prevIdx=i>0?TF_ORDER.indexOf(layers[i-1]?.timeframe):-1;
            const orderWarn=i>0&&tfIdx>=0&&prevIdx>=0&&tfIdx<prevIdx;
            const updateLayer=(field,value)=>{
              const updated=[...layers];updated[i]={...updated[i],[field]:value};
              setTrades(p=>p.map(t=>t.id===quickTagTrade.id?syncFlatTags(t,updated):t));
              setQuickTagTrade(p=>p?syncFlatTags(p,updated):null);
            };
            const toggleConf=(c)=>{
              const cur=layer.confirmations||[layer.confirmation].filter(Boolean);
              const next=cur.includes(c)?cur.filter(x=>x!==c):[...cur,c];
              const updated=[...layers];updated[i]={...updated[i],confirmations:next,confirmation:undefined};
              setTrades(p=>p.map(t=>t.id===quickTagTrade.id?syncFlatTags(t,updated):t));
              setQuickTagTrade(p=>p?syncFlatTags(p,updated):null);
            };
            return(
              <div key={layer.id||i} style={{background:orderWarn?"rgba(201,168,76,0.04)":"rgba(42,46,57,0.3)",borderRadius:"8px",border:`1px solid ${orderWarn?"rgba(201,168,76,0.2)":"var(--border2)"}`,padding:"10px",marginBottom:"6px"}}>

                  {i>0&&<button onClick={()=>moveLayer(i,-1)} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"11px",padding:"1px"}}>▲</button>}
                  {i<layers.length-1&&<button onClick={()=>moveLayer(i,1)} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"11px",padding:"1px"}}>▼</button>}

                  {orderWarn&&<span style={{fontSize:"9px",color:"var(--amber)",fontWeight:500}}>⚠ Niet top-down</span>}
                  <button onClick={()=>removeLayer(i)} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"12px",padding:"1px"}}>✕</button>
                </div>
                <div style={{display:"grid",gap:"6px"}}>
                  <div>
                    <div style={{fontSize:"9px",color:"var(--text4)",marginBottom:"3px",fontWeight:500}}>TIMEFRAME</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>{getTagsFor("timeframeTags").map(tf=>{const sel=layer.timeframe===tf;return(<button key={tf} onClick={()=>updateLayer("timeframe",sel?"":tf)} style={{padding:"2px 7px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#7c3aed":"var(--border3)"}`,background:sel?"rgba(124,58,237,0.2)":"transparent",color:sel?"#a78bfa":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{tf}</button>)})}</div>
                  </div>
                  <div>
                    <div style={{fontSize:"9px",color:"var(--text4)",marginBottom:"3px",fontWeight:500}}>SETUP</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>{getTagsFor("setupTags").map(s=>{const sel=layer.setup===s;return(<button key={s} onClick={()=>updateLayer("setup",sel?"":s)} style={{padding:"2px 7px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#2563eb":"var(--border3)"}`,background:sel?"rgba(37,99,235,0.2)":"transparent",color:sel?"#5B9CF6":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{s}</button>)})}</div>
                  </div>
                  <div>
                    <div style={{fontSize:"9px",color:"var(--text4)",marginBottom:"3px",fontWeight:500}}>CONFIRMATIE(S)</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>{getTagsFor("confirmationTags").map(c=>{const sel=(layer.confirmations||[layer.confirmation].filter(Boolean)).includes(c);return(<button key={c} onClick={()=>toggleConf(c)} style={{padding:"2px 7px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#0d9488":"var(--border3)"}`,background:sel?"rgba(13,148,136,0.2)":"transparent",color:sel?"#2dd4bf":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{c}</button>)})}</div>
                  </div>
                  <div>
                    <div style={{fontSize:"9px",color:"var(--text4)",marginBottom:"3px",fontWeight:500}}>ROL</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>{ROLE_OPTIONS.map(r=>{const sel=layer.role===r;return(<button key={r} onClick={()=>updateLayer("role",sel?"Bias":r)} style={{padding:"2px 7px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#d97706":"var(--border3)"}`,background:sel?"rgba(201,168,76,0.2)":"transparent",color:sel?"#c9a84c":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{r}</button>)})}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* === EMOTIES & FOUTEN (setup/confirmatie/timeframe zitten in lagen) === */}
        {TAG_CATEGORIES.filter(cat=>!["setupTags","confirmationTags","timeframeTags"].includes(cat.key)).map(cat=>{const c=COLORS[cat.color]||COLORS.blue;const tags=getTagsFor(cat.key);
          if(cat.key==="emotionTags")return(
            <div key={cat.key} style={{marginBottom:"12px"}}>
              <div style={{fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:"8px"}}>Emoties</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                <div>
                  <div style={{fontSize:"9px",color:"var(--red)",fontWeight:600,marginBottom:"4px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCross size={14}/> Negatief</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{tags.filter(t=>isNegEmotion(t)).map(tag=>{const a=(quickTagTrade.emotionTags||[]).includes(tag);return(<button key={tag} onClick={()=>quickTagUpdate("emotionTags",tag)} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:500,border:`1px solid ${a?"#dc2626":"rgba(54,58,69,0.7)"}`,background:a?"rgba(220,122,122,0.14)":"transparent",color:a?"#ef5350":"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>{tag}</button>)})}</div>
                </div>
                <div>
                  <div style={{fontSize:"9px",color:"var(--green)",fontWeight:600,marginBottom:"4px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCheck size={14}/> Positief</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{tags.filter(t=>!isNegEmotion(t)).map(tag=>{const a=(quickTagTrade.emotionTags||[]).includes(tag);return(<button key={tag} onClick={()=>quickTagUpdate("emotionTags",tag)} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:500,border:`1px solid ${a?"#059669":"rgba(54,58,69,0.7)"}`,background:a?"rgba(50,196,149,0.14)":"transparent",color:a?CHART_COLORS.win:"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>{tag}</button>)})}</div>
                </div>
              </div>
            </div>
          );
          return(
          <div key={cat.key} style={{marginBottom:"12px"}}>
            <div style={{fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:"8px"}}>{cat.label}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>{tags.map(tag=>{const a=(quickTagTrade[cat.key]||[]).includes(tag);return(<button key={tag} onClick={()=>quickTagUpdate(cat.key,tag)} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"12px",fontWeight:500,border:`1px solid ${a?c.border:"rgba(54,58,69,0.7)"}`,background:a?c.bg:"transparent",color:a?c.text:"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>{tag}</button>)})}</div>
          </div>
        )})}
        <button onClick={()=>setQuickTagTrade(null)} style={{width:"100%",padding:"10px",borderRadius:"8px",border:"none",background:"var(--blue2)",color:"#fff",fontSize:"13px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginTop:"4px"}}>Klaar</button>
      </div>
    </div>);
    })()}
  </div>);
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null}}
  static getDerivedStateFromError(error){return{hasError:true,error}}
  componentDidCatch(error,info){console.error("TradeJournal crash:",error,info)}
  render(){
    if(this.state.hasError)return React.createElement("div",{style:{padding:"2rem",textAlign:"center",color:"#ef5350",background:"rgba(8,9,12,0.8)",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
      React.createElement("div",{style:{fontSize:"48px",marginBottom:"1rem"}},"⚠️"),
      React.createElement("div",{style:{fontSize:"18px",fontWeight:700,marginBottom:"8px",color:"#d1d4dc"}},"Er ging iets mis"),
      React.createElement("div",{style:{fontSize:"13px",color:"#787b86",marginBottom:"16px",maxWidth:"400px"}},"De app is gecrasht. Klik hieronder om te herstarten. Je data is veilig opgeslagen."),
      React.createElement("div",{style:{fontSize:"11px",color:"#5d606b",marginBottom:"16px",fontFamily:"'JetBrains Mono',monospace",maxWidth:"500px",wordBreak:"break-all"}},String(this.state.error)),
      React.createElement("button",{onClick:()=>{this.setState({hasError:false,error:null});window.location.hash="#/dashboard";window.location.reload()},style:{padding:"10px 24px",borderRadius:"4px",border:"none",background:"#c9a84c",color:"#0c0d12",fontSize:"13px",fontWeight:700,cursor:"pointer"}},"Herstart app")
    );
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
</body>
