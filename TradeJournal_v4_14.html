<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
/* ═══ SHARED VARIABLES (all themes) ═══ */
:root{
--text:#f5f5f7;--text2:#c0c5cd;--text3:#939aa5;--text4:#6b7280;--text5:#515866;
--green:#3ee0a8;--green2:rgba(62,224,168,0.12);--green3:rgba(50,196,149,0.2);
--red:#ff8585;--red2:rgba(255,133,133,0.12);--red3:rgba(220,122,122,0.2);
--blue:#70b0ff;--blue2:#2962ff;--blue3:rgba(41,98,255,0.12);--blue4:rgba(41,98,255,0.1);
--amber:#d4b85c;--amber2:rgba(212,184,92,0.15);--orange:#f59e0b;--orange2:rgba(245,158,11,0.15);
--teal:#3ee0a8;--teal2:rgba(50,196,149,0.12);
--purple:#a78bfa;--purple2:rgba(124,58,237,0.15);
--radius:6px;--radius-lg:12px;
--font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
--gold:#d4b85c;--gold-dim:rgba(212,184,92,0.08);--gold-border:rgba(212,184,92,0.15);
--stat-fs:clamp(16px,2vw,22px);--stat-label-fs:clamp(9px,1vw,11px);
--content-pad:clamp(12px,2vw,20px);
--c-win:#32c495;--c-loss:#dc7a7a;--c-long:#32c495;--c-short:#dc7a7a;
--c-tokyo:#d4ad5c;--c-london:#6a9fd0;--c-ny:#9a8acc;--c-off:#8a8a90;--c-weekend:#cc7a9a;
--c-neutral:#7a9aaa;
/* Classic theme defaults */
--bg:#0c0d12;--bg2:#161722;--bg3:#1a1b28;--bg4:#1e1f2e;
--glass:#1a1b28;--glass-border:rgba(255,255,255,0.07);--glass-border-accent:rgba(255,255,255,0.1);
--glass-blur:none;
--border1:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.07);--border3:rgba(255,255,255,0.09);--border4:rgba(255,255,255,0.11);--border5:rgba(255,255,255,0.14);--border6:rgba(255,255,255,0.17);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before,body::after{display:none;content:'';position:fixed;pointer-events:none}
/* ═══ MORANI SIGNATURE THEME ═══ */
body.theme-morani{
--bg:#08090c;--bg2:rgba(14,16,22,0.45);--bg3:rgba(14,16,22,0.45);--bg4:rgba(20,22,30,0.5);
--glass:rgba(14,16,22,0.45);--glass-border:rgba(201,168,76,0.08);--glass-border-accent:rgba(201,168,76,0.12);
--glass-blur:blur(24px);
--border1:rgba(255,255,255,0.04);--border2:rgba(255,255,255,0.06);--border3:rgba(201,168,76,0.08);--border4:rgba(201,168,76,0.1);--border5:rgba(255,255,255,0.12);--border6:rgba(255,255,255,0.15);
background:#08090c}
body.theme-morani::before{display:block;inset:0;z-index:-1;background:
  radial-gradient(ellipse 500px 500px at 75% 10%, rgba(201,168,76,0.18) 0%, transparent 70%),
  radial-gradient(ellipse 450px 450px at 15% 80%, rgba(96,165,250,0.15) 0%, transparent 70%),
  radial-gradient(ellipse 350px 350px at 50% 50%, rgba(52,211,153,0.10) 0%, transparent 70%),
  radial-gradient(ellipse 200px 200px at 10% 15%, rgba(201,168,76,0.07) 0%, transparent 70%);
  filter:blur(30px)}
body.theme-morani::after{display:block;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(212,184,92,0.4) 30%,rgba(212,184,92,0.6) 50%,rgba(212,184,92,0.4) 70%,transparent 95%);z-index:1001}
@supports not (backdrop-filter:blur(1px)){body.theme-morani{--glass:rgba(14,16,22,0.7)!important}}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border4);border-radius:3px}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.spinner{width:16px;height:16px;border:2px solid rgba(54,58,69,0.9);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* ═══ NAVBAR STYLING ═══ */
.tj-topbar{height:60px;background:var(--glass);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-bottom:1px solid var(--glass-border);transition:all .2s}
/* ═══ LOGO ANIMATIONS ═══ */
@keyframes logoShimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 3px rgba(201,168,76,0.1))}50%{filter:drop-shadow(0 0 10px rgba(38,166,154,0.35)) drop-shadow(0 0 20px rgba(201,168,76,0.15))}}
.tj-logo{cursor:pointer;display:flex;align-items:center;gap:12px}
.tj-logo:hover{filter:drop-shadow(0 0 8px rgba(201,168,76,0.3))}
.tj-logo img{height:40px;animation:logoPulse 4s ease-in-out infinite;transition:transform .2s}
.tj-logo:hover img{transform:scale(1.04)}
.tj-logo-text{font-size:17px!important;font-weight:700;letter-spacing:-0.02em;background:linear-gradient(90deg,var(--text),var(--text),#5B9CF6,#26a69a,#c9a84c,var(--text),var(--text));background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:logoShimmer 6s linear infinite}
.tj-logo-sub{font-size:7.5px;color:var(--text3);font-family:var(--mono);letter-spacing:0.12em;margin-top:-2px}
.tj-tabs{display:flex;gap:4px;margin-left:8px}
.tj-tab{padding:0 14px!important;height:60px!important;display:flex;align-items:center;font-size:13px!important;font-weight:400;background:none;border:none;border-bottom:2px solid transparent;color:var(--text4);cursor:pointer;font-family:var(--font);transition:all .2s ease;position:relative}
.tj-tab:hover{color:var(--text);background:rgba(201,168,76,0.04);transform:translateY(-0.5px)}
.tj-tab.active,.tj-tab[data-active="true"]{color:var(--text)!important;font-weight:500;border-bottom-color:transparent}
.tj-tab.active::after,.tj-tab[data-active="true"]::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:2px;background:linear-gradient(90deg,#5B9CF6,#26a69a,#c9a84c);border-radius:2px}
.tj-tab span{margin-right:5px;font-size:12px;opacity:0.7;transition:opacity .2s}
.tj-tab:hover span{opacity:1}
.tj-right-btns{display:flex;align-items:center;gap:8px}
.tj-right-btns button{padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border3);background:transparent;color:var(--text4);font-size:11px;cursor:pointer;font-family:var(--font);transition:all .2s}
.tj-right-btns button:hover{border-color:var(--gold-border);color:var(--text2);background:var(--gold-dim)}

/* Touch: no hover effects */
@media(hover:none){.tj-tab:hover{background:none;transform:none}.tj-logo:hover{filter:none}.tj-logo:hover img{transform:none}.tj-right-btns button:hover{background:transparent;border-color:var(--border3);color:var(--text4)}}
@media(prefers-reduced-motion:reduce){.tj-logo img{animation:none}.tj-logo-text{animation:none;background:none;-webkit-text-fill-color:var(--text)}}
.morani-link{text-decoration:none;transition:filter .2s}
.morani-link:hover{filter:drop-shadow(0 0 6px rgba(201,168,76,0.4))}

/* Hamburger button — hidden on desktop */
.hamburger{display:none;background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:8px;line-height:1}

/* Mobile slide-in menu overlay */
.mobile-menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;animation:fadeIn .2s ease}
.mobile-menu{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--bg2);border-right:1px solid var(--border3);z-index:1000;animation:slideIn .25s ease;padding:16px 0;overflow-y:auto}
.mobile-menu-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer}
.mobile-menu .mm-item{display:block;width:100%;padding:12px 20px;border:none;background:none;color:var(--text3);font-size:14px;text-align:left;cursor:pointer;font-family:var(--font);transition:background .1s}
.mobile-menu .mm-item:hover,.mobile-menu .mm-item.active{background:var(--gold-dim);color:var(--gold)}
.mobile-menu .mm-sep{height:1px;background:var(--border2);margin:8px 16px}
.mobile-menu .mm-logo{padding:8px 20px 16px;display:flex;align-items:center;gap:10px}

/* ═══ RESPONSIVE BREAKPOINTS ═══ */

/* Ultrawide >1600px — expand content */
@media(min-width:1601px){
  .tj-content{max-width:1400px!important}
}

/* Laptop/small desktop 900-1200px */
@media(max-width:1200px){
  .tj-topbar .tj-tabs{gap:0}
  .tj-topbar .tj-tab{padding:0 8px;font-size:11px}
  .tj-topbar .tj-tab span{display:none}
  .tj-topbar .tj-right-btns button{font-size:10px;padding:4px 8px}
  .tj-content{padding:12px 16px!important}
}

/* Tablet 600-900px */
@media(max-width:900px){
  .hamburger{display:block}
  .tj-topbar .tj-tabs{display:none!important}
  .tj-topbar .tj-right-btns{gap:4px}
  .tj-topbar .tj-right-btns button{font-size:10px;padding:4px 6px}
  .tj-content{padding:10px 12px!important}
}

/* Mobile <600px */
@media(max-width:600px){
  .hamburger{display:block}
  .tj-topbar{height:44px!important;padding:0 10px!important}
  .tj-topbar .tj-tabs{display:none!important}
  .tj-topbar .tj-right-btns{display:none!important}
  .tj-topbar .tj-logo img{height:28px!important}
  .tj-topbar .tj-logo-text{font-size:14px!important}
  .tj-topbar .tj-logo-sub{display:none}
  .tj-content{padding:8px!important}
  /* Force all 4-col and 3-col grids to 1 column on mobile */
  .tj-content [style*="repeat(4"]{grid-template-columns:1fr!important}
  .tj-content [style*="repeat(3"]{grid-template-columns:1fr!important}
  .tj-content [style*="repeat(7"]{grid-template-columns:repeat(4,1fr)!important}
}

/* Responsive grid utility classes */
.resp-grid-stats{display:grid;gap:12px}
@media(min-width:901px){.resp-grid-stats{grid-template-columns:repeat(4,1fr)}}
@media(min-width:601px) and (max-width:900px){.resp-grid-stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.resp-grid-stats{grid-template-columns:1fr}}
.resp-grid-donuts{display:grid;gap:16px}
@media(min-width:769px){.resp-grid-donuts{grid-template-columns:repeat(3,1fr)}}
@media(min-width:601px) and (max-width:768px){.resp-grid-donuts{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.resp-grid-donuts{grid-template-columns:1fr}}
.resp-grid-2col{display:grid;gap:16px}
@media(min-width:769px){.resp-grid-2col{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.resp-grid-2col{grid-template-columns:1fr}}

/* Touch-friendly targets */
@media(pointer:coarse){
  button{min-height:44px}
  .tj-tab{min-height:48px}
  .mm-item{min-height:48px}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback} = React;

const DEFAULT_TAGS={
  setupTags:["BOS","MSB","SFP","F2R","F2L"],
  confirmationTags:["Liquidity Sweep","OB","FVG","Divergence","EQL/EQH","ChoCh"],
  timeframeTags:["1M","5M","15M","1H","4H","12H","Daily","Weekly"],
  emotionTags:["FOMO","Gehaast","Twijfels","Overconfident","Gefrustreerd","Tilt","Onzeker","Geduldig","Rustig","Zelfverzekerd","Kalm","Gedisciplineerd"],
  mistakeTags:["Te vroeg in","SL te krap","SL te wijd","Geen plan","Overtrading","TP te vroeg","Positie te groot","Revenge trade"]
};
const TAG_CATEGORIES=[
  {key:"setupTags",label:"Setup Type",color:"blue"},
  {key:"confirmationTags",label:"Confirmaties",color:"teal"},
  {key:"timeframeTags",label:"Timeframe",color:"purple"},
  {key:"emotionTags",label:"Emoties",color:"amber"},
  {key:"mistakeTags",label:"Fouten",color:"orange"},
];

const EMOTIONS_NEG=["FOMO","Gehaast","Twijfels","Overconfident","Gefrustreerd","Tilt","Onzeker"];
const EMOTIONS_POS=["Geduldig","Rustig","Zelfverzekerd","Kalm","Gedisciplineerd"];
const isNegEmotion=(tag)=>EMOTIONS_NEG.includes(tag);

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmt=(n)=>{if(n===null||n===undefined)return"--";const v=parseFloat(typeof n==="object"?0:n);return isNaN(v)?"--":v.toLocaleString("nl-NL",{minimumFractionDigits:2,maximumFractionDigits:2})};
const pct=(n)=>{const v=parseFloat(n);return isNaN(v)?"--":v.toFixed(1)+"%"};
const isEmpty=(v)=>v===undefined||v===null||v===""||v==="0"||v===0;
const NA=()=>React.createElement("span",{style:{color:"#939aa5",fontStyle:"italic",fontSize:"10px"}},"N/A");
const valOrNA=(v,formatter)=>isEmpty(v)?React.createElement(NA):formatter?formatter(v):v;
const ts2date=(ms)=>{const d=new Date(parseInt(ms));return d.toISOString().split("T")[0]};
const ts2time=(ms)=>{const d=new Date(parseInt(ms));return d.toTimeString().slice(0,5)};

// ============ SESSION DETECTION (CET/CEST) ============
const SESSION_COLORS={
  "Tokyo":{bg:"rgba(212,173,92,0.12)",border:"rgba(212,173,92,0.25)",text:"#d4ad5c"},
  "London":{bg:"rgba(106,159,208,0.12)",border:"rgba(106,159,208,0.25)",text:"#6a9fd0"},
  "New York":{bg:"rgba(154,138,204,0.12)",border:"rgba(154,138,204,0.25)",text:"#9a8acc"},
  "Off-session":{bg:"rgba(138,138,144,0.12)",border:"rgba(138,138,144,0.25)",text:"#8a8a90"},
  "Weekend":{bg:"rgba(204,122,154,0.12)",border:"rgba(204,122,154,0.25)",text:"#cc7a9a"},
};
const CHART_COLORS={win:"#32c495",loss:"#dc7a7a",long:"#32c495",short:"#dc7a7a",open:"#d4b85c",tokyo:"#d4ad5c",london:"#6a9fd0",ny:"#9a8acc",off:"#8a8a90",weekend:"#cc7a9a",neutral:"#7a9aaa"};
const ALL_SESSIONS=["Tokyo","London","New York","Off-session","Weekend"];

function getSessionTags(date, time) {
  if (!date || !time) return [];
  const dt = new Date(date + "T" + (time.length === 5 ? time + ":00" : time));
  if (isNaN(dt.getTime())) return [];
  const cetParts = new Intl.DateTimeFormat("en-GB", {
    timeZone: "Europe/Amsterdam", hour: "numeric", minute: "numeric",
    weekday: "short", hour12: false
  }).formatToParts(dt);
  const h = parseInt(cetParts.find(p => p.type === "hour")?.value || "0");
  const m = parseInt(cetParts.find(p => p.type === "minute")?.value || "0");
  const hm = h * 60 + m;
  const wd = cetParts.find(p => p.type === "weekday")?.value?.toLowerCase() || "";
  if (wd === "sat" || wd === "sun") return ["Weekend"];
  if (hm >= 930 && hm < 1320) return ["New York"];           // 15:30-22:00
  if (hm >= 540 && hm < 930) return ["London"];              // 09:00-15:30
  if (hm >= 120 && hm < 480) return ["Tokyo"];               // 02:00-08:00
  return ["Off-session"];                                     // 22:00-02:00 + 08:00-09:00
}

const ROLE_OPTIONS=["Bias","Entry","Confirmatie","Exit"];
const TF_ORDER=["Monthly","Weekly","Daily","12H","4H","1H","15M","5M","1M"];
const EMPTY_LAYER={id:"",timeframe:"",setup:"",confirmations:[],role:"Bias"};
// Gradient glow icons — positive (check) and negative (cross)
let _iconId=0;
function GlowCheck({size=20}){const id="gc"+(_iconId++);return(<svg width={size} height={size} viewBox="0 0 24 24" fill="none"><defs><linearGradient id={id} x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#34d399"/><stop offset="100%" stopColor="#60a5fa"/></linearGradient></defs><circle cx="12" cy="12" r="10.5" stroke={`url(#${id})`} strokeWidth="1.5" fill="rgba(52,211,153,0.08)"/><path d="M8 12.5l2.5 2.5L16 9.5" stroke={`url(#${id})`} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>)}
function GlowCross({size=20}){const id="gx"+(_iconId++);return(<svg width={size} height={size} viewBox="0 0 24 24" fill="none"><defs><linearGradient id={id} x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#f87171"/><stop offset="100%" stopColor="#fbbf24"/></linearGradient></defs><circle cx="12" cy="12" r="10.5" stroke={`url(#${id})`} strokeWidth="1.5" fill="rgba(248,113,113,0.08)"/><path d="M9 9l6 6M15 9l-6 6" stroke={`url(#${id})`} strokeWidth="2" strokeLinecap="round"/></svg>)}
function GlowWarn({size=20}){const id="gw"+(_iconId++);return(<svg width={size} height={size} viewBox="0 0 24 24" fill="none"><defs><linearGradient id={id} x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#f87171"/><stop offset="100%" stopColor="#fbbf24"/></linearGradient></defs><circle cx="12" cy="12" r="10.5" stroke={`url(#${id})`} strokeWidth="1.5" fill="rgba(248,113,113,0.06)"/><path d="M12 8v5" stroke={`url(#${id})`} strokeWidth="2" strokeLinecap="round"/><circle cx="12" cy="16" r="1" fill={`url(#${id})`}/></svg>)}

const EMPTY_TRADE={id:"",date:new Date().toISOString().split("T")[0],time:new Date().toTimeString().slice(0,5),pair:"BTC/USDT",direction:"long",entry:"",stopLoss:"",takeProfit:"",exit:"",leverage:"10",positionSize:"",positionSizeAsset:"",pnl:"",fees:"",setupTags:[],confirmationTags:[],timeframeTags:[],emotionTags:[],mistakeTags:[],customTags:[],rating:0,screenshot:null,notes:"",links:[],layers:[],source:"manual",positionId:"",openTime:"",closeTime:"",status:"closed",manualOverrides:[],tpLevels:[]};
const EMPTY_TP={id:"",price:"",pct:"25",status:"open",actualPrice:""};

// ============ PROXY CONFIG ============
const PROXY_URL = "http://127.0.0.1:8765";

async function proxyCall(payload) {
  const resp = await fetch(PROXY_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  });
  if (!resp.ok) throw new Error("Proxy niet bereikbaar. Start proxy.py eerst.");
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

  blofin: {
    name: "Blofin", color: "#6366f1", needsPassphrase: true,
    async fetchTrades(apiKey, apiSecret, passphrase, startTime) {
      const data = await proxyCall({exchange:"blofin",action:"trades",apiKey,apiSecret,passphrase,startTime});
      const source = data.source || "orders-history";
      
      if (source === "positions-history") {
        // Full position data with entry + exit
        return (data.trades || []).filter(t => {
          const pnl = parseFloat(t.realizedPnl || t.pnl || "0");
          return pnl !== 0 || parseFloat(t.closeTotalPos || "0") > 0;
        }).map(t => {
          const posSide = (t.positionSide || "net").toLowerCase();
          let direction;
          if (posSide === "long") direction = "long";
          else if (posSide === "short") direction = "short";
          else { direction = parseFloat(t.closeTotalPos || t.positions || "0") >= 0 ? "long" : "short"; }
          const closeTime = t.updateTime || t.createTime || Date.now();
          return {
            id:"blofin_"+t.positionId, date:ts2date(closeTime), time:ts2time(closeTime),
            pair:(t.instId||"").replace("-","/"), direction,
            entry:t.averagePrice||"", exit:t.closeAveragePrice||"",
            positionSize:t.closeTotalPos||t.positions||"",
            pnl:t.realizedPnl||t.pnl||"", fees:t.fee?Math.abs(parseFloat(t.fee)).toString():"0",
            leverage:t.leverage||"10", source:"blofin",
            status:"closed",
            stopLoss:"",takeProfit:"",setupTags:[],confirmationTags:[],timeframeTags:[],emotionTags:[],mistakeTags:[],customTags:[],rating:0,screenshot:null,notes:"",
            links:[],layers:[],positionId:t.positionId||"",openTime:t.createTime||"",closeTime:String(closeTime),
          };
        });
      }
      
      // Fallback: orders-history — calculate entry from exit + pnl + size
      return (data.trades || []).filter(t => {
        const pnl = parseFloat(t.pnl || "0");
        return pnl !== 0;
      }).map(t => {
        const side = (t.side || "").toLowerCase();
        const direction = side === "buy" ? "short" : "long";
        const closeTime = t.updateTime || t.createTime || Date.now();
        const exitPrice = parseFloat(t.averagePrice || t.price || "0");
        const pnlVal = parseFloat(t.pnl || "0");
        const sizeVal = parseFloat(t.filledSize || t.size || "0");
        // Calculate entry: long → entry = exit - pnl/size, short → entry = exit + pnl/size
        let entryPrice = "";
        if (exitPrice > 0 && sizeVal > 0) {
          const pnlPerUnit = pnlVal / sizeVal;
          const calc = direction === "long" ? exitPrice - pnlPerUnit : exitPrice + pnlPerUnit;
          if (calc > 0) entryPrice = calc.toString();
        }
        return {
          id:"blofin_"+t.orderId, date:ts2date(closeTime), time:ts2time(closeTime),
          pair:(t.instId||"").replace("-","/"), direction,
          entry:entryPrice, exit:t.averagePrice||t.price||"",
          positionSize:t.filledSize||t.size||"",
          pnl:t.pnl||"", fees:t.fee?Math.abs(parseFloat(t.fee)).toString():"0",

          status:"closed",
          stopLoss:"",takeProfit:"",setupTags:[],confirmationTags:[],timeframeTags:[],emotionTags:[],mistakeTags:[],customTags:[],rating:0,screenshot:null,notes:"",
          links:[],layers:[],positionId:t.positionId||"",openTime:t.createTime||"",closeTime:String(closeTime),
        };
      });

  kraken: {
    name: "Kraken", color: "#7b61ff", needsPassphrase: false,
    async fetchTrades(apiKey, apiSecret, _pp, startTime) {
      // Kraken Futures pair mapper: PF_XBTUSD → BTC/USD, PF_ETHUSDC → ETH/USDC
      const krakenPair=(sym)=>{
        let s=(sym||"").toUpperCase().replace("PF_","").replace("PI_","");
        // Map Kraken asset names
        s=s.replace("XBT","BTC");
        // Detect quote: USDC first (longer), then USD
        if(s.endsWith("USDC"))return s.slice(0,-4)+"/USDC";
        if(s.endsWith("USDT"))return s.slice(0,-4)+"/USDT";
        if(s.endsWith("USD"))return s.slice(0,-3)+"/USD";
        if(s.includes("/"))return s;
        return s+"/USD";
      };
      const data = await proxyCall({exchange:"kraken",action:"trades",apiKey,apiSecret,startTime});
      return (data.trades || []).filter(t => {
        if (data.source === "account_log" || data.source === "computed") return Math.abs(parseFloat(t.pnl||"0")) > 0.001;
        return true;
      }).map(t => {
        if (t.direction && t.pnl !== undefined && (t.entry_price || t.pair_clean)) {
          const ft = t.fillTime||"";
          const pair = t.pair_clean || krakenPair(t.symbol);
          const status = t.status || "closed";
          return {
            id:"kraken_"+(t.fill_id||uid()),
            date:ft?ft.split("T")[0]:"", time:ft?ft.split("T")[1]?.slice(0,5):"",
            pair,
            direction:t.direction,
            entry:String(t.entry_price||""),
            exit:status==="closed"?String(t.exit_price||""):"",
            positionSize:String(t.size||""),
            positionSizeAsset:String(t.size||""),
            pnl:status==="closed"?String(t.pnl||""):"",
            fees:t.fee?Math.abs(t.fee).toFixed(4):"0", leverage:"1", source:"kraken",
            status,
            stopLoss:"",takeProfit:"",setupTags:[],confirmationTags:[],timeframeTags:[],emotionTags:[],mistakeTags:[],customTags:[],rating:0,screenshot:null,notes:"",links:[],layers:[],manualOverrides:[],
          };
        }
        const ft = t.fillTime||"";
        return {
          id:"kraken_"+(t.fill_id||uid()),
          date:ft?ft.split("T")[0]:"", time:ft?ft.split("T")[1]?.slice(0,5):"",
          pair:krakenPair(t.symbol),
          direction:t.side==="buy"?"long":"short",
          entry:String(t.price||""), exit:String(t.price||""),
          positionSize:String(t.size||""), pnl:"",
          fees:"0", leverage:"1", source:"kraken",
          stopLoss:"",takeProfit:"",setupTags:[],confirmationTags:[],timeframeTags:[],emotionTags:[],mistakeTags:[],customTags:[],rating:0,screenshot:null,notes:"",links:[],layers:[],manualOverrides:[],
        };
      });
    },
    async testConnection(apiKey, apiSecret) {
      const data = await proxyCall({exchange:"kraken",action:"test",apiKey,apiSecret});
      return {success:true, balance:data.balance||"0"};
    },
    async fetchFills(apiKey, apiSecret, symbol, startTime, endTime) {

      return { fills: data.fills || [], total: data.total || 0 };

function TagGroup({label,tags,selected,onToggle,color,allowCustom,customTags,onAddCustom}){
  const[adding,setAdding]=useState(false);const[nv,setNv]=useState("");
  const c=COLORS[color]||COLORS.blue;const all=[...tags,...(customTags||[])];
  return(
    <div style={{marginBottom:"1rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:"8px"}}>{label}</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
        {all.map(tag=>{const a=selected.includes(tag);return(
          <button key={tag} onClick={()=>onToggle(tag)} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"12px",fontWeight:500,border:`1px solid ${a?c.border:"rgba(54,58,69,0.7)"}`,background:a?c.bg:"transparent",color:a?c.text:"#9ca3af",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{tag}</button>
        )})}
        {allowCustom&&!adding&&<button onClick={()=>setAdding(true)} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"12px",border:"1px dashed rgba(66,70,81,0.9)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit"}}>+ Eigen tag</button>}
        {adding&&<form onSubmit={e=>{e.preventDefault();if(nv.trim()){onAddCustom(nv.trim());setNv("");setAdding(false)}}} style={{display:"flex",gap:"4px"}}>
          <input autoFocus value={nv} onChange={e=>setNv(e.target.value)} placeholder="Tag..." style={{...iStyle,width:"120px",padding:"5px 10px",fontSize:"12px"}}/>
          <button type="submit" style={{padding:"5px 8px",borderRadius:"6px",fontSize:"12px",border:"1px solid rgba(78,82,93,0.9)",background:"transparent",color:"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>OK</button>
          <button type="button" onClick={()=>setAdding(false)} style={{padding:"5px 8px",borderRadius:"6px",fontSize:"12px",border:"none",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit"}}>X</button>
        </form>}
      </div>
    </div>
  );
}

function Stars({value,onChange}){
  const[h,setH]=useState(0);
  return(<div style={{display:"flex",gap:"4px"}}>{[1,2,3,4,5].map(s=>(
    <button key={s} onMouseEnter={()=>setH(s)} onMouseLeave={()=>setH(0)} onClick={()=>onChange(s===value?0:s)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"22px",color:s<=(h||value)?"#c9a84c":"#374151",transition:"color .1s",padding:"2px"}}>★</button>
  ))}</div>);
}

function Stat({label,value,sub,color}){
  const safeVal=typeof value==="object"?JSON.stringify(value):value;
  const safeSub=typeof sub==="object"?JSON.stringify(sub):sub;
  return(<div style={{background:"var(--glass)",...(typeof window!=="undefined"&&CSS.supports("backdrop-filter","blur(1px)")?{backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)"}:{}),borderRadius:"var(--radius-lg)",padding:"16px 18px",minWidth:0,border:"1px solid var(--glass-border)"}}>
    <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:500,marginBottom:"6px"}}>{label}</div>
    <div style={{fontSize:"22px",fontWeight:700,fontFamily:"var(--mono)",color:color||"var(--text)",letterSpacing:"-0.02em"}}>{safeVal}</div>
    {safeSub&&<div style={{fontSize:"11px",color:"var(--text3)",marginTop:"2px",fontFamily:"var(--mono)"}}>{safeSub}</div>}
  </div>);
}

function ExchangeIcon({name,size=16}){
  const n=(name||"").toLowerCase();
  const logos={
    mexc:"https://www.google.com/s2/favicons?domain=mexc.com&sz=64",
    blofin:"https://www.google.com/s2/favicons?domain=blofin.com&sz=64",
    kraken:"https://www.google.com/s2/favicons?domain=kraken.com&sz=64",
  };
  if(logos[n])return(<img src={logos[n]} alt={n} style={{width:size,height:size,borderRadius:"3px",objectFit:"contain",flexShrink:0}} title={exName(n)}/>);
  if(n==="csv")return(<div style={{width:size,height:size,borderRadius:"4px",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:size*0.55,fontWeight:800,fontFamily:"var(--mono)",background:"#4B5563",color:"#fff",flexShrink:0}} title="CSV">C</div>);
  if(n==="manual"||n==="handmatig")return(<span style={{fontSize:size*0.85,flexShrink:0}} title="Handmatig">✏️</span>);
  // Custom accounts: first letter badge
  if(n)return(<div style={{width:size,height:size,borderRadius:"4px",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:size*0.55,fontWeight:800,fontFamily:"var(--mono)",background:"rgba(201,168,76,0.15)",color:"#c9a84c",flexShrink:0,border:"1px solid rgba(201,168,76,0.2)"}} title={exName(n)}>{n.charAt(0).toUpperCase()}</div>);
  return null;
}

// Exchange name capitalizer
const exName=(n)=>{if(!n)return"";const map={mexc:"MEXC",blofin:"Blofin",kraken:"Kraken",manual:"Handmatig",csv:"CSV"};return map[n.toLowerCase()]||n.charAt(0).toUpperCase()+n.slice(1)};

// Exchange label: icon + capitalized name
function ExLabel({name,size=16,gap=6}){
  return(<span style={{display:"inline-flex",alignItems:"center",gap:gap+"px"}}><ExchangeIcon name={name} size={size}/><span>{exName(name)}</span></span>);
}

function CryptoIcon({pair,size=28}){
  const asset=(pair||"BTC/USDT").split("/")[0]||"BTC";
  const logo=CRYPTO_LOGOS[asset];
  const r=size/2;
  if(logo){
    return(<svg width={size} height={size} viewBox="0 0 20 20" style={{flexShrink:0}}>
      <circle cx="10" cy="10" r="10" fill={logo.bg}/>
      <path d={logo.path} fill="#fff" fillRule="evenodd"/>
    </svg>);
  }
  // Fallback: generic circle with initials
  const initials=asset.slice(0,2);
  const hash=[...asset].reduce((s,c)=>s+c.charCodeAt(0),0);
  const hue=(hash*37)%360;
  return(<svg width={size} height={size} viewBox="0 0 20 20" style={{flexShrink:0}}>
    <circle cx="10" cy="10" r="10" fill={`hsl(${hue},30%,25%)`}/>
    <text x="10" y="10" textAnchor="middle" dominantBaseline="central" fill={`hsl(${hue},40%,65%)`} fontSize="7" fontWeight="700" fontFamily="'DM Sans',sans-serif">{initials}</text>
  </svg>);
}

// ============ TAG MANAGER ============
function TagManager({tagConfig,setTagConfig,trades,showToast}){
  const[renaming,setRenaming]=useState(null);
  const[renameVal,setRenameVal]=useState("");
  const[adding,setAdding]=useState(null);
  const[addVal,setAddVal]=useState("");

  const getTags=(catKey)=>tagConfig[catKey]||DEFAULT_TAGS[catKey]||[];
  
  const addTag=(catKey)=>{
    if(!addVal.trim())return;
    const current=getTags(catKey);
    if(current.includes(addVal.trim())){showToast("Tag bestaat al","error");return}
    setTagConfig(p=>({...p,[catKey]:[...current,addVal.trim()]}));
    setAddVal("");setAdding(null);
    showToast("Tag toegevoegd");
  };

  const removeTag=(catKey,tag)=>{
    const usedCount=trades.filter(t=>(t[catKey]||[]).includes(tag)).length;
    const msg=usedCount>0?`"${tag}" verwijderen? Wordt nog getoond op ${usedCount} bestaande trade${usedCount>1?"s":""}.`:`"${tag}" verwijderen?`;
    if(!confirm(msg))return;
    setTagConfig(p=>({...p,[catKey]:getTags(catKey).filter(t=>t!==tag)}));
    showToast(`Tag "${tag}" verwijderd`);
  };

  const startRename=(catKey,tag)=>{setRenaming({catKey,tag});setRenameVal(tag)};
  
  const doRename=()=>{
    if(!renaming||!renameVal.trim())return;
    const{catKey,tag}=renaming;
    if(renameVal.trim()===tag){setRenaming(null);return}
    if(getTags(catKey).includes(renameVal.trim())){showToast("Tag naam bestaat al","error");return}
    // Update tagConfig
    setTagConfig(p=>({...p,[catKey]:getTags(catKey).map(t=>t===tag?renameVal.trim():t)}));
    // Update all trades that use this tag (rename in-place)
    // This is handled by the parent via a callback - we pass the rename info up
    showToast(`"${tag}" hernoemd naar "${renameVal.trim()}". Bestaande trades worden automatisch bijgewerkt.`);
    setRenaming(null);
    // Return rename info for parent to process
    return{catKey,oldTag:tag,newTag:renameVal.trim()};
  };

  return(
    <div style={{animation:"fadeIn .3s ease",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"24px",border:"1px solid var(--glass-border)"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:"1.5rem"}}>Tag categorieën beheren</div>
      
      {TAG_CATEGORIES.map(cat=>{
        const c=COLORS[cat.color]||COLORS.blue;
        const tags=getTags(cat.key);
        const isAdding=adding===cat.key;

        const renderTag=(tag)=>{
          const isRenaming=renaming?.catKey===cat.key&&renaming?.tag===tag;
          const usedCount=trades.filter(t=>(t[cat.key]||[]).includes(tag)).length;
          const isEmo=cat.key==="emotionTags";
          const neg=isEmo&&isNegEmotion(tag);
          const tagBorder=isEmo?(neg?"rgba(220,122,122,0.28)":"rgba(50,196,149,0.28)"):`${c.border}40`;
          const tagBg=isEmo?(neg?"rgba(239,83,80,0.1)":"rgba(38,166,154,0.1)"):c.bg;
          const tagColor=isEmo?(neg?"#ef5350":CHART_COLORS.win):c.text;
          if(isRenaming)return(
            <form key={tag} onSubmit={e=>{e.preventDefault();doRename()}} style={{display:"flex",gap:"4px",alignItems:"center"}}>
              <input autoFocus value={renameVal} onChange={e=>setRenameVal(e.target.value)} style={{...iStyle,width:"140px",padding:"5px 10px",fontSize:"12px"}}/>
              <button type="submit" style={{padding:"5px 8px",borderRadius:"5px",border:`1px solid ${tagBorder}`,background:tagBg,color:tagColor,fontSize:"11px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>OK</button>
              <button type="button" onClick={()=>setRenaming(null)} style={{padding:"5px 8px",borderRadius:"5px",border:"none",background:"transparent",color:"var(--text4)",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>Annuleer</button>
            </form>
          );
          return(
            <div key={tag} style={{display:"flex",alignItems:"center",gap:"2px",padding:"4px 4px 4px 10px",borderRadius:"6px",border:`1px solid ${tagBorder}`,background:tagBg,fontSize:"12px",color:tagColor,fontWeight:500}}>
              <span style={{cursor:"pointer"}} onClick={()=>startRename(cat.key,tag)} title="Klik om te hernoemen">{tag}</span>
              <span style={{fontSize:"9px",color:"var(--text4)",marginLeft:"4px",fontFamily:"var(--mono)"}}>{usedCount>0?`${usedCount}x`:""}</span>
              <button onClick={()=>removeTag(cat.key,tag)} style={{background:"none",border:"none",color:tagColor,cursor:"pointer",fontSize:"12px",padding:"2px 4px",opacity:0.5}} title="Verwijder">✕</button>
            </div>
          );
        };

        if(cat.key==="emotionTags"){
          const negTags=tags.filter(t=>isNegEmotion(t));
          const posTags=tags.filter(t=>!isNegEmotion(t));
          const isAddingNeg=adding==="emo_neg";
          const isAddingPos=adding==="emo_pos";
          return(
            <div key={cat.key} style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"16px",border:"1px solid var(--border1)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
                <div style={{fontSize:"13px",fontWeight:600,color:c.text}}>Emoties</div>
                <span style={{fontSize:"11px",color:"var(--text4)",fontFamily:"var(--mono)"}}>{tags.length} tags</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px"}}>
                <div>
                  <div style={{fontSize:"10px",color:"var(--red)",fontWeight:600,marginBottom:"8px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCross size={14}/> Negatief</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"8px"}}>{negTags.map(renderTag)}</div>
                  {!isAddingNeg&&<button onClick={()=>{setAdding("emo_neg");setAddVal("")}} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"12px",border:"1px dashed rgba(220,122,122,0.28)",background:"transparent",color:"var(--red)",cursor:"pointer",fontFamily:"inherit"}}>+ Negatief</button>}
                  {isAddingNeg&&<form onSubmit={e=>{e.preventDefault();if(!addVal.trim())return;const cur=getTags("emotionTags");if(cur.includes(addVal.trim())){showToast("Tag bestaat al","error");return}setTagConfig(p=>({...p,emotionTags:[...cur,addVal.trim()]}));EMOTIONS_NEG.push(addVal.trim());setAddVal("");setAdding(null);showToast("Negatieve emotie toegevoegd")}} style={{display:"flex",gap:"6px",marginTop:"4px"}}>
                    <input autoFocus value={addVal} onChange={e=>setAddVal(e.target.value)} placeholder="Nieuwe negatieve emotie..." style={{...iStyle,width:"160px",padding:"6px 10px",fontSize:"12px"}}/>
                    <button type="submit" style={{padding:"6px 12px",borderRadius:"6px",border:"1px solid rgba(220,122,122,0.28)",background:"rgba(239,83,80,0.1)",color:"#ef5350",fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+</button>
                    <button type="button" onClick={()=>setAdding(null)} style={{padding:"6px 8px",borderRadius:"6px",border:"none",background:"transparent",color:"var(--text4)",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
                  </form>}
                </div>
                <div>
                  <div style={{fontSize:"10px",color:"var(--green)",fontWeight:600,marginBottom:"8px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCheck size={14}/> Positief</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"8px"}}>{posTags.map(renderTag)}</div>
                  {!isAddingPos&&<button onClick={()=>{setAdding("emo_pos");setAddVal("")}} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"12px",border:"1px dashed rgba(50,196,149,0.28)",background:"transparent",color:"var(--green)",cursor:"pointer",fontFamily:"inherit"}}>+ Positief</button>}
                  {isAddingPos&&<form onSubmit={e=>{e.preventDefault();if(!addVal.trim())return;const cur=getTags("emotionTags");if(cur.includes(addVal.trim())){showToast("Tag bestaat al","error");return}setTagConfig(p=>({...p,emotionTags:[...cur,addVal.trim()]}));setAddVal("");setAdding(null);showToast("Positieve emotie toegevoegd")}} style={{display:"flex",gap:"6px",marginTop:"4px"}}>
                    <input autoFocus value={addVal} onChange={e=>setAddVal(e.target.value)} placeholder="Nieuwe positieve emotie..." style={{...iStyle,width:"160px",padding:"6px 10px",fontSize:"12px"}}/>
                    <button type="submit" style={{padding:"6px 12px",borderRadius:"6px",border:"1px solid rgba(50,196,149,0.28)",background:"rgba(38,166,154,0.1)",color:CHART_COLORS.win,fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+</button>
                    <button type="button" onClick={()=>setAdding(null)} style={{padding:"6px 8px",borderRadius:"6px",border:"none",background:"transparent",color:"var(--text4)",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
                  </form>}
                </div>
              </div>
            </div>
          );
        }

        return(
          <div key={cat.key} style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"16px",border:"1px solid var(--border1)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <div style={{fontSize:"13px",fontWeight:600,color:c.text}}>{cat.label}</div>
              <span style={{fontSize:"11px",color:"var(--text4)",fontFamily:"var(--mono)"}}>{tags.length} tags</span>
            </div>
            
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:isAdding?"12px":"0"}}>
              {tags.map(renderTag)}
              {!isAdding&&<button onClick={()=>{setAdding(cat.key);setAddVal("")}} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"12px",border:"1px dashed var(--border5)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit"}}>+ Nieuwe tag</button>}
            </div>
            
            {isAdding&&<form onSubmit={e=>{e.preventDefault();addTag(cat.key)}} style={{display:"flex",gap:"6px",marginTop:"8px"}}>
              <input autoFocus value={addVal} onChange={e=>setAddVal(e.target.value)} placeholder={`Nieuwe ${cat.label.toLowerCase()} tag...`} style={{...iStyle,width:"200px",padding:"7px 10px",fontSize:"12px"}}/>
              <button type="submit" style={{padding:"7px 14px",borderRadius:"6px",border:`1px solid ${c.border}`,background:c.bg,color:c.text,fontSize:"12px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Toevoegen</button>
              <button type="button" onClick={()=>setAdding(null)} style={{padding:"7px 10px",borderRadius:"6px",border:"none",background:"transparent",color:"var(--text4)",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>Annuleer</button>
            </form>}
            
            {tags.length===0&&<div style={{fontSize:"12px",color:"var(--text4)",padding:"8px 0",fontStyle:"italic"}}>Geen tags in deze categorie. Voeg er een toe om te beginnen.</div>}
          </div>
        );
      })}
    </div>
  );
}

// ============ ACCOUNTS HUB (Import + Accounts + API in one) ============
function AccountsHub({accounts,setAccounts,config,setConfig,trades,setTrades,showToast,exportData,importData,fRef}){
  const[testing,setTesting]=useState(null);const[testResult,setTestResult]=useState({});
  const[deleteConfirm,setDeleteConfirm]=useState(null);
  const[actionAcct,setActionAcct]=useState(null);const[actionType,setActionType]=useState("deposit");
  const[actionAmt,setActionAmt]=useState("");const[actionNote,setActionNote]=useState("");
  const[editKeys,setEditKeys]=useState(null); // which exchange is being edited
  const[importing,setImporting]=useState(null);const[preview,setPreview]=useState(null);const[selected,setSelected]=useState(new Set());
  const[addMode,setAddMode]=useState(null);
  const[expandedCards,setExpandedCards]=useState(new Set());
  const toggleCard=(id)=>setExpandedCards(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n});
  const[prevSort,setPrevSort]=useState({key:"date",dir:"desc"});
  const[prevFilter,setPrevFilter]=useState({direction:"all",result:"all"});
  const[addStep,setAddStep]=useState(0);const[addExchange,setAddExchange]=useState("");
  const[addConnType,setAddConnType]=useState("api"); // "api"|"csv"
  const[newName,setNewName]=useState("");const[newBal,setNewBal]=useState("");
  const csvRef=useRef();const csvAcctRef=useRef(null);
  const[debugData,setDebugData]=useState(null);

  const updateExchange=(ex,field,val)=>{setConfig(p=>{const next={...p,exchanges:{...p.exchanges}};next.exchanges[ex]={...(next.exchanges[ex]||{}),[field]:val};return next})};
  const testConn=async(exKey)=>{
    setTesting(exKey);setTestResult(p=>({...p,[exKey]:null}));
    try{const ex=ExchangeAPI[exKey];const cfg=config.exchanges?.[exKey]||{};
      if(!cfg.apiKey||!cfg.apiSecret)throw new Error("Vul API key en secret in");
      if(ex.needsPassphrase&&!cfg.passphrase)throw new Error("Vul passphrase in");
      const result=ex.needsPassphrase?await ex.testConnection(cfg.apiKey,cfg.apiSecret,cfg.passphrase):await ex.testConnection(cfg.apiKey,cfg.apiSecret);
      setTestResult(p=>({...p,[exKey]:{ok:true,balance:result.balance}}));showToast(`${ex.name} verbonden!`);
    }catch(err){setTestResult(p=>({...p,[exKey]:{ok:false,error:err.message}}));showToast(`${err.message}`,"error")}
    setTesting(null);
  };
  const saveConfig=()=>{try{localStorage.setItem("tj_config",JSON.stringify(config));showToast("Opgeslagen")}catch{showToast("Fout","error")}};

  // Import logic (from old ImportPage)
  const importFromExchange=async(exKey)=>{
    setImporting(exKey);setPreview(null);
    try{const ex=ExchangeAPI[exKey];const cfg=config.exchanges?.[exKey]||{};
      if(!cfg.apiKey||!cfg.apiSecret)throw new Error("Configureer eerst je API keys");
      const thirtyDaysAgo=Date.now()-30*24*60*60*1000;
      const fetched=ex.needsPassphrase?await ex.fetchTrades(cfg.apiKey,cfg.apiSecret,cfg.passphrase,thirtyDaysAgo):await ex.fetchTrades(cfg.apiKey,cfg.apiSecret,thirtyDaysAgo);
      let openPositions=[];
      if(ex.fetchOpenPositions){try{openPositions=ex.needsPassphrase?await ex.fetchOpenPositions(cfg.apiKey,cfg.apiSecret,cfg.passphrase):await ex.fetchOpenPositions(cfg.apiKey,cfg.apiSecret)}catch{}}
      const closedIds=new Set(fetched.map(t=>t.positionId).filter(Boolean));
      setTrades(prev=>prev.map(t=>{
        if(t.source===exKey&&t.status==="open"&&t.positionId&&closedIds.has(t.positionId)){
          const cv=fetched.find(f=>f.positionId===t.positionId);
          if(cv){const merged={...cv,setupTags:t.setupTags,confirmationTags:t.confirmationTags,timeframeTags:t.timeframeTags,emotionTags:t.emotionTags,mistakeTags:t.mistakeTags,rating:t.rating,notes:t.notes,links:t.links,layers:t.layers,manualOverrides:t.manualOverrides||[]};(t.manualOverrides||[]).forEach(field=>{if(t[field])merged[field]=t[field]});return merged}
        }return t}));
      const allNew=[...fetched,...openPositions];const existingIds=new Set(trades.map(t=>t.id));
      const newTrades=allNew.filter(t=>!existingIds.has(t.id));
      if(newTrades.length===0){showToast("Geen nieuwe trades gevonden");setImporting(null);return}
      setPreview({exchange:exKey,trades:newTrades});setSelected(new Set(newTrades.map(t=>t.id)));
    }catch(err){showToast(`${err.message}`,"error")}
    setImporting(null);
  };
  const confirmImport=()=>{if(!preview)return;const toImport=preview.trades.filter(t=>selected.has(t.id));setTrades(p=>[...p,...toImport]);showToast(`${toImport.length} trades geïmporteerd`);setPreview(null)};

  // CSV handler
  const handleCSV=(e,forExchange)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const text=ev.target.result;const lines=text.split("\n").filter(l=>l.trim());
        if(lines.length<2)throw new Error("Leeg bestand");
        const headers=lines[0].split(",").map(h=>h.trim().replace(/"/g,""));
        const isKrakenLog=headers.includes("uid")&&headers.includes("realized pnl")&&headers.includes("trade price");
        if(isKrakenLog){
          const rows=[];for(let i=1;i<lines.length;i++){const vals=lines[i].split(",").map(v=>v.trim().replace(/"/g,""));const row={};headers.forEach((h,idx)=>row[h]=vals[idx]||"");rows.push(row)}

                <div style={{fontSize:"10px",fontFamily:"var(--mono)",color:"var(--text3)"}}>${fmt(c.balance)}</div>

              <button onClick={()=>{setActionAcct(a.id);setActionType("deposit")}} style={{fontSize:"10px",padding:"6px 12px",borderRadius:"var(--radius)",border:"1px solid rgba(50,196,149,0.28)",background:"transparent",color:"var(--green)",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>+ Storting</button>
              <button onClick={()=>{setActionAcct(a.id);setActionType("withdrawal")}} style={{fontSize:"10px",padding:"6px 12px",borderRadius:"var(--radius)",border:"1px solid rgba(220,122,122,0.28)",background:"transparent",color:"var(--red)",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>- Opname</button>
              <button onClick={()=>{setActionAcct(a.id);setActionType("correction")}} style={{fontSize:"10px",padding:"6px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border3)",background:"transparent",color:"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>Correctie</button>
              <button onClick={()=>{csvAcctRef.current=a.name;csvRef.current.click()}} style={{fontSize:"10px",padding:"6px 12px",borderRadius:"var(--radius)",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit"}}>📄 CSV</button>
              {deleteConfirm===c.key?<div style={{display:"flex",gap:"4px",alignItems:"center",marginLeft:"auto"}}>
                <span style={{fontSize:"10px",color:"var(--red)"}}>Verwijderen?</span>
                <button onClick={()=>removeAccount(c.key)} style={{fontSize:"10px",padding:"4px 8px",borderRadius:"var(--radius)",border:"1px solid var(--red)",background:"transparent",color:"var(--red)",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Ja</button>
                <button onClick={()=>setDeleteConfirm(null)} style={{fontSize:"10px",padding:"4px 8px",borderRadius:"var(--radius)",border:"1px solid var(--border3)",background:"transparent",color:"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>Nee</button>

                <button onClick={()=>setActionAcct(null)} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"12px"}}>✕</button>

                  <span style={{color:entry.type==="deposit"?"var(--green)":entry.type==="withdrawal"?"var(--red)":"var(--text3)"}}>${fmt(entry.amount)}</span>

        ))}

    {/* Import preview */}
    {preview&&(()=>{
      // Filter
      let filtered=preview.trades;
      if(prevFilter.direction!=="all")filtered=filtered.filter(t=>t.direction===prevFilter.direction);
      if(prevFilter.result==="win")filtered=filtered.filter(t=>parseFloat(t.pnl)>0);
      if(prevFilter.result==="loss")filtered=filtered.filter(t=>parseFloat(t.pnl)<0);
      // Sort
      const sorted=[...filtered].sort((a,b)=>{
        const d=prevSort.dir==="asc"?1:-1;
        if(prevSort.key==="date")return d*(`${a.date}T${a.time}`).localeCompare(`${b.date}T${b.time}`);

        if(prevSort.key==="direction")return d*(a.direction||"").localeCompare(b.direction||"");
        if(prevSort.key==="pnl")return d*((parseFloat(a.pnl)||0)-(parseFloat(b.pnl)||0));
        return 0;
      });
      const sortIcon=(k)=>prevSort.key===k?(prevSort.dir==="asc"?"↑":"↓"):"";
      const doSort=(k)=>setPrevSort(p=>({key:k,dir:p.key===k&&p.dir==="desc"?"asc":"desc"}));

        <span style={{width:"1px",height:"14px",background:"var(--border3)"}}/>
        {["all","win","loss"].map(v=><button key={v} onClick={()=>setPrevFilter(p=>({...p,result:v}))} style={{padding:"3px 10px",borderRadius:"var(--radius)",border:"none",fontSize:"10px",fontWeight:600,background:prevFilter.result===v?(v==="win"?"var(--green2)":v==="loss"?"var(--red2)":"var(--gold-dim)"):"transparent",color:prevFilter.result===v?(v==="win"?"var(--green)":v==="loss"?"var(--red)":"var(--gold)"):"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{v==="all"?"Alles":v==="win"?"Win":"Loss"}</button>)}
        {(prevFilter.direction!=="all"||prevFilter.result!=="all")&&<button onClick={()=>setPrevFilter({direction:"all",result:"all"})} style={{padding:"3px 8px",borderRadius:"var(--radius)",border:"none",background:"transparent",color:"var(--text5)",cursor:"pointer",fontFamily:"inherit",fontSize:"10px"}}>✕ Reset</button>}
      </div>
      {/* Column headers (sortable) */}
      <div style={{display:"grid",gridTemplateColumns:"22px 60px 100px 1fr auto",gap:"10px",alignItems:"center",padding:"4px 12px",marginBottom:"4px"}}>
        <span/>
        <button onClick={()=>doSort("direction")} style={{background:"none",border:"none",color:"var(--text4)",fontSize:"9px",cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:600,textAlign:"left"}}>Side {sortIcon("direction")}</button>
        <button onClick={()=>doSort("pair")} style={{background:"none",border:"none",color:"var(--text4)",fontSize:"9px",cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:600,textAlign:"left"}}>Pair {sortIcon("pair")}</button>
        <button onClick={()=>doSort("date")} style={{background:"none",border:"none",color:"var(--text4)",fontSize:"9px",cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:600,textAlign:"left"}}>Datum {sortIcon("date")}</button>
        <button onClick={()=>doSort("pnl")} style={{background:"none",border:"none",color:"var(--text4)",fontSize:"9px",cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:600,textAlign:"right"}}>PNL {sortIcon("pnl")}</button>

      <div style={{maxHeight:"300px",overflowY:"auto"}}>
        {sorted.length===0&&<div style={{padding:"20px",textAlign:"center",color:"var(--text4)",fontSize:"12px"}}>Geen trades met deze filters</div>}
        {sorted.map(t=>{const pnlN=parseFloat(t.pnl);const isW=!isNaN(pnlN)&&pnlN>0;const isL=!isNaN(pnlN)&&pnlN<0;return(
          <div key={t.id} onClick={()=>toggleSelect(t.id)} style={{display:"grid",gridTemplateColumns:"22px 60px 100px 1fr auto",gap:"10px",alignItems:"center",background:selected.has(t.id)?"rgba(41,98,255,0.06)":"transparent",borderRadius:"var(--radius)",padding:"8px 12px",marginBottom:"2px",border:`1px solid ${selected.has(t.id)?"rgba(41,98,255,0.2)":"var(--border1)"}`,cursor:"pointer"}}>
            <div style={{width:"14px",height:"14px",borderRadius:"3px",border:`1px solid ${selected.has(t.id)?"var(--blue2)":"var(--border3)"}`,background:selected.has(t.id)?"var(--blue2)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",color:"#fff"}}>{selected.has(t.id)?"✓":""}</div>
            <span style={{padding:"2px 6px",borderRadius:"3px",fontSize:"9px",fontWeight:700,background:t.direction==="long"?"var(--green2)":"var(--red2)",color:t.direction==="long"?"var(--green)":"var(--red)",textAlign:"center"}}>{t.direction.toUpperCase()}</span>
            <span style={{display:"flex",alignItems:"center",gap:"5px"}}><CryptoIcon pair={t.pair} size={18}/><span style={{fontWeight:600,fontSize:"12px"}}>{t.pair}</span></span>
            <span style={{fontSize:"10px",color:"var(--text4)",fontFamily:"var(--mono)"}}>{t.date} {t.time||""}</span>
            <span style={{fontFamily:"var(--mono)",fontWeight:600,fontSize:"12px",color:isW?"var(--green)":isL?"var(--red)":"var(--text3)",textAlign:"right"}}>{!isNaN(pnlN)?`${pnlN>=0?"+":""}$${fmt(pnlN)}`:<NA/>}</span>
          </div>
        )})}
      </div>
    </div>})()}

    {/* Instellingen */}
    <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"16px",marginBottom:"1rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:"10px"}}>Instellingen</div>
      <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
        <span style={{fontSize:"12px",color:"var(--text2)"}}>Standaard quote asset:</span>
        {["USDT","USDC","USD"].map(q=><button key={q} onClick={()=>setConfig(p=>({...p,defaultQuote:q}))} style={{padding:"5px 12px",borderRadius:"var(--radius)",border:"none",fontSize:"11px",fontWeight:600,background:(config.defaultQuote||"USDT")===q?"var(--gold-dim)":"transparent",color:(config.defaultQuote||"USDT")===q?"var(--gold)":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{q}</button>)}
      </div>
      <div style={{fontSize:"10px",color:"var(--text4)",marginTop:"6px"}}>Wordt gebruikt als default bij nieuwe handmatige trades. API/CSV import behoudt de originele pairing.</div>
      
      {/* Theme switcher */}
      <div style={{marginTop:"14px",paddingTop:"14px",borderTop:"1px solid var(--border2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
          <span style={{fontSize:"12px",color:"var(--text2)"}}>Thema:</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
          {[
            {id:"classic",label:"Classic",desc:"Solid dark. Clean en snel.",preview:"linear-gradient(135deg,#0c0d12,#161722,#1a1b28)"},
            {id:"morani",label:"Morani Signature",desc:"Mesh gradient, glasmorfisme, gouden accenten.",preview:"linear-gradient(135deg,#08090c,#1a150a,#0a1018)"}
          ].map(t=>(
            <button key={t.id} onClick={()=>setConfig(p=>({...p,theme:t.id}))} style={{padding:"12px",borderRadius:"var(--radius-lg)",border:`2px solid ${(config.theme||"classic")===t.id?"var(--gold)":"var(--border2)"}`,background:"transparent",cursor:"pointer",fontFamily:"inherit",textAlign:"left",transition:"all .15s"}}>
              <div style={{height:"32px",borderRadius:"6px",background:t.preview,marginBottom:"8px",border:"1px solid var(--border1)"}}/>
              <div style={{fontSize:"12px",fontWeight:700,color:(config.theme||"classic")===t.id?"var(--gold)":"var(--text)"}}>{t.label}</div>
              <div style={{fontSize:"10px",color:"var(--text4)",marginTop:"2px"}}>{t.desc}</div>
            </button>
          ))}
        </div>
      </div>
    </div>

    {/* Backup & Restore */}
    <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"16px",marginBottom:"1rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:"10px"}}>Backup & Restore</div>
      <div style={{fontSize:"12px",color:"var(--text4)",marginBottom:"12px",lineHeight:1.6}}>Je data (trades, tags, accounts, instellingen) wordt lokaal in je browser opgeslagen. Maak regelmatig een backup zodat je niks verliest bij het wissen van browserdata.</div>
      <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
        <button onClick={exportData} disabled={!trades.length} style={{padding:"8px 16px",borderRadius:"var(--radius)",border:"1px solid var(--gold-border)",background:"var(--gold-dim)",color:"var(--gold)",fontSize:"12px",fontWeight:600,cursor:trades.length?"pointer":"default",fontFamily:"inherit",opacity:trades.length?1:0.4}}>↓ Backup exporteren (.json)</button>
        <button onClick={()=>fRef.current.click()} style={{padding:"8px 16px",borderRadius:"var(--radius)",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",fontSize:"12px",cursor:"pointer",fontFamily:"inherit"}}>↑ Backup importeren</button>
        <input type="file" ref={fRef} accept=".json" onChange={importData} style={{display:"none"}}/>
      </div>
      <div style={{fontSize:"10px",color:"var(--text5)",marginTop:"8px"}}>Export bevat: {trades.length} trades, {Object.keys(config.exchanges||{}).filter(k=>(config.exchanges[k]||{}).apiKey).length} exchange configs, {(accounts||[]).length} handmatige accounts.</div>
    </div>

    <div style={{fontSize:"10px",color:"var(--text5)",marginTop:"1rem"}}>API keys worden lokaal opgeslagen. Ze verlaten nooit je computer.</div>
  </div>);
}

// ============ LAYOUT PREFERENCES ============
const DEFAULT_LAYOUT={
  dashboard:{pnl:true,winrate:true,pf:true,rr:true,avgWin:true,avgLoss:true,fees:false,rating:false,accountValue:true,equityChart:true,setupPerf:true,emotionPerf:true,sessionPerf:true,foutenPerf:true},
  review:{scorecard:true,equityCurve:true,pnlPerDay:true,whatWorked:true,donuts:true,distributions:true,highlights:true},
  analytics:{longShort:true,perPair:true,perDay:true,rrAnalysis:true,holdtime:true,heatmap:true,streaks:true,foutAnalyse:true,emotionImpact:true,holdtime2:true,rr2:true,sessionPerf:true,layerAnalysis:true,showTips:true}
};

function useLayoutPrefs(page){
  const[prefs,setPrefs]=useState(()=>{
    try{const d=localStorage.getItem("tj_layout_"+page);return d?{...DEFAULT_LAYOUT[page],...JSON.parse(d)}:{...DEFAULT_LAYOUT[page]}}catch{return{...DEFAULT_LAYOUT[page]}}
  });
  const toggle=(key)=>setPrefs(p=>{const next={...p,[key]:!p[key]};localStorage.setItem("tj_layout_"+page,JSON.stringify(next));return next});
  const reset=()=>{setPrefs({...DEFAULT_LAYOUT[page]});localStorage.removeItem("tj_layout_"+page)};
  return{prefs,toggle,reset};
}

function LayoutPanel({open,onClose,sections,prefs,toggle,reset}){
  if(!open)return null;
  return(<>
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:998}}/>
    <div style={{position:"fixed",top:0,right:0,bottom:0,width:"280px",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",border:"1px solid var(--glass-border)",borderRight:"none",zIndex:999,display:"flex",flexDirection:"column",animation:"slideRight .2s ease",boxShadow:"-4px 0 30px rgba(0,0,0,0.3)"}}>
      <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:"13px",fontWeight:700,color:"var(--text)"}}>Indeling aanpassen</div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"14px"}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
        {sections.map(group=>(
          <div key={group.label} style={{marginBottom:"16px"}}>

              <div key={item.key} onClick={()=>toggle(item.key)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--border1)",cursor:"pointer"}}>

                  <div style={{width:"14px",height:"14px",borderRadius:"50%",background:prefs[item.key]?"var(--green)":"var(--text4)",position:"absolute",top:"2px",left:prefs[item.key]?"16px":"2px",transition:"left .2s,background .2s"}}/>

      </div>
    </div>
  </>);
}

      const redGrad=ctx.createLinearGradient(0,0,0,220);redGrad.addColorStop(0,"rgba(220,122,122,0.03)");redGrad.addColorStop(1,"rgba(220,122,122,0.22)");

      datasets.push({label:"_neg",data:cumData,borderColor:"transparent",backgroundColor:redGrad,borderWidth:0,fill:{target:{value:0},above:"transparent",below:redGrad},tension:0.35,pointRadius:0,pointHoverRadius:0});
      datasets.push({label:"PNL",data:cumData,borderColor:"transparent",backgroundColor:"transparent",borderWidth:2,fill:false,tension:0.35,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:"#fff",pointHoverBorderWidth:2,
        segment:{borderColor:function(c2){const v0=c2.p0.parsed.y;const v1=c2.p1.parsed.y;if(v0>=0&&v1>=0)return CHART_COLORS.win;if(v0<0&&v1<0)return"#d46a6a";return v1>=0?CHART_COLORS.win:CHART_COLORS.loss}}});
    }
    chartRef.current=new Chart(ctx,{type:"line",data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(10,12,18,0.9)",borderColor:"rgba(54,58,69,0.9)",borderWidth:1,titleFont:{family:"'JetBrains Mono',monospace",size:11},bodyFont:{family:"'JetBrains Mono',monospace",size:11},titleColor:"#c0c5cd",bodyColor:"#f5f5f7",padding:10,cornerRadius:6,filter:function(item){return!item.dataset.label.startsWith("_")},callbacks:{label:function(c2){const v=c2.parsed.y;return` ${c2.dataset.label}: ${v>=0?"+":""}$${v.toLocaleString("nl-NL",{minimumFractionDigits:2,maximumFractionDigits:2})}`}}}},
      scales:{x:{grid:{color:"rgba(255,255,255,0.10)",drawBorder:false},ticks:{color:"#939aa5",font:{family:"'JetBrains Mono',monospace",size:9},maxTicksLimit:8,maxRotation:0},border:{display:false}},y:{grid:{color:"rgba(255,255,255,0.10)",drawBorder:false},ticks:{color:"#939aa5",font:{family:"'JetBrains Mono',monospace",size:9},callback:function(v){return"$"+v.toLocaleString("nl-NL",{minimumFractionDigits:0,maximumFractionDigits:0})}},border:{display:false}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy()};
  },[JSON.stringify(allDates),showPerEx,JSON.stringify(pgExchanges)]);
  return(<div style={{height:"220px",position:"relative"}}><canvas ref={canvasRef}/></div>);

// ============ DASHBOARD ============
function Dashboard({trades, config, accounts, onReport}){
  const[balances,setBalances]=useState(null);
  const[balLoading,setBalLoading]=useState(false);
  const{prefs:lp,toggle:lpToggle,reset:lpReset}=useLayoutPrefs("dashboard");
  const[lpOpen,setLpOpen]=useState(false);
  const LP_SECTIONS=[
    {label:"Stat cards",items:[{key:"pnl",label:"Netto PNL"},{key:"winrate",label:"Winrate"},{key:"pf",label:"Profit Factor"},{key:"rr",label:"R:R Verhouding"},{key:"avgWin",label:"Gem. Winst"},{key:"avgLoss",label:"Gem. Verlies"},{key:"fees",label:"Totaal Fees"},{key:"rating",label:"Gem. Rating"}]},
    {label:"Grafieken & secties",items:[{key:"accountValue",label:"Account Waarde (toon bedragen)"},{key:"equityChart",label:"Gerealiseerde Winst grafiek"},{key:"setupPerf",label:"Setup Performance"},{key:"emotionPerf",label:"Emotie Performance"},{key:"sessionPerf",label:"Performance per Sessie"},{key:"foutenPerf",label:"Top Fouten"}]}
  ];
  // Privacy mode: mask amounts when accountValue is off
  const priv=!lp.accountValue;
  const fmtP=(v)=>priv?"***,**":(typeof v==="number"?`$${fmt(v)}`:v);

  const fetchBalances=useCallback(async()=>{
    if(balLoading)return;
    setBalLoading(true);
    const results={};
    for(const[exKey,ex]of Object.entries(ExchangeAPI)){
      const cfg=config?.exchanges?.[exKey]||{};
      if(!cfg.apiKey||!cfg.apiSecret)continue;
      try{
        const r=ex.needsPassphrase
          ?await ex.testConnection(cfg.apiKey,cfg.apiSecret,cfg.passphrase)
          :await ex.testConnection(cfg.apiKey,cfg.apiSecret);
        if(r.success)results[exKey]=parseFloat(r.balance)||0;
      }catch{}
    }
    setBalances(Object.keys(results).length>0?results:null);
    setBalLoading(false);
  },[config]);

  useEffect(()=>{if(config?.exchanges)fetchBalances()},[]);

  if(!trades.length)return(<div style={{textAlign:"center",padding:"4rem 2rem",color:"var(--text3)"}}>
    <div style={{fontSize:"48px",marginBottom:"1rem",opacity:0.3}}>📊</div>
    <div style={{fontSize:"16px",fontWeight:500,marginBottom:"8px"}}>Nog geen trades</div>
    <div style={{fontSize:"13px"}}>Voeg je eerste trade toe of importeer via API.</div>
  </div>);

  const closed=trades.filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  const totalPnl=closed.reduce((s,t)=>s+parseFloat(t.pnl),0);
  const totalFees=closed.reduce((s,t)=>s+(parseFloat(t.fees)||0),0);
  const net=totalPnl; // PNL van exchanges is al na fees
  const wins=closed.filter(t=>parseFloat(t.pnl)>0);
  const losses=closed.filter(t=>parseFloat(t.pnl)<0);
  const wr=closed.length>0?(wins.length/closed.length)*100:0;
  const avgW=wins.length?wins.reduce((s,t)=>s+parseFloat(t.pnl),0)/wins.length:0;
  const avgL=losses.length?Math.abs(losses.reduce((s,t)=>s+parseFloat(t.pnl),0)/losses.length):0;
  const grossW=wins.reduce((s,t)=>s+parseFloat(t.pnl),0);
  const grossL=Math.abs(losses.reduce((s,t)=>s+parseFloat(t.pnl),0));
  const pf=grossL>0?grossW/grossL:wins.length>0?Infinity:0;
  const rr=avgL>0?(avgW/avgL):avgW>0?Infinity:0;
  const rated=trades.filter(t=>t.rating>0);
  const avgR=rated.length?rated.reduce((s,t)=>s+t.rating,0)/rated.length:0;
  const[pgExchanges,setPgExchanges]=useState(["all"]);
  const[pgPeriod,setPgPeriod]=useState("all");
  const[pgUnit,setPgUnit]=useState("usdt");

  const setupPerf={};closed.forEach(t=>(t.setupTags||[]).forEach(tag=>{if(!setupPerf[tag])setupPerf[tag]={w:0,l:0,pnl:0,n:0};setupPerf[tag].n++;setupPerf[tag].pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?setupPerf[tag].w++:setupPerf[tag].l++}));
  const emoPerf={};closed.forEach(t=>(t.emotionTags||[]).forEach(tag=>{if(!emoPerf[tag])emoPerf[tag]={w:0,l:0,pnl:0,n:0};emoPerf[tag].n++;emoPerf[tag].pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?emoPerf[tag].w++:emoPerf[tag].l++}));
  const mistakeC={};trades.forEach(t=>(t.mistakeTags||[]).forEach(tag=>{mistakeC[tag]=(mistakeC[tag]||0)+1}));
  const topMistakes=Object.entries(mistakeC).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const sourceCount={};trades.forEach(t=>{const s=t.source||"manual";sourceCount[s]=(sourceCount[s]||0)+1});

  const byDay={};closed.forEach(t=>{if(!byDay[t.date])byDay[t.date]=[];byDay[t.date].push(t)});
  const dailyPnl=Object.entries(byDay).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,ts])=>({date:d,pnl:ts.reduce((s,t)=>s+parseFloat(t.pnl),0),n:ts.length}));
  let cum=0;const eq=dailyPnl.map(d=>{cum+=d.pnl;return{...d,cum}});
  const maxC=Math.max(...eq.map(d=>Math.abs(d.cum)),1);

  return(<div style={{animation:"fadeIn .3s ease"}}>
    {/* Portfolio waarde header */}
    {(()=>{
      const exColors2={"mexc":"#00b897","blofin":"#6366f1","kraken":"#7b61ff"};
      const manualBal=(accounts||[]).reduce((s,a)=>s+a.balance,0);
      const totalBal=balances?Object.values(balances).reduce((s,v)=>s+v,0)+manualBal:((accounts||[]).length>0?manualBal:null);
      return(<div style={{background:"linear-gradient(135deg, rgba(37,99,235,0.08), rgba(38,166,154,0.06))",borderRadius:"var(--radius-lg)",padding:"20px 24px",marginBottom:"1.5rem",border:"1px solid rgba(37,99,235,0.12)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:"10px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600,marginBottom:"6px",display:"flex",alignItems:"center",gap:"8px"}}>Account waarde (live) <button onClick={()=>lpToggle("accountValue")} style={{background:"none",border:"none",cursor:"pointer",fontSize:"13px",color:"var(--text4)",padding:"0",lineHeight:1,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="var(--text2)"} onMouseLeave={e=>e.currentTarget.style.color="var(--text4)"} title={priv?"Toon bedragen":"Verberg bedragen"}>{priv?"👁‍🗨":"👁"}</button></div>
            {totalBal!==null?
              <div style={{fontSize:"32px",fontWeight:700,fontFamily:"var(--mono)",color:"var(--text)",letterSpacing:"-0.03em"}}>{priv?"$***,**":`$${fmt(totalBal)}`}</div>
              :<div style={{fontSize:"20px",fontWeight:600,color:"var(--text4)"}}>{balLoading?<span style={{display:"inline-flex",alignItems:"center",gap:"8px"}}><span className="spinner"/>Ophalen...</span>:"Voeg een account toe"}</div>
            }
            <div style={{fontSize:"10px",color:"var(--text4)",marginTop:"4px"}}>Gerealiseerde winst: <span style={{color:priv?"var(--text4)":net>=0?"var(--green)":"var(--red)",fontWeight:600}}>{priv?"***,**":`${net>=0?"+":"−"}$${fmt(Math.abs(net))}`}</span> · {closed.length} trades</div>
          </div>
          <div style={{textAlign:"right"}}>
            {balances&&Object.entries(balances).map(([ex,bal])=>(
              <div key={ex} style={{display:"flex",alignItems:"center",gap:"8px",justifyContent:"flex-end",marginBottom:"4px"}}>
                <ExchangeIcon name={ex} size={16}/>
                <span style={{fontSize:"11px",color:"var(--text3)"}}>{exName(ex)}</span>
                <span style={{fontSize:"13px",fontFamily:"var(--mono)",fontWeight:600,color:"var(--text)"}}>{priv?"$***,**":`$${fmt(bal)}`}</span>
              </div>
            ))}
            {(accounts||[]).map(a=>(
              <div key={a.id} style={{display:"flex",alignItems:"center",gap:"8px",justifyContent:"flex-end",marginBottom:"4px"}}>
                <span style={{fontSize:"12px"}}>✏️</span>
                <span style={{fontSize:"11px",color:"var(--text3)"}}>{a.name}</span>
                <span style={{fontSize:"13px",fontFamily:"var(--mono)",fontWeight:600,color:"var(--text)"}}>{priv?"$***,**":`$${fmt(a.balance)}`}</span>
              </div>
            ))}
            {balances&&<button onClick={fetchBalances} disabled={balLoading} style={{marginTop:"6px",fontSize:"9px",padding:"3px 8px",borderRadius:"4px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text4)",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"4px",marginLeft:"auto"}}>{balLoading?<span className="spinner" style={{width:"10px",height:"10px"}}/>:"⟳"} Ververs</button>}
          </div>
        </div>
      </div>);
    })()}

    {onReport&&closed.length>0&&<div style={{display:"flex",justifyContent:"flex-end",marginBottom:"12px",gap:"8px"}}>
      <button onClick={onReport} style={{padding:"6px 14px",borderRadius:"var(--radius)",border:"1px solid var(--gold-border)",background:"var(--gold-dim)",color:"var(--gold)",fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"6px"}}>📄 Genereer rapport</button>
      <LayoutGear onClick={()=>setLpOpen(true)}/>
    </div>}
    <LayoutPanel open={lpOpen} onClose={()=>setLpOpen(false)} sections={LP_SECTIONS} prefs={lp} toggle={lpToggle} reset={lpReset}/>

    {(()=>{const cards=[[lp.pnl,<Stat key="pnl" label="Netto PNL" value={`$${fmt(net)}`} color={net>=0?"var(--green)":"var(--red)"} sub={`${closed.length} trades`}/>],[lp.winrate,<Stat key="wr" label="Winrate" value={pct(wr)} color={wr>=50?"var(--green)":"var(--red)"} sub={`${wins.length}W / ${losses.length}L`}/>],[lp.pf,<Stat key="pf" label="Profit factor" value={pf===Infinity?"∞":pf.toFixed(2)} color={pf>=1.5?"var(--green)":pf>=1?"var(--amber)":"var(--red)"}/>],[lp.rr,<Stat key="rr" label="R:R verhouding" value={rr===Infinity?"∞":rr.toFixed(2)} color={rr>=1.5?"var(--green)":rr>=1?"var(--amber)":"var(--red)"} sub={`${fmt(avgW)} / ${fmt(avgL)}`}/>],[lp.avgWin,<Stat key="aw" label="Gem. winst" value={`$${fmt(avgW)}`} color="var(--green)"/>],[lp.avgLoss,<Stat key="al" label="Gem. verlies" value={`-$${fmt(avgL)}`} color="var(--red)"/>],[lp.fees,<Stat key="fees" label="Totaal fees" value={`$${fmt(totalFees)}`} color="var(--amber)"/>],[lp.rating,<Stat key="rat" label="Gem. rating" value={avgR>0?avgR.toFixed(1)+" ★":"--"} color="var(--amber)"/>]].filter(c=>c[0]);
    return cards.length>0?<div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(cards.length,4)},minmax(0,1fr))`,gap:"12px",marginBottom:"1.5rem"}}>{cards.map(c=>c[1])}</div>:null})()}

    {lp.equityChart&&eq.length>1&&(()=>{
      // Portfolio growth component with exchange filter, time period, USDT/BTC toggle
      const btcPrice=(() => {const btcTrades=closed.filter(t=>(t.pair||"").includes("BTC"));if(!btcTrades.length)return 85000;const last=btcTrades[btcTrades.length-1];return parseFloat(last.exit||last.entry||"85000")||85000})();
      const toUnit=(v)=>pgUnit==="btc"?v/btcPrice:v;

      const unitFmt=(v)=>pgUnit==="btc"?v.toFixed(6):fmt(v);

      const toggleEx=(s)=>{
        if(s==="all")return setPgExchanges(["all"]);
        setPgExchanges(p=>{const next=p.filter(x=>x!=="all");const has=next.includes(s);const updated=has?next.filter(x=>x!==s):[...next,s];return updated.length===0?["all"]:updated});
      };

      // Time period filter
      const now=new Date();
      const periodStart=pgPeriod==="1w"?new Date(now-7*864e5):pgPeriod==="1m"?new Date(now-30*864e5):pgPeriod==="3m"?new Date(now-90*864e5):pgPeriod==="mtd"?new Date(now.getFullYear(),now.getMonth(),1):pgPeriod==="ytd"?new Date(now.getFullYear(),0,1):null;
      const periodTrades=periodStart?closed.filter(t=>new Date(t.date)>=periodStart):closed;
      const filteredByEx=pgExchanges.includes("all")?periodTrades:periodTrades.filter(t=>pgExchanges.includes(t.source||"manual"));

      // Build per-exchange cumulative data
      const exColors={"mexc":"#00b897","blofin":"#6366f1","kraken":"#7b61ff","manual":"#5B9CF6","csv":"#9ca3af"};
      const showPerEx=!pgExchanges.includes("all")&&pgExchanges.length>1;
      
      // All dates sorted
      const allDates=[...new Set(filteredByEx.map(t=>t.date))].sort();

      // Per-exchange lines
      const exLines={};
      if(showPerEx){pgExchanges.forEach(ex=>{let c2=0;exLines[ex]=allDates.map(d=>{const dp=periodTrades.filter(t=>t.date===d&&(t.source||"manual")===ex).reduce((s,t)=>s+parseFloat(t.pnl),0);c2+=dp;return{date:d,cum:c2}})});}

            <div style={{fontSize:"11px",color:"var(--text4)",fontFamily:"var(--mono)",marginTop:"2px"}}>{filteredByEx.length} trades{pgPeriod!=="all"?` · ${pgPeriod.toUpperCase()}`:""}</div>

            <button onClick={()=>toggleEx("all")} style={chipStyle(pgExchanges.includes("all"))}>Alle</button>

            ))}

        {/* Chart.js Canvas */}
