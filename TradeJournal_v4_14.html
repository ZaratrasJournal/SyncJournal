}

// ============ TP TIMELINE ============
function TPTimeline({trade, config}) {
  const [fills, setFills] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [expanded, setExpanded] = useState(false);

  const source = trade.source || "manual";
  const isSupported = ["mexc","blofin","kraken"].includes(source);
  if (!isSupported) return null;

  const exchangeName = {mexc:"MEXC",blofin:"Blofin",kraken:"Kraken"}[source]||source;

  // Time window
  const openTs = trade.openTime ? parseInt(trade.openTime) : 0;
  const closeTs = trade.closeTime ? parseInt(trade.closeTime) : 0;
  const idParts = (trade.id || "").split("_");
  const idCloseRaw = idParts.length >= 3 ? parseInt(idParts[idParts.length - 1]) : 0;
  const idCloseTs = idCloseRaw > 1577836800000 ? idCloseRaw : 0;
  const effectiveCloseTs = closeTs || idCloseTs || 0;
  const dateFallback = trade.date ? new Date(trade.date + "T" + (trade.time || "00:00")).getTime() : 0;
  const startTime = openTs > 0 ? openTs - 60000 : dateFallback > 0 ? dateFallback - 60000 : Date.now() - 7*86400000;
  const endTime = effectiveCloseTs > 0 ? effectiveCloseTs + 60000 : Date.now() + 60000;

  const fetchFillsData = async () => {
    if (loading) return;
    setLoading(true);
    setError(null);
    try {
      const cfg = config.exchanges?.[source] || {};
      if (!cfg.apiKey || !cfg.apiSecret) throw new Error(`${exchangeName} API keys niet geconfigureerd`);
      const symbol = (trade.pair || "BTC/USDT").replace("/", "_");
      
      let rawFills = [];
      
      if (source === "mexc") {
        const result = await ExchangeAPI.mexc.fetchFills(cfg.apiKey, cfg.apiSecret, symbol, "", startTime, endTime);
        rawFills = result.fills || [];
      } else if (source === "blofin") {
        const result = await ExchangeAPI.blofin.fetchFills(cfg.apiKey, cfg.apiSecret, cfg.passphrase, symbol, startTime, endTime);
        rawFills = result.fills || [];
      } else if (source === "kraken") {
        const result = await ExchangeAPI.kraken.fetchFills(cfg.apiKey, cfg.apiSecret, symbol, startTime, endTime);
        rawFills = result.fills || [];
      }
      
      if (!rawFills.length) throw new Error(`Geen fills gevonden voor ${symbol} via ${exchangeName}`);
      
      // Time filter for closed trades
      if (openTs > 0 && effectiveCloseTs > 0) {
        rawFills = rawFills.filter(f => {
          const ft = parseInt(f.timestamp || f.createTime || f.ts || 0) || (f.fillTime ? new Date(f.fillTime).getTime() : 0);
          return ft >= (startTime) && ft <= (endTime);
        });
      }
      
      if (!rawFills.length) throw new Error("Fills opgehaald maar geen match in tijdvenster van deze trade");
      
      // Parse fills — normalize across exchanges
      const entries = [];
      const exits = [];
      
      rawFills.forEach(f => {
        let item;
        
        if (source === "mexc") {
          const side = parseInt(f.side); // 1=open long, 2=close short, 3=open short, 4=close long
          item = {
            id: f.id || f.orderId,
            price: parseFloat(f.price || 0),
            vol: parseFloat(f.vol || 0),
            fee: parseFloat(f.fee || 0),
            profit: parseFloat(f.profit || 0),
            ts: parseInt(f.createTime || f.timestamp || 0),
            side: side,
            taker: parseInt(f.takerMaker) === 1,
          };
          if (side === 1 || side === 3) entries.push(item);
          else exits.push(item);
        }
        else if (source === "blofin") {
          // Blofin: side=buy/sell, positionSide=long/short/net
          const side = (f.side || "").toLowerCase();
          const posSide = (f.positionSide || "net").toLowerCase();
          const isOpen = (side === "buy" && posSide === "long") || (side === "sell" && posSide === "short") || (posSide === "net" && side === "buy" && trade.direction === "long") || (posSide === "net" && side === "sell" && trade.direction === "short");
          item = {
            id: f.tradeId || f.orderId,
            price: parseFloat(f.fillPrice || f.price || 0),
            vol: parseFloat(f.fillSize || f.size || 0),
            fee: Math.abs(parseFloat(f.fee || 0)),
            profit: parseFloat(f.pnl || 0),
            ts: parseInt(f.ts || f.fillTime || 0),
            taker: (f.execType || "").toLowerCase() === "taker",
          };
          if (isOpen) entries.push(item);
          else exits.push(item);
        }
        else if (source === "kraken") {
          // Kraken: side=buy/sell, fillTime=ISO string
          const side = (f.side || "").toLowerCase();
          const isOpen = (side === "buy" && trade.direction === "long") || (side === "sell" && trade.direction === "short");
          item = {
            id: f.fill_id || f.fillId,
            price: parseFloat(f.price || 0),
            vol: parseFloat(f.size || 0),
            fee: Math.abs(parseFloat(f.fee || 0)),
            profit: 0, // Kraken doesn't give per-fill PNL
            ts: f.fillTime ? new Date(f.fillTime).getTime() : 0,
            taker: f.fillType === "taker",
          };
          if (isOpen) entries.push(item);
          else exits.push(item);
        }
      });

      entries.sort((a, b) => a.ts - b.ts);
      exits.sort((a, b) => a.ts - b.ts);

      let totalEntryVol = entries.reduce((s, e) => s + e.vol, 0);
      let avgEntry = totalEntryVol > 0 ? entries.reduce((s, e) => s + e.price * e.vol, 0) / totalEntryVol : 0;
      
      // For Kraken exits: compute PNL from avg entry
      if (source === "kraken" && avgEntry > 0) {
        const isLong = trade.direction === "long";
        exits.forEach(ex => {
          ex.profit = isLong ? ex.vol * (ex.price - avgEntry) : ex.vol * (avgEntry - ex.price);
        });
      }

      let totalExitVol = exits.reduce((s, e) => s + e.vol, 0);
      let cumVol = 0;
      const tpSteps = exits.map((ex, i) => {
        cumVol += ex.vol;
        const pctClosed = totalEntryVol > 0 ? (cumVol / totalEntryVol) * 100 : 0;
        return { ...ex, cumVol, pctClosed, stepNum: i + 1 };
      });

      setFills({ entries, exits: tpSteps, avgEntry, totalEntryVol, totalExitVol, totalFills: rawFills.length });
      setExpanded(true);
    } catch (err) {
      setError(err.message);
    }
    setLoading(false);
  };

  const fmtPrice = (p) => p >= 1 ? fmt(p) : p.toPrecision(6);
  // Convert MEXC contract vol to asset amount
  // Common contractSizes: BTC=0.0001, ETH=0.01, SOL=1, most alts=1 or 10
  const asset = (trade.pair || "BTC/USDT").split("/")[0] || "BTC";
  const knownCS = {BTC:0.0001,ETH:0.01,SOL:1,DOGE:100,XRP:10,ADA:100,DOT:1,AVAX:1,MATIC:100,LINK:1,UNI:1,ATOM:1,FIL:1,APT:1,ARB:10,OP:10,SUI:10,PEPE:100000,WIF:10,BONK:1000000,SHIB:100000};
  const contractSize = knownCS[asset] || 1;
  const fmtVol = (vol) => {
    const assetAmt = vol * contractSize;
    return `${parseFloat(assetAmt.toFixed(8))} ${asset}`;
  };
  const fmtTime = (ms) => {
    if (!ms) return "--";
    const d = new Date(ms);
    return d.toLocaleDateString("nl-NL", {day:"numeric",month:"short"}) + " " + d.toTimeString().slice(0, 5);
  };
  const duration = (ms1, ms2) => {
    if (!ms1 || !ms2) return "";
    const diff = Math.abs(ms2 - ms1);
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}m`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}u ${mins % 60}m`;
    const days = Math.floor(hrs / 24);
    return `${days}d ${hrs % 24}u`;
  };

  const isLong = trade.direction === "long";
  const dirColor = isLong ? "var(--green)" : "var(--red)";

  return (
    <div style={{marginBottom:"1rem"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600}}>TP Tijdlijn</div>
        {!fills && (
          <button onClick={fetchFillsData} disabled={loading} style={{fontSize:"11px",padding:"5px 14px",borderRadius:"6px",border:"1px solid rgba(0,184,151,0.3)",background:"rgba(0,184,151,0.08)",color:"#00b897",cursor:"pointer",fontFamily:"inherit",fontWeight:600,display:"flex",alignItems:"center",gap:"6px"}}>
            {loading ? <><span className="spinner" style={{width:"12px",height:"12px",borderWidth:"1.5px"}}/> Fills ophalen...</> : <><span style={{fontSize:"13px"}}>⟳</span> Fills ophalen ({exchangeName})</>}
          </button>
        )}
        {fills && (
          <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
            <span style={{fontSize:"10px",color:"var(--text4)",fontFamily:"var(--mono)"}}>{fills.totalFills} fills</span>
            <button onClick={()=>setExpanded(p=>!p)} style={{fontSize:"10px",padding:"3px 8px",borderRadius:"4px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit"}}>{expanded ? "Inklappen" : "Uitklappen"}</button>
            <button onClick={()=>{setFills(null);setExpanded(false);setError(null)}} style={{fontSize:"10px",padding:"3px 8px",borderRadius:"4px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>Reset</button>
          </div>
        )}
      </div>

      {error && <div style={{fontSize:"12px",color:"var(--red)",padding:"8px 12px",background:"rgba(239,83,80,0.08)",borderRadius:"6px",border:"1px solid rgba(220,122,122,0.14)",marginBottom:"8px"}}>{error}</div>}

      {fills && expanded && (
        <div style={{background:"rgba(42,46,57,0.3)",borderRadius:"10px",border:"1px solid var(--border2)",padding:"16px",animation:"fadeIn .3s ease"}}>
          {/* Summary row */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"10px",marginBottom:"16px"}}>
            <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"6px",padding:"10px 12px"}}>
              <div style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",fontWeight:600,marginBottom:"4px"}}>Gem. Entry</div>
              <div style={{fontSize:"14px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--text)"}}>${fmtPrice(fills.avgEntry)}</div>
              <div style={{fontSize:"9px",color:"var(--text4)",marginTop:"2px"}}>{fills.entries.length} fill{fills.entries.length !== 1 ? "s" : ""}</div>
            </div>
            <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"6px",padding:"10px 12px"}}>
              <div style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",fontWeight:600,marginBottom:"4px"}}>TP Steps</div>
              <div style={{fontSize:"14px",fontFamily:"var(--mono)",fontWeight:700,color:dirColor}}>{fills.exits.length}</div>
              <div style={{fontSize:"9px",color:"var(--text4)",marginTop:"2px"}}>{fills.exits.length === 1 ? "Full close" : "Partials"}</div>
            </div>
            <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"6px",padding:"10px 12px"}}>
              <div style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",fontWeight:600,marginBottom:"4px"}}>Totaal Vol</div>
              <div style={{fontSize:"14px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--text)"}}>{fmtVol(fills.totalEntryVol)}</div>
              <div style={{fontSize:"9px",color:"var(--text4)",marginTop:"2px"}}>{asset}</div>
            </div>
            <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"6px",padding:"10px 12px"}}>
              <div style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase",fontWeight:600,marginBottom:"4px"}}>Duur</div>
              <div style={{fontSize:"14px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--text)"}}>
                {fills.entries.length > 0 && fills.exits.length > 0 ? duration(fills.entries[0].ts, fills.exits[fills.exits.length - 1].ts) : "--"}
              </div>
              <div style={{fontSize:"9px",color:"var(--text4)",marginTop:"2px"}}>entry → close</div>
            </div>
          </div>

          {/* Visual timeline */}
          <div style={{position:"relative",paddingLeft:"28px",marginBottom:"4px"}}>
            {/* Vertical line */}
            <div style={{position:"absolute",left:"11px",top:"8px",bottom:"8px",width:"2px",background:"linear-gradient(to bottom, var(--blue2), " + dirColor + ")",borderRadius:"1px",opacity:0.4}}/>

            {/* Entry node(s) */}
            {fills.entries.map((e, i) => (
              <div key={"e"+i} style={{position:"relative",marginBottom:"8px",display:"flex",alignItems:"flex-start",gap:"12px"}}>
                <div style={{position:"absolute",left:"-22px",top:"4px",width:"10px",height:"10px",borderRadius:"50%",background:"var(--blue2)",border:"2px solid var(--bg)",boxShadow:"0 0 0 2px var(--blue2)",zIndex:1}}/>
                <div style={{flex:1,background:"rgba(37,99,235,0.06)",border:"1px solid rgba(37,99,235,0.15)",borderRadius:"8px",padding:"10px 14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                      <span style={{fontSize:"10px",fontWeight:700,color:"var(--blue)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Entry {fills.entries.length > 1 ? `#${i+1}` : ""}</span>
                      <span style={{fontSize:"11px",fontFamily:"var(--mono)",fontWeight:600,color:"var(--text)"}}>${fmtPrice(e.price)}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                      <span style={{fontSize:"10px",color:"var(--text4)",fontFamily:"var(--mono)"}}>{fmtTime(e.ts)}</span>
                      <span style={{fontSize:"9px",padding:"2px 6px",borderRadius:"3px",background:"rgba(37,99,235,0.1)",color:"var(--blue)",fontWeight:600}}>{fmtVol(e.vol)}</span>
                    </div>
                  </div>
                  {e.fee > 0 && <div style={{fontSize:"9px",color:"var(--text4)",marginTop:"4px",fontFamily:"var(--mono)"}}>Fee: ${e.fee.toFixed(4)}</div>}
                </div>
              </div>
            ))}

            {/* Exit / TP nodes */}
            {fills.exits.map((ex, i) => {
              const pnlColor = ex.profit >= 0 ? "var(--green)" : "var(--red)";
              const pnlBg = ex.profit >= 0 ? "rgba(38,166,154,0.06)" : "rgba(239,83,80,0.06)";
              const pnlBorder = ex.profit >= 0 ? "rgba(50,196,149,0.14)" : "rgba(220,122,122,0.14)";
              const nodeColor = ex.profit >= 0 ? "var(--green)" : "var(--red)";
              const isLast = i === fills.exits.length - 1;
              const pctMove = fills.avgEntry > 0 ? ((ex.price - fills.avgEntry) / fills.avgEntry * 100) * (isLong ? 1 : -1) : 0;
              const timeSinceEntry = fills.entries.length > 0 ? duration(fills.entries[0].ts, ex.ts) : "";

              return (
                <div key={"x"+i} style={{position:"relative",marginBottom:"8px",display:"flex",alignItems:"flex-start",gap:"12px"}}>
                  <div style={{position:"absolute",left:"-22px",top:"4px",width:"10px",height:"10px",borderRadius:isLast?"50%":"3px",background:nodeColor,border:"2px solid var(--bg)",boxShadow:`0 0 0 2px ${nodeColor}`,zIndex:1,transform:isLast?"none":"rotate(45deg)"}}/>
                  <div style={{flex:1,background:pnlBg,border:`1px solid ${pnlBorder}`,borderRadius:"8px",padding:"10px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                        <span style={{fontSize:"10px",fontWeight:700,color:pnlColor,textTransform:"uppercase",letterSpacing:"0.05em"}}>{isLast && fills.exits.length > 1 ? "Final Close" : fills.exits.length === 1 ? "Close" : `TP ${ex.stepNum}`}</span>
                        <span style={{fontSize:"11px",fontFamily:"var(--mono)",fontWeight:600,color:"var(--text)"}}>${fmtPrice(ex.price)}</span>
                        <span style={{fontSize:"10px",fontFamily:"var(--mono)",color:pctMove >= 0 ? "var(--green)" : "var(--red)",fontWeight:600}}>{pctMove >= 0 ? "+" : ""}{pctMove.toFixed(2)}%</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                        <span style={{fontSize:"10px",color:"var(--text4)",fontFamily:"var(--mono)"}}>{fmtTime(ex.ts)}</span>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:"12px",marginTop:"6px",alignItems:"center",flexWrap:"wrap"}}>
                      <span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"3px",background:`${pnlColor}15`,color:pnlColor,fontWeight:600,fontFamily:"var(--mono)"}}>{ex.profit >= 0 ? "+" : ""}${fmt(ex.profit)}</span>
                      <span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"3px",background:"rgba(255,255,255,0.10)",color:"var(--text3)",fontWeight:600,fontFamily:"var(--mono)"}}>{fmtVol(ex.vol)}</span>
                      <span style={{fontSize:"10px",padding:"2px 6px",borderRadius:"3px",background:"rgba(255,255,255,0.10)",color:"var(--text3)",fontWeight:600,fontFamily:"var(--mono)"}}>{ex.pctClosed.toFixed(0)}% gesloten</span>
                      {timeSinceEntry && <span style={{fontSize:"9px",color:"var(--text4)",fontFamily:"var(--mono)"}}>+{timeSinceEntry}</span>}
                    </div>
                    {ex.fee > 0 && <div style={{fontSize:"9px",color:"var(--text4)",marginTop:"4px",fontFamily:"var(--mono)"}}>Fee: ${ex.fee.toFixed(4)}</div>}

                    {/* Progress bar showing % closed */}
                    <div style={{marginTop:"6px",height:"3px",background:"rgba(42,46,57,0.7)",borderRadius:"2px",overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(ex.pctClosed, 100)}%`,background:pnlColor,borderRadius:"2px",transition:"width .3s ease"}}/>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Total PNL from fills */}
          {fills.exits.length > 0 && (() => {
            const totalProfit = fills.exits.reduce((s, e) => s + e.profit, 0);
            const totalFees = [...fills.entries, ...fills.exits].reduce((s, e) => s + e.fee, 0);
            const net = totalProfit - totalFees;
            return (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"rgba(255,255,255,0.10)",borderRadius:"8px",marginTop:"8px",border:"1px solid var(--border1)"}}>
                <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Fills totaal</span>
                <div style={{display:"flex",gap:"16px",alignItems:"center"}}>
                  <span style={{fontSize:"10px",color:"var(--text4)",fontFamily:"var(--mono)"}}>Fees: ${fmt(totalFees)}</span>
                  <span style={{fontSize:"13px",fontFamily:"var(--mono)",fontWeight:700,color:net >= 0 ? "var(--green)" : "var(--red)"}}>{net >= 0 ? "+" : ""}${fmt(net)}</span>
                </div>
              </div>
            );
          })()}
        </div>
      )}
    </div>
  );
}

// ============ TRADE FORM ============
function TradeForm({trade,setTrade,onSave,onCancel,tagConfig,config,accounts}){
  const toggle=(f,tag)=>setTrade(p=>({...p,[f]:p[f].includes(tag)?p[f].filter(t=>t!==tag):[...p[f],tag]}));
  const fRef=useRef();
  const handleSS=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setTrade(p=>({...p,screenshot:ev.target.result}));r.readAsDataURL(f)};
  const gt=(k)=>tagConfig[k]||DEFAULT_TAGS[k]||[];
  const[sizeInputMode,setSizeInputMode]=useState(()=>localStorage.getItem("tj_sizeInputMode")||"usdt");

  // Build source options: manual + connected exchanges + manual accounts
  const sourceOptions=[{id:"manual",label:"✏️ Handmatig",color:"var(--text3)"}];
  Object.entries(ExchangeAPI).forEach(([key,ex])=>{
    if(config?.exchanges?.[key]?.apiKey)sourceOptions.push({id:key,label:ex.name,color:ex.color});
  });
  (accounts||[]).forEach(a=>{
    if(!sourceOptions.find(s=>s.id===a.name))sourceOptions.push({id:a.name,label:"✏️ "+a.name,color:"var(--text3)"});
  });

  return(<div style={{animation:"fadeIn .3s ease",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"24px",border:"1px solid var(--glass-border)"}}>
    {/* Exchange/account selector */}
    <div style={{marginBottom:"1rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>ACCOUNT / EXCHANGE</div>
      <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
        {sourceOptions.map(opt=>{
          const active=(trade.source||"manual")===opt.id;
          return(<button key={opt.id} onClick={()=>setTrade(p=>({...p,source:opt.id}))} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"11px",fontWeight:600,border:`1px solid ${active?opt.color||"var(--blue2)":"var(--border3)"}`,background:active?`${opt.color||"var(--blue2)"}15`:"transparent",color:active?opt.color||"var(--blue)":"var(--text4)",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"5px"}}>
            {!opt.id.startsWith("✏")&&opt.id!=="manual"&&<ExchangeIcon name={opt.id} size={14}/>}
            {opt.label}
          </button>);
        })}
      </div>
    </div>
    
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"1rem"}}>
      <div><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>DATUM</div><input type="date" value={trade.date} onChange={e=>setTrade(p=>({...p,date:e.target.value}))} style={iStyle}/></div>
      <div><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>TIJD</div><input type="time" value={trade.time} onChange={e=>setTrade(p=>({...p,time:e.target.value}))} style={iStyle}/></div>
      <div><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>PAIR</div>
        <div style={{display:"flex",gap:0}}>
          <input type="text" value={(trade.pair||"").split("/")[0]||""} onChange={e=>{const base=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"");const quote=(trade.pair||"").split("/")[1]||config.defaultQuote||"USDT";setTrade(p=>({...p,pair:base+"/"+quote}))}} style={{...iStyle,borderRadius:"4px 0 0 4px",borderRight:"none",flex:1}} placeholder="BTC"/>
          <select value={(trade.pair||"").split("/")[1]||config.defaultQuote||"USDT"} onChange={e=>{const base=(trade.pair||"").split("/")[0]||"BTC";setTrade(p=>({...p,pair:base+"/"+e.target.value}))}} style={{...iStyle,borderRadius:"0 4px 4px 0",width:"80px",cursor:"pointer",color:"var(--gold)",fontWeight:600,fontSize:"11px"}}>
            <option value="USDT">USDT</option>
            <option value="USDC">USDC</option>
            <option value="USD">USD</option>
          </select>
        </div>
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,marginBottom:"1rem",borderRadius:"8px",overflow:"hidden",border:"1px solid rgba(54,58,69,0.7)"}}>
      {["long","short"].map(dir=>(
        <button key={dir} onClick={()=>setTrade(p=>({...p,direction:dir}))} style={{padding:"10px",border:"none",fontSize:"14px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",
          background:trade.direction===dir?(dir==="long"?"var(--green2)":"var(--red2)"):"transparent",
          color:trade.direction===dir?(dir==="long"?"var(--green)":"var(--red)"):"var(--text4)",
          boxShadow:trade.direction===dir?`inset 0 0 0 1px ${dir==="long"?"var(--green3)":"var(--red3)"}`:"none"
        }}>{dir.toUpperCase()}</button>
      ))}
    </div>

    {/* Auto session tag (read-only) */}
    {(()=>{const st=getSessionTags(trade.date,trade.time);return st.length>0?(
      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"1rem"}}>
        <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Sessie</span>
        {st.map(s=>{const c=SESSION_COLORS[s]||SESSION_COLORS["Off-session"];return(
          <span key={s} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:600,border:`1px solid ${c.border}`,background:c.bg,color:c.text}}>{s}</span>
        )})}
        <span style={{fontSize:"9px",color:"var(--text5)",fontFamily:"var(--mono)",marginLeft:"4px"}}>auto (CET)</span>
      </div>
    ):null})()}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"12px",marginBottom:"1rem"}}>
      {[["entry","ENTRY"],["stopLoss","STOP LOSS"],["exit","EXIT"]].map(([k,l])=>(
        <div key={k}><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>{l}</div><input type="text" value={trade[k]} onChange={e=>{const v=e.target.value;setTrade(p=>({...p,[k]:v,manualOverrides:[...new Set([...(p.manualOverrides||[]),k])]}))}} style={{...iStyle,color:isEmpty(trade[k])?"#4b5563":"var(--text)"}} placeholder="N/A"/></div>
      ))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"12px"}}>
      {(()=>{
        const asset=(trade.pair||"BTC/USDT").split("/")[0]||"BTC";
        const toggleInput=()=>{const next=sizeInputMode==="usdt"?"asset":"usdt";setSizeInputMode(next);localStorage.setItem("tj_sizeInputMode",next)};
        const handleSizeChange=(v)=>{
          const entry=parseFloat(trade.entry);
          if(sizeInputMode==="usdt"){
            const updates={positionSize:v,manualOverrides:[...new Set([...(trade.manualOverrides||[]),"positionSize"])]};
            if(entry>0&&parseFloat(v)>0)updates.positionSizeAsset=String(parseFloat((parseFloat(v)/entry).toFixed(8)));
            setTrade(p=>({...p,...updates}));
          }else{
            const updates={positionSizeAsset:v,manualOverrides:[...new Set([...(trade.manualOverrides||[]),"positionSize"])]};
            if(entry>0&&parseFloat(v)>0)updates.positionSize=String(parseFloat((parseFloat(v)*entry).toFixed(2)));
            setTrade(p=>({...p,...updates}));
          }
        };
        return(<div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"6px"}}>
            <div style={{fontSize:"11px",color:"var(--text3)",fontWeight:500}}>POSITIE ({sizeInputMode==="usdt"?"$":asset})</div>
            <button onClick={toggleInput} style={{fontSize:"9px",padding:"2px 6px",borderRadius:"3px",border:"1px solid var(--border3)",background:"transparent",color:"var(--gold)",cursor:"pointer",fontFamily:"var(--mono)"}}>{sizeInputMode==="usdt"?"→ "+asset:"→ USDT"}</button>
          </div>
          <input type="text" value={sizeInputMode==="usdt"?(trade.positionSize||""):(trade.positionSizeAsset||"")} onChange={e=>handleSizeChange(e.target.value)} style={{...iStyle,color:isEmpty(sizeInputMode==="usdt"?trade.positionSize:trade.positionSizeAsset)?"#4b5563":"var(--text)"}} placeholder="N/A"/>
        </div>);
      })()}
      {[["pnl","PNL ($)"],["fees","FEES ($)"]].map(([k,l])=>(
        <div key={k}><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>{l}</div><input type="text" value={trade[k]} onChange={e=>{const v=e.target.value;setTrade(p=>({...p,[k]:v,manualOverrides:[...new Set([...(p.manualOverrides||[]),k])]}))}} style={{...iStyle,color:isEmpty(trade[k])?"#4b5563":"var(--text)"}} placeholder="N/A"/></div>
      ))}
    </div>

    {/* Auto PNL calc hint */}
    {(()=>{
      const e=parseFloat(trade.entry);const ex=parseFloat(trade.exit);const sz=parseFloat(trade.positionSize);const fees=parseFloat(trade.fees)||0;
      if(e>0&&ex>0&&sz>0&&!(trade.manualOverrides||[]).includes("pnl")){
        const raw=trade.direction==="long"?(ex-e)*sz/e:(e-ex)*sz/e;
        const net2=raw-fees;
        if(trade.pnl!==""&&Math.abs(parseFloat(trade.pnl)-net2)>0.01||trade.pnl===""){
          return(<div style={{marginBottom:"12px"}}>
            <button onClick={()=>setTrade(p=>({...p,pnl:net2.toFixed(2)}))} style={{fontSize:"10px",padding:"4px 12px",borderRadius:"5px",border:"1px solid var(--blue2)",background:"var(--blue3)",color:"var(--blue)",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>
              💡 PNL berekenen: {net2>=0?"+":""}${fmt(net2)} {fees>0?`(na $${fmt(fees)} fees)`:""} → Toepassen
            </button>
          </div>);
        }
      }
      return null;
    })()}

    {/* Status toggle + source */}
    <div style={{display:"flex",gap:"12px",alignItems:"center",marginBottom:"1.5rem"}}>
      <div>
        <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>STATUS</div>
        <div style={{display:"flex",gap:0,borderRadius:"6px",overflow:"hidden",border:"1px solid var(--border3)"}}>
          {["closed","open"].map(s=>(
            <button key={s} onClick={()=>setTrade(p=>({...p,status:s}))} style={{padding:"6px 14px",border:"none",fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",
              background:trade.status===s?(s==="open"?"rgba(96,165,250,0.15)":"rgba(42,46,57,0.7)"):"transparent",
              color:trade.status===s?(s==="open"?"var(--blue)":"var(--text)"):"var(--text4)"
            }}>{s==="open"?"Open":"Closed"}</button>
          ))}
        </div>
      </div>
      <div style={{fontSize:"10px",color:"var(--text4)",display:"flex",alignItems:"center",gap:"6px",marginTop:"18px"}}>
        {trade.source==="manual"||!trade.source
          ?<><span style={{fontSize:"12px"}}>✏️</span> Handmatig</>
          :<><ExchangeIcon name={trade.source} size={14}/> {exName(trade.source)}</>
        }
      </div>
    </div>

    {/* TP Levels (multi-TP with percentages) */}
    {(()=>{
      const tps=trade.tpLevels||[];
      const totalPct=tps.reduce((s,tp)=>s+parseFloat(tp.pct||0),0);
      const entryN=parseFloat(trade.entry);const slN=parseFloat(trade.stopLoss);const sizeN=parseFloat(trade.positionSize);
      const isLong=trade.direction==="long";

      const addTP=()=>{const remaining=Math.max(0,100-totalPct);setTrade(p=>({...p,tpLevels:[...(p.tpLevels||[]),{...EMPTY_TP,id:uid(),pct:String(remaining>0?Math.min(remaining,25):25)}]}))};
      const updateTP=(id,field,val)=>setTrade(p=>({...p,tpLevels:(p.tpLevels||[]).map(tp=>tp.id===id?{...tp,[field]:val}:tp)}));
      const removeTP=(id)=>setTrade(p=>({...p,tpLevels:(p.tpLevels||[]).filter(tp=>tp.id!==id)}));
      const toggleStatus=(id)=>setTrade(p=>({...p,tpLevels:(p.tpLevels||[]).map(tp=>tp.id===id?{...tp,status:tp.status==="hit"?"open":tp.status==="open"?"missed":"hit"}:tp)}));

      const calcProfit=(tp)=>{
        if(!entryN||!sizeN||!parseFloat(tp.price))return null;
        const pct=parseFloat(tp.pct||0)/100;const tpPrice=parseFloat(tp.price);
        return isLong?(tpPrice-entryN)*sizeN*pct/entryN:(entryN-tpPrice)*sizeN*pct/entryN;
      };
      const calcRR=(tp)=>{
        if(!entryN||!slN||!parseFloat(tp.price))return null;
        const risk=Math.abs(entryN-slN);if(risk===0)return null;
        return Math.abs(parseFloat(tp.price)-entryN)/risk;
      };

      return(<div style={{borderTop:"1px solid var(--border2)",paddingTop:"1rem",marginBottom:"1rem"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
          <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600}}>Take Profit niveaus</div>
          {tps.length<4&&<button onClick={addTP} style={{fontSize:"11px",padding:"4px 10px",borderRadius:"var(--radius)",border:"1px dashed var(--border5)",background:"transparent",color:"var(--gold)",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>+ TP toevoegen</button>}
        </div>

        {tps.length>0&&<>
          {/* Header */}
          <div style={{display:"grid",gridTemplateColumns:"32px 1fr 70px 80px 70px 60px 28px",gap:"6px",marginBottom:"4px",padding:"0 2px"}}>
            <span style={{fontSize:"9px",color:"var(--text5)"}}></span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>Prijs</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>%</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>Winst</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>R:R</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>Status</span>
            <span></span>
          </div>

          {tps.map((tp,i)=>{
            const profit=calcProfit(tp);const rr=calcRR(tp);
            const statusColor=tp.status==="hit"?"var(--green)":tp.status==="missed"?"var(--red)":"var(--gold)";
            const statusIcon=tp.status==="hit"?<GlowCheck size={14}/>:tp.status==="missed"?<GlowCross size={14}/>:"◔";
            return(<div key={tp.id} style={{display:"grid",gridTemplateColumns:"32px 1fr 70px 80px 70px 60px 28px",gap:"6px",alignItems:"center",marginBottom:"4px"}}>
              <span style={{fontSize:"11px",fontWeight:700,color:"var(--gold)",textAlign:"center"}}>TP{i+1}</span>
              <input type="text" value={tp.price} onChange={e=>updateTP(tp.id,"price",e.target.value)} placeholder="Prijs" style={{...iStyle,padding:"6px 8px",fontSize:"12px"}}/>
              <div style={{position:"relative"}}>
                <input type="text" value={tp.pct} onChange={e=>updateTP(tp.id,"pct",e.target.value)} style={{...iStyle,padding:"6px 8px",fontSize:"12px",paddingRight:"18px"}}/>
                <span style={{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",fontSize:"10px",color:"var(--text4)"}}>%</span>
              </div>
              <span style={{fontSize:"11px",fontFamily:"var(--mono)",color:profit!==null?(profit>=0?"var(--green)":"var(--red)"):"var(--text5)"}}>{profit!==null?`${profit>=0?"+":""}$${fmt(profit)}`:<NA/>}</span>
              <span style={{fontSize:"11px",fontFamily:"var(--mono)",color:rr!==null?"var(--text2)":"var(--text5)"}}>{rr!==null?rr.toFixed(2)+"R":<NA/>}</span>
              <button onClick={()=>toggleStatus(tp.id)} style={{padding:"3px 8px",borderRadius:"var(--radius)",border:"none",background:tp.status==="hit"?"var(--green2)":tp.status==="missed"?"var(--red2)":"var(--gold-dim)",color:statusColor,fontSize:"10px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{statusIcon}</button>
              <button onClick={()=>removeTP(tp.id)} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"12px",padding:"2px"}}>✕</button>
            </div>);
          })}

          {/* Summary row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"8px",padding:"8px 10px",background:"rgba(20,22,30,0.5)",borderRadius:"var(--radius)",fontSize:"10px"}}>
            <div style={{display:"flex",gap:"16px"}}>
              <span style={{color:totalPct===100?"var(--green)":totalPct>100?"var(--red)":"var(--gold)"}}>
                Totaal: {totalPct}% {totalPct!==100&&<span style={{fontSize:"9px"}}>{totalPct>100?"⚠ >100%":"⚠ <100%"}</span>}
              </span>
              {(()=>{const totalProfit=tps.reduce((s,tp)=>{const p=calcProfit(tp);return s+(p||0)},0);
                return totalProfit!==0&&<span style={{fontFamily:"var(--mono)",color:totalProfit>=0?"var(--green)":"var(--red)"}}>Verwacht: {totalProfit>=0?"+":""}${fmt(totalProfit)}</span>})()}
              {(()=>{const rrs=tps.map(tp=>({rr:calcRR(tp),pct:parseFloat(tp.pct||0)})).filter(x=>x.rr!==null);
                if(rrs.length===0)return null;const weighted=rrs.reduce((s,x)=>s+x.rr*x.pct,0)/rrs.reduce((s,x)=>s+x.pct,0);
                return <span style={{fontFamily:"var(--mono)",color:"var(--text2)"}}>Gem R:R: {weighted.toFixed(2)}R</span>})()}
            </div>
            <span style={{color:"var(--text4)"}}>{tps.filter(tp=>tp.status==="hit").length}/{tps.length} bereikt</span>
          </div>
        </>}

        {tps.length===0&&<div style={{fontSize:"11px",color:"var(--text4)",padding:"6px 0"}}>Klik "+ TP toevoegen" om take profit niveaus in te stellen.</div>}
      </div>);
    })()}

    {/* TP Timeline for MEXC trades */}
    <TPTimeline trade={trade} config={config}/>

    <div style={{borderTop:"1px solid var(--border2)",paddingTop:"1.5rem",marginBottom:"0.5rem"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600}}>Setup lagen (top-down)</div>
        <button onClick={()=>setTrade(p=>({...p,layers:[...(p.layers||[]),{...EMPTY_LAYER,id:uid()}]}))} style={{fontSize:"11px",padding:"4px 10px",borderRadius:"5px",border:"1px dashed var(--border5)",background:"transparent",color:"var(--blue)",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>+ Laag toevoegen</button>
      </div>
      
      {(trade.layers||[]).length===0&&<div style={{background:"rgba(37,99,235,0.06)",border:"1px solid rgba(37,99,235,0.15)",borderRadius:"8px",padding:"14px 16px",marginBottom:"12px",fontSize:"12px",color:"var(--blue)",lineHeight:1.6}}>
        Voeg setup lagen toe in top-down volgorde. Begin met het hoogste timeframe (bias) en eindig met je entry timeframe.
      </div>}
      
      {(trade.layers||[]).map((layer,i)=>{
        const tfIdx=TF_ORDER.indexOf(layer.timeframe);
        const prevTfIdx=i>0?TF_ORDER.indexOf((trade.layers||[])[i-1]?.timeframe):-1;
        const orderWarn=i>0&&tfIdx>=0&&prevTfIdx>=0&&tfIdx<prevTfIdx;
        return(
          <div key={layer.id||i} style={{background:orderWarn?"rgba(201,168,76,0.04)":"rgba(42,46,57,0.3)",borderRadius:"8px",border:`1px solid ${orderWarn?"rgba(201,168,76,0.2)":"var(--border2)"}`,padding:"12px",marginBottom:"6px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"8px"}}>
              <span style={{fontSize:"11px",color:"var(--text4)",fontWeight:700,fontFamily:"var(--mono)",width:"20px"}}>{i+1}.</span>
              {i>0&&<button onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];[l[i-1],l[i]]=[l[i],l[i-1]];return{...p,layers:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>▲</button>}
              {i<(trade.layers||[]).length-1&&<button onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];[l[i],l[i+1]]=[l[i+1],l[i]];return{...p,layers:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>▼</button>}
              <div style={{flex:1}}/>
              {orderWarn&&<span style={{fontSize:"10px",color:"var(--amber)",fontWeight:500}}>⚠ Niet top-down</span>}
              <button onClick={()=>setTrade(p=>({...p,layers:(p.layers||[]).filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>✕</button>
            </div>
            <div style={{display:"grid",gap:"10px"}}>
              <div>
                <div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>TIMEFRAME</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{gt("timeframeTags").map(tf=>{const sel=layer.timeframe===tf;return(<button key={tf} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],timeframe:sel?"":tf};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#7c3aed":"var(--border3)"}`,background:sel?"rgba(124,58,237,0.2)":"transparent",color:sel?"#a78bfa":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{tf}</button>)})}</div>
              </div>
              <div>
                <div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>SETUP</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{gt("setupTags").map(s=>{const sel=layer.setup===s;return(<button key={s} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],setup:sel?"":s};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#2563eb":"var(--border3)"}`,background:sel?"rgba(37,99,235,0.2)":"transparent",color:sel?"#5B9CF6":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{s}</button>)})}</div>
              </div>
              <div>
                <div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>CONFIRMATIE(S)</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{gt("confirmationTags").map(c=>{const sel=(layer.confirmations||[layer.confirmation].filter(Boolean)).includes(c);return(<button key={c} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];const cur=l[i].confirmations||[l[i].confirmation].filter(Boolean);l[i]={...l[i],confirmations:sel?cur.filter(x=>x!==c):[...cur,c],confirmation:undefined};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#0d9488":"var(--border3)"}`,background:sel?"rgba(13,148,136,0.2)":"transparent",color:sel?"#2dd4bf":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{c}</button>)})}</div>
              </div>
              <div>
                <div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>ROL</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{[...ROLE_OPTIONS,"Eigen..."].map(r=>{const val=r==="Eigen..."?"_custom":r;const sel=layer.role===val;return(<button key={r} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],role:sel?"":val};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#d97706":"var(--border3)"}`,background:sel?"rgba(201,168,76,0.2)":"transparent",color:sel?"#c9a84c":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{r}</button>)})}
                {layer.role==="_custom"&&<input value={layer.customRole||""} onChange={e=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],customRole:e.target.value};return{...p,layers:l}})} placeholder="Eigen rol..." style={{...iStyle,padding:"5px 8px",fontSize:"11px",marginTop:"6px",width:"200px"}}/>}</div>
              </div>
            </div>
          </div>
        );
      })}
      
      <div style={{marginTop:"16px"}}/>
      <div style={{marginBottom:"1rem"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:"8px"}}>Emoties</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          <div>
            <div style={{fontSize:"10px",color:"var(--red)",fontWeight:600,marginBottom:"6px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCross size={14}/> Negatief</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{gt("emotionTags").filter(t=>isNegEmotion(t)).map(tag=>{const a=(trade.emotionTags||[]).includes(tag);return(<button key={tag} onClick={()=>toggle("emotionTags",tag)} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:500,border:`1px solid ${a?"#dc2626":"rgba(54,58,69,0.7)"}`,background:a?"rgba(220,122,122,0.14)":"transparent",color:a?"#ef5350":"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>{tag}</button>)})}</div>
          </div>
          <div>
            <div style={{fontSize:"10px",color:"var(--green)",fontWeight:600,marginBottom:"6px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCheck size={14}/> Positief</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{gt("emotionTags").filter(t=>!isNegEmotion(t)).map(tag=>{const a=(trade.emotionTags||[]).includes(tag);return(<button key={tag} onClick={()=>toggle("emotionTags",tag)} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:500,border:`1px solid ${a?"#059669":"rgba(54,58,69,0.7)"}`,background:a?"rgba(50,196,149,0.14)":"transparent",color:a?CHART_COLORS.win:"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>{tag}</button>)})}</div>
          </div>
        </div>
      </div>
      <TagGroup label="Fouten" tags={gt("mistakeTags")} selected={trade.mistakeTags} onToggle={t=>toggle("mistakeTags",t)} color="orange"/>
    </div>

    <div style={{marginBottom:"1rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"8px"}}>Trade kwaliteit</div>
      <Stars value={trade.rating} onChange={r=>setTrade(p=>({...p,rating:r}))}/>
    </div>

    <div style={{marginBottom:"1rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"8px"}}>Screenshot</div>
      <input type="file" ref={fRef} accept="image/*" onChange={handleSS} style={{display:"none"}}/>
      {trade.screenshot?(
        <div style={{position:"relative"}}>
          <img src={trade.screenshot} alt="" style={{width:"100%",borderRadius:"8px",border:"1px solid var(--border2)"}}/>
          <button onClick={()=>{setTrade(p=>({...p,screenshot:null}));fRef.current.value=""}} style={{position:"absolute",top:"8px",right:"8px",background:"rgba(0,0,0,0.7)",border:"none",color:"var(--red)",borderRadius:"6px",padding:"4px 10px",cursor:"pointer",fontSize:"12px",fontFamily:"inherit"}}>Verwijder</button>
        </div>
      ):(
        <button onClick={()=>fRef.current.click()} style={{padding:"24px",width:"100%",borderRadius:"8px",border:"1px dashed var(--border5)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit",fontSize:"13px"}}>Klik om screenshot te uploaden (TradingView)</button>
      )}
    </div>

    <div style={{marginBottom:"1rem"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
        <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500}}>TradingView links</div>
        <button onClick={()=>setTrade(p=>({...p,links:[...(p.links||[]),{id:uid(),url:"",comment:""}]}))} style={{fontSize:"11px",padding:"4px 10px",borderRadius:"5px",border:"1px dashed var(--border5)",background:"transparent",color:"var(--teal)",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>+ Link toevoegen</button>
      </div>
      {(trade.links||[]).map((link,i)=>(
        <div key={link.id||i} style={{background:"rgba(42,46,57,0.3)",borderRadius:"8px",border:"1px solid var(--border2)",padding:"10px 12px",marginBottom:"6px"}}>
          <div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"6px"}}>
            {i>0&&<button onClick={()=>setTrade(p=>{const l=[...(p.links||[])];[l[i-1],l[i]]=[l[i],l[i-1]];return{...p,links:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"14px",padding:"2px"}}>▲</button>}
            {i<(trade.links||[]).length-1&&<button onClick={()=>setTrade(p=>{const l=[...(p.links||[])];[l[i],l[i+1]]=[l[i+1],l[i]];return{...p,links:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"14px",padding:"2px"}}>▼</button>}
            <input value={link.url} onChange={e=>setTrade(p=>{const l=[...(p.links||[])];l[i]={...l[i],url:e.target.value};return{...p,links:l}})} placeholder="https://www.tradingview.com/chart/..." style={{...iStyle,padding:"7px 10px",fontSize:"12px",flex:1}}/>
            {link.url&&<a href={link.url} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} style={{fontSize:"11px",color:"var(--teal)",textDecoration:"none",padding:"4px 8px",borderRadius:"4px",border:"1px solid rgba(13,148,136,0.3)",whiteSpace:"nowrap"}}>Open ↗</a>}
            <button onClick={()=>setTrade(p=>({...p,links:(p.links||[]).filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"14px",padding:"2px 4px"}}>✕</button>
          </div>
          <input value={link.comment||""} onChange={e=>setTrade(p=>{const l=[...(p.links||[])];l[i]={...l[i],comment:e.target.value};return{...p,links:l}})} placeholder="Opmerking (bijv. 4H setup, entry zone, weekly bias...)" style={{...iStyle,padding:"6px 10px",fontSize:"12px",fontFamily:"var(--font)"}}/>
        </div>
      ))}
      {(!trade.links||trade.links.length===0)&&<div style={{fontSize:"12px",color:"var(--text4)",padding:"8px 0"}}>Voeg TradingView chart links toe om je analyse te documenteren.</div>}
    </div>

    <div style={{marginBottom:"1.5rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:500,marginBottom:"8px"}}>Notities</div>
      <textarea value={trade.notes} onChange={e=>setTrade(p=>({...p,notes:e.target.value}))} placeholder="Waarom nam je deze trade? Wat ging goed? Wat kon beter?" rows={4} style={{...iStyle,fontFamily:"var(--font)",fontSize:"13px",resize:"vertical",lineHeight:"1.6"}}/>
    </div>

    <div style={{display:"flex",gap:"12px"}}>
      <button onClick={onSave} style={{flex:1,padding:"12px",borderRadius:"8px",border:"none",fontSize:"14px",fontWeight:700,background:"var(--blue2)",color:"#fff",cursor:"pointer",fontFamily:"inherit"}}>Trade opslaan</button>
      {onCancel&&<button onClick={onCancel} style={{padding:"12px 24px",borderRadius:"8px",border:"1px solid var(--border4)",background:"transparent",color:"var(--text2)",cursor:"pointer",fontFamily:"inherit",fontSize:"14px"}}>Annuleren</button>}
    </div>
  </div>);
}

// ============ TRADE LIST (TraderSync-style) ============
function TradeList({trades,onEdit,onDelete,onQuickTag,onBulkDelete,onBulkTag,showToast,tagConfig}){
  const[sortField,setSortField]=useState("date");
  const[sortDir,setSortDir]=useState("desc");
  const[selected,setSelected]=useState(new Set());
  const[bulkAction,setBulkAction]=useState(null);
  const[sizeMode,setSizeMode]=useState(()=>localStorage.getItem("tj_sizeMode")||"usdt");
  const toggleSizeMode=()=>{const next=sizeMode==="usdt"?"asset":"usdt";setSizeMode(next);localStorage.setItem("tj_sizeMode",next)};
  const fmtSize=(t)=>{
    const sz=parseFloat(t.positionSize);if(!sz||isNaN(sz))return null;
    if(sizeMode==="asset"){
      const asset=(t.pair||"").split("/")[0]||"";
      if(t.positionSizeAsset&&parseFloat(t.positionSizeAsset)>0)return `${parseFloat(parseFloat(t.positionSizeAsset).toFixed(8))} ${asset}`;
      const entry=parseFloat(t.entry);
      if(entry>0){const assetSize=sz/entry;return `${parseFloat(assetSize.toFixed(8))} ${asset}`}
      return `${parseFloat(sz.toFixed(8))} ${asset}`;
    }
    return `$${fmt(sz)}`;
  }; // "tag"|"export"|null
  
  if(!trades.length)return(<div style={{textAlign:"center",padding:"4rem 2rem",color:"var(--text3)"}}>
    <div style={{fontSize:"48px",marginBottom:"1rem",opacity:0.3}}>📋</div>
    <div style={{fontSize:"16px",fontWeight:500,marginBottom:"8px"}}>Geen trades gevonden</div>
  </div>);

  const sorted=[...trades].sort((a,b)=>{
    if(a.status==="open"&&b.status!=="open")return -1;
    if(b.status==="open"&&a.status!=="open")return 1;
    let va,vb;
    if(sortField==="date"){va=`${a.date}T${a.time}`;vb=`${b.date}T${b.time}`}
    else if(sortField==="pnl"){va=parseFloat(a.pnl)||0;vb=parseFloat(b.pnl)||0}
    else if(sortField==="pair"){va=(a.pair||"").split("/")[0];vb=(b.pair||"").split("/")[0]}
    else{va=a[sortField]||"";vb=b[sortField]||""}
    if(typeof va==="number")return sortDir==="asc"?va-vb:vb-va;
    return sortDir==="asc"?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
  });

  const toggleSort=f=>{if(sortField===f)setSortDir(p=>p==="asc"?"desc":"asc");else{setSortField(f);setSortDir("desc")}};
  const thStyle={padding:"8px 6px",fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.04em",cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",borderBottom:"1px solid var(--border2)"};
  const arrow=f=>sortField===f?(sortDir==="asc"?" ▴":" ▾"):"";

  const totalPnl=sorted.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
  const wins=sorted.filter(t=>parseFloat(t.pnl)>0).length;

  const toggleSelect=(id,e)=>{e.stopPropagation();setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n})};
  const toggleAll=()=>{if(selected.size===sorted.length)setSelected(new Set());else setSelected(new Set(sorted.map(t=>t.id)))};
  const selCount=selected.size;

  // Bulk actions
  const bulkDelete=()=>{
    if(!confirm(`${selCount} trades verwijderen? Dit kan niet ongedaan worden.`))return;
    onBulkDelete([...selected]);
    setSelected(new Set());
    showToast(`${selCount} trades verwijderd`);
  };
  const bulkExportJSON=()=>{
    const data=sorted.filter(t=>selected.has(t.id));
    const blob=new Blob([JSON.stringify({version:4,exportDate:new Date().toISOString(),trades:data},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`trades-export-${data.length}-${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(url);
    showToast(`${data.length} trades geëxporteerd (JSON)`);
  };
  const bulkExportCSV=()=>{
    const data=sorted.filter(t=>selected.has(t.id));
    const headers=["date","time","pair","direction","entry","exit","pnl","fees","leverage","source","setupTags","emotionTags","mistakeTags"];
    const rows=data.map(t=>headers.map(h=>Array.isArray(t[h])?(t[h]||[]).join(";"):String(t[h]||"")).join(","));
    const csv=[headers.join(","),...rows].join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`trades-export-${data.length}-${new Date().toISOString().split("T")[0]}.csv`;a.click();URL.revokeObjectURL(url);
    showToast(`${data.length} trades geëxporteerd (CSV)`);
  };

  const gt=(k)=>tagConfig?.[k]||DEFAULT_TAGS[k]||[];

  return(<div style={{animation:"fadeIn .3s ease"}}>
    {/* Header + bulk action bar */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",minHeight:"32px"}}>
      <div style={{fontSize:"12px",color:"var(--text3)"}}>
        {sorted.length} trades
        <span style={{margin:"0 8px",color:"var(--text5)"}}>|</span>
        <span style={{color:totalPnl>=0?"var(--green)":"var(--red)",fontFamily:"var(--mono)",fontWeight:600}}>{totalPnl>=0?"+":""}${fmt(totalPnl)}</span>
        <span style={{margin:"0 8px",color:"var(--text5)"}}>|</span>
        WR: {sorted.length>0?((wins/sorted.length)*100).toFixed(0):"0"}%
      </div>
    </div>

    {/* Bulk action bar */}
    {selCount>0&&<div style={{display:"flex",alignItems:"center",gap:"8px",padding:"10px 16px",marginBottom:"12px",borderRadius:"var(--radius)",background:"var(--blue3)",border:"1px solid rgba(37,99,235,0.2)",animation:"slideDown .2s ease",flexWrap:"wrap"}}>
      <span style={{fontSize:"12px",color:"var(--blue)",fontWeight:600}}>{selCount} trade{selCount>1?"s":""} geselecteerd</span>
      <div style={{width:"1px",height:"16px",background:"rgba(37,99,235,0.2)"}}/>
      <button onClick={()=>setBulkAction(bulkAction==="tag"?null:"tag")} style={{fontSize:"11px",padding:"5px 12px",borderRadius:"5px",border:"1px solid rgba(37,99,235,0.3)",background:bulkAction==="tag"?"rgba(37,99,235,0.15)":"transparent",color:"var(--blue)",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>Tags toevoegen</button>
      <button onClick={bulkExportJSON} style={{fontSize:"11px",padding:"5px 12px",borderRadius:"5px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>Export JSON</button>
      <button onClick={bulkExportCSV} style={{fontSize:"11px",padding:"5px 12px",borderRadius:"5px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>Export CSV</button>
      <button onClick={bulkDelete} style={{fontSize:"11px",padding:"5px 12px",borderRadius:"5px",border:"1px solid rgba(220,122,122,0.28)",background:"transparent",color:"var(--red)",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>Verwijderen</button>
      <div style={{flex:1}}/>
      <button onClick={()=>{setSelected(new Set());setBulkAction(null)}} style={{fontSize:"10px",color:"var(--text4)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Deselecteer</button>
    </div>}

    {/* Bulk tag panel */}
    {bulkAction==="tag"&&selCount>0&&<div style={{padding:"14px 16px",marginBottom:"12px",borderRadius:"var(--radius)",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",border:"1px solid var(--border2)",animation:"slideDown .2s ease"}}>
      <div style={{fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600,marginBottom:"10px"}}>Tags toevoegen aan {selCount} trades</div>
      {[{key:"setupTags",label:"Setup Type",color:"blue"},{key:"confirmationTags",label:"Confirmaties",color:"teal"},{key:"emotionTags",label:"Emoties",color:"amber"},{key:"mistakeTags",label:"Fouten",color:"orange"}].map(cat=>{
        const c=COLORS[cat.color]||COLORS.blue;const tags=gt(cat.key);
        return(<div key={cat.key} style={{marginBottom:"8px"}}>
          <div style={{fontSize:"9px",color:"var(--text4)",fontWeight:600,marginBottom:"4px"}}>{cat.label}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
            {tags.map(tag=>(
              <button key={tag} onClick={()=>{onBulkTag([...selected],cat.key,tag);showToast(`"${tag}" toegevoegd aan ${selCount} trades`)}} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${c.border}40`,background:"transparent",color:c.text,cursor:"pointer",fontFamily:"inherit",opacity:0.7,transition:"opacity .1s"}} onMouseEnter={e=>e.currentTarget.style.opacity="1"} onMouseLeave={e=>e.currentTarget.style.opacity="0.7"}>{tag}</button>
            ))}
          </div>
        </div>);
      })}
    </div>}

    <div style={{display:"flex",justifyContent:"flex-end",marginBottom:"8px"}}>
      <button onClick={toggleSizeMode} style={{padding:"4px 10px",borderRadius:"var(--radius)",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",fontSize:"10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,display:"flex",alignItems:"center",gap:"6px"}}>
        Size: <span style={{color:"var(--gold)"}}>{sizeMode==="usdt"?"$":"Asset"}</span>
      </button>
    </div>

    <div style={{overflowX:"auto",borderRadius:"var(--radius-lg)",border:"1px solid var(--border1)"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)"}}>
        <thead>
          <tr>
            <th style={{...thStyle,width:"30px",cursor:"pointer"}} onClick={toggleAll}>
              <div style={{width:"14px",height:"14px",borderRadius:"3px",border:`1px solid ${selCount===sorted.length&&selCount>0?"var(--blue2)":"var(--border4)"}`,background:selCount===sorted.length&&selCount>0?"var(--blue2)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",color:"#fff",margin:"0 auto"}}>{selCount===sorted.length&&selCount>0?"✓":""}</div>
            </th>
            <th style={thStyle} onClick={()=>toggleSort("date")}>Status</th>
            <th style={thStyle} onClick={()=>toggleSort("date")}>Datum{arrow("date")}</th>
            <th style={thStyle} onClick={()=>toggleSort("pair")}>Symbol{arrow("pair")}</th>
            <th style={{...thStyle,textAlign:"center"}}>Entry</th>
            <th style={{...thStyle,textAlign:"center"}}>Exit</th>
            <th style={{...thStyle,textAlign:"center"}}>Size</th>
            <th style={{...thStyle,textAlign:"center"}}>Side</th>
            <th style={thStyle} onClick={()=>toggleSort("pnl")}>Return{arrow("pnl")}</th>
            <th style={thStyle}>Lagen</th>
            <th style={thStyle}>Sessie</th>
            <th style={thStyle}>Emoties</th>
            <th style={thStyle}>Fouten</th>
            <th style={{...thStyle,width:"30px"}}></th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(t=>{
            const pnlN=parseFloat(t.pnl);const isW=!isNaN(pnlN)&&pnlN>0;const isL=!isNaN(pnlN)&&pnlN<0;
            const isNew=t.date&&(Date.now()-new Date(t.date).getTime())<3*24*60*60*1000;
            const isSel=selected.has(t.id);
            const tdStyle={padding:"10px 6px",borderBottom:"1px solid var(--border1)",verticalAlign:"middle"};
            const tagStyle2=(bg,color)=>({display:"inline-block",fontSize:"9px",padding:"2px 6px",borderRadius:"3px",background:bg,color,marginRight:"3px",marginBottom:"2px",fontWeight:600,whiteSpace:"nowrap"});
            const layers=t.layers||[];
            const hasLayers=layers.length>0;
            return(<tr key={t.id} onClick={()=>onEdit(t)} style={{cursor:"pointer",transition:"background .1s",background:isSel?"rgba(37,99,235,0.04)":"transparent"}}
              onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background="rgba(42,46,57,0.3)"}} onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background="transparent"}}>
              <td style={tdStyle} onClick={e=>toggleSelect(t.id,e)}>
                <div style={{width:"14px",height:"14px",borderRadius:"3px",border:`1px solid ${isSel?"var(--blue2)":"var(--border4)"}`,background:isSel?"var(--blue2)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",color:"#fff",margin:"0 auto",cursor:"pointer"}}>{isSel?"✓":""}</div>
              </td>
              <td style={tdStyle}>
                {t.status==="open"?<span style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:700,
                  background:"rgba(96,165,250,0.15)",color:"var(--blue)",display:"inline-flex",alignItems:"center",gap:"5px"}}>
                  <span style={{width:"6px",height:"6px",borderRadius:"50%",background:"var(--blue)",animation:"pulse 2s ease-in-out infinite"}}/>OPEN</span>
                :<span style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:700,
                  background:isW?"rgba(38,166,154,0.2)":isL?"rgba(239,83,80,0.2)":"rgba(42,46,57,0.6)",
                  color:isW?"var(--green)":isL?"var(--red)":"var(--text3)"}}>{isW?"WIN":isL?"LOSS":"--"}</span>}
              </td>
              <td style={{...tdStyle,fontFamily:"var(--mono)",color:"var(--text2)",fontSize:"11px",whiteSpace:"nowrap"}}>{t.date}{isNew&&<span style={{marginLeft:"6px",fontSize:"8px",padding:"1px 5px",borderRadius:"3px",background:"rgba(201,168,76,0.15)",color:"#d4b85c",fontWeight:700,verticalAlign:"middle",letterSpacing:"0.04em"}}>NEW</span>}<br/><span style={{color:"var(--text4)"}}>{t.time}</span></td>
              <td style={{...tdStyle,fontWeight:600,color:"var(--text)"}}><div style={{display:"flex",alignItems:"center",gap:"8px"}}><div style={{position:"relative",flexShrink:0}}><CryptoIcon pair={t.pair} size={24}/>{t.source&&t.source!=="manual"&&<div style={{position:"absolute",bottom:"-2px",right:"-4px",borderRadius:"3px",overflow:"hidden",border:"1.5px solid var(--bg3)"}}><ExchangeIcon name={t.source} size={11}/></div>}</div><span>{t.pair}</span></div></td>
              <td style={{...tdStyle,fontFamily:"var(--mono)",fontSize:"11px",color:"var(--text2)",textAlign:"center"}}>{t.entry&&parseFloat(t.entry)?fmt(t.entry):<NA/>}</td>
              <td style={{...tdStyle,fontFamily:"var(--mono)",fontSize:"11px",color:"var(--text2)",textAlign:"center"}}>{t.exit&&parseFloat(t.exit)?fmt(t.exit):<NA/>}</td>
              <td style={{...tdStyle,fontFamily:"var(--mono)",fontSize:"10px",color:"var(--text3)",textAlign:"center"}}>{fmtSize(t)||<NA/>}</td>
              <td style={{...tdStyle,textAlign:"center"}}>
                <span style={{padding:"3px 10px",borderRadius:"4px",fontSize:"10px",fontWeight:700,
                  background:t.direction==="long"?"var(--green2)":"var(--red2)",
                  color:t.direction==="long"?"var(--green)":"var(--red)"}}>{t.direction.toUpperCase()}</span>
              </td>
              <td style={{...tdStyle,fontFamily:"var(--mono)",fontWeight:700,fontSize:"12px",
                color:isW?"var(--green)":isL?"var(--red)":"var(--text3)"}}>{!isNaN(pnlN)?`${pnlN>=0?"+":""}$${fmt(pnlN)}`:<NA/>}</td>
              <td style={tdStyle}>{hasLayers?layers.map((l,li)=>{const confs=(l.confirmations||[l.confirmation].filter(Boolean));return <span key={li} style={{...tagStyle2(li===0?"var(--purple2)":li===layers.length-1?"var(--blue4)":"var(--teal2)",li===0?"var(--purple)":li===layers.length-1?"var(--blue)":"var(--teal)")}}>{l.timeframe}{l.setup?" "+l.setup:""}{confs.length>0?" "+confs.join("+"):""}</span>}):(t.setupTags||[]).length>0?(t.setupTags||[]).map(s=><span key={s} style={tagStyle2("var(--blue4)","var(--blue)")}>{s}</span>):<button onClick={e=>{e.stopPropagation();onQuickTag&&onQuickTag(t)}} style={{fontSize:"10px",padding:"2px 8px",borderRadius:"3px",border:"1px dashed var(--border4)",background:"transparent",color:"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>+ tag</button>}</td>
              <td style={tdStyle}>{getSessionTags(t.date,t.time).map(s=>{const c=SESSION_COLORS[s]||SESSION_COLORS["Off-session"];return <span key={s} style={tagStyle2(c.bg,c.text)}>{s}</span>})}</td>
              <td style={tdStyle}>{(t.emotionTags||[]).map(s=><span key={s} style={tagStyle2(isNegEmotion(s)?"var(--red2)":"var(--green2)",isNegEmotion(s)?"var(--red)":"var(--green)")}>{s}</span>)}</td>
              <td style={tdStyle}>{(t.mistakeTags||[]).map(s=><span key={s} style={tagStyle2("var(--orange2)","var(--orange)")}>{s}</span>)}</td>
              <td style={tdStyle}><button onClick={e=>{e.stopPropagation();onDelete(t.id)}} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"12px",padding:"2px 4px"}}>✕</button></td>
            </tr>);
          })}
        </tbody>
      </table>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",fontSize:"11px",color:"var(--text4)",fontFamily:"var(--mono)"}}>
      <span>Trades: {sorted.length}</span>
      <span>Return: <span style={{color:totalPnl>=0?"var(--green)":"var(--red)",fontWeight:600}}>{totalPnl>=0?"+":""}${fmt(totalPnl)}</span></span>
    </div>
  </div>);
}

// ============ FILTER BAR ============
function FilterBar({trades,allTrades,filters,setFilters,config,accounts}){
  // Build filter options from ALL trades (not filtered), plus connected accounts
  const at=allTrades||trades;
  const exchanges=config?.exchanges||{};
  const connectedSources=Object.keys(exchanges).filter(k=>(exchanges[k]||{}).apiKey);
  const manualSources=(accounts||[]).map(a=>a.name);
  const tradeSources=[...new Set((at||[]).map(t=>t.source||"manual"))];
  const sources=[...new Set([...tradeSources,...connectedSources,...manualSources])].sort();
  const pairs=[...new Set(at.map(t=>t.pair))].sort();
  const allSetups=[...new Set(at.flatMap(t=>t.setupTags||[]))].sort();
  const allConfs=[...new Set(at.flatMap(t=>t.confirmationTags||[]))].sort();
  const allEmotions=[...new Set(at.flatMap(t=>t.emotionTags||[]))].sort();
  const allMistakes=[...new Set(at.flatMap(t=>t.mistakeTags||[]))].sort();
  const allTf=[...new Set(at.flatMap(t=>t.timeframeTags||[]))];
  
  const activeCount=Object.values(filters).filter(v=>v&&v!=="all"&&(!Array.isArray(v)||v.length>0)&&v!=="").length;
  const[expanded,setExpanded]=useState(activeCount>0);

  const chip=(label,field,value)=>{
    const active=filters[field]===value;
    return <button key={value} onClick={()=>setFilters(p=>({...p,[field]:active?"all":value}))} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:500,border:`1px solid ${active?"var(--blue2)":"var(--border3)"}`,background:active?"var(--blue3)":"transparent",color:active?"var(--blue)":"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>{label}</button>;
  };

  const multiChip=(label,field,value)=>{
    const arr=filters[field]||[];
    const active=arr.includes(value);
    return <button key={value} onClick={()=>setFilters(p=>{const cur=p[field]||[];return{...p,[field]:active?cur.filter(v=>v!==value):[...cur,value]}})} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:500,border:`1px solid ${active?"var(--blue2)":"var(--border3)"}`,background:active?"var(--blue3)":"transparent",color:active?"var(--blue)":"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>{label}</button>;
  };

  const clearAll=()=>setFilters({source:"all",pair:"all",quote:"all",direction:"all",status:"all",dateFrom:"",dateTo:"",setupTags:[],confirmationTags:[],emotionTags:[],mistakeTags:[],timeframeTags:[],sessionTags:[],leverage:"all",result:"all"});

  return(<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:expanded?"16px":"10px 16px",marginBottom:"1.5rem",border:"1px solid var(--border1)",transition:"padding .2s"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setExpanded(p=>!p)}>
      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
        <span style={{fontSize:"12px",color:"var(--text3)",fontWeight:600}}>Filters</span>
        {activeCount>0&&<span style={{fontSize:"10px",padding:"2px 8px",borderRadius:"10px",background:"var(--blue3)",color:"var(--blue)",fontWeight:600}}>{activeCount} actief</span>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
        {activeCount>0&&<button onClick={e=>{e.stopPropagation();clearAll()}} style={{fontSize:"10px",color:"var(--red)",background:"transparent",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>Reset</button>}
        <span style={{fontSize:"12px",color:"var(--text4)",transition:"transform .2s",transform:expanded?"rotate(180deg)":"rotate(0)"}}>▾</span>
      </div>
    </div>
    
    {expanded&&<div style={{marginTop:"12px",display:"grid",gap:"10px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
        <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Datum</span>
        <input type="date" value={filters.dateFrom||""} onChange={e=>setFilters(p=>({...p,dateFrom:e.target.value}))} style={{...iStyle,width:"140px",padding:"5px 8px",fontSize:"11px"}}/>
        <span style={{fontSize:"11px",color:"var(--text4)"}}>t/m</span>
        <input type="date" value={filters.dateTo||""} onChange={e=>setFilters(p=>({...p,dateTo:e.target.value}))} style={{...iStyle,width:"140px",padding:"5px 8px",fontSize:"11px"}}/>
      </div>

      {sources.length>0&&<div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
        <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Exchange</span>
        {chip("Alle","source","all")}
        {sources.map(s=>chip(<span style={{display:"inline-flex",alignItems:"center",gap:"5px"}}><ExchangeIcon name={s} size={14}/>{exName(s)}</span>,"source",s))}
      </div>}

      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
        <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Pair</span>
        {chip("Alle","pair","all")}
        {pairs.map(p=>chip(p,"pair",p))}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
        <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Richting</span>
        {chip("Alle","direction","all")}
        {chip("Long","direction","long")}
        {chip("Short","direction","short")}
      </div>

      {(()=>{const quotes=[...new Set(at.map(t=>(t.pair||"").split("/")[1]).filter(Boolean))];return quotes.length>1?<div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
        <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Quote</span>
        {chip("Alle","quote","all")}
        {quotes.map(q=>chip(q,"quote",q))}
      </div>:null})()}

      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
        <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Status</span>
        {chip("Alle","status","all")}
        <button onClick={()=>setFilters(p=>({...p,status:p.status==="open"?"all":"open"}))} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:500,border:`1px solid ${filters.status==="open"?"var(--blue2)":"var(--border3)"}`,background:filters.status==="open"?"var(--blue3)":"transparent",color:filters.status==="open"?"var(--blue)":"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .12s",display:"flex",alignItems:"center",gap:"5px"}}>{filters.status==="open"&&<span style={{width:"5px",height:"5px",borderRadius:"50%",background:"var(--blue)"}}/>}Open</button>
        {chip("Closed","status","closed")}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
        <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Resultaat</span>
        {chip("Alle","result","all")}
        {chip("Winners","result","win")}
        {chip("Losers","result","loss")}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>

        {allEmotions.map(e=>{const neg=isNegEmotion(e);const arr=filters.emotionTags||[];const active=arr.includes(e);return <button key={e} onClick={()=>setFilters(p=>{const cur=p.emotionTags||[];return{...p,emotionTags:active?cur.filter(v=>v!==e):[...cur,e]}})} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:500,border:`1px solid ${active?(neg?"#dc2626":"#059669"):"var(--border3)"}`,background:active?(neg?"rgba(220,122,122,0.14)":"rgba(50,196,149,0.14)"):"transparent",color:active?(neg?"#ef5350":CHART_COLORS.win):"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>{e}</button>})}
      </div>}

      {allMistakes.length>0&&<div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>

        {allMistakes.map(m=>multiChip(m,"mistakeTags",m))}
      </div>}
    </div>}
  </div>);
}

function applyFilters(trades,filters){
  return trades.filter(t=>{
    if(filters.source&&filters.source!=="all"&&(t.source||"manual")!==filters.source)return false;
    if(filters.pair&&filters.pair!=="all"&&t.pair!==filters.pair)return false;
    if(filters.quote&&filters.quote!=="all"&&(t.pair||"").split("/")[1]!==filters.quote)return false;
    if(filters.direction&&filters.direction!=="all"&&t.direction!==filters.direction)return false;
    if(filters.status&&filters.status!=="all"&&(t.status||"closed")!==filters.status)return false;
    if(filters.dateFrom&&t.date<filters.dateFrom)return false;
    if(filters.dateTo&&t.date>filters.dateTo)return false;
    if(filters.result&&filters.result!=="all"){
      const pnl=parseFloat(t.pnl);
      if(isNaN(pnl))return false;
      if(filters.result==="win"&&pnl<=0)return false;
      if(filters.result==="loss"&&pnl>=0)return false;
    }
    if(filters.setupTags?.length>0&&!filters.setupTags.some(s=>(t.setupTags||[]).includes(s)))return false;
    if(filters.confirmationTags?.length>0&&!filters.confirmationTags.some(c=>(t.confirmationTags||[]).includes(c)))return false;
    if(filters.emotionTags?.length>0&&!filters.emotionTags.some(e=>(t.emotionTags||[]).includes(e)))return false;
    if(filters.mistakeTags?.length>0&&!filters.mistakeTags.some(m=>(t.mistakeTags||[]).includes(m)))return false;
    if(filters.sessionTags?.length>0){const st=getSessionTags(t.date,t.time);if(!filters.sessionTags.some(s=>st.includes(s)))return false}
    return true;
  });
}

function App(){
  const[trades,setTrades]=useState(()=>{try{const d=localStorage.getItem("tj_trades");if(d){const p=JSON.parse(d);if(p.length>0)return p};}catch{}
return[];
});

  const parseHash=()=>{
    const h=(window.location.hash||"#/dashboard").slice(1);

    setViewRaw(newView);

    try{const cs=JSON.parse(localStorage.getItem("tj_csetups")||"[]");cs.forEach(t=>{if(!initial.setupTags.includes(t))initial.setupTags.push(t)})}catch{}
    try{const cc=JSON.parse(localStorage.getItem("tj_cconfs")||"[]");cc.forEach(t=>{if(!initial.confirmationTags.includes(t))initial.confirmationTags.push(t)})}catch{}
    return initial;
  });
  const[config,setConfig]=useState(()=>{try{const d=localStorage.getItem("tj_config");return d?JSON.parse(d):{exchanges:{}}}catch{return{exchanges:{}}}});
  const[accounts,setAccounts]=useState(()=>{try{const d=localStorage.getItem("tj_accounts");return d?JSON.parse(d):[]}catch{return[]}});

    setTrades(p=>p.map(t=>{const arr=t[catKey]||[];if(!arr.includes(oldTag))return t;return{...t,[catKey]:arr.map(x=>x===oldTag?newTag:x)}}));
  };

  const syncLayersToFlatTags=(t)=>{
    if(!t.layers||t.layers.length===0)return t;
    const setups=new Set(t.setupTags||[]);
    const confs=new Set(t.confirmationTags||[]);
    const tfs=new Set(t.timeframeTags||[]);

      if(l.timeframe)tfs.add(l.timeframe);

    return{...t,setupTags:[...setups],confirmationTags:[...confs],timeframeTags:[...tfs]};
  };

  const saveTrade=()=>{

    const synced=syncLayersToFlatTags(newTrade);

  const importData=e=>{
    const file=e.target.files[0];if(!file)return;

      const data=JSON.parse(ev.target.result);

  const[quickTagTrade,setQuickTagTrade]=useState(null);

  const[syncing,setSyncing]=useState(false);

  const syncInterval=config.syncInterval||0; // 0=off, 15/30/60 min

  const doSync=useCallback(async(silent)=>{
    if(syncing||connectedCount===0)return;
