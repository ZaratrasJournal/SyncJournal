// ═══ Trade Card Export — 4 designs + veld-toggles + PNG download ═══
function TradeCardExport({trade,onClose}){
  const [style,setStyle]=useState(()=>{try{return localStorage.getItem("tj_card_style")||"classic"}catch{return"classic"}});
  const [fields,setFields]=useState(()=>{try{return JSON.parse(localStorage.getItem("tj_card_fields")||"null")||{pnlAbs:true,pnlPct:true,rMult:true,entry:true,exit:true,size:true,stopLoss:false,holdTime:true,setup:true,dateTime:true,session:true,anonPair:false}}catch{return{}}});
  useEffect(()=>{try{localStorage.setItem("tj_card_style",style);localStorage.setItem("tj_card_fields",JSON.stringify(fields));}catch{}},[style,fields]);
  const cardRef=useRef(null);
  const [busy,setBusy]=useState(false);

  // Compute all trade values once
  const pnl=parseFloat(trade.pnl)||0;
  const entryP=parseFloat(trade.entry)||0;
  const exitP=parseFloat(trade.exit)||0;
  const size=trade.positionSize||trade.positionSizeAsset||"";
  const sl=parseFloat(trade.stopLoss)||0;
  const dir=trade.direction||"long";
  const pairDisplay=fields.anonPair?"COIN/USDT":(trade.pair||"BTC/USDT");
  const pairShort=pairDisplay.split("/")[0];
  const quoteShort=pairDisplay.split("/")[1]||"USDT";
  const rMult=(()=>{if(!entryP||!sl||!exitP)return null;const r=Math.abs(entryP-sl);if(!r)return null;return Math.abs(exitP-entryP)/r*(pnl>=0?1:-1);})();
  const pnlPct=(()=>{if(!entryP||!size)return null;const notional=entryP*parseFloat(size);if(!notional)return null;return pnl/notional*100;})();
  const holdMs=trade.openTime&&trade.closeTime?Math.abs(parseInt(trade.closeTime)-parseInt(trade.openTime)):0;
  const holdStr=holdMs?(holdMs>86400000?(holdMs/86400000).toFixed(1)+"d":holdMs>3600000?Math.floor(holdMs/3600000)+"h "+Math.floor((holdMs%3600000)/60000)+"m":Math.floor(holdMs/60000)+"m"):"–";
  const sessionStr=(()=>{try{const s=getSessionTags(trade.date,trade.time);return s[0]||"–";}catch{return"–";}})();
  const setupStr=(trade.setupTags||[]).slice(0,2).join(" · ")||"–";
  const dirColor=pnl>=0?"#2eaa6f":"#e05555";
  const pnlSign=pnl>=0?"+":"";
  const dateDisplay=fmtNL(trade.date||"")+(trade.time?" · "+trade.time:"");

  const[copyStatus,setCopyStatus]=useState("");
  const renderCanvas=async()=>{
    const el=cardRef.current;
    if(!el)throw new Error("card niet gevonden");
    // Clone the card into an isolated detached container, away from any parent CSS
    // (parent conic-gradient / transform:scale / backdrop-filter can break html2canvas)
    const sandbox=document.createElement("div");
    sandbox.style.cssText="position:fixed;left:-99999px;top:0;pointer-events:none;background:transparent;z-index:-1";
    const clone=el.cloneNode(true);
    clone.classList.add("capture-mode");
    sandbox.appendChild(clone);
    document.body.appendChild(sandbox);
    try{
      await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
      return await html2canvas(clone,{backgroundColor:null,scale:2,logging:false,useCORS:true,imageTimeout:0,removeContainer:true,foreignObjectRendering:false});
    }finally{
      document.body.removeChild(sandbox);
    }
  };
  const downloadPNG=async()=>{
    if(!cardRef.current||typeof html2canvas==="undefined")return;
    setBusy(true);
    try{
      const canvas=await renderCanvas();
      const url=canvas.toDataURL("image/png");
      const a=document.createElement("a");a.href=url;a.download=`trade-${pairShort}-${trade.date||"card"}.png`;a.click();
    }catch(e){alert("Export mislukt: "+e.message)}
    setBusy(false);
  };
  const copyImage=async()=>{
    if(!cardRef.current||typeof html2canvas==="undefined")return;
    if(!navigator.clipboard||!window.ClipboardItem){setCopyStatus("Browser ondersteunt geen clipboard-image (gebruik Download)");setTimeout(()=>setCopyStatus(""),3500);return}
    setBusy(true);setCopyStatus("");
    try{
      const canvas=await renderCanvas();
      const blob=await new Promise(r=>canvas.toBlob(r,"image/png"));
      if(!blob)throw new Error("Kon geen PNG blob maken");
      await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
      setCopyStatus("✓ Gekopieerd — plak in Discord met Ctrl+V");
      setTimeout(()=>setCopyStatus(""),3000);
    }catch(e){
      setCopyStatus("Kopiëren mislukt: "+(e.message||"onbekend"));
      setTimeout(()=>setCopyStatus(""),3500);
    }
    setBusy(false);
  };

  const FieldToggle=({k,label})=>(
    <label style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 10px",background:fields[k]?"rgba(46,170,111,.08)":"rgba(255,255,255,.02)",border:`1px solid ${fields[k]?"rgba(46,170,111,.22)":"var(--border2)"}`,borderRadius:"6px",cursor:"pointer",fontSize:"12px",color:"var(--text2)",marginBottom:"4px",userSelect:"none"}}>
      <input type="checkbox" checked={!!fields[k]} onChange={()=>setFields(p=>({...p,[k]:!p[k]}))} style={{accentColor:"var(--gold)",width:"14px",height:"14px",cursor:"pointer"}}/>
      <span>{label}</span>
    </label>
  );

  // Per-card crypto animations — injected via style-block
  const animStyle=(<style>{`
    @keyframes coinOrbit{0%{transform:rotate(0) translateX(140px) rotate(0)}100%{transform:rotate(360deg) translateX(140px) rotate(-360deg)}}
    @keyframes coinFloat{0%,100%{transform:translateY(0) rotateY(0)}50%{transform:translateY(-12px) rotateY(180deg)}}
    @keyframes candleRise{0%{opacity:0;transform:translateY(30px) scale(.8)}15%{opacity:1}80%{opacity:.6}100%{opacity:0;transform:translateY(-140px) scale(1.2)}}
    @keyframes chartScroll{0%{transform:translateX(0)}100%{transform:translateX(-120px)}}
    @keyframes rocketFly{0%{transform:translate(-40px,420px) rotate(-20deg);opacity:0}10%{opacity:1}100%{transform:translate(420px,-80px) rotate(-20deg);opacity:0}}
    @keyframes rocketFall{0%{transform:translate(-40px,-80px) rotate(160deg);opacity:0}10%{opacity:1}100%{transform:translate(420px,460px) rotate(160deg);opacity:0}}
    @keyframes sparkle{0%,100%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.2)}}
    @keyframes numberTick{0%{transform:translateY(8px);opacity:.4}100%{transform:translateY(0);opacity:1}}
    @keyframes priceBlink{0%,100%{opacity:1}50%{opacity:.55}}
    @keyframes coinSpin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}
    @keyframes pulseRing{0%{transform:scale(.95);opacity:.9}70%{transform:scale(1.3);opacity:0}100%{transform:scale(1.3);opacity:0}}
    @keyframes scanLine{0%{left:-2%;opacity:0}8%{opacity:1}92%{opacity:1}100%{left:102%;opacity:0}}
    @keyframes sparkDraw{0%{stroke-dashoffset:1800}60%,100%{stroke-dashoffset:0}}
    @keyframes glyphFloat{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-6px) rotate(-6deg)}}
    @keyframes priceGlow{0%,100%{filter:drop-shadow(0 0 12px currentColor)}50%{filter:drop-shadow(0 0 24px currentColor)}}
    @keyframes tickerSlide{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    @keyframes gridDrift{0%{background-position:0 0}100%{background-position:30px 30px}}
    .capture-mode,.capture-mode *{animation:none!important;transition:none!important}
  `}</style>);

  // Static sparkline path — looks like real BTC price action, direction depends on win/loss
  const sparkPath=pnl>=0
    ? "M0,58 L30,54 L60,56 L90,48 L120,50 L150,42 L180,44 L210,36 L240,40 L270,30 L300,33 L330,26 L360,22 L390,28 L420,18 L450,14 L480,20 L510,10 L540,12 L570,6 L600,4"
    : "M0,10 L30,14 L60,8 L90,16 L120,12 L150,20 L180,16 L210,24 L240,20 L270,30 L300,26 L330,34 L360,38 L390,32 L420,42 L450,46 L480,40 L510,50 L540,48 L570,54 L600,58";
  const sparkFill=sparkPath+" L600,80 L0,80 Z";

  // Design 1 — Exchange Premium (Bybit/Binance inspired) — ₿ watermark + static price chart
  const Design1=()=>(<div ref={cardRef} style={{width:"600px",height:"400px",background:"linear-gradient(135deg,#06080c 0%,#0c0f16 60%,#080a10 100%)",borderRadius:"20px",padding:"28px 32px",position:"relative",overflow:"hidden",color:"#fff",border:"1px solid rgba(201,168,76,.25)",fontFamily:"'Outfit',sans-serif"}}>
    {animStyle}
    {/* Massive ₿ watermark — right side, static */}
    <div style={{position:"absolute",right:"-80px",top:"50%",transform:"translateY(-50%) rotate(-6deg)",fontSize:"460px",fontWeight:900,color:"rgba(201,168,76,.055)",lineHeight:.8,userSelect:"none",pointerEvents:"none",letterSpacing:"-.06em",fontFamily:"'Times New Roman',serif"}}>₿</div>
    {/* Static candle silhouette — pure divs, no SVG */}
    <div style={{position:"absolute",left:"32px",width:"536px",bottom:"88px",height:"80px",opacity:.28,pointerEvents:"none",display:"flex",alignItems:"flex-end",gap:"3px"}}>
      {candleHeights.slice(0,30).map((h,i)=>{const up=pnl>=0?(i%4!==2):(i%4===0);return(<div key={i} style={{flex:1,height:Math.min(h,85)+"%",background:up?"#2eaa6f":"#e05555",borderRadius:"1px 1px 0 0"}}/>)})}
    </div>
    {/* Top gold border line */}
    <div style={{position:"absolute",top:0,left:0,right:0,height:"1px",background:"linear-gradient(90deg,transparent,rgba(201,168,76,.6),transparent)"}}/>
    {/* Corner accents */}
    <div style={{position:"absolute",top:"14px",left:"14px",width:"18px",height:"18px",borderTop:"1px solid rgba(201,168,76,.5)",borderLeft:"1px solid rgba(201,168,76,.5)",pointerEvents:"none"}}/>
    <div style={{position:"absolute",top:"14px",right:"14px",width:"18px",height:"18px",borderTop:"1px solid rgba(201,168,76,.5)",borderRight:"1px solid rgba(201,168,76,.5)",pointerEvents:"none"}}/>
    <div style={{position:"absolute",bottom:"14px",left:"14px",width:"18px",height:"18px",borderBottom:"1px solid rgba(201,168,76,.5)",borderLeft:"1px solid rgba(201,168,76,.5)",pointerEvents:"none"}}/>
    <div style={{position:"absolute",bottom:"14px",right:"14px",width:"18px",height:"18px",borderBottom:"1px solid rgba(201,168,76,.5)",borderRight:"1px solid rgba(201,168,76,.5)",pointerEvents:"none"}}/>

    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"22px",position:"relative",zIndex:2}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <div style={{width:"32px",height:"32px",borderRadius:"8px",background:"linear-gradient(135deg,#f0d57a,#C9A84C,#8c721c)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:"16px",color:"#000",boxShadow:"0 2px 10px rgba(201,168,76,.4)"}}>M</div>
        <div>
          <div style={{fontWeight:800,fontSize:"12px",letterSpacing:".02em",lineHeight:1.1}}>SyncJournal</div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"rgba(255,255,255,.45)",letterSpacing:".18em",textTransform:"uppercase",marginTop:"2px"}}>Morani · Trade</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
        <div style={{width:"6px",height:"6px",borderRadius:"50%",background:dirColor,boxShadow:`0 0 8px ${dirColor}`}}/>
        {fields.dateTime&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"rgba(255,255,255,.5)",letterSpacing:".08em"}}>{dateDisplay}</div>}
      </div>
    </div>

    {/* Ticker + direction row */}
    <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"4px",position:"relative",zIndex:2}}>
      <div style={{fontSize:"44px",fontWeight:900,letterSpacing:"-.02em",lineHeight:1,color:"#fff"}}>{pairDisplay}</div>
      <div style={{padding:"4px 10px",borderRadius:"5px",fontSize:"10px",fontWeight:800,letterSpacing:".12em",background:dir==="long"?"rgba(46,170,111,.15)":"rgba(224,85,85,.15)",color:dirColor,border:`1px solid ${dir==="long"?"rgba(46,170,111,.45)":"rgba(224,85,85,.45)"}`,textTransform:"uppercase"}}>{dir==="long"?"▲ Long":"▼ Short"}</div>
    </div>

    {/* Sub-label */}
    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"rgba(201,168,76,.7)",letterSpacing:".2em",textTransform:"uppercase",marginBottom:"18px",position:"relative",zIndex:2}}>Realized P&L · Net of fees</div>

    {/* Big PnL */}
    {fields.pnlAbs&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"64px",fontWeight:800,color:dirColor,letterSpacing:"-.03em",lineHeight:1,marginBottom:"8px",position:"relative",zIndex:2}}>{pnlSign}${fmt(Math.abs(pnl))}</div>}

    {/* Sub-stats inline */}
    <div style={{fontSize:"12px",color:"rgba(255,255,255,.65)",fontWeight:500,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".04em",position:"relative",zIndex:2}}>
      {fields.rMult&&rMult!==null&&<span style={{color:"#C9A84C",fontWeight:700}}>{rMult>=0?"+":""}{rMult.toFixed(2)}R</span>}
      {fields.pnlPct&&pnlPct!==null&&<>{fields.rMult&&rMult!==null?" · ":""}<span style={{color:dirColor}}>{pnlPct>=0?"+":""}{pnlPct.toFixed(2)}%</span></>}
    </div>

    {/* Bottom stats row */}
    <div style={{position:"absolute",bottom:"22px",left:"32px",right:"32px",display:"flex",justifyContent:"space-between",alignItems:"flex-end",zIndex:2}}>
      <div style={{display:"flex",gap:"18px",fontSize:"10px"}}>
        {fields.entry&&<div><div style={{color:"rgba(255,255,255,.38)",textTransform:"uppercase",letterSpacing:".14em",fontWeight:600,marginBottom:"2px",fontSize:"8px"}}>Entry</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:700,color:"rgba(255,255,255,.92)"}}>{entryP?fmt(entryP):"–"}</div></div>}
        {fields.exit&&<div><div style={{color:"rgba(255,255,255,.38)",textTransform:"uppercase",letterSpacing:".14em",fontWeight:600,marginBottom:"2px",fontSize:"8px"}}>Exit</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:700,color:dirColor}}>{exitP?fmt(exitP):"–"}</div></div>}
        {fields.size&&<div><div style={{color:"rgba(255,255,255,.38)",textTransform:"uppercase",letterSpacing:".14em",fontWeight:600,marginBottom:"2px",fontSize:"8px"}}>Size</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:700,color:"rgba(255,255,255,.92)"}}>{size||"–"}</div></div>}
        {fields.holdTime&&holdStr!=="–"&&<div><div style={{color:"rgba(255,255,255,.38)",textTransform:"uppercase",letterSpacing:".14em",fontWeight:600,marginBottom:"2px",fontSize:"8px"}}>Hold</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:700,color:"rgba(255,255,255,.92)"}}>{holdStr}</div></div>}
      </div>
      {(fields.setup&&setupStr!=="–")||(fields.session&&sessionStr!=="–")?<div style={{display:"flex",gap:"5px"}}>
        {fields.setup&&(trade.setupTags||[]).slice(0,2).map(t=>(<div key={t} style={{padding:"3px 7px",borderRadius:"3px",fontSize:"8px",fontWeight:700,background:"rgba(201,168,76,.12)",color:"#C9A84C",border:"1px solid rgba(201,168,76,.28)",letterSpacing:".04em"}}>{t}</div>))}
        {fields.session&&sessionStr!=="–"&&<div style={{padding:"3px 7px",borderRadius:"3px",fontSize:"8px",fontWeight:700,background:"rgba(138,159,192,.12)",color:"#8a9fc0",border:"1px solid rgba(138,159,192,.28)",letterSpacing:".04em"}}>{sessionStr}</div>}
      </div>:null}
    </div>
  </div>);

  // Static candle heights — looks like a real BTC chart session, deterministic
  const candleHeights=[28,34,30,38,32,42,38,48,42,52,45,55,50,62,55,65,60,70,65,58,62,68,72,65,70,78,72,80,75,82,78,85,80,88,82,92,85,95,88,90];
  // Design 2 — Exchange-Grade Static (1200x630) — ₿ watermark + static candle chart + clean hierarchy
  const Design2=()=>(<div ref={cardRef} style={{width:"1200px",height:"630px",background:"linear-gradient(135deg,#06080c 0%,#0a0d15 50%,#06080c 100%)",position:"relative",overflow:"hidden",color:"#fff",fontFamily:"'Outfit',sans-serif",display:"flex",flexDirection:"column"}}>
    {animStyle}
    {/* Massive ₿ watermark — right side */}
    <div style={{position:"absolute",right:"-140px",top:"90px",fontSize:"720px",fontWeight:900,color:"rgba(201,168,76,.055)",lineHeight:.8,userSelect:"none",pointerEvents:"none",letterSpacing:"-.06em",fontFamily:"'Times New Roman',serif"}}>₿</div>
    {/* Static candle chart across bottom — realistic rally/drop silhouette */}
    <div style={{position:"absolute",left:"56px",width:"744px",bottom:"76px",height:"220px",opacity:.18,pointerEvents:"none",display:"flex",alignItems:"flex-end",gap:"4px"}}>
      {candleHeights.map((h,i)=>{const up=pnl>=0?(i%4!==2):(i%4===0);return(<div key={i} style={{flex:1,height:h+"%",background:up?"#2eaa6f":"#e05555",borderRadius:"1px 1px 0 0"}}/>)})}
    </div>
    {/* Top accent line */}
    <div style={{height:"2px",background:"linear-gradient(90deg,transparent 0%,rgba(201,168,76,.55) 50%,transparent 100%)",position:"relative",zIndex:3}}/>
    {/* Corner accents */}
    <div style={{position:"absolute",top:"18px",left:"18px",width:"24px",height:"24px",borderTop:"1px solid rgba(201,168,76,.55)",borderLeft:"1px solid rgba(201,168,76,.55)",pointerEvents:"none",zIndex:4}}/>
    <div style={{position:"absolute",top:"18px",right:"18px",width:"24px",height:"24px",borderTop:"1px solid rgba(201,168,76,.55)",borderRight:"1px solid rgba(201,168,76,.55)",pointerEvents:"none",zIndex:4}}/>
    <div style={{position:"absolute",bottom:"18px",left:"18px",width:"24px",height:"24px",borderBottom:"1px solid rgba(201,168,76,.55)",borderLeft:"1px solid rgba(201,168,76,.55)",pointerEvents:"none",zIndex:4}}/>
    <div style={{position:"absolute",bottom:"18px",right:"18px",width:"24px",height:"24px",borderBottom:"1px solid rgba(201,168,76,.55)",borderRight:"1px solid rgba(201,168,76,.55)",pointerEvents:"none",zIndex:4}}/>

    <div style={{flex:1,padding:"44px 56px 0",display:"grid",gridTemplateColumns:"1fr 380px",gap:"40px",position:"relative",zIndex:2}}>
      <div style={{display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"10px"}}>
            <div style={{width:"52px",height:"52px",borderRadius:"14px",background:"linear-gradient(135deg,#f7931a 0%,#ffb84d 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"28px",fontWeight:900,color:"#fff",boxShadow:"0 6px 20px rgba(247,147,26,.35)",flexShrink:0}}>{pairShort.charAt(0)}</div>
            <div style={{fontSize:"60px",fontWeight:900,letterSpacing:"-.02em",lineHeight:1,color:"#fff"}}>{pairDisplay}</div>
            <div style={{padding:"8px 16px",borderRadius:"7px",fontSize:"13px",fontWeight:800,letterSpacing:".12em",background:dir==="long"?"rgba(46,170,111,.18)":"rgba(224,85,85,.18)",color:dirColor,border:`1.5px solid ${dir==="long"?"rgba(46,170,111,.5)":"rgba(224,85,85,.5)"}`,textTransform:"uppercase"}}>{dir==="long"?"▲ Long":"▼ Short"}</div>
          </div>
          {fields.dateTime&&<div style={{color:"rgba(255,255,255,.5)",fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",letterSpacing:".1em",textTransform:"uppercase"}}>{dateDisplay}{fields.session&&sessionStr!=="–"&&" · "+sessionStr}</div>}
        </div>
        <div style={{marginBottom:"20px"}}>
          {fields.pnlAbs&&<>
            <div style={{fontSize:"12px",color:"rgba(201,168,76,.75)",textTransform:"uppercase",letterSpacing:".28em",fontWeight:700,marginBottom:"12px"}}>Realized P&amp;L · Net of fees</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"128px",fontWeight:900,color:dirColor,letterSpacing:"-.04em",lineHeight:.88}}>{pnlSign}${fmt(Math.abs(pnl))}</div>
            <div style={{fontSize:"18px",color:"rgba(255,255,255,.7)",fontFamily:"'JetBrains Mono',monospace",marginTop:"10px",letterSpacing:".04em"}}>
              {fields.rMult&&rMult!==null&&<span style={{color:"#C9A84C",fontWeight:700}}>{rMult>=0?"+":""}{rMult.toFixed(2)}R</span>}
              {fields.pnlPct&&pnlPct!==null&&<>{fields.rMult&&rMult!==null?" · ":""}<span style={{color:dirColor}}>{pnlPct>=0?"+":""}{pnlPct.toFixed(2)}%</span></>}
            </div>
          </>}
        </div>
      </div>
      <div style={{background:"rgba(201,168,76,.07)",border:"1px solid rgba(201,168,76,.3)",borderRadius:"14px",padding:"24px",display:"flex",flexDirection:"column",justifyContent:"center",height:"fit-content",marginTop:"4px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"16px"}}>
          <div style={{width:"4px",height:"14px",background:"#C9A84C",borderRadius:"2px"}}/>
          <div style={{fontSize:"11px",color:"#C9A84C",textTransform:"uppercase",letterSpacing:".24em",fontWeight:800}}>Trade detail</div>
        </div>
        {fields.entry&&<div style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:"1px solid rgba(255,255,255,.06)",fontSize:"13px"}}><span style={{color:"rgba(255,255,255,.55)",letterSpacing:".05em"}}>Entry</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:"rgba(255,255,255,.95)"}}>{entryP?fmt(entryP):"–"}</span></div>}
        {fields.exit&&<div style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:"1px solid rgba(255,255,255,.06)",fontSize:"13px"}}><span style={{color:"rgba(255,255,255,.55)",letterSpacing:".05em"}}>Exit</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:dirColor}}>{exitP?fmt(exitP):"–"}</span></div>}
        {fields.stopLoss&&sl>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:"1px solid rgba(255,255,255,.06)",fontSize:"13px"}}><span style={{color:"rgba(255,255,255,.55)",letterSpacing:".05em"}}>Stop-loss</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:"#e05555"}}>{fmt(sl)}</span></div>}
        {fields.size&&<div style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:"1px solid rgba(255,255,255,.06)",fontSize:"13px"}}><span style={{color:"rgba(255,255,255,.55)",letterSpacing:".05em"}}>Size</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:"rgba(255,255,255,.95)"}}>{size||"–"}</span></div>}
        {fields.holdTime&&holdStr!=="–"&&<div style={{display:"flex",justifyContent:"space-between",padding:"11px 0",borderBottom:"1px solid rgba(255,255,255,.06)",fontSize:"13px"}}><span style={{color:"rgba(255,255,255,.55)",letterSpacing:".05em"}}>Hold time</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:"rgba(255,255,255,.95)"}}>{holdStr}</span></div>}
        {fields.setup&&setupStr!=="–"&&<div style={{display:"flex",justifyContent:"space-between",padding:"11px 0",fontSize:"13px"}}><span style={{color:"rgba(255,255,255,.55)",letterSpacing:".05em"}}>Setup</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:"#C9A84C"}}>{setupStr}</span></div>}
      </div>
    </div>
    <div style={{background:"rgba(0,0,0,.6)",padding:"18px 56px",display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid rgba(201,168,76,.15)",position:"relative",zIndex:3}}>
      <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
        <div style={{width:"40px",height:"40px",borderRadius:"11px",background:"linear-gradient(135deg,#f0d57a,#C9A84C,#8c721c)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:"20px",color:"#000"}}>M</div>

  </div>);

  // Design 4 — Instagram Story — 🚀 rocket to moon (win) / ☄️ meteor fall (loss) + sparkles
  const Design4=()=>(<div ref={cardRef} style={{width:"432px",height:"768px",background:"linear-gradient(180deg,#000 0%,#0c0e13 50%,#000 100%)",color:"#fff",fontFamily:"'Outfit',sans-serif",position:"relative",overflow:"hidden",display:"flex",flexDirection:"column"}}>
    {animStyle}
    <div style={{position:"absolute",top:0,left:0,right:0,height:"100%",background:`radial-gradient(ellipse 300px 200px at 50% 30%,${pnl>=0?"rgba(46,170,111,.15)":"rgba(224,85,85,.15)"} 0%,transparent 60%)`,pointerEvents:"none"}}/>
    {/* Static rocket arc — diagonal trail for win, diagonal drop for loss */}
    <div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",overflow:"hidden"}}>
      <div style={{position:"absolute",fontSize:"44px",top:pnl>=0?"30%":"20%",right:pnl>=0?"18%":"22%",transform:pnl>=0?"rotate(-25deg)":"rotate(160deg)",filter:`drop-shadow(0 0 14px ${pnl>=0?"#2eaa6f":"#e05555"})`}}>{pnl>=0?"🚀":"☄️"}</div>
      {/* Static sparkle/debris sprinkled across card */}
      {[[12,18,14],[22,72,10],[35,8,12],[48,85,14],[60,15,10],[68,65,14],[78,22,12],[88,78,10]].map(([top,left,sz],i)=>(
        <div key={i} style={{position:"absolute",top:top+"%",left:left+"%",fontSize:sz+"px",opacity:.85,color:pnl>=0?"#C9A84C":"#e05555",textShadow:pnl>=0?"0 0 6px #C9A84C":"none"}}>{pnl>=0?"✨":"·"}</div>
      ))}
    </div>
    {/* ₿ watermark */}
    <div style={{position:"absolute",right:"-40px",bottom:"-30px",fontSize:"320px",fontWeight:900,color:"rgba(201,168,76,.06)",lineHeight:.8,pointerEvents:"none",letterSpacing:"-.06em",fontFamily:"serif",transform:"rotate(-8deg)"}}>₿</div>
    <div style={{padding:"30px",display:"flex",justifyContent:"space-between",alignItems:"center",zIndex:2,position:"relative"}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <div style={{width:"36px",height:"36px",borderRadius:"10px",background:"linear-gradient(135deg,#f0d57a,#C9A84C)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#000"}}>M</div>
        <div style={{fontWeight:800,fontSize:"14px"}}>SyncJournal</div>
      </div>
      {fields.dateTime&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"11px",color:"rgba(255,255,255,.5)"}}>{fmtNL(trade.date||"")}</div>}
    </div>
    <div style={{padding:"40px 30px",textAlign:"center",zIndex:2,position:"relative"}}>
      <div style={{fontSize:"56px",fontWeight:900,letterSpacing:"-.03em",marginBottom:"12px",lineHeight:1}}>{pairDisplay}</div>
      <div style={{display:"inline-block",padding:"8px 24px",borderRadius:"30px",fontSize:"14px",fontWeight:800,letterSpacing:".2em",background:`linear-gradient(135deg,${dir==="long"?"rgba(46,170,111,.2)":"rgba(224,85,85,.2)"},${dir==="long"?"rgba(46,170,111,.08)":"rgba(224,85,85,.08)"})`,color:dirColor,border:`2px solid ${dir==="long"?"rgba(46,170,111,.5)":"rgba(224,85,85,.5)"}`,boxShadow:`0 8px 24px ${dirColor}30`}}>{dir==="long"?"📈 LONG":"📉 SHORT"}</div>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 30px",zIndex:2,position:"relative"}}>
      {fields.pnlAbs&&<>
        <div style={{fontSize:"12px",color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".3em",fontWeight:600,marginBottom:"16px"}}>💰 Realized</div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"96px",fontWeight:900,color:dirColor,letterSpacing:"-.04em",lineHeight:.9,textShadow:`0 0 40px ${dirColor}80`,marginBottom:"8px"}}>{pnlSign}${fmt(Math.abs(pnl))}</div>
        <div style={{fontSize:"18px",color:"rgba(255,255,255,.7)",fontFamily:"'JetBrains Mono',monospace"}}>
          {fields.rMult&&rMult!==null&&<>{rMult>=0?"+":""}{rMult.toFixed(1)}R</>}
          {fields.session&&sessionStr!=="–"&&<> · {sessionStr}</>}
        </div>
      </>}
    </div>
    <div style={{padding:"20px 30px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",zIndex:2,position:"relative"}}>
      {fields.entry&&<div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"10px",padding:"14px 10px",textAlign:"center"}}><div style={{fontSize:"9px",color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".1em",fontWeight:600,marginBottom:"4px"}}>Entry</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"16px",fontWeight:700}}>{entryP?fmt(entryP):"–"}</div></div>}
      {fields.exit&&<div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"10px",padding:"14px 10px",textAlign:"center"}}><div style={{fontSize:"9px",color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".1em",fontWeight:600,marginBottom:"4px"}}>Exit</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"16px",fontWeight:700}}>{exitP?fmt(exitP):"–"}</div></div>}
      {fields.holdTime&&<div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:"10px",padding:"14px 10px",textAlign:"center"}}><div style={{fontSize:"9px",color:"rgba(255,255,255,.5)",textTransform:"uppercase",letterSpacing:".1em",fontWeight:600,marginBottom:"4px"}}>Hold</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"16px",fontWeight:700}}>{holdStr}</div></div>}
    </div>
    <div style={{padding:"20px 30px 30px",textAlign:"center",zIndex:2}}>
      {fields.setup&&(trade.setupTags||[]).length>0&&<div style={{display:"flex",justifyContent:"center",gap:"6px",flexWrap:"wrap",marginBottom:"16px"}}>{(trade.setupTags||[]).slice(0,3).map(t=>(<div key={t} style={{padding:"4px 10px",fontSize:"10px",fontWeight:600,color:"#C9A84C",border:"1px solid rgba(201,168,76,.3)",borderRadius:"20px",background:"rgba(201,168,76,.08)"}}>{t}</div>))}</div>}
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"10px",color:"rgba(255,255,255,.4)",letterSpacing:".12em"}}>SYNCJOURNAL · MORANI</div>
    </div>
  </div>);

  // Design 6 — Boss Mode (Ibiza Final Boss) — custom bg + luxury overlay + gold chain border
  const Design6=()=>(<div ref={cardRef} style={{width:"600px",height:"400px",position:"relative",overflow:"hidden",borderRadius:"20px",fontFamily:"'Outfit',sans-serif",color:"#fff",background:"#080808"}}>
    {/* Boss image — positioned RIGHT with left-fade */}
    <div style={{position:"absolute",top:0,right:0,bottom:0,width:"340px"}}>
      <img src={BOSS_BG} alt="" style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}}/>
      {/* Fade from right (transparent) to left (solid dark) */}
      <div style={{position:"absolute",inset:0,background:"linear-gradient(90deg,#080808 0%,rgba(8,8,8,.85) 25%,rgba(8,8,8,.3) 60%,transparent 100%)"}}/>
      {/* Subtle darkening at bottom */}
      <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,transparent 50%,rgba(8,8,8,.6) 100%)"}}/>
    </div>
    {/* Top gold accent line */}
    <div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:"linear-gradient(90deg,#8c721c,#f0d57a,#C9A84C,#f0d57a,#8c721c)",zIndex:3}}/>
    {/* Bottom gold accent line */}
    <div style={{position:"absolute",bottom:0,left:0,right:0,height:"2px",background:"linear-gradient(90deg,#8c721c,#f0d57a,#C9A84C,#f0d57a,#8c721c)",zIndex:3}}/>
    {/* Content — left-aligned for readability */}
    <div style={{position:"relative",zIndex:2,padding:"24px 28px",height:"100%",display:"flex",flexDirection:"column",justifyContent:"space-between",maxWidth:"340px"}}>
      {/* Header */}
      <div>
        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"4px"}}>
          <div style={{width:"30px",height:"30px",borderRadius:"8px",background:"linear-gradient(135deg,#f0d57a,#C9A84C,#8c721c)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:"15px",color:"#000",boxShadow:"0 2px 10px rgba(201,168,76,.5)"}}>M</div>
          <div><div style={{fontWeight:800,fontSize:"11px"}}>SyncJournal</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"8px",color:"rgba(255,255,255,.5)",letterSpacing:".18em"}}>BOSS MODE</div></div>
        </div>
        {fields.dateTime&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"9px",color:"rgba(255,255,255,.5)",marginTop:"4px"}}>{dateDisplay}</div>}
      </div>
      {/* Pair + direction */}
      <div>
        <div style={{fontSize:"38px",fontWeight:900,letterSpacing:"-.02em",lineHeight:1,marginBottom:"6px"}}>{pairDisplay}</div>
        <div style={{display:"inline-block",padding:"4px 12px",borderRadius:"5px",fontSize:"11px",fontWeight:800,letterSpacing:".1em",background:dir==="long"?"rgba(46,170,111,.2)":"rgba(224,85,85,.2)",color:dirColor,border:`1px solid ${dir==="long"?"rgba(46,170,111,.45)":"rgba(224,85,85,.45)"}`}}>{dir==="long"?"▲ LONG":"▼ SHORT"}</div>
      </div>
      {/* PnL */}
      <div>
        {fields.pnlAbs&&<div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"48px",fontWeight:900,color:dirColor,letterSpacing:"-.03em",lineHeight:1,textShadow:`0 0 24px ${dirColor}66`,marginBottom:"4px"}}>{pnlSign}${fmt(Math.abs(pnl))}</div>}
        <div style={{display:"flex",gap:"10px",fontSize:"12px",fontFamily:"'JetBrains Mono',monospace"}}>
          {fields.rMult&&rMult!==null&&<span style={{color:"#f0d57a",fontWeight:700}}>{rMult>=0?"+":""}{rMult.toFixed(1)}R</span>}
          {fields.pnlPct&&pnlPct!==null&&<span style={{color:"rgba(255,255,255,.7)"}}>{pnlPct>=0?"+":""}{pnlPct.toFixed(2)}%</span>}
          {fields.session&&sessionStr!=="–"&&<span style={{color:"rgba(255,255,255,.5)"}}>· {sessionStr}</span>}
        </div>
      </div>
      {/* Bottom stats */}
      <div style={{display:"flex",gap:"16px",fontSize:"9px"}}>
        {fields.entry&&<div><div style={{color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:".12em",fontWeight:600,marginBottom:"2px"}}>Entry</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:700}}>{entryP?fmt(entryP):"–"}</div></div>}
        {fields.exit&&<div><div style={{color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:".12em",fontWeight:600,marginBottom:"2px"}}>Exit</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:700,color:dirColor}}>{exitP?fmt(exitP):"–"}</div></div>}
        {fields.size&&<div><div style={{color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:".12em",fontWeight:600,marginBottom:"2px"}}>Size</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:700}}>{size||"–"}</div></div>}
        {fields.holdTime&&holdStr!=="–"&&<div><div style={{color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:".12em",fontWeight:600,marginBottom:"2px"}}>Hold</div><div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:"13px",fontWeight:700}}>{holdStr}</div></div>}
      </div>
    </div>
    {/* Setup tags — bottom right, floating over image */}
    {fields.setup&&(trade.setupTags||[]).length>0&&<div style={{position:"absolute",bottom:"24px",right:"24px",zIndex:2,display:"flex",gap:"5px"}}>{(trade.setupTags||[]).slice(0,2).map(tg=>(<div key={tg} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"9px",fontWeight:700,background:"rgba(201,168,76,.25)",color:"#f0d57a",border:"1px solid rgba(201,168,76,.4)",backdropFilter:"blur(6px)"}}>{tg}</div>))}</div>}
  </div>);

  return(<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:9998,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",backdropFilter:"blur(8px)",overflowY:"auto"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"var(--bg2)",border:"1px solid var(--gold-border)",borderRadius:"16px",maxWidth:"1400px",width:"100%",maxHeight:"92vh",overflow:"auto",display:"grid",gridTemplateColumns:"280px 1fr",gap:"0"}}>
      {/* Sidebar */}
      <div style={{padding:"24px",borderRight:"1px solid var(--border3)",background:"var(--bg3)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
          <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:".12em",fontWeight:700}}>Deel als kaart</div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:"var(--text3)",fontSize:"18px",cursor:"pointer"}}>✕</button>
        </div>
        <div style={{fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:".1em",fontWeight:600,marginBottom:"8px"}}>Stijl</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px",marginBottom:"20px"}}>
          {[["classic","Classic"],["ticker","Ticker"],["story","Story"],["minimal","Minimal"],["boss","🔥 Boss"]].map(([k,l])=>(
            <button key={k} onClick={()=>setStyle(k)} style={{padding:"10px",borderRadius:"6px",border:`1px solid ${style===k?"var(--gold)":"var(--border3)"}`,background:style===k?"var(--gold-dim)":"transparent",color:style===k?"var(--gold)":"var(--text3)",fontSize:"12px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
          ))}
        </div>
        <div style={{fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:".1em",fontWeight:600,marginBottom:"8px"}}>Velden</div>
        <FieldToggle k="pnlAbs" label="PnL ($)"/>
        <FieldToggle k="pnlPct" label="PnL %"/>
        <FieldToggle k="rMult" label="R-Multiple"/>
        <FieldToggle k="entry" label="Entry prijs"/>
        <FieldToggle k="exit" label="Exit prijs"/>
        <FieldToggle k="stopLoss" label="Stop-loss (Ticker)"/>
        <FieldToggle k="size" label="Size"/>
        <FieldToggle k="holdTime" label="Hold time"/>
        <FieldToggle k="setup" label="Setup tags"/>
        <FieldToggle k="session" label="Sessie"/>
        <FieldToggle k="dateTime" label="Datum/tijd"/>
        <div style={{marginTop:"12px",paddingTop:"12px",borderTop:"1px solid var(--border2)"}}>
          <FieldToggle k="anonPair" label="🥷 Pair anonimiseren"/>
