// ── Trading Rules compliance check ──
function evaluateRules(rules,dayTrades){
  return (rules||[]).filter(r=>r.enabled).map(r=>{
    let ok=true,detail="";
    if(r.type==="max_trades_per_day"){const n=dayTrades.length;ok=n<=r.value;detail=`${n} trade${n===1?"":"s"}`;}
    else if(r.type==="max_losses_per_day"){const l=dayTrades.filter(t=>parseFloat(t.pnl)<0).length;ok=l<=r.value;detail=`${l} loss${l===1?"":"es"}`;}
    else if(r.type==="require_sl"){const missing=dayTrades.filter(t=>!t.stopLoss||parseFloat(t.stopLoss)<=0).length;ok=missing===0;detail=missing?`${missing} zonder SL`:"100%";}
    else if(r.type==="require_entry_note"){const missing=dayTrades.filter(t=>!t.entryNote||!t.entryNote.trim()).length;ok=missing===0;detail=missing?`${missing} zonder notitie`:`${dayTrades.length}/${dayTrades.length}`;}
    else if(r.type==="max_risk_pct"){detail="handmatig gecheckt";}
    return{...r,ok,detail};
  });
}

function GoalsPage({goals,setGoals,trades}){
  const items=goals?.items||[];
  const addGoal=()=>{
    const id="g"+Date.now();
    const newGoal={id,metric:"pnl",label:"Nieuw doel",target:1000,period:"month",enabled:true};
    setGoals(p=>({...p,items:[...(p?.items||[]),newGoal]}));
  };
  const updateGoal=(id,patch)=>setGoals(p=>({...p,items:(p?.items||[]).map(g=>g.id===id?{...g,...patch}:g)}));
  const deleteGoal=(id)=>{
    const g=items.find(x=>x.id===id);
    if(!confirm(`Verwijder doel "${g?.label||id}"?`))return;
    setGoals(p=>({...p,items:(p?.items||[]).filter(g=>g.id!==id)}));
  };
  return(<div style={{animation:"fadeIn .3s ease"}}>
    <div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"24px",border:"1px solid var(--border1)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px",gap:"16px",flexWrap:"wrap"}}>
        <div>
          <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"4px"}}>🎯 Goals</div>
          <div style={{fontSize:"12px",color:"var(--text4)",lineHeight:1.6,maxWidth:"640px"}}>Stel je eigen maand/week/kwartaal-doelen in. Elke goal kiest een metric (PnL, winrate, R-multiple, drawdown enz.) en een periode. De rings op het Dashboard tonen alleen <em>actieve</em> doelen.</div>
        </div>
        <button onClick={addGoal} style={{padding:"10px 18px",borderRadius:"8px",border:"1px dashed var(--gold-border)",background:"var(--gold-dim)",color:"var(--gold)",fontSize:"12px",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ Doel toevoegen</button>
      </div>

      {items.length===0&&<div style={{fontSize:"13px",color:"var(--text4)",textAlign:"center",padding:"30px",background:"rgba(255,255,255,.02)",borderRadius:"8px",border:"1px dashed var(--border3)"}}>Nog geen doelen — klik <strong style={{color:"var(--gold)"}}>+ Doel toevoegen</strong> om te beginnen.</div>}

      {items.map(g=>{
        const def=GOAL_METRICS.find(m=>m.id===g.metric)||GOAL_METRICS[0];
        const current=computeGoalMetric(g.metric,trades,g.period||"month");
        const target=parseFloat(g.target)||0;
        const reached=def.inverted?current<=target:current>=target;
        const progress=target?Math.min(def.inverted?Math.max(0,1-current/target):current/target,1.2):0;
        const pct=Math.round(Math.min(progress,1)*100);
        return(<div key={g.id} style={{padding:"14px 16px",background:"rgba(255,255,255,.02)",border:`1px solid ${g.enabled?"var(--border3)":"var(--border1)"}`,borderLeft:`3px solid ${g.enabled?(reached?"var(--green)":"var(--gold)"):"var(--text5)"}`,borderRadius:"8px",marginBottom:"10px",opacity:g.enabled?1:0.55,transition:"all .15s"}}>

            <button onClick={()=>updateGoal(g.id,{enabled:!g.enabled})} title={g.enabled?"Actief":"Inactief"} style={{width:"24px",height:"24px",borderRadius:"5px",border:`1.5px solid ${g.enabled?"var(--green)":"var(--border4)"}`,background:g.enabled?"rgba(46,170,111,.15)":"transparent",color:g.enabled?"var(--green)":"var(--text5)",cursor:"pointer",fontSize:"13px",fontWeight:700,fontFamily:"inherit"}}>{g.enabled?"✓":""}</button>

            <div>
              <div style={{fontSize:"9px",color:"var(--text5)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"3px",fontWeight:600}}>Metric</div>
              <select value={g.metric} onChange={e=>updateGoal(g.id,{metric:e.target.value})} style={{width:"100%",padding:"6px 10px",borderRadius:"5px",border:"1px solid var(--border3)",background:"var(--bg3)",color:"var(--text2)",fontSize:"12px",fontFamily:"inherit",outline:"none",cursor:"pointer"}}>
                {GOAL_METRICS.map(m=>(<option key={m.id} value={m.id}>{m.label} ({m.unit})</option>))}

            <div>

              </select>
            </div>
            <div>
              <div style={{fontSize:"9px",color:"var(--text5)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:"3px",fontWeight:600}}>Doel {def.inverted?"(max)":"(min)"}</div>

                <div style={{height:"100%",width:pct+"%",background:reached?"var(--green)":"var(--gold)",transition:"width .3s"}}/>
              </div>
              <span style={{fontFamily:"var(--mono)",color:"var(--text3)",fontSize:"10px",minWidth:"36px",textAlign:"right"}}>{pct}%</span>
            </div>
            <div style={{fontFamily:"var(--mono)",color:reached?"var(--green)":"var(--text2)",fontWeight:700}}>

// ── Trading Rules compliance widget (inklapbaar + handmatige override) ──
function TradingRulesWidget({rules,trades}){
  const today=new Date().toISOString().split("T")[0];
  const[collapsed,setCollapsed]=useState(()=>{try{return localStorage.getItem("tj_rules_collapsed")==="1"}catch{return false}});
  const[manual,setManual]=useState(()=>{try{return JSON.parse(localStorage.getItem("tj_rules_manual")||"{}")}catch{return{}}});
  useEffect(()=>{try{localStorage.setItem("tj_rules_collapsed",collapsed?"1":"0")}catch{}},[collapsed]);
  useEffect(()=>{try{localStorage.setItem("tj_rules_manual",JSON.stringify(manual))}catch{}},[manual]);
  const todayTrades=(trades||[]).filter(t=>t.date===today);
  const evalsAuto=evaluateRules(rules,todayTrades);
  // Merge manual overrides — if user explicitly checked/unchecked, use that
  const todayManual=manual[today]||{};
  const evals=evalsAuto.map(e=>todayManual[e.id]!==undefined?{...e,ok:todayManual[e.id],manualOverride:true}:e);
  const passed=evals.filter(e=>e.ok).length;
  const total=evals.length;
  const toggleManual=(ruleId)=>{setManual(p=>{const day={...(p[today]||{})};const current=day[ruleId]!==undefined?day[ruleId]:evalsAuto.find(e=>e.id===ruleId)?.ok;day[ruleId]=!current;return{...p,[today]:day}})};

        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:".12em",fontWeight:700}}>Trading Rules · Vandaag</div>

      {evals.length===0&&<div style={{fontSize:"12px",color:"var(--text4)",textAlign:"center",padding:"12px"}}>Geen regels ingesteld — configureer via Instellingen → Trading Rules.</div>}
      {evals.map(e=>(
        <div key={e.id} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 10px",background:e.ok?"rgba(46,170,111,.08)":"rgba(224,85,85,.08)",border:`1px solid ${e.ok?"rgba(46,170,111,.18)":"rgba(224,85,85,.22)"}`,borderRadius:"8px"}}>
          <button onClick={(ev)=>{ev.stopPropagation();toggleManual(e.id)}} title="Handmatig aan/uit" style={{width:"22px",height:"22px",borderRadius:"5px",border:`1.5px solid ${e.ok?"var(--green)":"var(--red)"}`,background:e.ok?"rgba(46,170,111,.15)":"transparent",color:e.ok?"var(--green)":"var(--red)",cursor:"pointer",fontSize:"13px",fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{e.ok?"✓":"✗"}</button>
          <span style={{fontSize:"12px",flex:1,color:"var(--text2)"}}>{e.name}{e.manualOverride&&<span style={{fontSize:"9px",color:"var(--gold)",marginLeft:"6px",fontWeight:600}}>[handmatig]</span>}</span>

// ── Rolling 20-trade Win-rate + Expectancy — Chart.js dual-axis line ──
function RollingEdgeChart({trades,window:W=20}){
  const canvasRef=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current)return;
    if(chartRef.current){try{chartRef.current.destroy()}catch{}chartRef.current=null}
    const sorted=[...(trades||[])].filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl))).sort((a,b)=>(a.date+(a.time||"")).localeCompare(b.date+(b.time||"")));
    if(sorted.length<W)return;
    const labels=[],wrLine=[],expLine=[];
    for(let i=W-1;i<sorted.length;i++){
      const win=sorted.slice(i-W+1,i+1);
      const wins=win.filter(t=>parseFloat(t.pnl)>0).length;
      const rs=win.map(t=>calcRMultiple(t)).filter(r=>r!==null&&!isNaN(r));
      const expR=rs.length?rs.reduce((s,r)=>s+r,0)/rs.length:0;
      wrLine.push(wins/W*100);expLine.push(expR);labels.push("#"+(i+1));
    }
    chartRef.current=new Chart(canvasRef.current,{type:"line",data:{labels,datasets:[{label:"Win-rate %",data:wrLine,borderColor:"#C9A84C",backgroundColor:"rgba(201,168,76,0.1)",borderWidth:2,fill:true,tension:0.4,pointRadius:0,pointHoverRadius:4,yAxisID:"y"},{label:"Expectancy (R)",data:expLine,borderColor:"#2eaa6f",backgroundColor:"transparent",borderWidth:2,borderDash:[5,3],fill:false,tension:0.4,pointRadius:0,pointHoverRadius:4,yAxisID:"y1"}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:true,position:"top",labels:{color:"#c0c5cd",font:{size:10},boxWidth:10}},tooltip:{backgroundColor:"rgba(10,12,18,0.9)",borderColor:"rgba(54,58,69,0.9)",borderWidth:1,padding:10,cornerRadius:6,titleColor:"#c0c5cd",bodyColor:"#f5f5f7"}},scales:{x:{grid:{display:false},ticks:{color:"#939aa5",font:{size:9},maxTicksLimit:8}},y:{position:"left",min:0,max:100,grid:{color:"rgba(255,255,255,0.05)"},ticks:{color:"#C9A84C",font:{size:9},callback:v=>v+"%"},title:{display:true,text:"WR",color:"#C9A84C",font:{size:10}}},y1:{position:"right",grid:{display:false},ticks:{color:"#2eaa6f",font:{size:9},callback:v=>v.toFixed(1)+"R"},title:{display:true,text:"E[R]",color:"#2eaa6f",font:{size:10}}}}}});
    return()=>{if(chartRef.current){try{chartRef.current.destroy()}catch{}chartRef.current=null}};
  },[trades.length,W]);
  return(<div style={{height:"240px",position:"relative"}}><canvas ref={canvasRef}/></div>);
}

// ── Per-setup insights table — richer than the bar chart, with advice column ──
function SetupInsightsTable({trades,onSetupClick}){
  const MIN_N=3;
  const closed=(trades||[]).filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  const perf={};
  closed.forEach(t=>(t.setupTags||[]).forEach(tag=>{
    if(!perf[tag])perf[tag]={n:0,w:0,pnl:0,rTotal:0,rCount:0,best:-Infinity,worst:Infinity};
    perf[tag].n++;
    const p=parseFloat(t.pnl);perf[tag].pnl+=p;if(p>0)perf[tag].w++;
    const r=calcRMultiple(t);if(r!==null&&!isNaN(r)){perf[tag].rTotal+=r;perf[tag].rCount++;if(r>perf[tag].best)perf[tag].best=r;if(r<perf[tag].worst)perf[tag].worst=r}
  }));
  const rows=Object.entries(perf).filter(([,d])=>d.n>=MIN_N).map(([tag,d])=>{
    const wr=d.w/d.n*100,avgR=d.rCount>0?d.rTotal/d.rCount:null,avgPnl=d.pnl/d.n;
    let advice="—",adviceColor="var(--text4)";
    if(wr<40&&d.n>=5){advice="🚫 Overweeg schrappen";adviceColor="var(--red)"}
    else if(avgR!==null&&avgR>=1.5){advice="🏆 Edge bevestigd";adviceColor="var(--green)"}
    else if(wr>=60&&avgR!==null&&avgR<0.5){advice="🎯 Targets verhogen";adviceColor="var(--gold)"}
    else if(avgR!==null&&avgR<-0.3){advice="⚠ Verliezen te groot";adviceColor="var(--red)"}
    else if(wr>=55&&avgR!==null&&avgR>=0.5){advice="✓ Consistent";adviceColor="var(--teal)"}
    return{tag,n:d.n,wr,avgR,avgPnl,totalPnl:d.pnl,best:d.best,worst:d.worst,advice,adviceColor};
  }).sort((a,b)=>(b.avgR??-999)-(a.avgR??-999));
  if(rows.length===0)return(<div style={{fontSize:"12px",color:"var(--text4)",textAlign:"center",padding:"20px"}}>Minimaal {MIN_N} trades per setup nodig voor insights.</div>);
  const th={padding:"10px 12px",textAlign:"left",color:"var(--text4)",fontSize:"10px",textTransform:"uppercase",letterSpacing:".08em",fontWeight:700,borderBottom:"1px solid var(--border2)"};
  const td={padding:"10px 12px",borderBottom:"1px solid var(--border2)",fontSize:"12px"};
  return(<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
    <thead><tr>
      <th style={th}>Setup</th>
      <th style={{...th,textAlign:"center"}}>Trades</th>
      <th style={{...th,textAlign:"center"}}>WR</th>
      <th style={{...th,textAlign:"center"}}>Avg R</th>
      <th style={{...th,textAlign:"right"}}>Avg $</th>
      <th style={{...th,textAlign:"right"}}>Totaal</th>
      <th style={{...th,textAlign:"center"}}>Best / Worst</th>
      <th style={{...th,textAlign:"right"}}>Advies</th>
    </tr></thead>
    <tbody>{rows.map(r=>(<tr key={r.tag} onClick={onSetupClick?()=>onSetupClick(r.tag):undefined} style={{cursor:onSetupClick?"pointer":"default",transition:"background .15s"}} onMouseEnter={e=>{if(onSetupClick)e.currentTarget.style.background="rgba(201,168,76,.04)"}} onMouseLeave={e=>{if(onSetupClick)e.currentTarget.style.background="transparent"}}>
      <td style={{...td,fontWeight:600,color:"var(--text2)"}}>{r.tag}</td>

function AccountsHub({config,setConfig,accounts,setAccounts,showToast,trades,importTrades,exportTrades,setTagConfig,tagConfig,tradingRules,setTradingRules,goals,setGoals}){
  const csvRef=useRef();const csvAcctRef=useRef(null);
  const backupRef=useRef();
  // CSV preview state
  const[preview,setPreview]=useState(null);
  const[selected,setSelected]=useState(new Set());
  const[prevFilter,setPrevFilter]=useState({direction:"all",result:"all"});
  const[prevSort,setPrevSort]=useState({key:"date",dir:"desc"});
  const handleBackup=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        const trList=d.trades||d;
        if(!Array.isArray(trList)){showToast("Ongeldig formaat","error");return}
        importTrades(trList.map(t=>({...EMPTY_TRADE,...t,id:t.id||uid()})));
        if(d.tagConfig&&typeof d.tagConfig==="object"&&setTagConfig)setTagConfig(d.tagConfig);
        if(Array.isArray(d.accounts))setAccounts(d.accounts);
        if(d.config&&typeof d.config==="object")setConfig(p=>({...p,...d.config}));
        showToast("Backup hersteld");
      }catch(err){showToast("Fout bij importeren: "+err.message,"error")}
    };
    r.readAsText(f);e.target.value="";
  };
  const handleCSV=(e,forExchange)=>{
    const file=e.target.files[0];if(!file)return;
    const isXlsx=/\.(xlsx|xls)$/i.test(file.name);
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        let text;
        if(isXlsx){
          if(typeof XLSX==="undefined")throw new Error("XLSX library niet geladen");
          const wb=XLSX.read(ev.target.result,{type:"array"});
          const sheet=wb.Sheets[wb.SheetNames[0]];
          text=XLSX.utils.sheet_to_csv(sheet);
        }else{
          text=ev.target.result;
        }
        // Simpele CSV-parser die rekening houdt met quoted velden (MEXC heeft "68,125" met komma in prijs)
        const parseCSVLine=(line)=>{const out=[];let cur="",inQ=false;for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){out.push(cur);cur="";}else cur+=ch;}out.push(cur);return out.map(v=>v.trim())};
        const lines=text.split("\n").filter(l=>l.trim());
        if(lines.length<2)throw new Error("Leeg bestand");
        const headers=parseCSVLine(lines[0]).map(h=>h.replace(/"/g,""));
        const isKrakenLog=headers.includes("uid")&&headers.includes("realized pnl")&&headers.includes("trade price");
        const isMexcFutures=headers.includes("Futures Trading Pair")&&headers.includes("Closing PNL");
        const isMexcPosition=headers.includes("Futures")&&headers.includes("Avg Entry Price")&&headers.includes("Avg Close Price");
        const isBlofinOrder=headers.includes("Underlying Asset")&&headers.includes("Avg Fill")&&headers.includes("PNL");
        let csvTrades=[];
        if(isBlofinOrder){
          // Blofin Order History → FIFO positie-reconstructie (one-way mode verondersteld).
          // PnL uit CSV is authoritative (bevat funding/fees). Orphan closes krijgen partial_data flag.
          const stripUnit=(s)=>String(s||"").replace(/"/g,"").split(/\s+/)[0].replace(/,/g,"");
          const parseBlofinDate=(dt)=>{
            const m=(dt||"").match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})(?::(\d{2}))?/);
            if(!m)return{date:"",time:"",ts:0};
            // CSV-tijd is UTC (Blofin server). Converteer naar browser-local tijdzone voor display.
            const utcMs=Date.UTC(+m[3],+m[1]-1,+m[2],+m[4],+m[5],+(m[6]||0));
            const local=new Date(utcMs);
            const pad=n=>String(n).padStart(2,"0");
            return{
              date:`${local.getFullYear()}-${pad(local.getMonth()+1)}-${pad(local.getDate())}`,
              time:`${pad(local.getHours())}:${pad(local.getMinutes())}`,
              ts:utcMs,
            };
          };
          const cleanPair=(s)=>s.endsWith("USDT")?s.slice(0,-4)+"/USDT":s.endsWith("USDC")?s.slice(0,-4)+"/USDC":s;
          const uidShort=()=>Math.random().toString(36).slice(2,10);

          // Parse + sort ASC
          const orders=[];
          for(let i=1;i<lines.length;i++){
            const vals=parseCSVLine(lines[i]);
            const r={};headers.forEach((h,idx)=>r[h]=vals[idx]||"");
            if((r["Status"]||"").toLowerCase()!=="filled")continue;
            const dt=parseBlofinDate(r["Order Time"]);
            const sideRaw=(r["Side"]||"").toLowerCase();
            const isBuy=sideRaw.startsWith("buy");
            const reduceOnly=(r["Reduce-only"]||"").toLowerCase()==="y";
            orders.push({
              symbol:r["Underlying Asset"]||"",
              isBuy,reduceOnly,
              price:parseFloat(stripUnit(r["Avg Fill"]))||0,
              size:parseFloat(stripUnit(r["Filled"]))||0,
              pnl:parseFloat(stripUnit(r["PNL"]))||0,
              fee:Math.abs(parseFloat(stripUnit(r["Fee"]))||0),
              leverage:r["Leverage"]||"10",
              date:dt.date,time:dt.time,ts:dt.ts,
              raw:r,
            });
          }
          orders.sort((a,b)=>a.ts-b.ts);

          // FIFO queue per symbol — bevat open lots: [{price,size,fee,openDate,openTime,openTs}, ...]

// ============ SIMPLE TP TIMELINE ============
function TPTimeline({trade,config,setTrade,showToast}){
  const[loading,setLoading]=useState(false);
  const tpLevels=(trade.tpLevels||[]).filter(t=>parseFloat(t.price)>0);
  const sourceKey=(trade.source||"").toLowerCase();
  const exApi=ExchangeAPI[sourceKey];
  const exCfg=config?.exchanges?.[sourceKey]||{};
  const connected=!!(exCfg.apiKey&&exCfg.apiSecret&&exApi);

  const fetchTPs=async()=>{
    if(!connected||!exApi.fetchFills||!setTrade)return;
    setLoading(true);
    try{
      const symbol=(trade.pair||"").replace("/","_");
      const startTime=trade.openTime?parseInt(trade.openTime):new Date(trade.date).getTime()-86400000;
      const endTime=trade.closeTime?parseInt(trade.closeTime):Date.now();
      const r=exApi.needsPassphrase
        ?await exApi.fetchFills(exCfg.apiKey,exCfg.apiSecret,exCfg.passphrase,symbol,startTime,endTime)
        :await exApi.fetchFills(exCfg.apiKey,exCfg.apiSecret,symbol,trade.positionId,startTime,endTime);
      const fills=r.fills||[];
      if(!fills.length){showToast&&showToast("Geen TP-fills gevonden bij exchange","error");return}
      // Converteer elke fill naar een TP-level
      const total=fills.reduce((s,f)=>s+Math.abs(parseFloat(f.size||f.vol||f.amount||0)),0)||1;
      const newTPs=fills.map((f,i)=>{
        const sz=Math.abs(parseFloat(f.size||f.vol||f.amount||0));
        return{id:`tp_${Date.now()}_${i}`,price:String(f.price||f.tradePrice||f.closeAvgPrice||""),pct:String(((sz/total)*100).toFixed(1)),status:"hit",actualPrice:String(f.price||f.tradePrice||f.closeAvgPrice||"")};
      }).filter(t=>parseFloat(t.price)>0);
      setTrade(p=>({...p,tpLevels:newTPs}));
      showToast&&showToast(`${newTPs.length} TP's opgehaald van ${exApi.name}`);
    }catch(e){
      showToast&&showToast(`TP-fetch mislukt: ${e.message}`,"error");
    }finally{setLoading(false)}
  };

  const fetchBtn=connected&&setTrade?(
    <button onClick={fetchTPs} disabled={loading} style={{padding:"6px 12px",borderRadius:"5px",border:"1px solid rgba(46,170,111,0.3)",background:"rgba(46,170,111,0.08)",color:"var(--teal)",fontSize:"11px",fontWeight:600,cursor:loading?"default":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"6px"}}>
      {loading?<><span className="spinner"/>Ophalen...</>:<>🎯 TP's ophalen ({exApi.name})</>}
    </button>
  ):null;

  if(!tpLevels.length&&!parseFloat(trade.takeProfit))return(<div style={{padding:"1.5rem",fontSize:"12px",color:"var(--text4)",textAlign:"center"}}>Geen TP niveaus ingesteld voor deze trade.{fetchBtn&&<div style={{marginTop:"12px",display:"flex",justifyContent:"center"}}>{fetchBtn}</div>}</div>);
  const entry=parseFloat(trade.entry)||0;
  const sl=parseFloat(trade.stopLoss)||0;
  const allTPs=tpLevels.length?tpLevels:[{price:trade.takeProfit,pct:"100",status:"open",actualPrice:""}];
  const prices=[entry,sl,...allTPs.map(t=>parseFloat(t.price)||0)].filter(p=>p>0);
  const minP=Math.min(...prices)*0.998;const maxP=Math.max(...prices)*1.002;const range=maxP-minP||1;
  const pos=p=>((p-minP)/range)*100;
  return(<div style={{padding:"20px",background:"rgba(42,46,57,0.3)",borderRadius:"8px",marginTop:"12px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",fontWeight:600}}>TP Tijdlijn</div>
      {fetchBtn}
    </div>
    <div style={{position:"relative",height:"40px",margin:"0 20px"}}>
      <div style={{position:"absolute",top:"50%",left:0,right:0,height:"2px",background:"rgba(255,255,255,0.1)",transform:"translateY(-50%)"}}/>
      {sl>0&&<div style={{position:"absolute",top:0,bottom:0,left:`${pos(sl)}%`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"2px",height:"100%",background:"var(--red)"}}/>
        <div style={{position:"absolute",bottom:"-18px",fontSize:"9px",color:"var(--red)",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>SL ${fmt(sl)}</div>
      </div>}
      {entry>0&&<div style={{position:"absolute",top:0,bottom:0,left:`${pos(entry)}%`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"2px",height:"100%",background:"#C9A84C"}}/>
        <div style={{position:"absolute",bottom:"-18px",fontSize:"9px",color:"#C9A84C",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>E ${fmt(entry)}</div>
      </div>}
      {allTPs.map((tp,i)=>{const p=parseFloat(tp.price)||0;if(!p)return null;const hit=tp.status==="hit";return(<div key={i} style={{position:"absolute",top:0,bottom:0,left:`${pos(p)}%`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"2px",height:"100%",background:hit?"var(--green)":"rgba(46,170,111,0.4)"}}/>
        <div style={{position:"absolute",top:"-18px",fontSize:"9px",color:hit?"var(--green)":"var(--text4)",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>TP{i+1} ${fmt(p)}{hit&&" ✓"}</div>
      </div>);})}
    </div>
  </div>);
}


// ============ MAIN APP (v7: storage warning + keyboard shortcuts) ============
function App(){
  const[trades,setTrades]=useState([]);
  const[tradesLoaded,setTradesLoaded]=useState(false);

  // v9: Laad trades uit IndexedDB bij start (migreer van localStorage indien nodig)
  useEffect(function(){
    idbLoadAllTrades().then(function(idbTrades){
      if(idbTrades&&idbTrades.length>0){
        // IndexedDB heeft data - gebruik dat
        setTrades(idbTrades.map(function(t){return Object.assign({},EMPTY_TRADE,t);}));
        setTradesLoaded(true);
      } else {
        // Geen IDB data - probeer localStorage (migratie)
        try{
          var ls=localStorage.getItem("tj_trades");
          if(ls){
            var parsed=JSON.parse(ls);
            var migrated=parsed.map(function(t){return Object.assign({},EMPTY_TRADE,t);});
            setTrades(migrated);
            // Sla meteen op in IDB
            idbSaveAllTrades(migrated);
          }
        }catch(e){}
        setTradesLoaded(true);
      }
    }).catch(function(){
      // IDB volledig mislukt - val terug op localStorage
      try{
        var ls2=localStorage.getItem("tj_trades");
        if(ls2)setTrades(JSON.parse(ls2).map(function(t){return Object.assign({},EMPTY_TRADE,t);}));
      }catch(e){}
      setTradesLoaded(true);
    });
  },[]);

  const[accounts,setAccounts]=useState(()=>{try{const d=localStorage.getItem("tj_accounts");return d?JSON.parse(d):[]}catch(err){return[]}});
  const[tagConfig,setTagConfig]=useState(()=>{try{const d=localStorage.getItem("tj_tags");return d?JSON.parse(d):DEFAULT_TAGS}catch(err){return DEFAULT_TAGS}});
  const[dailyNotes,setDailyNotes]=useState(()=>{try{const d=localStorage.getItem("tj_daily_notes");return d?JSON.parse(d):{}}catch{return{}}});
  const[goals,setGoals]=useState(()=>{try{const d=localStorage.getItem("tj_goals");return migrateGoals(d?JSON.parse(d):null)}catch{return migrateGoals(null)}});
  useEffect(()=>{try{localStorage.setItem("tj_goals",JSON.stringify(goals))}catch{}},[goals]);
  const[cmdOpen,setCmdOpen]=useState(false);

  useEffect(()=>{try{localStorage.setItem("tj_daily_notes",JSON.stringify(dailyNotes))}catch{}},[dailyNotes]);
  const[tradingRules,setTradingRules]=useState(()=>{try{const d=localStorage.getItem("tj_trading_rules");return d?JSON.parse(d):[
    {id:"r1",name:"Max 2% risk per trade",type:"max_risk_pct",value:2,enabled:true},
    {id:"r2",name:"Altijd stop-loss bij entry",type:"require_sl",value:null,enabled:true},
    {id:"r3",name:"Max 5 trades per dag",type:"max_trades_per_day",value:5,enabled:true},
    {id:"r4",name:"Pauze na 2 losses op dag",type:"max_losses_per_day",value:2,enabled:true},
    {id:"r5",name:"Pre-trade notitie ingevuld",type:"require_entry_note",value:null,enabled:true},
  ]}catch{return[]}});
  useEffect(()=>{try{localStorage.setItem("tj_trading_rules",JSON.stringify(tradingRules))}catch{}},[tradingRules]);
  const parseHash=()=>{
    const h=(window.location.hash||"#/dashboard").slice(1);

    return{view:parts[0]||"dashboard",tradeId:parts[1]==="edit"?parts[2]:null};
  };
  const isPopping=useRef(false);
  const safeHistory=(method,hash)=>{try{window.history[method](null,null,hash)}catch(e){}};
  const[tab,setTab]=useState(()=>parseHash().view||"dashboard");
  const[editTrade,setEditTrade]=useState(null);
  const[newTrade,setNewTrade]=useState(null);
  const[filters,setFilters]=useState({source:"all",pair:"all",quote:"all",direction:"all",status:"all",dateFrom:"",dateTo:"",setupTags:[],confirmationTags:[],emotionTags:[],mistakeTags:[],timeframeTags:[],sessionTags:[],leverage:"all",result:"all"});
  const[toast,setToast]=useState(null);
  const[mobileOpen,setMobileOpen]=useState(false);
  const[importDragOver,setImportDragOver]=useState(false);

  const newEmptyTrade=()=>({...EMPTY_TRADE,id:uid(),date:new Date().toISOString().split("T")[0],time:new Date().toTimeString().slice(0,5)});

  // v9: IndexedDB als primaire opslag (onbeperkt), localStorage als fallback
  useEffect(()=>{
    if(!tradesLoaded)return;

      if(!ok)console.warn("IndexedDB save mislukt, val terug op localStorage");
    });

    try{
      var small=trades.map(function(t){return Object.assign({},t,{screenshot:null});});

  },[trades,tradesLoaded]);

  useEffect(()=>{try{localStorage.setItem("tj_config",JSON.stringify(config))}catch(err){}},[config]);

  // Auto-sync interval — alleen actief bij syncInterval>0 én minstens 1 gekoppelde exchange
  useEffect(()=>{
    const iv=config.syncInterval||0;
    if(!iv)return;
    const connected=Object.entries(config.exchanges||{}).filter(([k,c])=>c&&c.apiKey&&c.apiSecret&&ExchangeAPI[k]);
    if(!connected.length)return;
    const timer=setInterval(async()=>{
      if(document.hidden)return;
      for(const[key,cfg] of connected){
        try{
          const api=ExchangeAPI[key];
          const startTime=Date.now()-30*86400000;
          const fetched=api.needsPassphrase
            ?await api.fetchTrades(cfg.apiKey,cfg.apiSecret,cfg.passphrase,startTime)
            :await api.fetchTrades(cfg.apiKey,cfg.apiSecret,null,startTime);
          if(fetched&&fetched.length){
            setTrades(prev=>{const ex=new Set(prev.map(t=>t.id));const fresh=fetched.filter(t=>!ex.has(t.id));return fresh.length?[...fresh,...prev]:prev;});
          }
        }catch(e){console.warn("[auto-sync]",key,e.message)}
      }
    },iv*60*1000);
    return()=>clearInterval(timer);
  },[config.syncInterval,config.exchanges]);
  useEffect(()=>{try{localStorage.setItem("tj_accounts",JSON.stringify(accounts))}catch(err){}},[accounts]);

      const found=trades.find(t=>t.id===init.tradeId);

    }
    const onPop=()=>{
      isPopping.current=true;

      setTab(p.view);
      if(p.tradeId){
        const found=trades.find(t=>t.id===p.tradeId);
        if(found){setEditTrade(found);setNewTrade({...EMPTY_TRADE,...found,tpLevels:found.tpLevels||[],layers:found.layers||[],links:found.links||[],manualOverrides:found.manualOverrides||[]})}
      }else if(p.view!=="new"){setEditTrade(null);setNewTrade(null)}
      isPopping.current=false;
    };
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[tradesLoaded]);

  // v7 NEW: keyboard shortcuts
  useKeyboardShortcuts(navigate,setNewTrade,newEmptyTrade,editTrade);

  const saveTrade=(trade)=>{
    const isNew=!trades.find(t=>t.id===trade.id);
    // Auto-compute risk unless manually overridden
    const overrides=trade.manualOverrides||[];
    const risk=computeTradeRisk(trade,config,accounts);
    const enriched={...trade};
    if(risk.riskUsd!==undefined&&!overrides.includes("riskUsd"))enriched.riskUsd=risk.riskUsd;
    if(risk.riskPct!==undefined&&!overrides.includes("riskPct"))enriched.riskPct=risk.riskPct;
    if(isNew){const sessions=getSessionTags(enriched.date,enriched.time);if(sessions.length&&!(enriched.timeframeTags||[]).some(t=>["Tokyo","London","New York","Off-session","Weekend"].includes(t))){}}
    setTrades(p=>{if(isNew){return[enriched,...p]}else{return p.map(t=>t.id===enriched.id?enriched:t)}});
    setEditTrade(null);setNewTrade(null);
    showToast(isNew?"Trade opgeslagen ✓":"Trade bijgewerkt ✓");
    if(isNew&&tab==="new")setTab("trades");
  };

  const deleteTrade=(id)=>{const t=trades.find(x=>x.id===id);setTrades(p=>p.filter(x=>x.id!==id));showToast("Trade verwijderd","error",t)};
  const bulkDelete=(ids)=>setTrades(p=>p.filter(t=>!ids.includes(t.id)));
  const bulkTag=(ids,field,tag)=>setTrades(p=>p.map(t=>{if(!ids.includes(t.id))return t;const arr=t[field]||[];if(arr.includes(tag))return t;return{...t,[field]:[...arr,tag]}}));
  const importTrades=(newOnes)=>{setTrades(p=>{const ex=new Set(p.map(t=>t.id));const fresh=newOnes.filter(t=>!ex.has(t.id));return[...fresh,...p]});showToast(`${newOnes.length} trades geïmporteerd`)};

  const handleDrop=useCallback((e)=>{e.preventDefault();setImportDragOver(false);const f=e.dataTransfer.files[0];if(!f||!f.name.endsWith(".json"))return;const r=new FileReader();r.onload=ev=>{try{
    const d=JSON.parse(ev.target.result);const trList=d.trades||d;
    if(!Array.isArray(trList)){showToast("Ongeldig formaat","error");return}

    // Volledige backup? Herstel dan ook tags/accounts/config
    if(d.tagConfig&&typeof d.tagConfig==="object")setTagConfig(d.tagConfig);
    if(Array.isArray(d.accounts))setAccounts(d.accounts);
    if(d.config&&typeof d.config==="object")setConfig(p=>({...p,...d.config}));
  }catch(err){showToast("Fout bij importeren","error")}};r.readAsText(f)},[trades]);
  const handleDragOver=useCallback((e)=>{e.preventDefault();setImportDragOver(true)},[]);

  const exportTrades=()=>{

    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;
    a.download=`syncjournal-backup-${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(url);
    showToast(`Backup geëxporteerd: ${trades.length} trades, ${(accounts||[]).length} accounts`);

  const theme=["sync","classic","aurora","light"].includes(config.theme)?config.theme:"sync";

  const filteredTrades=applyFilters(trades,filters);

  const TABS=[

    {id:"calendar",label:"Kalender",icon:"📅"},
    {id:"accounts",label:"Accounts",icon:"🔗"},
    {id:"tags",label:"Tags",icon:"🏷"},
    {id:"help",label:"Help",icon:"❓"},
  ];

  return(
    <div onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave} style={{minHeight:"100vh",position:"relative"}}>
      {showWelcome&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{background:"#0a0a0a",border:"1px solid rgba(201,168,76,0.3)",borderRadius:"16px",padding:"36px 32px",width:"100%",maxWidth:"520px",textAlign:"center"}}>

              ["💾","Maak backups","Exporteer regelmatig via de Export-knop. Bij browserreset of nieuw apparaat heb je anders geen data."],

          <div style={{maxWidth:"760px",margin:"0 auto",position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <div style={{fontSize:"16px",fontWeight:700,color:"var(--text)"}}>Trade bewerken</div>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>{if(confirm("TP tijdlijn laden?")){}}} style={{display:"none"}}/>
                <button onClick={()=>setEditTrade(null)} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"14px",padding:"4px"}}>✕</button>
              </div>
            </div>
            <TradeForm trade={editTrade} setTrade={setEditTrade} onSave={()=>saveTrade(editTrade)} onCancel={()=>setEditTrade(null)} tagConfig={tagConfig} config={config} accounts={accounts}/>
            <TPTimeline trade={editTrade} config={config} setTrade={setEditTrade} showToast={showToast}/>
          </div>
        </div>}

        {/* Main content routing */}
        {tab==="dashboard"&&(layout==="premium"
          ?<DashboardPremium trades={filteredTrades} config={config} accounts={accounts} tradingRules={tradingRules} dailyNotes={dailyNotes} goals={goals} setTab={navigate} setNewTrade={setNewTrade} newEmptyTrade={newEmptyTrade} setFilters={setFilters}/>
          :<Dashboard trades={filteredTrades} config={config} accounts={accounts} onReport={()=>setShowPdf(true)} storageUsage={storageUsage} setFilters={setFilters} setTab={navigate}/>)}
        {tab==="trades"&&!editTrade&&<TradeList trades={filteredTrades} onEdit={setEditTrade} onDelete={deleteTrade} onBulkDelete={bulkDelete} onBulkTag={bulkTag} showToast={showToast} tagConfig={tagConfig} config={config} accounts={accounts}/>}
        {tab==="analytics"&&<Analytics trades={filteredTrades}/>}
        {tab==="review"&&<ReviewDashboard trades={filteredTrades}/>}
        {tab==="calendar"&&<Calendar trades={filteredTrades} setFilters={setFilters} setTab={setTab} dailyNotes={dailyNotes} setDailyNotes={setDailyNotes} tradingRules={tradingRules} onEdit={(t)=>{setEditTrade(t);setNewTrade({...EMPTY_TRADE,...t,tpLevels:t.tpLevels||[],layers:t.layers||[],links:t.links||[],manualOverrides:t.manualOverrides||[]});navigate("new");}}/>}
        {tab==="accounts"&&<AccountsHub config={config} setConfig={setConfig} accounts={accounts} setAccounts={setAccounts} showToast={showToast} trades={trades} importTrades={importTrades} exportTrades={exportTrades} setTagConfig={setTagConfig} tagConfig={tagConfig} tradingRules={tradingRules} setTradingRules={setTradingRules} goals={goals} setGoals={setGoals}/>}
        {tab==="rules"&&<TradingRulesPage tradingRules={tradingRules} setTradingRules={setTradingRules}/>}
        {tab==="goals"&&<GoalsPage goals={goals} setGoals={setGoals} trades={trades}/>}
        {tab==="tags"&&<TagManager tagConfig={tagConfig} setTagConfig={setTagConfig} trades={trades} setTrades={setTrades} showToast={showToast}/>}
        {tab==="help"&&<HelpPage/>}
      </div>

      {/* Footer hint */}
      <div style={{textAlign:"center",padding:"8px 0 16px",fontSize:"10px",color:"var(--text5)"}}>
        <span className="kbd">N</span> Nieuw &nbsp; <span className="kbd">T</span> Trades &nbsp; <span className="kbd">D</span> Dashboard &nbsp; Drag & drop JSON om te importeren
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  componentDidCatch(error, info) { this.setState({ error: error }); }
  static getDerivedStateFromError(error) { return { error: error }; }
  render() {
    if (this.state.error) {
      return React.createElement('div', {
        style: { position:'fixed', inset:0, background:'#0a0a0a', color:'#ff6b6b',
                 padding:'30px', fontFamily:'monospace', fontSize:'13px',
                 whiteSpace:'pre-wrap', overflow:'auto', zIndex:99999 }
      }, 'REACT ERROR:\n' + this.state.error.toString() + '\n\nStack:\n' + (this.state.error.stack || ''));
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
</html>
