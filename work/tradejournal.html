<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SyncJournal v12</title>
<meta name="app-version" content="12.0.0">
<meta name="app-name" content="SyncJournal">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--text:#ffffff;--text2:rgba(255,255,255,0.9);--text3:rgba(255,255,255,0.6);--text4:rgba(255,255,255,0.38);--text5:rgba(255,255,255,0.22);
--green:#2eaa6f;--green2:rgba(46,170,111,0.12);--green3:rgba(46,170,111,0.2);
--red:#e05555;--red2:rgba(224,85,85,0.12);--red3:rgba(224,85,85,0.2);
--blue:#C9A84C;--blue2:#C9A84C;--blue3:rgba(201,168,76,0.12);--blue4:rgba(201,168,76,0.08);
--amber:#C9A84C;--amber2:rgba(201,168,76,0.12);--orange:#C9A84C;--orange2:rgba(201,168,76,0.12);
--teal:#2eaa6f;--teal2:rgba(46,170,111,0.1);
--purple:#C9A84C;--purple2:rgba(201,168,76,0.1);
--radius:12px;--radius-lg:16px;
--font:'Outfit',sans-serif;--mono:'Outfit',monospace;
--gold:#C9A84C;--gold-dim:rgba(201,168,76,0.07);--gold-border:rgba(201,168,76,0.28);
--stat-fs:clamp(18px,2vw,26px);--stat-label-fs:clamp(10px,1vw,12px);
--content-pad:clamp(16px,2vw,28px);
--c-win:#2eaa6f;--c-loss:#e05555;--c-long:#2eaa6f;--c-short:#e05555;
--c-tokyo:#C9A84C;--c-london:#8a9fc0;--c-ny:#9a8acc;--c-off:#666672;--c-weekend:#b07090;
--c-neutral:#6a7a8a;
--bg:#000000;--bg2:#0a0a0a;--bg3:#0f0f0f;--bg4:#141414;
--glass:rgba(255,255,255,0.03);--glass-border:rgba(201,168,76,0.18);--glass-border-accent:rgba(201,168,76,0.28);
--glass-blur:none;
--border1:rgba(201,168,76,0.08);--border2:rgba(201,168,76,0.12);--border3:rgba(201,168,76,0.18);--border4:rgba(201,168,76,0.22);--border5:rgba(201,168,76,0.28);--border6:rgba(201,168,76,0.35);
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;letter-spacing:0.01em}
body::before,body::after{display:none;content:'';position:fixed;pointer-events:none}
/* ═══ SYNCJOURNAL THEME (default) ═══ — gebruikt :root direct, geen class override */
body.theme-sync::before,body.theme-sync::after{display:none}
/* ═══ CLASSIC THEME — solid, clean, minder gouden accenten ═══ */
body.theme-classic{
--bg:#0c0d12;--bg2:#161722;--bg3:#1a1b28;--bg4:#1e1f2e;
--glass:#1a1b28;--glass-border:rgba(255,255,255,0.08);--glass-border-accent:rgba(255,255,255,0.12);
--glass-blur:none;
--border1:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.08);--border3:rgba(255,255,255,0.11);--border4:rgba(255,255,255,0.14);--border5:rgba(255,255,255,0.17);--border6:rgba(255,255,255,0.2);
background:#0c0d12}
body.theme-classic::before,body.theme-classic::after{display:none}
/* ═══ LIGHT THEME — schoon, licht, hoog contrast ═══ */
body.theme-light{
--text:#1a1a1a;--text2:rgba(26,26,26,0.85);--text3:rgba(26,26,26,0.6);--text4:rgba(26,26,26,0.45);--text5:rgba(26,26,26,0.3);
--green:#2d8659;--green2:rgba(45,134,89,0.12);--green3:rgba(45,134,89,0.22);
--red:#c73e3e;--red2:rgba(199,62,62,0.10);--red3:rgba(199,62,62,0.20);
--bg:#f7f6f2;--bg2:#ffffff;--bg3:#faf8f2;--bg4:#eeeae0;
--glass:rgba(255,255,255,0.92);--glass-border:rgba(175,140,50,0.22);--glass-border-accent:rgba(175,140,50,0.35);
--glass-blur:none;
--border1:rgba(26,26,26,0.06);--border2:rgba(26,26,26,0.08);--border3:rgba(26,26,26,0.12);--border4:rgba(26,26,26,0.16);--border5:rgba(175,140,50,0.3);--border6:rgba(175,140,50,0.4);
--gold:#a88a3c;--gold-dim:rgba(168,138,60,0.10);--gold-border:rgba(168,138,60,0.35);
background:#f7f6f2;color:#1a1a1a}
body.theme-light::before,body.theme-light::after{display:none}
body.theme-light input,body.theme-light textarea,body.theme-light select{background:#ffffff!important;color:#1a1a1a!important;border-color:rgba(26,26,26,0.15)!important}
body.theme-light input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0)}
/* ═══ AURORA THEME — v4_14 Morani Signature: mesh gradient orbs, glasmorfisme ═══ */
body.theme-aurora{
--bg:#08090c;--bg2:rgba(14,16,22,0.45);--bg3:rgba(14,16,22,0.45);--bg4:rgba(20,22,30,0.5);
--glass:rgba(14,16,22,0.45);--glass-border:rgba(201,168,76,0.08);--glass-border-accent:rgba(201,168,76,0.12);
--glass-blur:blur(24px);
--border1:rgba(255,255,255,0.04);--border2:rgba(255,255,255,0.06);--border3:rgba(201,168,76,0.10);--border4:rgba(201,168,76,0.14);--border5:rgba(255,255,255,0.12);--border6:rgba(255,255,255,0.15);
background:#08090c}
body.theme-aurora::before{display:block;position:fixed;inset:0;z-index:-1;pointer-events:none;background:
  radial-gradient(ellipse 500px 500px at 75% 10%,rgba(201,168,76,0.18) 0%,transparent 70%),
  radial-gradient(ellipse 450px 450px at 15% 80%,rgba(96,165,250,0.15) 0%,transparent 70%),
  radial-gradient(ellipse 350px 350px at 50% 50%,rgba(52,211,153,0.10) 0%,transparent 70%),
  radial-gradient(ellipse 200px 200px at 10% 15%,rgba(201,168,76,0.07) 0%,transparent 70%);
  filter:blur(30px)}
body.theme-aurora::after{display:block;position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(212,184,92,0.4) 30%,rgba(212,184,92,0.6) 50%,rgba(212,184,92,0.4) 70%,transparent 95%);z-index:1001;pointer-events:none}
@supports not (backdrop-filter:blur(1px)){body.theme-aurora{--glass:rgba(14,16,22,0.7)!important}}
/* ═══ PREMIUM LAYOUT — werkt bovenop élk thema (sync/classic/aurora/light) ═══ */
/* Grid overlay als signature */
body.layout-premium::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;display:block!important;background-image:linear-gradient(rgba(201,168,76,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.04) 1px,transparent 1px);background-size:48px 48px;opacity:.9}
/* 3-color ambient orbs bovenop bestaande thema-gradients */
body.layout-premium::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;display:block!important;background:radial-gradient(ellipse 900px 700px at 85% -5%,rgba(201,168,76,.12) 0%,transparent 55%),radial-gradient(ellipse 700px 600px at -5% 100%,rgba(91,156,246,.08) 0%,transparent 55%),radial-gradient(ellipse 600px 500px at 105% 100%,rgba(167,139,250,.08) 0%,transparent 55%);filter:blur(30px)}
/* Rijke gouden shimmer op logo-tekst */
body.layout-premium .tj-logo-text{background:linear-gradient(90deg,#fff 0%,#f0d57a 35%,#C9A84C 50%,#f0d57a 65%,#fff 100%)!important;background-size:200% auto!important;-webkit-background-clip:text!important;background-clip:text!important;-webkit-text-fill-color:transparent!important;animation:shimmer 6s linear infinite!important}
/* Topbar moet opaque blijven bij scrollen — anders lekt content erdoorheen */
body.layout-premium .tj-topbar{background:rgba(6,7,10,.88)!important;backdrop-filter:blur(20px) saturate(180%)!important;-webkit-backdrop-filter:blur(20px) saturate(180%)!important;border-bottom-color:rgba(201,168,76,.2)!important}
body.theme-light.layout-premium .tj-topbar{background:rgba(247,246,242,.92)!important;border-bottom-color:rgba(168,138,60,.2)!important}
/* Light-mode compatibiliteit: grid wat donkerder, orbs iets zachter */
body.theme-light.layout-premium::before{background-image:linear-gradient(rgba(26,26,26,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(26,26,26,.05) 1px,transparent 1px)}
body.theme-light.layout-premium::after{background:radial-gradient(ellipse 900px 700px at 85% -5%,rgba(168,138,60,.12) 0%,transparent 55%),radial-gradient(ellipse 700px 600px at -5% 100%,rgba(91,156,246,.06) 0%,transparent 55%),radial-gradient(ellipse 600px 500px at 105% 100%,rgba(167,139,250,.06) 0%,transparent 55%);filter:blur(30px)}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
/* ═══ PREMIUM TYPOGRAPHY + COLORS (hyper-modern) ═══ */
body.layout-premium{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif!important;-webkit-font-smoothing:antialiased;color:#E8E4DC}
body.layout-premium .tj-topbar,body.layout-premium .tj-tabs,body.layout-premium .tj-tab{font-family:'Inter',sans-serif!important}
body.layout-premium .tj-content{font-family:'Inter',sans-serif!important}
/* Warmer text palette */
body.layout-premium{--text:#E8E4DC;--text2:#c0c5cd;--text3:#8a8f9a;--text4:#5a5f6a}
/* Softer win/loss colors with better accessibility */
body.layout-premium{--green:#4ADE80;--green2:rgba(74,222,128,.12);--green3:rgba(74,222,128,.3);--red:#F87171;--red2:rgba(248,113,113,.12);--red3:rgba(248,113,113,.3)}
/* Stronger glass effect */
body.layout-premium{--glass:rgba(18,21,30,.65);--glass-blur:blur(16px) saturate(150%);--glass-border:rgba(255,255,255,.07)}
/* Bigger radius on cards */
body.layout-premium{--radius:12px;--radius-lg:18px}
/* Gold accent glow on card top-lines */
body.layout-premium .card-glow::before,body.layout-premium [style*="var(--glass)"]::before{opacity:.8!important}
/* Section headers — Inter bold */
body.layout-premium [style*="textTransform:\"uppercase\""],body.layout-premium [style*="text-transform:uppercase"]{letter-spacing:.14em!important}
/* Pill bar in premium — slightly larger */
body.layout-premium .pill-bar .pill{padding:7px 16px;font-size:12px;border-radius:999px}
/* Toast in premium — rounder */
body.layout-premium .tj-toast{border-radius:16px}
/* Premium rendering quality */
body.layout-premium{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
/* Tabular numbers — aligned digits in columns */
body.layout-premium [style*="var(--mono)"],body.layout-premium td,body.layout-premium th{font-variant-numeric:tabular-nums}
/* Smooth transitions on all interactive elements */
body.layout-premium button{transition:all .2s ease}
body.layout-premium button:active{transform:scale(.97)}
/* Trade-reveal quote styling (gold left-border on notes, like ui-demo) */
body.layout-premium .trade-reveal [style*="italic"]{padding:6px 10px!important;background:rgba(201,168,76,.04)!important;border-left:2px solid var(--gold)!important;border-radius:0 6px 6px 0!important;margin-top:2px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border4);border-radius:3px}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes logoShimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 3px rgba(201,168,76,0.1))}50%{filter:drop-shadow(0 0 12px rgba(46,170,111,0.4))}}
.spinner{width:16px;height:16px;border:2px solid rgba(201,168,76,0.2);border-top-color:#C9A84C;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.tj-topbar{height:64px;background:var(--glass);-webkit-backdrop-filter:var(--glass-blur);backdrop-filter:var(--glass-blur);border-bottom:1px solid rgba(201,168,76,0.2);transition:all .2s}

.tj-logo{cursor:pointer;display:flex;align-items:center;gap:12px}
.tj-logo:hover .tj-logo-text{filter:drop-shadow(0 0 8px rgba(201,168,76,0.5))}
.tj-logo img{display:none}
.tj-logo:hover img{transform:scale(1.04)}
.tj-logo-text{font-size:22px!important;font-weight:800;letter-spacing:0.04em;background:linear-gradient(90deg,#C9A84C,#d4b86a,#C9A84C);background-size:300% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:logoShimmer 6s linear infinite;font-family:var(--font)}
.tj-logo-sub{font-size:8px;color:var(--text4);font-family:var(--mono);letter-spacing:0.14em;margin-top:-2px}
.tj-tabs{display:flex;gap:2px;margin-left:8px}
.tj-tab{padding:0 16px!important;height:64px!important;display:flex;align-items:center;font-size:13.5px!important;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;color:var(--text4);cursor:pointer;font-family:var(--font);transition:all .2s ease;position:relative;letter-spacing:0.01em}
.tj-tab:hover{color:var(--text);background:rgba(201,168,76,0.04)}
.tj-tab.active,.tj-tab[data-active="true"]{color:var(--text)!important;font-weight:600;border-bottom-color:transparent}
.tj-tab.active::after,.tj-tab[data-active="true"]::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:2px;background:#C9A84C;border-radius:0}
.tj-tab span{margin-right:6px;font-size:13px;opacity:0.75}
.tj-right-btns{display:flex;align-items:center;gap:8px}
.tj-right-btns button{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border3);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .2s;font-weight:500}
.tj-right-btns button:hover{border-color:var(--gold-border);color:var(--text);background:var(--gold-dim)}
.hamburger{display:none;background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:8px;line-height:1}
.mobile-menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:999;animation:fadeIn .2s ease}
.mobile-menu{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--bg2);border-right:1px solid var(--border3);z-index:1000;animation:slideIn .25s ease;padding:16px 0;overflow-y:auto}
.mobile-menu-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer}
.mobile-menu .mm-item{display:block;width:100%;padding:13px 20px;border:none;background:none;color:var(--text3);font-size:14px;text-align:left;cursor:pointer;font-family:var(--font);transition:background .1s;font-weight:500}
.mobile-menu .mm-item:hover,.mobile-menu .mm-item.active{background:rgba(201,168,76,0.07);color:#C9A84C}
.mobile-menu .mm-sep{height:1px;background:var(--border2);margin:8px 16px}
.mobile-menu .mm-logo{padding:8px 20px 16px;display:flex;align-items:center;gap:10px}
.resp-grid-stats{display:grid;gap:14px}
@media(min-width:901px){.resp-grid-stats{grid-template-columns:repeat(4,1fr)}}
@media(min-width:601px) and (max-width:900px){.resp-grid-stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.resp-grid-stats{grid-template-columns:1fr}}
/* ═══ DRAG & DROP (SortableJS) ═══ */
.sort-row{position:relative}
.drag-handle{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:grab;color:var(--text4);background:rgba(255,255,255,.04);border:1px solid var(--border2);user-select:none;font-size:16px;line-height:1;z-index:5;transition:all .15s}
.drag-handle:hover{color:var(--gold);background:var(--gold-dim);border-color:var(--gold-border)}
.drag-handle:active{cursor:grabbing}
.edit-mode .sort-row{outline:1px dashed rgba(201,168,76,.3);outline-offset:-1px}
/* Handle zit bovenop het paneel, zwart solid zodat content erachter niet doorlekt; in edit-mode duwt paneel-header content wat naar links */
.drag-handle{right:14px;top:14px;background:var(--bg2);border-color:var(--gold-border);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.edit-mode .sort-row>*:not(.drag-handle){padding-right:52px!important}
.sort-ghost{opacity:.35;background:rgba(201,168,76,.08)!important}
.sort-chosen{cursor:grabbing}
.sort-drag{transform:rotate(1deg);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.edit-banner{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--gold);display:flex;justify-content:space-between;align-items:center}

/* ═══ CALENDAR PREMIUM ═══ */
.cal-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--gold-border);border-radius:14px;overflow:hidden;margin-bottom:20px;border:1px solid var(--gold-border)}
.cal-stat{background:var(--bg2);padding:18px 20px;display:flex;flex-direction:column;gap:4px}
.cal-stat-label{font-size:10px;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.cal-stat-value{font-size:22px;font-weight:800;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.cal-stat-sub{font-size:11px;color:var(--text4)}
.cal-heatmap rect.cell{cursor:pointer;transition:all .15s ease}
.cal-heatmap rect.cell:hover{stroke:var(--gold);stroke-width:1.5}
.cal-day-cell{background:var(--bg2);border:1px solid rgba(255,255,255,.04);border-radius:8px;padding:10px;min-height:88px;cursor:pointer;transition:all .2s ease;position:relative;display:flex;flex-direction:column;gap:6px}
.cal-day-cell:hover{transform:translateY(-2px);border-color:var(--gold-border);box-shadow:0 8px 20px rgba(0,0,0,.4)}
.cal-day-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day-cell.empty:hover{transform:none;box-shadow:none}
.cal-day-cell.weekend{background:rgba(255,255,255,.015)}
.cal-day-cell.today{box-shadow:0 0 0 2px rgba(201,168,76,.25),inset 0 0 0 1px var(--gold);animation:calPulse 2s ease-in-out infinite}
.cal-day-cell.win{background:linear-gradient(135deg,rgba(46,170,111,.08) 0%,rgba(46,170,111,.18) 100%);border-color:rgba(46,170,111,.3)}
.cal-day-cell.win.big{background:linear-gradient(135deg,rgba(46,170,111,.15) 0%,rgba(46,170,111,.35) 100%);border-color:rgba(46,170,111,.5);box-shadow:0 0 16px rgba(46,170,111,.15)}
.cal-day-cell.loss{background:linear-gradient(135deg,rgba(224,85,85,.08) 0%,rgba(224,85,85,.18) 100%);border-color:rgba(224,85,85,.3)}
.cal-day-cell.loss.big{background:linear-gradient(135deg,rgba(224,85,85,.15) 0%,rgba(224,85,85,.35) 100%);border-color:rgba(224,85,85,.5);box-shadow:0 0 16px rgba(224,85,85,.15)}
@keyframes calPulse{0%,100%{box-shadow:0 0 0 2px rgba(201,168,76,.25),inset 0 0 0 1px var(--gold)}50%{box-shadow:0 0 0 4px rgba(201,168,76,.45),inset 0 0 0 1px var(--gold)}}
.cal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;opacity:0;pointer-events:none;transition:opacity .25s}
.cal-overlay.show{opacity:1;pointer-events:auto}
.cal-sidepanel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:92vw;background:var(--bg2);border-left:1px solid var(--gold-border);z-index:100;padding:24px;overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);box-shadow:-20px 0 60px rgba(0,0,0,.6)}
.cal-sidepanel.show{transform:translateX(0)}
.cal-tip{position:fixed;background:rgba(0,0,0,.95);color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;pointer-events:none;z-index:200;border:1px solid var(--gold-border);min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.6);opacity:0;transition:opacity .15s}
.cal-tip.show{opacity:1}

.resp-grid-donuts{display:grid;gap:16px}
@media(min-width:769px){.resp-grid-donuts{grid-template-columns:repeat(3,1fr)}}
@media(min-width:601px) and (max-width:768px){.resp-grid-donuts{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.resp-grid-donuts{grid-template-columns:1fr}}
.resp-grid-2col{display:grid;gap:18px}
@media(min-width:769px){.resp-grid-2col{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.resp-grid-2col{grid-template-columns:1fr}}
@media(max-width:1200px){.tj-topbar .tj-tabs{gap:0}.tj-topbar .tj-tab{padding:0 10px;font-size:12px}.tj-topbar .tj-tab span{display:none}.tj-content{padding:14px 18px!important}}

<script type="text/babel">

const {useState,useRef,useEffect,useCallback,useMemo} = React;

// ============ CONSTANTS & HELPERS ============
const TF_ORDER=["1m","3m","5m","15m","30m","1h","2h","4h","6h","8h","12h","1d","3d","1w","1M"];
const ROLE_OPTIONS=["Bias","Entry","Confirmatie"];

const EMPTY_TP={id:"",price:"",pct:"25",status:"open",actualPrice:""};

const DEFAULT_TAGS={
  setupTags:["BOS","MSB","SFP","F2R","F2L","Fill Play"],
  confirmationTags:["Liquidity Sweep","OB","Divergence","EQL/EQH","ChoCh","Directe Play","Backtest Play"],

  emotionTags:["FOMO","Gehaast","Twijfels","Overconfident","Gefrustreerd","Tilt","Onzeker","Geduldig","Rustig","Zelfverzekerd","Kalm","Gedisciplineerd"],

];

const fmt=(n)=>{if(n===null||n===undefined)return"--";const v=parseFloat(typeof n==="object"?0:n);return isNaN(v)?"--":v.toLocaleString("nl-NL",{minimumFractionDigits:2,maximumFractionDigits:2})};
const pct=(n)=>{const v=parseFloat(n);return isNaN(v)?"--":v.toFixed(1)+"%"};

const valOrNA=(v,formatter)=>isEmpty(v)?React.createElement(NA):formatter?formatter(v):v;

const ts2time=(ms)=>{const d=new Date(parseInt(ms));return d.toTimeString().slice(0,5)};
// Nederlandse datumweergave: 2026-04-14 → 14-04-2026. Storage blijft ISO voor sortering.
const fmtNL=(iso)=>{if(!iso||typeof iso!=="string")return iso||"";const p=iso.split("-");return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:iso;};

// ============ SESSION DETECTION ============
const SESSION_COLORS={
  "Tokyo":{bg:"rgba(201,168,76,0.08)",border:"rgba(201,168,76,0.25)",text:"#C9A84C"},
  "London":{bg:"rgba(138,159,192,0.08)",border:"rgba(138,159,192,0.22)",text:"#8a9fc0"},

  "Weekend":{bg:"rgba(176,112,144,0.08)",border:"rgba(176,112,144,0.22)",text:"#b07090"},
};
const CHART_COLORS={win:"#2eaa6f",loss:"#e05555",long:"#2eaa6f",short:"#e05555",open:"#C9A84C",tokyo:"#C9A84C",london:"#8a9fc0",ny:"#9a8acc",off:"#666672",weekend:"#b07090",neutral:"#6a7a8a"};
const ALL_SESSIONS=["Tokyo","London","New York","Off-session","Weekend"];

function getSessionTags(date,time){
  if(!date||!time)return[];
  const dt=new Date(date+"T"+(time.length===5?time+":00":time));
  if(isNaN(dt.getTime()))return[];
  const cetParts=new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/Amsterdam",hour:"numeric",minute:"numeric",weekday:"short",hour12:false}).formatToParts(dt);
  const h=parseInt(cetParts.find(p=>p.type==="hour")?.value||"0");
  const m=parseInt(cetParts.find(p=>p.type==="minute")?.value||"0");
  const hm=h*60+m;
  const wd=cetParts.find(p=>p.type==="weekday")?.value?.toLowerCase()||"";
  if(wd==="sat"||wd==="sun")return["Weekend"];
  if(hm>=930&&hm<1320)return["New York"];
  if(hm>=540&&hm<930)return["London"];
  if(hm>=120&&hm<480)return["Tokyo"];
  return["Off-session"];
}

// ============ STORAGE UTILS ============
// v7 FIX: localStorage quota monitoring
function getStorageUsage(){
  try{
    let total=0;
    for(const key of Object.keys(localStorage)){
      total+=((localStorage[key]||"").length+(key||"").length)*2;
    }
    return{bytes:total,pct:total/(5*1024*1024)*100};
  }catch(err){return{bytes:0,pct:0}}
}

function safeSave(key,data){
  try{
    const json=JSON.stringify(data);
    localStorage.setItem(key,json);
    return{ok:true,usage:getStorageUsage()};
  }catch(e){
    if(e.name==="QuotaExceededError"||e.code===22){
      return{ok:false,error:"quota",usage:getStorageUsage()};
    }
    return{ok:false,error:e.message,usage:getStorageUsage()};
  }
}

// v7 NEW: Calculate actual R-multiple for a trade
function calcRMultiple(trade){
  const entry=parseFloat(trade.entry);
  const sl=parseFloat(trade.stopLoss);
  const pnlVal=parseFloat(trade.pnl);
  if(!entry||!sl||sl===entry||isNaN(pnlVal))return null;
  // Position size in base currency (contracts or lots)
  const size=parseFloat(trade.positionSize)||1;
  const risk=Math.abs(entry-sl);
  // Risk in USDT = risk × size / entry (for linear contracts)
  const riskUsdt=risk*size/entry;
  if(riskUsdt<=0)return null;
  return pnlVal/riskUsdt;
}
function calcExpectancy(trades){
  if(!trades||!trades.length)return null;
  const closed=trades.filter(function(t){return t.pnl!==''&&!isNaN(parseFloat(t.pnl));});
  if(!closed.length)return null;
  const wins=closed.filter(function(t){return parseFloat(t.pnl)>0;});
  const losses=closed.filter(function(t){return parseFloat(t.pnl)<0;});
  const winRate=wins.length/closed.length;
  const avgWin=wins.length?wins.reduce(function(s,t){return s+parseFloat(t.pnl);},0)/wins.length:0;
  const avgLoss=losses.length?Math.abs(losses.reduce(function(s,t){return s+parseFloat(t.pnl);},0)/losses.length):0;
  const exp=(winRate*avgWin)-((1-winRate)*avgLoss);
  return Math.round(exp*100)/100;
}

// Resolve label for any trade source (manual account name, exchange key, or bare source string)
function resolveAccountLabel(source,config,accounts){
  if(!source||source==="manual")return"";
  const ex=config?.exchanges?.[source];
  if(ex?.label)return ex.label;
  const acct=(accounts||[]).find(a=>a.name===source);
  return acct?.label||"";
}

// Compute per-account capital = net of transactions. Corrections are absolute setpoints.
function computeAccountCapital(transactions){
  const tx=transactions||[];
  let capital=0;
  for(const t of tx){
    const amt=parseFloat(t.amount)||0;
    if(t.type==="deposit")capital+=amt;
    else if(t.type==="withdrawal")capital-=amt;
    else if(t.type==="correction")capital=amt; // correction = set to this value
  }
  return capital;
}

// Sum PnL for all trades linked to an account (by source name)
function sumTradePnl(trades,source){
  return(trades||[]).filter(t=>t.source===source).reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);
}

// Lookup capital for a trade-source (manual account name or exchange key)
function getCapitalForSource(source,config,accounts){
  if(!source||source==="manual")return 0;
  const ex=config?.exchanges?.[source];
  if(ex?.transactions)return computeAccountCapital(ex.transactions);
  const acct=(accounts||[]).find(a=>a.name===source);
  if(acct?.transactions)return computeAccountCapital(acct.transactions);
  return 0;
}

// Compute a metric value over a given period
function computeGoalMetric(metric,trades,period){
  const now=new Date();
  const inPeriod=t=>{
    if(!t.date)return false;
    if(period==="all")return true;
    const d=new Date(t.date);
    if(period==="year")return d.getFullYear()===now.getFullYear();
    if(period==="month")return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
    if(period==="quarter"){const q=Math.floor(d.getMonth()/3);const nq=Math.floor(now.getMonth()/3);return d.getFullYear()===now.getFullYear()&&q===nq}
    if(period==="week"){const ws=new Date(now);const dow=(ws.getDay()+6)%7;ws.setDate(ws.getDate()-dow);ws.setHours(0,0,0,0);return d>=ws}
    return true;
  };
  const scoped=(trades||[]).filter(t=>inPeriod(t)&&t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  if(scoped.length===0)return 0;
  switch(metric){
    case "pnl":return scoped.reduce((s,t)=>s+parseFloat(t.pnl),0);
    case "winRate":return scoped.filter(t=>parseFloat(t.pnl)>0).length/scoped.length*100;
    case "trades":return scoped.length;
    case "winningDays":{const byDay={};scoped.forEach(t=>{byDay[t.date]=(byDay[t.date]||0)+parseFloat(t.pnl)});return Object.values(byDay).filter(p=>p>0).length}
    case "avgR":{const rs=scoped.map(t=>calcRMultiple(t)).filter(r=>r!==null&&!isNaN(r));return rs.length?rs.reduce((s,r)=>s+r,0)/rs.length:0}
    case "grossProfit":return scoped.filter(t=>parseFloat(t.pnl)>0).reduce((s,t)=>s+parseFloat(t.pnl),0);
    case "maxDD":{const sorted=[...scoped].sort((a,b)=>(a.date+(a.time||"")).localeCompare(b.date+(b.time||"")));let peak=0,dd=0,cum=0;sorted.forEach(t=>{cum+=parseFloat(t.pnl);if(cum>peak)peak=cum;const d=peak-cum;if(d>dd)dd=d});return dd}
    case "profitFactor":{const gw=scoped.filter(t=>parseFloat(t.pnl)>0).reduce((s,t)=>s+parseFloat(t.pnl),0);const gl=Math.abs(scoped.filter(t=>parseFloat(t.pnl)<0).reduce((s,t)=>s+parseFloat(t.pnl),0));return gl>0?gw/gl:(gw>0?Infinity:0)}
    case "expectancy":return scoped.reduce((s,t)=>s+parseFloat(t.pnl),0)/scoped.length;
    default:return 0;
  }
}

// Compute riskUsd / riskPct for a trade. Returns {} if insufficient data.
function computeTradeRisk(trade,config,accounts){
  const entry=parseFloat(trade.entry),sl=parseFloat(trade.stopLoss),sz=parseFloat(trade.positionSize);
  const out={};
  if(entry>0&&sl>0&&sz>0){
    out.riskUsd=(Math.abs(entry-sl)*sz/entry).toFixed(2);
    const capital=getCapitalForSource(trade.source,config,accounts);
    if(capital>0)out.riskPct=(parseFloat(out.riskUsd)/capital*100).toFixed(2);
  }
  return out;
}

function getProxyUrl(){
  const WORKER="https://morani-proxy.moranitraden.workers.dev";

    }

  }catch(err){return WORKER;}
}

async function proxyCall(payload){
  const url=getProxyUrl();
  const resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  if(!resp.ok){
    var errMsg="Worker fout ("+resp.status+")";
    try{var ed=JSON.parse(await resp.text());if(ed.error)errMsg="Fout: "+ed.error;}catch(ex){}
    throw new Error(errMsg);
  }
  const data=await resp.json();
  if(data.error)throw new Error(data.error);
  return data;
}

// ============ v7: TAG MANAGER (FIXED) ============
function TagManager({tagConfig,setTagConfig,trades,setTrades,showToast}){
  const[renaming,setRenaming]=useState(null);
  const[renameVal,setRenameVal]=useState("");
  const[adding,setAdding]=useState(null);
  const[addVal,setAddVal]=useState("");

  const getTags=(catKey)=>tagConfig[catKey]||DEFAULT_TAGS[catKey]||[];

  const addTag=(catKey)=>{
    if(!addVal.trim())return;
    const current=getTags(catKey);
    if(current.includes(addVal.trim())){showToast("Tag bestaat al","error");return}
    setTagConfig(p=>({...p,[catKey]:[...current,addVal.trim()]}));
    setAddVal("");setAdding(null);showToast("Tag toegevoegd");
  };

  const removeTag=(catKey,tag)=>{
    const usedCount=trades.filter(t=>(t[catKey]||[]).includes(tag)).length;
    const msg=usedCount>0?`"${tag}" verwijderen? Wordt nog getoond op ${usedCount} bestaande trade${usedCount>1?"s":""}.`:`"${tag}" verwijderen?`;
    if(!confirm(msg))return;
    setTagConfig(p=>({...p,[catKey]:getTags(catKey).filter(t=>t!==tag)}));
    showToast(`Tag "${tag}" verwijderd`);
  };

  const startRename=(catKey,tag)=>{setRenaming({catKey,tag});setRenameVal(tag)};

  // v7 FIX: Actually rename tag in all trades
  const doRename=()=>{
    if(!renaming||!renameVal.trim())return;
    const{catKey,tag}=renaming;
    if(renameVal.trim()===tag){setRenaming(null);return}
    if(getTags(catKey).includes(renameVal.trim())){showToast("Tag naam bestaat al","error");return}
    const newTag=renameVal.trim();
    // Update tagConfig
    setTagConfig(p=>({...p,[catKey]:getTags(catKey).map(t=>t===tag?newTag:t)}));
    // v7 FIX: Update all trades that use this tag
    setTrades(p=>p.map(t=>{
      const arr=t[catKey]||[];
      if(!arr.includes(tag))return t;
      return{...t,[catKey]:arr.map(x=>x===tag?newTag:x)};
    }));
    showToast(`"${tag}" hernoemd naar "${newTag}" in alle trades`);
    setRenaming(null);
  };

  return(
    <div style={{animation:"fadeIn .3s ease",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"24px",border:"1px solid var(--glass-border)"}}>
      <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"1.5rem"}}>Tag categorieën beheren</div>

      {TAG_CATEGORIES.map(cat=>{
        const c=COLORS[cat.color]||COLORS.blue;
        const tags=getTags(cat.key);
        const isAdding=adding===cat.key;

        const renderTag=(tag)=>{
          const isRenaming=renaming?.catKey===cat.key&&renaming?.tag===tag;
          const usedCount=trades.filter(t=>(t[cat.key]||[]).includes(tag)).length;
          const isEmo=cat.key==="emotionTags";
          const neg=isEmo&&isNegEmotion(tag);
          const tagBorder=isEmo?(neg?"rgba(220,122,122,0.28)":"rgba(46,170,111,0.28)"):`${c.border}40`;
          const tagBg=isEmo?(neg?"rgba(239,83,80,0.1)":"rgba(46,170,111,0.1)"):c.bg;
          const tagColor=isEmo?(neg?"#e05555":CHART_COLORS.win):c.text;
          if(isRenaming)return(
            <form key={tag} onSubmit={e=>{e.preventDefault();doRename()}} style={{display:"flex",gap:"4px",alignItems:"center"}}>
              <input autoFocus value={renameVal} onChange={e=>setRenameVal(e.target.value)} style={{...iStyle,width:"140px",padding:"5px 10px",fontSize:"12px"}}/>
              <button type="submit" style={{padding:"5px 8px",borderRadius:"5px",border:`1px solid ${tagBorder}`,background:tagBg,color:tagColor,fontSize:"11px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>OK</button>
              <button type="button" onClick={()=>setRenaming(null)} style={{padding:"5px 8px",borderRadius:"5px",border:"none",background:"transparent",color:"var(--text4)",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>Annuleer</button>
            </form>
          );
          return(

    }else{
      const greenGrad=ctx.createLinearGradient(0,0,0,220);greenGrad.addColorStop(0,"rgba(46,170,111,0.22)");greenGrad.addColorStop(1,"rgba(46,170,111,0.03)");
      const redGrad=ctx.createLinearGradient(0,0,0,220);redGrad.addColorStop(0,"rgba(220,122,122,0.03)");redGrad.addColorStop(1,"rgba(220,122,122,0.22)");

        segment:{borderColor:function(c2){const v0=c2.p0.parsed.y;const v1=c2.p1.parsed.y;if(v0>=0&&v1>=0)return CHART_COLORS.win;if(v0<0&&v1<0)return"#d46a6a";return v1>=0?CHART_COLORS.win:CHART_COLORS.loss}}});

      plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(10,12,18,0.9)",borderColor:"rgba(54,58,69,0.9)",borderWidth:1,titleFont:{family:"'JetBrains Mono',monospace",size:11},bodyFont:{family:"'JetBrains Mono',monospace",size:11},titleColor:"#c0c5cd",bodyColor:"#f5f5f7",padding:10,cornerRadius:6,filter:function(item){return!item.dataset.label.startsWith("_")},callbacks:{label:function(c2){const v=c2.parsed.y;return` ${c2.dataset.label}: ${v>=0?"+":""}$${v.toLocaleString("nl-NL",{minimumFractionDigits:2,maximumFractionDigits:2})}`}}}},
      scales:{x:{grid:{color:"rgba(255,255,255,0.10)"},ticks:{color:"#939aa5",font:{family:"'JetBrains Mono',monospace",size:9},maxTicksLimit:8,maxRotation:0},border:{display:false}},y:{grid:{color:"rgba(255,255,255,0.10)"},ticks:{color:"#939aa5",font:{family:"'JetBrains Mono',monospace",size:9},callback:function(v){return"$"+v.toLocaleString("nl-NL",{minimumFractionDigits:0,maximumFractionDigits:0})}},border:{display:false}}}}});
    return()=>{if(chartRef.current){try{chartRef.current.destroy()}catch(err){}chartRef.current=null}};

// ============ SETUP RANKING WIDGET ============
// Top 3 / Worst 3 setups by avg-R-multiple (fallback: avg PnL per trade).
// Only setups with n >= MIN_N (3) are considered, to avoid noise from rare setups.
function SetupRankingWidget({trades,onSetupClick}){
  const MIN_N=3;
  const closed=(trades||[]).filter(t=>t.status==="closed"||!t.status);
  const perf={};
  closed.forEach(t=>{
    (t.setupTags||[]).forEach(tag=>{
      if(!perf[tag])perf[tag]={n:0,w:0,pnl:0,rTotal:0,rCount:0};
      perf[tag].n++;
      const p=parseFloat(t.pnl)||0;
      perf[tag].pnl+=p;if(p>0)perf[tag].w++;
      const r=calcRMultiple(t);if(r!==null&&!isNaN(r)){perf[tag].rTotal+=r;perf[tag].rCount++}
    })
  });
  const enriched=Object.entries(perf).filter(([,d])=>d.n>=MIN_N).map(([tag,d])=>({
    tag,n:d.n,winRate:d.n>0?d.w/d.n*100:0,totalPnl:d.pnl,avgPnl:d.pnl/d.n,
    avgR:d.rCount>0?d.rTotal/d.rCount:null,
    // Ranking score: avgR if available, else avgPnl normalized to scale-independent
    score:d.rCount>0?d.rTotal/d.rCount:d.pnl/d.n/100
  }));
  if(enriched.length===0)return null;
  const sorted=[...enriched].sort((a,b)=>b.score-a.score);
  const top=sorted.slice(0,3);
  const worst=sorted.slice(-3).reverse();
  const Row=({item,rank,flavor})=>(<div onClick={onSetupClick?()=>onSetupClick(item.tag):undefined} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 10px",borderRadius:"6px",background:"rgba(255,255,255,.02)",border:"1px solid var(--border2)",cursor:onSetupClick?"pointer":"default",transition:"background .15s"}} onMouseEnter={e=>{if(onSetupClick)e.currentTarget.style.background="rgba(201,168,76,.06)"}} onMouseLeave={e=>{if(onSetupClick)e.currentTarget.style.background="rgba(255,255,255,.02)"}}>
    <div style={{width:"22px",height:"22px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:700,background:flavor==="top"?"rgba(46,170,111,.15)":"rgba(224,85,85,.15)",color:flavor==="top"?"var(--green)":"var(--red)"}}>{rank}</div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:"12px",fontWeight:600,color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.tag}</div>
      <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"var(--mono)"}}>{item.n}x · {item.winRate.toFixed(0)}% wr</div>
    </div>
    <div style={{textAlign:"right"}}>
      {item.avgR!==null?<div style={{fontSize:"12px",fontWeight:700,color:item.avgR>=0?"var(--green)":"var(--red)",fontFamily:"var(--mono)"}}>{item.avgR>=0?"+":""}{item.avgR.toFixed(2)}R</div>:<div style={{fontSize:"11px",fontWeight:700,color:item.avgPnl>=0?"var(--green)":"var(--red)",fontFamily:"var(--mono)"}}>{item.avgPnl>=0?"+":""}${fmt(item.avgPnl)}</div>}
      <div style={{fontSize:"9px",color:"var(--text4)",fontFamily:"var(--mono)"}}>gem. per trade</div>
    </div>
  </div>);
  return(<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"1.5rem",border:"1px solid var(--border1)"}}>
    <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <span>Setup ranking</span>
      <span style={{fontSize:"9px",color:"var(--text5)",fontWeight:500,textTransform:"none",letterSpacing:0}}>min. {MIN_N} trades · {onSetupClick?"klik om te filteren":""}</span>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px"}}>
      <div>
        <div style={{fontSize:"10px",color:"var(--green)",fontWeight:700,marginBottom:"6px",letterSpacing:".08em"}}>🏆 TOP {top.length}</div>
        <div style={{display:"grid",gap:"4px"}}>{top.map((it,i)=>(<Row key={it.tag} item={it} rank={i+1} flavor="top"/>))}</div>
      </div>
      <div>
        <div style={{fontSize:"10px",color:"var(--red)",fontWeight:700,marginBottom:"6px",letterSpacing:".08em"}}>🚫 WORST {worst.length}</div>
        <div style={{display:"grid",gap:"4px"}}>{worst.map((it,i)=>(<Row key={it.tag} item={it} rank={i+1} flavor="worst"/>))}</div>
      </div>
    </div>
  </div>);
}

    {/* Equity chart (unchanged from original) */}
    {lp.equityChart&&eq.length>1&&(()=>{

    {/* Setup ranking — Top 3 / Worst 3, clickable to filter */}

    {/* Setup performance */}
    {lp.setupPerf&&(Object.keys(setupPerf).length>0?<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"1.5rem"}}>
      <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"14px"}}>Setup performance</div>
      {Object.entries(setupPerf).sort((a,b)=>b[1].pnl-a[1].pnl).map(([tag,d])=>{const wr2=d.n>0?d.w/d.n*100:0;const mx=Math.max(...Object.values(setupPerf).map(x=>Math.abs(x.pnl)),1);const w=Math.abs(d.pnl)/mx*100;const pos=d.pnl>=0;return(<div key={tag} style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}><div style={{width:"80px",fontSize:"12px",color:"var(--text2)",fontWeight:500}}>{tag}</div><div style={{flex:1,height:"24px",background:"rgba(255,255,255,0.10)",borderRadius:"4px",position:"relative",overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(w,2)}%`,background:pos?"rgba(46,170,111,0.28)":"rgba(220,122,122,0.28)",borderRadius:"4px"}}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:"8px",fontSize:"11px",fontFamily:"var(--mono)",color:pos?"var(--green)":"var(--red)",fontWeight:600}}>{d.pnl>=0?"+":""}${fmt(d.pnl)}</div></div><div style={{width:"40px",fontSize:"10px",color:"var(--text3)",textAlign:"right",fontFamily:"var(--mono)"}}>{d.n}x</div><div style={{width:"45px",fontSize:"10px",color:wr2>=50?"var(--green)":"var(--red)",textAlign:"right",fontFamily:"var(--mono)"}}>{wr2.toFixed(0)}%</div></div>)})}
    </div>:null)}

    {/* Session performance */}
    {lp.sessionPerf&&(()=>{

      closed.forEach(t=>{const st=getSessionTags(t.date,t.time);const p=parseFloat(t.pnl);st.forEach(s=>{if(!sessPerf[s])sessPerf[s]={w:0,l:0,pnl:0,n:0};sessPerf[s].n++;sessPerf[s].pnl+=p;p>0?sessPerf[s].w++:sessPerf[s].l++})});
      const hasSess=Object.values(sessPerf).some(d=>d.n>0);
      if(!hasSess)return null;
      const sessMax=Math.max(...Object.values(sessPerf).map(d=>Math.abs(d.pnl)),1);
      return(<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"1.5rem"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"14px"}}>Performance per sessie (CET)</div>
        {ALL_SESSIONS.filter(s=>sessPerf[s].n>0).map(s=>{
          const d=sessPerf[s];const wr=d.n>0?d.w/d.n*100:0;
          const grossW=closed.filter(t=>getSessionTags(t.date,t.time).includes(s)&&parseFloat(t.pnl)>0).reduce((a,t)=>a+parseFloat(t.pnl),0);
          const grossL=Math.abs(closed.filter(t=>getSessionTags(t.date,t.time).includes(s)&&parseFloat(t.pnl)<0).reduce((a,t)=>a+parseFloat(t.pnl),0));
          const profitFactor=grossL>0?grossW/grossL:(grossW>0?Infinity:0);
          const w=Math.abs(d.pnl)/sessMax*100;const pos=d.pnl>=0;
          const c=SESSION_COLORS[s]||SESSION_COLORS["Off-session"];
          return(<div key={s} style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}}>
            <div style={{width:"90px",display:"flex",alignItems:"center",gap:"6px"}}><div style={{width:"8px",height:"8px",borderRadius:"2px",background:c.text,flexShrink:0}}/><span style={{fontSize:"12px",color:c.text,fontWeight:600}}>{s}</span></div>
            <div style={{flex:1,height:"24px",background:"rgba(255,255,255,0.10)",borderRadius:"4px",position:"relative",overflow:"hidden"}}><div style={{height:"100%",width:`${Math.max(w,2)}%`,background:pos?`${c.text}30`:`rgba(220,122,122,0.28)`,borderRadius:"4px"}}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:"8px",fontSize:"11px",fontFamily:"var(--mono)",color:pos?"var(--green)":"var(--red)",fontWeight:600}}>{d.pnl>=0?"+":""}${fmt(d.pnl)}</div></div>
            <div style={{width:"40px",fontSize:"10px",color:"var(--text3)",textAlign:"right",fontFamily:"var(--mono)"}}>{d.n}x</div>
            <div style={{width:"45px",fontSize:"10px",color:wr>=50?"var(--green)":"var(--red)",textAlign:"right",fontFamily:"var(--mono)"}}>{wr.toFixed(0)}%</div>
            <div style={{width:"45px",fontSize:"10px",color:profitFactor>=1.5?"var(--green)":profitFactor>=1?"var(--amber)":"var(--red)",textAlign:"right",fontFamily:"var(--mono)"}}>{profitFactor===Infinity?"∞":profitFactor.toFixed(2)}</div>
          </div>);
        })}
      </div>);
    })()}

    {/* Fouten + Emotie performance */}
    <div style={{display:"grid",gridTemplateColumns:lp.foutenPerf&&lp.emotionPerf?"1fr 1fr":"1fr",gap:"16px"}}>
      {lp.foutenPerf&&topMistakes.length>0&&<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"20px"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"12px"}}>Top fouten</div>
        {topMistakes.map(([tag,n])=>(<div key={tag} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border1)",fontSize:"13px"}}><span style={{color:"var(--orange)"}}>{tag}</span><span style={{fontFamily:"var(--mono)",color:"var(--text3)"}}>{n}x</span></div>))}

        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"12px"}}>Performance per emotie</div>

// ============ TRADE LIST (v7: with search) ============
function TradeList({trades,onEdit,onDelete,onQuickTag,onBulkDelete,onBulkTag,showToast,tagConfig,config,accounts}){
  const[sortField,setSortField]=useState("date");
  const[sortDir,setSortDir]=useState("desc");
  const[selected,setSelected]=useState(new Set());
  const[bulkAction,setBulkAction]=useState(null);
  const[sizeMode,setSizeMode]=useState(()=>localStorage.getItem("tj_sizeMode")||"usdt");
  // v7 NEW: search state
  const[search,setSearch]=useState("");

  const toggleSizeMode=()=>{const next=sizeMode==="usdt"?"asset":"usdt";setSizeMode(next);localStorage.setItem("tj_sizeMode",next)};
  const fmtSize=(t)=>{
    const sz=parseFloat(t.positionSize);if(!sz||isNaN(sz))return null;
    if(sizeMode==="asset"){
      const asset=(t.pair||"").split("/")[0]||"";
      if(t.positionSizeAsset&&parseFloat(t.positionSizeAsset)>0)return `${parseFloat(parseFloat(t.positionSizeAsset).toFixed(8))} ${asset}`;
      const entry=parseFloat(t.entry);
      if(entry>0){const assetSize=sz/entry;return `${parseFloat(assetSize.toFixed(8))} ${asset}`}
      return `${parseFloat(sz.toFixed(8))} ${asset}`;
    }
    return `$${fmt(sz)}`;
  };

  if(!trades.length)return(<div style={{textAlign:"center",padding:"4rem 2rem",color:"var(--text3)"}}>
    <div style={{fontSize:"48px",marginBottom:"1rem",opacity:0.3}}>📋</div>
    <div style={{fontSize:"16px",fontWeight:500,marginBottom:"8px"}}>Geen trades gevonden</div>
    <div style={{marginTop:"8px",fontSize:"11px",color:"var(--text4)"}}><span className="kbd">N</span> Nieuwe trade toevoegen</div>
  </div>);

  // v7 NEW: search filter (debounced on state)
  const searchLower=search.toLowerCase().trim();
  const searchFiltered=searchLower?trades.filter(t=>{
    if((t.pair||"").toLowerCase().includes(searchLower))return true;
    if((t.notes||"").toLowerCase().includes(searchLower))return true;
    if((t.date||"").includes(searchLower))return true;
    if([...(t.setupTags||[]),...(t.confirmationTags||[]),...(t.emotionTags||[]),...(t.mistakeTags||[])].some(s=>s.toLowerCase().includes(searchLower)))return true;
    // R-multiple search e.g. "2R" or "+2R"
    const rMult=calcRMultiple(t);
    if(rMult!==null&&(`${rMult.toFixed(1)}R`).includes(searchLower))return true;
    return false;
  }):trades;

  const sorted=[...searchFiltered].sort((a,b)=>{
    if(a.status==="open"&&b.status!=="open")return -1;
    if(b.status==="open"&&a.status!=="open")return 1;
    let va,vb;
    if(sortField==="date"){va=`${a.date}T${a.time}`;vb=`${b.date}T${b.time}`}
    else if(sortField==="pnl"){va=parseFloat(a.pnl)||0;vb=parseFloat(b.pnl)||0}
    else if(sortField==="pair"){va=(a.pair||"").split("/")[0];vb=(b.pair||"").split("/")[0]}
    else{va=a[sortField]||"";vb=b[sortField]||""}
    if(typeof va==="number")return sortDir==="asc"?va-vb:vb-va;
    return sortDir==="asc"?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
  });

  const toggleSort=f=>{if(sortField===f)setSortDir(p=>p==="asc"?"desc":"asc");else{setSortField(f);setSortDir("desc")}};
  const thStyle={padding:"8px 6px",fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.04em",cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",borderBottom:"1px solid var(--border2)"};
  const arrow=f=>sortField===f?(sortDir==="asc"?" ▴":" ▾"):"";

// ═══ Trade Card Export — 4 designs + veld-toggles + PNG download ═══
function TradeCardExport({trade,onClose}){
  const [style,setStyle]=useState(()=>{try{return localStorage.getItem("tj_card_style")||"classic"}catch{return"classic"}});
  const [fields,setFields]=useState(()=>{try{return JSON.parse(localStorage.getItem("tj_card_fields")||"null")||{pnlAbs:true,pnlPct:true,rMult:true,entry:true,exit:true,size:true,stopLoss:false,holdTime:true,setup:true,dateTime:true,session:true,anonPair:false}}catch{return{}}});
  useEffect(()=>{try{localStorage.setItem("tj_card_style",style);localStorage.setItem("tj_card_fields",JSON.stringify(fields));}catch{}},[style,fields]);
  const cardRef=useRef(null);
  const [busy,setBusy]=useState(false);

  // Compute all trade values once
  const pnl=parseFloat(trade.pnl)||0;
  const entryP=parseFloat(trade.entry)||0;
  const exitP=parseFloat(trade.exit)||0;
  const size=trade.positionSize||trade.positionSizeAsset||"";
  const sl=parseFloat(trade.stopLoss)||0;
  const dir=trade.direction||"long";
  const pairDisplay=fields.anonPair?"COIN/USDT":(trade.pair||"BTC/USDT");
  const pairShort=pairDisplay.split("/")[0];
  const quoteShort=pairDisplay.split("/")[1]||"USDT";
  const rMult=(()=>{if(!entryP||!sl||!exitP)return null;const r=Math.abs(entryP-sl);if(!r)return null;return Math.abs(exitP-entryP)/r*(pnl>=0?1:-1);})();
  const pnlPct=(()=>{if(!entryP||!size)return null;const notional=entryP*parseFloat(size);if(!notional)return null;return pnl/notional*100;})();
  const holdMs=trade.openTime&&trade.closeTime?Math.abs(parseInt(trade.closeTime)-parseInt(trade.openTime)):0;
  const holdStr=holdMs?(holdMs>86400000?(holdMs/86400000).toFixed(1)+"d":holdMs>3600000?Math.floor(holdMs/3600000)+"h "+Math.floor((holdMs%3600000)/60000)+"m":Math.floor(holdMs/60000)+"m"):"–";
  const sessionStr=(()=>{try{const s=getSessionTags(trade.date,trade.time);return s[0]||"–";}catch{return"–";}})();
  const setupStr=(trade.setupTags||[]).slice(0,2).join(" · ")||"–";
  const dirColor=pnl>=0?"#2eaa6f":"#e05555";
  const pnlSign=pnl>=0?"+":"";
  const dateDisplay=fmtNL(trade.date||"")+(trade.time?" · "+trade.time:"");

  const[copyStatus,setCopyStatus]=useState("");
  const renderCanvas=async()=>{
    const el=cardRef.current;
    if(!el)throw new Error("card niet gevonden");
    // Clone the card into an isolated detached container, away from any parent CSS
    // (parent conic-gradient / transform:scale / backdrop-filter can break html2canvas)
    const sandbox=document.createElement("div");
    sandbox.style.cssText="position:fixed;left:-99999px;top:0;pointer-events:none;background:transparent;z-index:-1";
    const clone=el.cloneNode(true);
    clone.classList.add("capture-mode");
    sandbox.appendChild(clone);
    document.body.appendChild(sandbox);
    try{
      await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
      return await html2canvas(clone,{backgroundColor:null,scale:2,logging:false,useCORS:true,imageTimeout:0,removeContainer:true,foreignObjectRendering:false});
    }finally{
      document.body.removeChild(sandbox);
    }
  };
  const downloadPNG=async()=>{
    if(!cardRef.current||typeof html2canvas==="undefined")return;
    setBusy(true);
    try{
      const canvas=await renderCanvas();
      const url=canvas.toDataURL("image/png");
      const a=document.createElement("a");a.href=url;a.download=`trade-${pairShort}-${trade.date||"card"}.png`;a.click();
    }catch(e){alert("Export mislukt: "+e.message)}
    setBusy(false);
  };
  const copyImage=async()=>{
    if(!cardRef.current||typeof html2canvas==="undefined")return;

function Section({title,storeKey,defaultOpen=true,hint,children}){
  const[open,setOpen]=useState(()=>{const s=localStorage.getItem("tj_form_section_"+storeKey);return s===null?defaultOpen:s==="1"});
  const onToggle=(e)=>{const v=e.target.open;setOpen(v);localStorage.setItem("tj_form_section_"+storeKey,v?"1":"0")};
  return(<details className="tj-section" open={open} onToggle={onToggle}>
    <summary><span className="tj-sec-title">{title}</span>{hint&&<span className="tj-sec-hint">{hint}</span>}<span className="tj-sec-chev">▾</span></summary>
    <div className="tj-sec-body">{children}</div>
  </details>);
}

function TradeForm({trade,setTrade,onSave,onCancel,tagConfig,config,accounts}){

  const toggle=(f,tag)=>setTrade(p=>({...p,[f]:p[f].includes(tag)?p[f].filter(t=>t!==tag):[...p[f],tag]}));
  const fRef=useRef();
  const handleSS=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setTrade(p=>({...p,screenshot:ev.target.result}));r.readAsDataURL(f)};
  const gt=(k)=>tagConfig[k]||DEFAULT_TAGS[k]||[];
  const[sizeInputMode,setSizeInputMode]=useState(()=>localStorage.getItem("tj_sizeInputMode")||"usdt");
  const isOpen=(trade.status||"closed")==="open";

  const sourceOptions=[{id:"manual",label:"✏️ Handmatig",color:"var(--text3)"}];

  (accounts||[]).forEach(a=>{if(!sourceOptions.find(s=>s.id===a.name))sourceOptions.push({id:a.name,label:"✏️ "+a.name,color:"var(--text3)"})});

  return(<div style={{animation:"fadeIn .3s ease",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"24px",border:"1px solid var(--glass-border)"}}>
    {/* Status toggle — primary control, drives conditional form sections */}

      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>Status</span>
        <div style={{display:"flex",gap:0,borderRadius:"6px",overflow:"hidden",border:"1px solid var(--border3)"}}>
          {["closed","open"].map(s=>(<button key={s} onClick={()=>setTrade(p=>({...p,status:s}))} style={{padding:"6px 16px",border:"none",fontSize:"11px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:trade.status===s?(s==="open"?"rgba(201,168,76,0.2)":"rgba(42,46,57,0.9)"):"transparent",color:trade.status===s?(s==="open"?"#C9A84C":"var(--text)"):"var(--text4)",display:"flex",alignItems:"center",gap:"5px"}}>{s==="open"&&trade.status==="open"&&<span style={{width:"6px",height:"6px",borderRadius:"50%",background:"#C9A84C",boxShadow:"0 0 6px #C9A84C"}}/>}{s==="open"?"Open":"Closed"}</button>))}
        </div>
      </div>

        {sourceOptions.map(opt=>{const active=(trade.source||"manual")===opt.id;return(<button key={opt.id} onClick={()=>setTrade(p=>({...p,source:opt.id}))} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"11px",fontWeight:600,border:`1px solid ${active?opt.color||"#C9A84C":"var(--border3)"}`,background:active?`${opt.color||"#C9A84C"}15`:"transparent",color:active?opt.color||"#C9A84C":"var(--text4)",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"5px"}}>{!opt.id.startsWith("✏")&&opt.id!=="manual"&&<ExchangeIcon name={opt.id} size={14}/>}{opt.label}</button>);})}

      {(()=>{
        const asset=(trade.pair||"BTC/USDT").split("/")[0]||"BTC";
        const toggleInput=()=>{const next=sizeInputMode==="usdt"?"asset":"usdt";setSizeInputMode(next);localStorage.setItem("tj_sizeInputMode",next)};
        const handleSizeChange=(v)=>{
          const entry=parseFloat(trade.entry);
          if(sizeInputMode==="usdt"){const updates={positionSize:v,manualOverrides:[...new Set([...(trade.manualOverrides||[]),"positionSize"])]};if(entry>0&&parseFloat(v)>0)updates.positionSizeAsset=String(parseFloat((parseFloat(v)/entry).toFixed(8)));setTrade(p=>({...p,...updates}));}
          else{const updates={positionSizeAsset:v,manualOverrides:[...new Set([...(trade.manualOverrides||[]),"positionSize"])]};if(entry>0&&parseFloat(v)>0)updates.positionSize=String(parseFloat((parseFloat(v)*entry).toFixed(2)));setTrade(p=>({...p,...updates}));}
        };
        return(<div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"6px"}}><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:500}}>POSITIE ({sizeInputMode==="usdt"?"$":asset})</div><button onClick={toggleInput} style={{fontSize:"9px",padding:"2px 6px",borderRadius:"3px",border:"1px solid var(--border3)",background:"transparent",color:"var(--gold)",cursor:"pointer",fontFamily:"var(--mono)"}}>{sizeInputMode==="usdt"?"→ "+asset:"→ USDT"}</button></div><input type="text" value={sizeInputMode==="usdt"?(trade.positionSize||""):(trade.positionSizeAsset||"")} onChange={e=>handleSizeChange(e.target.value)} style={{...iStyle,color:isEmpty(sizeInputMode==="usdt"?trade.positionSize:trade.positionSizeAsset)?"#4b5563":"var(--text)"}} placeholder="N/A"/></div>);
      })()}
      {!isOpen&&[["pnl","PNL ($)"],["fees","FEES ($)"]].map(([k,l])=>(<div key={k}><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>{l}</div><input type="text" value={trade[k]} onChange={e=>{const v=e.target.value;setTrade(p=>({...p,[k]:v,manualOverrides:[...new Set([...(p.manualOverrides||[]),k])]}))}} style={{...iStyle,color:isEmpty(trade[k])?"#4b5563":"var(--text)"}} placeholder="N/A"/></div>))}
    </div>

    {/* Live KPI strip — Risk / R:R / Qty real-time */}
    {(()=>{
      const e=parseFloat(trade.entry),s=parseFloat(trade.stopLoss),sz=parseFloat(trade.positionSize);
      const szAsset=parseFloat(trade.positionSizeAsset);
      const qty=sz>0&&e>0?sz/e:(szAsset>0?szAsset:null);
      const risk=(e>0&&s>0&&sz>0)?Math.abs(e-s)*sz/e:null;
      const tps=trade.tpLevels||[];
      const weightedRR=(()=>{
        if(!e||!s)return null;const riskDist=Math.abs(e-s);if(riskDist===0)return null;
        const rrs=tps.map(tp=>{const tpN=parseFloat(tp.price);const pct=parseFloat(tp.pct||0);return(tpN>0&&pct>0)?{rr:Math.abs(tpN-e)/riskDist,pct}:null}).filter(Boolean);
        if(rrs.length===0){const ex=parseFloat(trade.exit);if(!ex)return null;return Math.abs(ex-e)/riskDist}
        const sum=rrs.reduce((a,b)=>a+b.pct,0);return rrs.reduce((a,b)=>a+b.rr*b.pct,0)/(sum||1);
      })();
      const asset=(trade.pair||"BTC/USDT").split("/")[0]||"BTC";
      const capital=getCapitalForSource(trade.source,config,accounts);
      const riskPct=(risk!=null&&capital>0)?risk/capital*100:null;
      const riskPctColor=riskPct==null?"var(--text5)":riskPct<=1?"var(--green)":riskPct<=2?"var(--gold)":riskPct<=4?"var(--amber)":"var(--red)";
      return(<div className="tj-kpi-strip">
        <div className="tj-kpi"><span className="tj-kpi-label">Risk $</span><span className={"tj-kpi-val"+(risk==null?" muted":"")} style={risk!=null?{color:"var(--red)"}:{}}>{risk!=null?"$"+fmt(risk):"—"}</span></div>
        <div className="tj-kpi"><span className="tj-kpi-label">Risk %</span><span className={"tj-kpi-val"+(riskPct==null?" muted":"")} style={{color:riskPctColor}}>{riskPct!=null?riskPct.toFixed(2)+"%":"—"}</span></div>
        <div className="tj-kpi"><span className="tj-kpi-label">R:R</span><span className={"tj-kpi-val"+(weightedRR==null?" muted":"")} style={weightedRR!=null?{color:weightedRR>=1?"var(--green)":"var(--amber)"}:{}}>{weightedRR!=null?"1:"+weightedRR.toFixed(2):"—"}</span></div>
        <div className="tj-kpi"><span className="tj-kpi-label">Qty ({asset})</span><span className={"tj-kpi-val"+(qty==null?" muted":"")}>{qty!=null?qty.toFixed(6).replace(/\.?0+$/,""):"—"}</span></div>
      </div>);
    })()}

    {/* Auto PNL calc */}
    {!isOpen&&(()=>{const e=parseFloat(trade.entry);const ex=parseFloat(trade.exit);const sz=parseFloat(trade.positionSize);const fees=parseFloat(trade.fees)||0;if(e>0&&ex>0&&sz>0&&!(trade.manualOverrides||[]).includes("pnl")){const raw=trade.direction==="long"?(ex-e)*sz/e:(e-ex)*sz/e;const net2=raw-fees;if(trade.pnl!==""&&Math.abs(parseFloat(trade.pnl)-net2)>0.01||trade.pnl===""){return(<div style={{marginBottom:"12px"}}><button onClick={()=>setTrade(p=>({...p,pnl:net2.toFixed(2)}))} style={{fontSize:"10px",padding:"4px 12px",borderRadius:"5px",border:"1px solid var(--blue2)",background:"rgba(201,168,76,0.12)",color:"#C9A84C",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>💡 PNL berekenen: {net2>=0?"+":""}${fmt(net2)} {fees>0?`(na $${fmt(fees)} fees)`:""} → Toepassen</button></div>)}}return null;})()}

    {/* TP Levels (multi-TP with percentages) — ported from v4_14 */}
    {(()=>{
      const tps=trade.tpLevels||[];
      const totalPct=tps.reduce((s,tp)=>s+parseFloat(tp.pct||0),0);
      const entryN=parseFloat(trade.entry);const slN=parseFloat(trade.stopLoss);const sizeN=parseFloat(trade.positionSize);
      const isLong=trade.direction==="long";

      const addTP=()=>{const remaining=Math.max(0,100-totalPct);setTrade(p=>({...p,tpLevels:[...(p.tpLevels||[]),{...EMPTY_TP,id:uid(),pct:String(remaining>0?Math.min(remaining,25):25)}]}))};
      const updateTP=(id,field,val)=>setTrade(p=>({...p,tpLevels:(p.tpLevels||[]).map(tp=>tp.id===id?{...tp,[field]:val}:tp)}));
      const removeTP=(id)=>setTrade(p=>({...p,tpLevels:(p.tpLevels||[]).filter(tp=>tp.id!==id)}));
      const toggleStatus=(id)=>setTrade(p=>({...p,tpLevels:(p.tpLevels||[]).map(tp=>tp.id===id?{...tp,status:tp.status==="hit"?"open":tp.status==="open"?"missed":"hit"}:tp)}));

      const calcProfit=(tp)=>{
        if(!entryN||!sizeN||!parseFloat(tp.price))return null;
        const pct=parseFloat(tp.pct||0)/100;const tpPrice=parseFloat(tp.price);
        return isLong?(tpPrice-entryN)*sizeN*pct/entryN:(entryN-tpPrice)*sizeN*pct/entryN;
      };
      const calcRR=(tp)=>{
        if(!entryN||!slN||!parseFloat(tp.price))return null;
        const risk=Math.abs(entryN-slN);if(risk===0)return null;
        return Math.abs(parseFloat(tp.price)-entryN)/risk;
      };

      return(<div style={{borderTop:"1px solid var(--border2)",paddingTop:"1.5rem",marginBottom:"1rem"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
          <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Take Profit niveaus</div>
          {tps.length<4&&<button onClick={addTP} style={{fontSize:"11px",padding:"4px 10px",borderRadius:"5px",border:"1px dashed var(--border5)",background:"transparent",color:"#C9A84C",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>+ TP toevoegen</button>}
        </div>

        {tps.length>0&&<>
          <div style={{display:"grid",gridTemplateColumns:"32px 1fr 70px 80px 70px 60px 28px",gap:"6px",marginBottom:"4px",padding:"0 2px"}}>
            <span style={{fontSize:"9px",color:"var(--text5)"}}></span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>Prijs</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>%</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>Winst</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>R:R</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>Status</span>
            <span></span>
          </div>

          {tps.map((tp,i)=>{
            const profit=calcProfit(tp);const rr=calcRR(tp);
            const statusColor=tp.status==="hit"?"var(--green)":tp.status==="missed"?"var(--red)":"var(--gold)";
            const statusIcon=tp.status==="hit"?<GlowCheck size={14}/>:tp.status==="missed"?<GlowCross size={14}/>:"◔";
            return(<div key={tp.id} style={{display:"grid",gridTemplateColumns:"32px 1fr 70px 80px 70px 60px 28px",gap:"6px",alignItems:"center",marginBottom:"4px"}}>
              <span style={{fontSize:"11px",fontWeight:700,color:"var(--gold)",textAlign:"center"}}>TP{i+1}</span>
              <input type="text" value={tp.price} onChange={e=>updateTP(tp.id,"price",e.target.value)} placeholder="Prijs" style={{...iStyle,padding:"6px 8px",fontSize:"12px"}}/>
              <div style={{position:"relative"}}>
                <input type="text" value={tp.pct} onChange={e=>updateTP(tp.id,"pct",e.target.value)} style={{...iStyle,padding:"6px 8px",fontSize:"12px",paddingRight:"18px"}}/>
                <span style={{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",fontSize:"10px",color:"var(--text4)"}}>%</span>
              </div>
              <span style={{fontSize:"11px",fontFamily:"var(--mono)",color:profit!==null?(profit>=0?"var(--green)":"var(--red)"):"var(--text5)"}}>{profit!==null?`${profit>=0?"+":""}$${fmt(profit)}`:<NA/>}</span>
              <span style={{fontSize:"11px",fontFamily:"var(--mono)",color:rr!==null?"var(--text2)":"var(--text5)"}}>{rr!==null?rr.toFixed(2)+"R":<NA/>}</span>
              <button onClick={()=>toggleStatus(tp.id)} style={{padding:"3px 8px",borderRadius:"5px",border:"none",background:tp.status==="hit"?"var(--green2)":tp.status==="missed"?"var(--red2)":"rgba(201,168,76,0.12)",color:statusColor,fontSize:"10px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{statusIcon}</button>
              <button onClick={()=>removeTP(tp.id)} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"12px",padding:"2px"}}>✕</button>
            </div>);
          })}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"8px",padding:"8px 10px",background:"rgba(20,22,30,0.5)",borderRadius:"5px",fontSize:"10px"}}>
            <div style={{display:"flex",gap:"16px"}}>
              <span style={{color:totalPct===100?"var(--green)":totalPct>100?"var(--red)":"var(--gold)"}}>
                Totaal: {totalPct}% {totalPct!==100&&<span style={{fontSize:"9px"}}>{totalPct>100?"⚠ >100%":"⚠ <100%"}</span>}
              </span>
              {(()=>{const totalProfit=tps.reduce((s,tp)=>{const p=calcProfit(tp);return s+(p||0)},0);
                return totalProfit!==0&&<span style={{fontFamily:"var(--mono)",color:totalProfit>=0?"var(--green)":"var(--red)"}}>Verwacht: {totalProfit>=0?"+":""}${fmt(totalProfit)}</span>})()}
              {(()=>{const rrs=tps.map(tp=>({rr:calcRR(tp),pct:parseFloat(tp.pct||0)})).filter(x=>x.rr!==null);
                if(rrs.length===0)return null;const weighted=rrs.reduce((s,x)=>s+x.rr*x.pct,0)/rrs.reduce((s,x)=>s+x.pct,0);
                return <span style={{fontFamily:"var(--mono)",color:"var(--text2)"}}>Gem R:R: {weighted.toFixed(2)}R</span>})()}
            </div>
            <span style={{color:"var(--text4)"}}>{tps.filter(tp=>tp.status==="hit").length}/{tps.length} bereikt</span>
          </div>
        </>}

        {tps.length===0&&<div style={{fontSize:"11px",color:"var(--text4)",padding:"6px 0"}}>Klik "+ TP toevoegen" om take profit niveaus in te stellen.</div>}
      </div>);
    })()}

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Setup lagen (top-down)</div>
        <button onClick={()=>setTrade(p=>({...p,layers:[...(p.layers||[]),{...EMPTY_LAYER,id:uid()}]}))} style={{fontSize:"11px",padding:"4px 10px",borderRadius:"5px",border:"1px dashed var(--border5)",background:"transparent",color:"#C9A84C",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>+ Laag toevoegen</button>
      </div>
      {(trade.layers||[]).length===0&&<div style={{background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.15)",borderRadius:"8px",padding:"14px 16px",marginBottom:"12px",fontSize:"12px",color:"#C9A84C",lineHeight:1.6}}>Voeg setup lagen toe in top-down volgorde. Begin met het hoogste timeframe (bias) en eindig met je entry timeframe.</div>}
      {(trade.layers||[]).map((layer,i)=>{

        const orderWarn=i>0&&tfIdx>=0&&prevTfIdx>=0&&tfIdx<prevTfIdx;
        return(<div key={layer.id||i} style={{background:orderWarn?"rgba(201,168,76,0.04)":"rgba(42,46,57,0.3)",borderRadius:"8px",border:`1px solid ${orderWarn?"rgba(201,168,76,0.2)":"var(--border2)"}`,padding:"12px",marginBottom:"6px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"8px"}}>
            <span style={{fontSize:"11px",color:"var(--text4)",fontWeight:700,fontFamily:"var(--mono)",width:"20px"}}>{i+1}.</span>
            {i>0&&<button onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];[l[i-1],l[i]]=[l[i],l[i-1]];return{...p,layers:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>▲</button>}
            {i<(trade.layers||[]).length-1&&<button onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];[l[i],l[i+1]]=[l[i+1],l[i]];return{...p,layers:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>▼</button>}
            <div style={{flex:1}}/>
            {orderWarn&&<span style={{fontSize:"10px",color:"var(--amber)",fontWeight:500}}>⚠ Niet top-down</span>}
            <button onClick={()=>setTrade(p=>({...p,layers:(p.layers||[]).filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>✕</button>
          </div>
          <div style={{display:"grid",gap:"10px"}}>
            <div><div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>TIMEFRAME</div><div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{gt("timeframeTags").map(tf=>{const sel=layer.timeframe===tf;return(<button key={tf} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],timeframe:sel?"":tf};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#7c3aed":"var(--border3)"}`,background:sel?"rgba(124,58,237,0.2)":"transparent",color:sel?"#a78bfa":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{tf}</button>)})}</div></div>
            <div>
                <div style={{fontSize:"9px",color:"#C9A84C",marginBottom:"6px",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>Setup</div>

            <div><div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>ROL</div><div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{ROLE_OPTIONS.map(r=>{const sel=layer.role===r;return(<button key={r} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],role:sel?"Bias":r};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#d97706":"var(--border3)"}`,background:sel?"rgba(201,168,76,0.2)":"transparent",color:sel?"#c9a84c":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{r}</button>)})}</div></div>
          </div>
        </div>);
      })}
      <div style={{marginTop:"16px"}}/>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          <div><div style={{fontSize:"10px",color:"var(--red)",fontWeight:600,marginBottom:"6px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCross size={14}/> Negatief</div><div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{gt("emotionTags").filter(t=>isNegEmotion(t)).map(tag=>{const a=(trade.emotionTags||[]).includes(tag);return(<button key={tag} onClick={()=>toggle("emotionTags",tag)} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:500,border:`1px solid ${a?"#dc2626":"rgba(54,58,69,0.7)"}`,background:a?"rgba(220,122,122,0.14)":"transparent",color:a?"#e05555":"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>{tag}</button>)})}</div></div>
          <div><div style={{fontSize:"10px",color:"var(--green)",fontWeight:600,marginBottom:"6px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCheck size={14}/> Positief</div><div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{gt("emotionTags").filter(t=>!isNegEmotion(t)).map(tag=>{const a=(trade.emotionTags||[]).includes(tag);return(<button key={tag} onClick={()=>toggle("emotionTags",tag)} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:500,border:`1px solid ${a?"#059669":"rgba(54,58,69,0.7)"}`,background:a?"rgba(46,170,111,0.14)":"transparent",color:a?CHART_COLORS.win:"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>{tag}</button>)})}</div></div>

function applyFilters(trades,filters){
  return trades.filter(t=>{
    if(filters.source&&filters.source!=="all"&&(t.source||"manual")!==filters.source)return false;
    if(filters.pair&&filters.pair!=="all"&&t.pair!==filters.pair)return false;
    if(filters.quote&&filters.quote!=="all"&&(t.pair||"").split("/")[1]!==filters.quote)return false;
    if(filters.direction&&filters.direction!=="all"&&t.direction!==filters.direction)return false;
    if(filters.status&&filters.status!=="all"&&(t.status||"closed")!==filters.status)return false;
    if(filters.dateFrom&&t.date<filters.dateFrom)return false;
    if(filters.dateTo&&t.date>filters.dateTo)return false;
    if(filters.result&&filters.result!=="all"){const pnl=parseFloat(t.pnl);if(isNaN(pnl))return false;if(filters.result==="win"&&pnl<=0)return false;if(filters.result==="loss"&&pnl>=0)return false;}
    if(filters.setupTags?.length>0&&!filters.setupTags.some(s=>(t.setupTags||[]).includes(s)))return false;
    if(filters.confirmationTags?.length>0&&!filters.confirmationTags.some(c=>(t.confirmationTags||[]).includes(c)))return false;
    if(filters.emotionTags?.length>0&&!filters.emotionTags.some(e=>(t.emotionTags||[]).includes(e)))return false;
    if(filters.mistakeTags?.length>0&&!filters.mistakeTags.some(m=>(t.mistakeTags||[]).includes(m)))return false;
    if(filters.sessionTags?.length>0){const st=getSessionTags(t.date,t.time);if(!filters.sessionTags.some(s=>st.includes(s)))return false}
    return true;
  });
}

// ============ CALENDAR ============
function Calendar({trades,setFilters,setTab,onEdit,dailyNotes,setDailyNotes,tradingRules}){
  const closed=trades.filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [openDay,setOpenDay]=useState(null);
  const tipRef=useRef(null);

  const dayMap=useMemo(()=>{
    const m={};
    closed.forEach(t=>{
      if(!t.date||!t.date.startsWith(String(year)))return;
      const pnl=parseFloat(t.pnl)||0;
      if(!m[t.date])m[t.date]={pnl:0,n:0,wins:0,losses:0};
      m[t.date].pnl+=pnl;m[t.date].n++;
      if(pnl>0)m[t.date].wins++;else if(pnl<0)m[t.date].losses++;
    });
    return m;
  },[closed,year]);

  const stats=useMemo(()=>{
    const yt=closed.filter(t=>t.date.startsWith(String(year)));
    const pnl=yt.reduce((s,t)=>s+parseFloat(t.pnl),0);
    const list=Object.entries(dayMap);
    const greens=list.filter(([,d])=>d.pnl>0).length;
    const reds=list.filter(([,d])=>d.pnl<0).length;
    const wins=yt.filter(t=>parseFloat(t.pnl)>0).length;
    const wr=yt.length?wins/yt.length*100:0;
    const winnersAvg=(()=>{const w=yt.filter(t=>parseFloat(t.pnl)>0);return w.length?w.reduce((s,t)=>s+parseFloat(t.pnl),0)/w.length:0;})();
    const best=list.reduce((a,b)=>b[1].pnl>(a?.[1]?.pnl??-Infinity)?b:a,null);

// ═══ Goals Progress Rings ═══
// Computes current-month metrics vs user-set goals; renders 3-4 animated SVG rings.
function GoalsRings({goals,trades,onEdit}){
  if(!goals)return null;
  const normalized=Array.isArray(goals.items)?goals:migrateGoals(goals);
  const items=(normalized.items||[]).filter(g=>g.enabled).map(g=>{
    const def=GOAL_METRICS.find(m=>m.id===g.metric)||GOAL_METRICS[0];
    const current=computeGoalMetric(g.metric,trades,g.period||"month");
    const target=parseFloat(g.target)||0;
    return{k:g.id,label:g.label||def.label,current,target,fmt:def.fmt,good:def.inverted?((c,t)=>c<=t):((c,t)=>c>=t),inverted:!!def.inverted};
  });
  if(items.length===0)return null;

  const Ring=({item})=>{
    const {current,target,inverted}=item;
    // Progress: normal = current/target. Inverted (DD): as current grows, progress goes down.
    let progress=target?(inverted?Math.max(0,1-current/target):Math.min(current/target,1.2)):0;
    if(progress<0)progress=0;
    const done=item.good(current,target);
    const cap=Math.min(progress,1);
    const color=done?"#2eaa6f":progress>.8?"#C9A84C":progress>.4?"#d4a853":"#e05555";
    const r=42,c=2*Math.PI*r;
    const offset=c*(1-cap);
    return(<div style={{flex:1,minWidth:"160px",background:"var(--glass)",border:"1px solid var(--border2)",borderRadius:"var(--radius-lg)",padding:"20px",textAlign:"center",position:"relative",overflow:"hidden",transition:"all .2s"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"1px",background:`linear-gradient(90deg,transparent,${color}80,transparent)`,opacity:.7}}/>
      <div style={{fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:".14em",fontWeight:700,marginBottom:"12px"}}>{item.label}</div>
      <div style={{position:"relative",width:"100px",height:"100px",margin:"0 auto 12px"}}>
        <svg viewBox="0 0 100 100" style={{width:"100%",height:"100%",transform:"rotate(-90deg)"}}>
          <circle cx="50" cy="50" r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="7"/>
          <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="7" strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset .6s cubic-bezier(.2,.8,.2,1),stroke .3s",filter:`drop-shadow(0 0 8px ${color}60)`}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontFamily:"var(--mono)",fontSize:"16px",fontWeight:800,color:color,lineHeight:1}}>{item.fmt(current)}</div>
          <div style={{fontSize:"9px",color:"var(--text5)",marginTop:"2px"}}>{done?"✓":Math.round(progress*100)+"%"}</div>
        </div>
      </div>
      <div style={{fontSize:"11px",color:"var(--text4)"}}>Doel: <span style={{color:"var(--text2)",fontFamily:"var(--mono)",fontWeight:600}}>{item.fmt(target||0)}</span></div>
    </div>);
  };

  return(<div style={{background:"var(--glass)",border:"1px solid var(--border2)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
      <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:".12em",fontWeight:700}}>🎯 Maand-doelen</div>
      {onEdit&&<button onClick={onEdit} style={{padding:"4px 10px",borderRadius:"5px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",fontSize:"10px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:".08em"}}>⚙ Bewerken</button>}
    </div>
    <div style={{display:"flex",gap:"12px",flexWrap:"wrap"}}>
      {items.map(it=>(<Ring key={it.k} item={it}/>))}
    </div>
  </div>);
}

  const fuzzy=(text,query)=>{text=text.toLowerCase();query=query.toLowerCase();let ti=0;for(const q of query){const idx=text.indexOf(q,ti);if(idx<0)return false;ti=idx+1;}return true;};

function Sparkline({data,color="#2eaa6f"}){
  if(!data||data.length<2)return null;
  const min=Math.min(...data),max=Math.max(...data);
  const range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*60},${24-((v-min)/range)*22-1}`).join(" ");
  const ptsArea=`0,24 ${pts} 60,24`;
  return(<svg width="60" height="24" viewBox="0 0 60 24" style={{display:"block"}}>
    <polygon points={ptsArea} fill={color} opacity=".15"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5"/>
  </svg>);
}
