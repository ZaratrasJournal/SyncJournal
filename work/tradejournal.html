    let ok=true,detail="";
    if(r.type==="max_trades_per_day"){const n=dayTrades.length;ok=n<=r.value;detail=`${n} trade${n===1?"":"s"}`;}
    else if(r.type==="max_losses_per_day"){const l=dayTrades.filter(t=>parseFloat(t.pnl)<0).length;ok=l<=r.value;detail=`${l} loss${l===1?"":"es"}`;}
    else if(r.type==="require_sl"){const missing=dayTrades.filter(t=>!t.stopLoss||parseFloat(t.stopLoss)<=0).length;ok=missing===0;detail=missing?`${missing} zonder SL`:"100%";}
    else if(r.type==="require_entry_note"){const missing=dayTrades.filter(t=>!t.entryNote||!t.entryNote.trim()).length;ok=missing===0;detail=missing?`${missing} zonder notitie`:`${dayTrades.length}/${dayTrades.length}`;}
    else if(r.type==="max_risk_pct"){detail="handmatig gecheckt";}
    return{...r,ok,detail};
  });
}

// ── Trading Rules compliance widget (inklapbaar + handmatige override) ──
function TradingRulesWidget({rules,trades}){
  const today=new Date().toISOString().split("T")[0];
  const[collapsed,setCollapsed]=useState(()=>{try{return localStorage.getItem("tj_rules_collapsed")==="1"}catch{return false}});
  const[manual,setManual]=useState(()=>{try{return JSON.parse(localStorage.getItem("tj_rules_manual")||"{}")}catch{return{}}});
  useEffect(()=>{try{localStorage.setItem("tj_rules_collapsed",collapsed?"1":"0")}catch{}},[collapsed]);
  useEffect(()=>{try{localStorage.setItem("tj_rules_manual",JSON.stringify(manual))}catch{}},[manual]);
  const todayTrades=(trades||[]).filter(t=>t.date===today);
  const evalsAuto=evaluateRules(rules,todayTrades);
  // Merge manual overrides — if user explicitly checked/unchecked, use that
  const todayManual=manual[today]||{};
  const evals=evalsAuto.map(e=>todayManual[e.id]!==undefined?{...e,ok:todayManual[e.id],manualOverride:true}:e);
  const passed=evals.filter(e=>e.ok).length;
  const total=evals.length;
  const toggleManual=(ruleId)=>{setManual(p=>{const day={...(p[today]||{})};const current=day[ruleId]!==undefined?day[ruleId]:evalsAuto.find(e=>e.id===ruleId)?.ok;day[ruleId]=!current;return{...p,[today]:day}})};
  return(<div style={{background:"var(--glass)",border:"1px solid var(--border1)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:collapsed?0:"14px",cursor:"pointer",userSelect:"none"}} onClick={()=>setCollapsed(p=>!p)}>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <span style={{fontSize:"12px",color:"var(--text4)",transition:"transform .2s",display:"inline-block",transform:collapsed?"rotate(-90deg)":"rotate(0)"}}>▾</span>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:".12em",fontWeight:700}}>Trading Rules · Vandaag</div>
      </div>
      <span style={{fontFamily:"var(--mono)",fontSize:"18px",fontWeight:800,color:passed===total?"var(--green)":"var(--amber)"}}>{passed}/{total} {passed===total?"✓":""}</span>
    </div>
    {!collapsed&&<div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
      {evals.length===0&&<div style={{fontSize:"12px",color:"var(--text4)",textAlign:"center",padding:"12px"}}>Geen regels ingesteld — configureer via Instellingen → Trading Rules.</div>}
      {evals.map(e=>(
        <div key={e.id} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px 10px",background:e.ok?"rgba(46,170,111,.08)":"rgba(224,85,85,.08)",border:`1px solid ${e.ok?"rgba(46,170,111,.18)":"rgba(224,85,85,.22)"}`,borderRadius:"8px"}}>
          <button onClick={(ev)=>{ev.stopPropagation();toggleManual(e.id)}} title="Handmatig aan/uit" style={{width:"22px",height:"22px",borderRadius:"5px",border:`1.5px solid ${e.ok?"var(--green)":"var(--red)"}`,background:e.ok?"rgba(46,170,111,.15)":"transparent",color:e.ok?"var(--green)":"var(--red)",cursor:"pointer",fontSize:"13px",fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{e.ok?"✓":"✗"}</button>
          <span style={{fontSize:"12px",flex:1,color:"var(--text2)"}}>{e.name}{e.manualOverride&&<span style={{fontSize:"9px",color:"var(--gold)",marginLeft:"6px",fontWeight:600}}>[handmatig]</span>}</span>
          <span style={{fontFamily:"var(--mono)",fontSize:"10px",color:e.ok?"var(--text4)":"var(--red)",fontWeight:600}}>{e.detail}</span>
        </div>
      ))}
    </div>}
  </div>);
}

// ── Herbruikbare equity-curve (Chart.js, dashboard-stijl) ──
function EquityCurveChart({line}){
  const canvasRef=useRef(null);const chartRef=useRef(null);
  const fmtDate2=(d)=>{const p=(d||"").split("-");return p.length===3?`${p[2]}/${p[1]}`:d};
  useEffect(()=>{
    if(!canvasRef.current||!line||line.length<2)return;
    if(chartRef.current){try{chartRef.current.destroy()}catch{}chartRef.current=null}
    const ctx=canvasRef.current.getContext("2d");
    const labels=line.map(d=>fmtDate2(d.date));
    const cumData=line.map(d=>d.cum);
    const greenGrad=ctx.createLinearGradient(0,0,0,220);greenGrad.addColorStop(0,"rgba(46,170,111,0.22)");greenGrad.addColorStop(1,"rgba(46,170,111,0.03)");
    const redGrad=ctx.createLinearGradient(0,0,0,220);redGrad.addColorStop(0,"rgba(220,122,122,0.03)");redGrad.addColorStop(1,"rgba(220,122,122,0.22)");
    const datasets=[
      {label:"_pos",data:cumData,borderColor:"transparent",backgroundColor:greenGrad,borderWidth:0,fill:{target:{value:0},above:greenGrad,below:"transparent"},tension:0.35,pointRadius:0,pointHoverRadius:0},
      {label:"_neg",data:cumData,borderColor:"transparent",backgroundColor:redGrad,borderWidth:0,fill:{target:{value:0},above:"transparent",below:redGrad},tension:0.35,pointRadius:0,pointHoverRadius:0},
      {label:"PNL",data:cumData,borderColor:"transparent",backgroundColor:"transparent",borderWidth:2,fill:false,tension:0.35,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:"#fff",pointHoverBorderWidth:2,
        segment:{borderColor:function(c2){const v0=c2.p0.parsed.y;const v1=c2.p1.parsed.y;if(v0>=0&&v1>=0)return CHART_COLORS.win;if(v0<0&&v1<0)return"#d46a6a";return v1>=0?CHART_COLORS.win:CHART_COLORS.loss}}}
    ];

// ── Rolling 20-trade Win-rate + Expectancy — Chart.js dual-axis line ──
function RollingEdgeChart({trades,window:W=20}){
  const canvasRef=useRef(null);const chartRef=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current)return;
    if(chartRef.current){try{chartRef.current.destroy()}catch{}chartRef.current=null}
    const sorted=[...(trades||[])].filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl))).sort((a,b)=>(a.date+(a.time||"")).localeCompare(b.date+(b.time||"")));
    if(sorted.length<W)return;
    const labels=[],wrLine=[],expLine=[];
    for(let i=W-1;i<sorted.length;i++){
      const win=sorted.slice(i-W+1,i+1);
      const wins=win.filter(t=>parseFloat(t.pnl)>0).length;
      const rs=win.map(t=>calcRMultiple(t)).filter(r=>r!==null&&!isNaN(r));
      const expR=rs.length?rs.reduce((s,r)=>s+r,0)/rs.length:0;
      wrLine.push(wins/W*100);expLine.push(expR);labels.push("#"+(i+1));
    }

    return()=>{if(chartRef.current){try{chartRef.current.destroy()}catch{}chartRef.current=null}};

// ── Per-setup insights table — richer than the bar chart, with advice column ──
function SetupInsightsTable({trades,onSetupClick}){
  const MIN_N=3;
  const closed=(trades||[]).filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  const perf={};
  closed.forEach(t=>(t.setupTags||[]).forEach(tag=>{
    if(!perf[tag])perf[tag]={n:0,w:0,pnl:0,rTotal:0,rCount:0,best:-Infinity,worst:Infinity};
    perf[tag].n++;
    const p=parseFloat(t.pnl);perf[tag].pnl+=p;if(p>0)perf[tag].w++;
    const r=calcRMultiple(t);if(r!==null&&!isNaN(r)){perf[tag].rTotal+=r;perf[tag].rCount++;if(r>perf[tag].best)perf[tag].best=r;if(r<perf[tag].worst)perf[tag].worst=r}
  }));
  const rows=Object.entries(perf).filter(([,d])=>d.n>=MIN_N).map(([tag,d])=>{
    const wr=d.w/d.n*100,avgR=d.rCount>0?d.rTotal/d.rCount:null,avgPnl=d.pnl/d.n;
    let advice="—",adviceColor="var(--text4)";
    if(wr<40&&d.n>=5){advice="🚫 Overweeg schrappen";adviceColor="var(--red)"}
    else if(avgR!==null&&avgR>=1.5){advice="🏆 Edge bevestigd";adviceColor="var(--green)"}
    else if(wr>=60&&avgR!==null&&avgR<0.5){advice="🎯 Targets verhogen";adviceColor="var(--gold)"}
    else if(avgR!==null&&avgR<-0.3){advice="⚠ Verliezen te groot";adviceColor="var(--red)"}
    else if(wr>=55&&avgR!==null&&avgR>=0.5){advice="✓ Consistent";adviceColor="var(--teal)"}
    return{tag,n:d.n,wr,avgR,avgPnl,totalPnl:d.pnl,best:d.best,worst:d.worst,advice,adviceColor};
  }).sort((a,b)=>(b.avgR??-999)-(a.avgR??-999));
  if(rows.length===0)return(<div style={{fontSize:"12px",color:"var(--text4)",textAlign:"center",padding:"20px"}}>Minimaal {MIN_N} trades per setup nodig voor insights.</div>);
  const th={padding:"10px 12px",textAlign:"left",color:"var(--text4)",fontSize:"10px",textTransform:"uppercase",letterSpacing:".08em",fontWeight:700,borderBottom:"1px solid var(--border2)"};
  const td={padding:"10px 12px",borderBottom:"1px solid var(--border2)",fontSize:"12px"};
  return(<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}>
    <thead><tr>
      <th style={th}>Setup</th>
      <th style={{...th,textAlign:"center"}}>Trades</th>
      <th style={{...th,textAlign:"center"}}>WR</th>
      <th style={{...th,textAlign:"center"}}>Avg R</th>
      <th style={{...th,textAlign:"right"}}>Avg $</th>
      <th style={{...th,textAlign:"right"}}>Totaal</th>
      <th style={{...th,textAlign:"center"}}>Best / Worst</th>
      <th style={{...th,textAlign:"right"}}>Advies</th>
    </tr></thead>
    <tbody>{rows.map(r=>(<tr key={r.tag} onClick={onSetupClick?()=>onSetupClick(r.tag):undefined} style={{cursor:onSetupClick?"pointer":"default",transition:"background .15s"}} onMouseEnter={e=>{if(onSetupClick)e.currentTarget.style.background="rgba(201,168,76,.04)"}} onMouseLeave={e=>{if(onSetupClick)e.currentTarget.style.background="transparent"}}>
      <td style={{...td,fontWeight:600,color:"var(--text2)"}}>{r.tag}</td>
      <td style={{...td,textAlign:"center",fontFamily:"var(--mono)",color:"var(--text3)"}}>{r.n}</td>
      <td style={{...td,textAlign:"center"}}><span style={{padding:"2px 8px",borderRadius:"10px",fontSize:"10px",fontWeight:700,fontFamily:"var(--mono)",background:r.wr>=50?"rgba(46,170,111,.15)":"rgba(224,85,85,.15)",color:r.wr>=50?"var(--green)":"var(--red)"}}>{r.wr.toFixed(0)}%</span></td>
      <td style={{...td,textAlign:"center",fontFamily:"var(--mono)",fontWeight:700,color:r.avgR===null?"var(--text5)":r.avgR>=1?"var(--green)":r.avgR>=0?"var(--gold)":"var(--red)"}}>{r.avgR===null?"—":(r.avgR>=0?"+":"")+r.avgR.toFixed(2)+"R"}</td>
      <td style={{...td,textAlign:"right",fontFamily:"var(--mono)",color:r.avgPnl>=0?"var(--green)":"var(--red)"}}>{r.avgPnl>=0?"+":""}${fmt(Math.abs(r.avgPnl))}</td>
      <td style={{...td,textAlign:"right",fontFamily:"var(--mono)",fontWeight:700,color:r.totalPnl>=0?"var(--green)":"var(--red)"}}>{r.totalPnl>=0?"+":""}${fmt(Math.abs(r.totalPnl))}</td>
      <td style={{...td,textAlign:"center",fontFamily:"var(--mono)",fontSize:"10px",color:"var(--text4)"}}>{r.best>-Infinity?(r.best>=0?"+":"")+r.best.toFixed(1)+"R":"—"} / {r.worst<Infinity?(r.worst>=0?"+":"")+r.worst.toFixed(1)+"R":"—"}</td>
      <td style={{...td,textAlign:"right",color:r.adviceColor,fontSize:"11px",fontWeight:600}}>{r.advice}</td>
    </tr>))}</tbody>
  </table></div>);
}

    donuts:{visible:lp.donuts,render:()=>{

        const sz=120,cx=sz/2,cy=sz/2,r=44,sw=14;const circ=2*Math.PI*r;const gapDeg=2.5;
        const nonZero=segments.filter(s=>s.value>0).length;
        const availDeg=360-(gapDeg*nonZero);
        let offset=0;const rendered=[];
        segments.forEach((s,i)=>{if(s.value<=0)return;const pct=s.value/total;const deg=pct*availDeg;const dashLen=(deg/360)*circ;rendered.push({i,deg,dashLen,rot:offset-90,pct,...s});offset+=deg+gapDeg});
        return(<div style={{flex:1,minWidth:"160px"}}>
          <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600,marginBottom:"10px",textAlign:"center"}}>{title}</div>
          <div style={{display:"flex",justifyContent:"center"}}>
            <svg viewBox={`0 0 ${sz} ${sz}`} style={{width:"100%",maxWidth:"180px"}}>
              <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth={sw}/>
              {rendered.map(s=>(<circle key={s.i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={sw} strokeDasharray={`${s.dashLen} ${circ-s.dashLen}`} strokeLinecap="round" transform={`rotate(${s.rot} ${cx} ${cy})`}><title>{s.label}: {(s.pct*100).toFixed(0)}%</title></circle>))}
              <text x={cx} y={cy-2} textAnchor="middle" fill="var(--text)" style={{fontSize:"14px",fontFamily:"var(--mono)",fontWeight:700}}>{centerText}</text>
              {centerSub&&<text x={cx} y={cy+12} textAnchor="middle" fill="var(--text4)" style={{fontSize:"8px"}}>{centerSub}</text>}
            </svg>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:"10px",marginTop:"10px"}}>
            {rendered.map(s=>(<div key={s.label} style={{display:"flex",alignItems:"center",gap:"5px",fontSize:"10px",color:"var(--text3)"}}>
              <div style={{width:"8px",height:"8px",borderRadius:"2px",background:s.color}}/>{s.label} <span style={{color:"var(--text5)",fontFamily:"var(--mono)"}}>{(s.pct*100).toFixed(0)}%</span>
            </div>))}
          </div>
        </div>);
      };
      const openN=trades.filter(t=>t.status==="open").length;
      const wl=[{label:"Win",value:wins.length,color:CHART_COLORS.win},{label:"Loss",value:losses.length,color:CHART_COLORS.loss}];
      if(openN>0)wl.push({label:"Open",value:openN,color:CHART_COLORS.open});
      const longN=closed.filter(t=>t.direction==="long").length;const shortN=closed.filter(t=>t.direction==="short").length;
      const ls=[{label:"Long",value:longN,color:CHART_COLORS.long},{label:"Short",value:shortN,color:CHART_COLORS.loss}];
      const sessCounts={};ALL_SESSIONS.forEach(s=>sessCounts[s]=0);
      closed.forEach(t=>{getSessionTags(t.date,t.time).forEach(s=>{if(sessCounts[s]!==undefined)sessCounts[s]++})});
      const sessSegs=ALL_SESSIONS.filter(s=>sessCounts[s]>0).map(s=>({label:s,value:sessCounts[s],color:(SESSION_COLORS[s]||SESSION_COLORS["Off-session"]).text}));
      const topSess=sessSegs.length?sessSegs.reduce((a,b)=>b.value>a.value?b:a).label:"–";
      return(<div className="resp-grid-donuts" style={{marginBottom:"16px"}}>
        <div style={sectStyle}><Donut title="Win / Loss" segments={wl} centerText={`${wr.toFixed(0)}%`} centerSub="winrate"/></div>
        <div style={sectStyle}><Donut title="Long / Short" segments={ls} centerText={closed.length?`${((longN/closed.length)*100).toFixed(0)}%`:"–"} centerSub="long"/></div>
        <div style={sectStyle}><Donut title="Sessies" segments={sessSegs} centerText={topSess} centerSub="meest actief"/></div>
      </div>);
    }},
    highlights:{visible:lp.highlights,render:()=>(<div style={sectStyle}>
      <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"14px"}}>Uitschieters</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"12px"}}>
        {bestTrade.pair&&<div style={{borderRadius:"8px",padding:"14px",background:"rgba(46,170,111,0.08)",border:"1px solid rgba(46,170,111,0.15)"}}>
          <div style={{fontSize:"9px",color:"var(--green)",textTransform:"uppercase",fontWeight:700,marginBottom:"6px"}}>Beste trade</div>
          <div style={{fontSize:"16px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--green)"}}>{parseFloat(bestTrade.pnl)>=0?"+":""}${fmt(bestTrade.pnl)}</div>
          <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"4px"}}>{bestTrade.pair} · {bestTrade.date}</div>
        </div>}
        {worstTrade.pair&&<div style={{borderRadius:"8px",padding:"14px",background:"rgba(220,122,122,0.08)",border:"1px solid rgba(220,122,122,0.15)"}}>
          <div style={{fontSize:"9px",color:"var(--red)",textTransform:"uppercase",fontWeight:700,marginBottom:"6px"}}>Slechtste trade</div>
          <div style={{fontSize:"16px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--red)"}}>{parseFloat(worstTrade.pnl)>=0?"+":""}${fmt(worstTrade.pnl)}</div>
          <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"4px"}}>{worstTrade.pair} · {worstTrade.date}</div>
        </div>}
        {bestDay.date&&<div style={{borderRadius:"8px",padding:"14px",background:"rgba(46,170,111,0.08)",border:"1px solid rgba(46,170,111,0.15)"}}>
          <div style={{fontSize:"9px",color:"var(--green)",textTransform:"uppercase",fontWeight:700,marginBottom:"6px"}}>Beste dag</div>
          <div style={{fontSize:"16px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--green)"}}>{bestDay.pnl>=0?"+":""}${fmt(bestDay.pnl)}</div>
          <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"4px"}}>{fmtNL(bestDay.date)}</div>
        </div>}
        {worstDay.date&&<div style={{borderRadius:"8px",padding:"14px",background:"rgba(220,122,122,0.08)",border:"1px solid rgba(220,122,122,0.15)"}}>
          <div style={{fontSize:"9px",color:"var(--red)",textTransform:"uppercase",fontWeight:700,marginBottom:"6px"}}>Slechtste dag</div>
          <div style={{fontSize:"16px",fontFamily:"var(--mono)",fontWeight:700,color:"var(--red)"}}>{worstDay.pnl>=0?"+":""}${fmt(worstDay.pnl)}</div>
          <div style={{fontSize:"11px",color:"var(--text3)",marginTop:"4px"}}>{fmtNL(worstDay.date)}</div>
        </div>}
      </div>
    </div>)},
  };
  const DEFAULT_ORDER=["scorecard","equityStats","equityChart","pnlPerDay","donuts","highlights"];

  return(<div style={{animation:"fadeIn .3s ease"}}>
    <EditModeBar editMode={editMode} setEditMode={setEditMode} onReset={()=>setOrder(DEFAULT_ORDER)} gear={<LayoutGear onClick={()=>setLpOpen(true)}/>}/>
    <LayoutPanel open={lpOpen} onClose={()=>setLpOpen(false)} sections={LP_SECTIONS} prefs={lp} toggle={lpToggle} reset={lpReset}/>
    <SortableSections sections={sections} defaultOrder={DEFAULT_ORDER} order={lp.order} setOrder={setOrder} editMode={editMode}/>
  </div>);
}

// ============ ACCOUNTS HUB ============
function AccountsHub({config,setConfig,accounts,setAccounts,showToast,trades,importTrades,exportTrades,setTagConfig,tagConfig,tradingRules,setTradingRules,goals,setGoals}){
  const csvRef=useRef();const csvAcctRef=useRef(null);
  const backupRef=useRef();
  // CSV preview state
  const[preview,setPreview]=useState(null);
  const[selected,setSelected]=useState(new Set());
  const[prevFilter,setPrevFilter]=useState({direction:"all",result:"all"});
  const[prevSort,setPrevSort]=useState({key:"date",dir:"desc"});
  const handleBackup=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        const trList=d.trades||d;
        if(!Array.isArray(trList)){showToast("Ongeldig formaat","error");return}
        importTrades(trList.map(t=>({...EMPTY_TRADE,...t,id:t.id||uid()})));
        if(d.tagConfig&&typeof d.tagConfig==="object"&&setTagConfig)setTagConfig(d.tagConfig);
        if(Array.isArray(d.accounts))setAccounts(d.accounts);
        if(d.config&&typeof d.config==="object")setConfig(p=>({...p,...d.config}));
        showToast("Backup hersteld");
      }catch(err){showToast("Fout bij importeren: "+err.message,"error")}
    };
    r.readAsText(f);e.target.value="";
  };
  const handleCSV=(e,forExchange)=>{
    const file=e.target.files[0];if(!file)return;
    const isXlsx=/\.(xlsx|xls)$/i.test(file.name);
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        let text;
        if(isXlsx){
          if(typeof XLSX==="undefined")throw new Error("XLSX library niet geladen");
          const wb=XLSX.read(ev.target.result,{type:"array"});
          const sheet=wb.Sheets[wb.SheetNames[0]];
          text=XLSX.utils.sheet_to_csv(sheet);
        }else{
          text=ev.target.result;
        }
        // Simpele CSV-parser die rekening houdt met quoted velden (MEXC heeft "68,125" met komma in prijs)
        const parseCSVLine=(line)=>{const out=[];let cur="",inQ=false;for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){out.push(cur);cur="";}else cur+=ch;}out.push(cur);return out.map(v=>v.trim())};
        const lines=text.split("\n").filter(l=>l.trim());
        if(lines.length<2)throw new Error("Leeg bestand");
        const headers=parseCSVLine(lines[0]).map(h=>h.replace(/"/g,""));
        const isKrakenLog=headers.includes("uid")&&headers.includes("realized pnl")&&headers.includes("trade price");
        const isMexcFutures=headers.includes("Futures Trading Pair")&&headers.includes("Closing PNL");
        const isMexcPosition=headers.includes("Futures")&&headers.includes("Avg Entry Price")&&headers.includes("Avg Close Price");
        const isBlofinOrder=headers.includes("Underlying Asset")&&headers.includes("Avg Fill")&&headers.includes("PNL");
        let csvTrades=[];
        if(isBlofinOrder){
          // Blofin Order History → FIFO positie-reconstructie (one-way mode verondersteld).
          // PnL uit CSV is authoritative (bevat funding/fees). Orphan closes krijgen partial_data flag.
          const stripUnit=(s)=>String(s||"").replace(/"/g,"").split(/\s+/)[0].replace(/,/g,"");
          const parseBlofinDate=(dt)=>{
            const m=(dt||"").match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})(?::(\d{2}))?/);
            if(!m)return{date:"",time:"",ts:0};
            // CSV-tijd is UTC (Blofin server). Converteer naar browser-local tijdzone voor display.
            const utcMs=Date.UTC(+m[3],+m[1]-1,+m[2],+m[4],+m[5],+(m[6]||0));
            const local=new Date(utcMs);
            const pad=n=>String(n).padStart(2,"0");
            return{
              date:`${local.getFullYear()}-${pad(local.getMonth()+1)}-${pad(local.getDate())}`,
              time:`${pad(local.getHours())}:${pad(local.getMinutes())}`,
              ts:utcMs,
            };
          };
          const cleanPair=(s)=>s.endsWith("USDT")?s.slice(0,-4)+"/USDT":s.endsWith("USDC")?s.slice(0,-4)+"/USDC":s;
          const uidShort=()=>Math.random().toString(36).slice(2,10);

          // Parse + sort ASC
          const orders=[];
          for(let i=1;i<lines.length;i++){
            const vals=parseCSVLine(lines[i]);
            const r={};headers.forEach((h,idx)=>r[h]=vals[idx]||"");
            if((r["Status"]||"").toLowerCase()!=="filled")continue;
            const dt=parseBlofinDate(r["Order Time"]);
            const sideRaw=(r["Side"]||"").toLowerCase();
            const isBuy=sideRaw.startsWith("buy");
            const reduceOnly=(r["Reduce-only"]||"").toLowerCase()==="y";
            orders.push({
              symbol:r["Underlying Asset"]||"",
              isBuy,reduceOnly,
              price:parseFloat(stripUnit(r["Avg Fill"]))||0,
              size:parseFloat(stripUnit(r["Filled"]))||0,
              pnl:parseFloat(stripUnit(r["PNL"]))||0,
              fee:Math.abs(parseFloat(stripUnit(r["Fee"]))||0),
              leverage:r["Leverage"]||"10",
              date:dt.date,time:dt.time,ts:dt.ts,
              raw:r,
            });
          }
          orders.sort((a,b)=>a.ts-b.ts);

          // FIFO queue per symbol — bevat open lots: [{price,size,fee,openDate,openTime,openTs}, ...]
          const fifo={}; // symbol -> {direction, lots[], totalSize, tps[], feeSum, pnlSum}
          const emit=(sym,pos)=>{
            const entryW=pos.lots.reduce((s,l)=>s+l.price*l.size,0);
            const origEntrySize=pos.origEntrySize||pos.tps.reduce((s,t)=>s+t.size,0);
            const avgEntry=pos.entryW/pos.entryTotalSize;
            const exitW=pos.tps.reduce((s,t)=>s+t.price*t.size,0);
            const totalExit=pos.tps.reduce((s,t)=>s+t.size,0);
            const avgExit=totalExit>0?exitW/totalExit:0;
            // Net PnL = sum of CSV PNL column minus total fees (opening + closing fees)
            const netPnl=pos.pnlSum-pos.feeSum;
            csvTrades.push({...EMPTY_TRADE,
              id:"blofin_csv_"+uid(),
              date:pos.openDate,time:pos.openTime,
              pair:cleanPair(sym),
              direction:pos.direction,
              entry:avgEntry>0?avgEntry.toFixed(6):"",
              exit:avgExit>0?avgExit.toFixed(6):"",
              positionSize:String(pos.entryTotalSize.toFixed(8)),
              pnl:String(netPnl.toFixed(4)),
              fees:String(pos.feeSum.toFixed(4)),
              leverage:pos.leverage,
              source:forExchange||"blofin",
              status:"closed",
              notes:pos.partial?"⚠ Partial data: opening orders niet in CSV-range":"",
              tpLevels:pos.tps.map(t=>({id:uidShort(),price:String(t.price),pct:String(((t.size/pos.entryTotalSize)*100).toFixed(1)),status:"hit",actualPrice:String(t.price)})),
            });
          };

          for(const o of orders){
            const sym=o.symbol;if(!sym||!o.size)continue;
            if(!o.reduceOnly){
              // Open/add: direction = Buy→long, Sell→short
              const dir=o.isBuy?"long":"short";
              if(!fifo[sym]){
                fifo[sym]={direction:dir,lots:[],entryW:0,entryTotalSize:0,tps:[],feeSum:0,pnlSum:0,openDate:o.date,openTime:o.time,openTs:o.ts,leverage:o.leverage,partial:false};
              }else if(fifo[sym].direction!==dir){
                // Tegenovergestelde open → eerst de huidige positie sluiten (edge case)
                emit(sym,fifo[sym]);
                fifo[sym]={direction:dir,lots:[],entryW:0,entryTotalSize:0,tps:[],feeSum:0,pnlSum:0,openDate:o.date,openTime:o.time,openTs:o.ts,leverage:o.leverage,partial:false};
              }
              fifo[sym].lots.push({price:o.price,size:o.size});
              fifo[sym].entryW+=o.price*o.size;
              fifo[sym].entryTotalSize+=o.size;
              fifo[sym].feeSum+=o.fee;
            }else{
              // Close fill
              if(!fifo[sym]){
                // Orphan close — opening order buiten range. Emit los met partial flag.
                const dir=o.isBuy?"short":"long"; // close-side is tegengesteld
                csvTrades.push({...EMPTY_TRADE,
                  id:"blofin_csv_"+uid(),
                  date:o.date,time:o.time,pair:cleanPair(sym),direction:dir,
                  entry:"",exit:String(o.price),positionSize:String(o.size),
                  pnl:String((o.pnl-o.fee).toFixed(4)),fees:String(o.fee.toFixed(4)),
                  leverage:o.leverage,source:forExchange||"blofin",status:"closed",
                  notes:"⚠ Partial data: opening order valt buiten CSV-range",
                });
                continue;
              }
              const pos=fifo[sym];
              // Trek size af van FIFO lots
              let remaining=o.size;
              while(remaining>1e-9&&pos.lots.length){
                const lot=pos.lots[0];
                if(lot.size<=remaining+1e-9){remaining-=lot.size;pos.lots.shift();}
                else{lot.size-=remaining;remaining=0;}
              }
              pos.tps.push({price:o.price,size:o.size,pnl:o.pnl,ts:o.ts});
              pos.pnlSum+=o.pnl;pos.feeSum+=o.fee;
              if(pos.lots.length===0){
                emit(sym,pos);
                delete fifo[sym];
              }
            }
          }
        }
        // Kraken account log — position-lifecycle tracking per contract
        if(isKrakenLog){
          const rowsRaw=[];
          for(let i=1;i<lines.length;i++){
            const vals=parseCSVLine(lines[i]).map(v=>v.replace(/"/g,""));
            const r={};headers.forEach((h,idx)=>r[h]=vals[idx]||"");
            rowsRaw.push(r);
          }
          // Filter op "futures trade" met contract (niet usd-side, niet conversion)
          const fills=rowsRaw.filter(r=>r.type==="futures trade"&&r.contract&&r.symbol!=="usd").reverse();
          // Bovenstaande reverse: CSV is normaal nieuwste eerst; wij willen oudste eerst voor lifecycle tracking
          // (als CSV al oud→nieuw is, geen reverse nodig; check eerste vs laatste date)
          if(fills.length>=2&&new Date(fills[0].dateTime)>new Date(fills[fills.length-1].dateTime))fills.reverse();

          const cleanPair=(s)=>{let x=(s||"").toUpperCase().replace("PF_","").replace("PI_","").replace("XBT","BTC");if(x.includes("/"))return x;if(x.endsWith("USDC"))return x.slice(0,-4)+"/USDC";if(x.endsWith("USDT"))return x.slice(0,-4)+"/USDT";if(x.endsWith("USD"))return x.slice(0,-3)+"/USD";return x+"/USD";};
          const uidShort=()=>Math.random().toString(36).slice(2,10);
          // Lifecycle per contract
          const positions={};
          for(const f of fills){
            const contract=f.contract;if(!contract)continue;
            const oldBal=parseFloat(f["new balance"])-parseFloat(f.change||0);
            const newBal=parseFloat(f["new balance"]);
            const chg=parseFloat(f.change||0);
            const tradePrice=parseFloat(f["trade price"]||0);
            const fee=Math.abs(parseFloat(f.fee||0));
            // Find matching usd-side row voor realized pnl
            const usdRow=rowsRaw.find(r=>r.type==="futures trade"&&r.symbol==="usd"&&r.dateTime===f.dateTime&&r["trade price"]===f["trade price"]);
            const pnl=usdRow?parseFloat(usdRow["realized pnl"]||0):0;
            const ts=new Date(f.dateTime).getTime();
            const date=f.dateTime.split(" ")[0];
            const time=(f.dateTime.split(" ")[1]||"00:00:00").slice(0,5);
            const absOld=Math.abs(oldBal),absNew=Math.abs(newBal);
            let pos=positions[contract];
            // Nieuwe positie opent (balance van 0 naar non-zero)
            if(absOld<1e-9&&absNew>1e-9){
              positions[contract]={direction:newBal>0?"long":"short",openTs:ts,date,time,entryPrice:parseFloat(f["new average entry price"])||tradePrice,openSize:absNew,tps:[],totalPnl:0,totalFee:fee,partial:false};
              continue;
            }
            // Orphan close: opening valt buiten CSV-range. Start virtuele positie bij eerste close-fill.
            if(!pos&&absOld>1e-9&&absNew<absOld){
              positions[contract]=pos={
                direction:oldBal>0?"long":"short",
                openTs:ts,date,time,
                entryPrice:parseFloat(f["new average entry price"])||tradePrice,
                openSize:absOld,
                tps:[],totalPnl:0,totalFee:0,partial:true,
              };
            }
            if(!pos)continue;
            // Partial close
            if(absNew<absOld-1e-9){
              const closedAmt=absOld-absNew;
              pos.tps.push({price:tradePrice,sizeClose:closedAmt,pnl});
              pos.totalPnl+=pnl;pos.totalFee+=fee;
              if(absNew<1e-9){
                const exitW=pos.tps.reduce((s,t)=>s+t.price*t.sizeClose,0);
                const totalClosed=pos.tps.reduce((s,t)=>s+t.sizeClose,0);
                const avgExit=totalClosed>0?exitW/totalClosed:0;
                csvTrades.push({...EMPTY_TRADE,
                  id:"kraken_csv_"+uid(),
                  date:pos.date,time:pos.time,
                  pair:cleanPair(contract),
                  direction:pos.direction,
                  entry:String(pos.entryPrice),
                  exit:String(avgExit),
                  positionSize:String(pos.openSize.toFixed(8)),
                  pnl:String((pos.totalPnl-pos.totalFee).toFixed(4)),
                  fees:String(pos.totalFee.toFixed(4)),
                  leverage:"1",
                  source:forExchange||"kraken",
                  status:"closed",
                  notes:pos.partial?"⚠ Partial data: opening order niet in CSV-range":"",
                  tpLevels:pos.tps.map(t=>({id:uidShort(),price:String(t.price),pct:String(((t.sizeClose/pos.openSize)*100).toFixed(1)),status:"hit",actualPrice:String(t.price)})),
                });
                delete positions[contract];
              }
              continue;
            }
            // Add to position
            if(absNew>absOld+1e-9){
              pos.openSize+=(absNew-absOld);
              pos.entryPrice=parseFloat(f["new average entry price"])||pos.entryPrice;
              pos.totalFee+=fee;
            }
          }
        }else if(isBlofinOrder){/* al verwerkt hierboven */}else if(isMexcPosition){
          // MEXC Position History — positie-level data met entry, exit, pnl
          const normNum=(s)=>String(s||"").replace(/"/g,"").replace(/,/g,"").replace(/USDT|USDC|USD/g,"").trim();
          for(let i=1;i<lines.length;i++){
            const vals=parseCSVLine(lines[i]);
            const row={};headers.forEach((h,idx)=>row[h]=vals[idx]||"");
            const pnl=parseFloat(normNum(row["Realized PNL"]));
            if(isNaN(pnl))continue;
            const direction=(row["Direction"]||"").toLowerCase().includes("long")?"long":"short";
            const pairRaw=row["Futures"]||"";
            const pair=pairRaw.endsWith("USDT")?pairRaw.slice(0,-4)+"/USDT":pairRaw.endsWith("USDC")?pairRaw.slice(0,-4)+"/USDC":pairRaw.endsWith("USD")?pairRaw.slice(0,-3)+"/USD":pairRaw;
            const openDt=row["Open Time"]||"";
            const closeDt=row["Close Time"]||"";

            <button onClick={()=>setSelected(new Set(sorted.map(t=>t.id)))} style={{padding:"5px 10px",borderRadius:"5px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",fontSize:"11px",cursor:"pointer",fontFamily:"inherit"}}>Selecteer gefilterde</button>

          <span style={{width:"1px",height:"14px",background:"var(--border3)"}}/>
          {["all","win","loss"].map(v=><button key={v} onClick={()=>setPrevFilter(p=>({...p,result:v}))} style={{padding:"3px 10px",borderRadius:"4px",border:"none",fontSize:"10px",fontWeight:600,background:prevFilter.result===v?(v==="win"?"var(--green2)":v==="loss"?"var(--red2)":"var(--gold-dim)"):"transparent",color:prevFilter.result===v?(v==="win"?"var(--green)":v==="loss"?"var(--red)":"var(--gold)"):"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{v==="all"?"Alles":v==="win"?"Win":"Loss"}</button>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"22px 60px 120px 1fr auto",gap:"10px",alignItems:"center",padding:"4px 12px",marginBottom:"4px"}}>
          <span/>

          <button onClick={()=>doSort("pair")} style={{background:"none",border:"none",color:"var(--text4)",fontSize:"9px",cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:600,textAlign:"left"}}>Pair {sortIcon("pair")}</button>
          <button onClick={()=>doSort("date")} style={{background:"none",border:"none",color:"var(--text4)",fontSize:"9px",cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:600,textAlign:"left"}}>Datum {sortIcon("date")}</button>
          <button onClick={()=>doSort("pnl")} style={{background:"none",border:"none",color:"var(--text4)",fontSize:"9px",cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:600,textAlign:"right"}}>PNL {sortIcon("pnl")}</button>
        </div>
        <div style={{maxHeight:"320px",overflowY:"auto"}}>
          {sorted.length===0&&<div style={{padding:"20px",textAlign:"center",color:"var(--text4)",fontSize:"12px"}}>Geen trades met deze filters</div>}

            <div key={t.id} onClick={()=>toggleSel(t.id)} style={{display:"grid",gridTemplateColumns:"22px 60px 120px 1fr auto",gap:"10px",alignItems:"center",background:sel?"rgba(201,168,76,0.07)":"transparent",borderRadius:"5px",padding:"8px 12px",marginBottom:"2px",border:`1px solid ${sel?"rgba(201,168,76,0.25)":"var(--border1)"}`,cursor:"pointer"}}>
              <div style={{width:"14px",height:"14px",borderRadius:"3px",border:`1px solid ${sel?"var(--gold)":"var(--border3)"}`,background:sel?"var(--gold)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",color:"#000"}}>{sel?"✓":""}</div>
              <span style={{padding:"2px 6px",borderRadius:"3px",fontSize:"9px",fontWeight:700,background:t.direction==="long"?"var(--green2)":"var(--red2)",color:t.direction==="long"?"var(--green)":"var(--red)",textAlign:"center"}}>{(t.direction||"").toUpperCase()}</span>

    {/* Instellingen — quote asset + auto-sync interval, ported from v4_14 */}

// ============ SIMPLE TP TIMELINE ============
function TPTimeline({trade,config,setTrade,showToast}){
  const[loading,setLoading]=useState(false);
  const tpLevels=(trade.tpLevels||[]).filter(t=>parseFloat(t.price)>0);
  const sourceKey=(trade.source||"").toLowerCase();
  const exApi=ExchangeAPI[sourceKey];
  const exCfg=config?.exchanges?.[sourceKey]||{};
  const connected=!!(exCfg.apiKey&&exCfg.apiSecret&&exApi);

  const fetchTPs=async()=>{
    if(!connected||!exApi.fetchFills||!setTrade)return;
    setLoading(true);
    try{
      const symbol=(trade.pair||"").replace("/","_");
      const startTime=trade.openTime?parseInt(trade.openTime):new Date(trade.date).getTime()-86400000;
      const endTime=trade.closeTime?parseInt(trade.closeTime):Date.now();
      const r=exApi.needsPassphrase
        ?await exApi.fetchFills(exCfg.apiKey,exCfg.apiSecret,exCfg.passphrase,symbol,startTime,endTime)
        :await exApi.fetchFills(exCfg.apiKey,exCfg.apiSecret,symbol,trade.positionId,startTime,endTime);
      const fills=r.fills||[];
      if(!fills.length){showToast&&showToast("Geen TP-fills gevonden bij exchange","error");return}
      // Converteer elke fill naar een TP-level
      const total=fills.reduce((s,f)=>s+Math.abs(parseFloat(f.size||f.vol||f.amount||0)),0)||1;
      const newTPs=fills.map((f,i)=>{
        const sz=Math.abs(parseFloat(f.size||f.vol||f.amount||0));
        return{id:`tp_${Date.now()}_${i}`,price:String(f.price||f.tradePrice||f.closeAvgPrice||""),pct:String(((sz/total)*100).toFixed(1)),status:"hit",actualPrice:String(f.price||f.tradePrice||f.closeAvgPrice||"")};
      }).filter(t=>parseFloat(t.price)>0);
      setTrade(p=>({...p,tpLevels:newTPs}));
      showToast&&showToast(`${newTPs.length} TP's opgehaald van ${exApi.name}`);
    }catch(e){
      showToast&&showToast(`TP-fetch mislukt: ${e.message}`,"error");
    }finally{setLoading(false)}
  };

  const fetchBtn=connected&&setTrade?(
    <button onClick={fetchTPs} disabled={loading} style={{padding:"6px 12px",borderRadius:"5px",border:"1px solid rgba(46,170,111,0.3)",background:"rgba(46,170,111,0.08)",color:"var(--teal)",fontSize:"11px",fontWeight:600,cursor:loading?"default":"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"6px"}}>
      {loading?<><span className="spinner"/>Ophalen...</>:<>🎯 TP's ophalen ({exApi.name})</>}
    </button>
  ):null;

  if(!tpLevels.length&&!parseFloat(trade.takeProfit))return(<div style={{padding:"1.5rem",fontSize:"12px",color:"var(--text4)",textAlign:"center"}}>Geen TP niveaus ingesteld voor deze trade.{fetchBtn&&<div style={{marginTop:"12px",display:"flex",justifyContent:"center"}}>{fetchBtn}</div>}</div>);
  const entry=parseFloat(trade.entry)||0;
  const sl=parseFloat(trade.stopLoss)||0;
  const allTPs=tpLevels.length?tpLevels:[{price:trade.takeProfit,pct:"100",status:"open",actualPrice:""}];
  const prices=[entry,sl,...allTPs.map(t=>parseFloat(t.price)||0)].filter(p=>p>0);
  const minP=Math.min(...prices)*0.998;const maxP=Math.max(...prices)*1.002;const range=maxP-minP||1;
  const pos=p=>((p-minP)/range)*100;
  return(<div style={{padding:"20px",background:"rgba(42,46,57,0.3)",borderRadius:"8px",marginTop:"12px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",textTransform:"uppercase",fontWeight:600}}>TP Tijdlijn</div>
      {fetchBtn}
    </div>
    <div style={{position:"relative",height:"40px",margin:"0 20px"}}>
      <div style={{position:"absolute",top:"50%",left:0,right:0,height:"2px",background:"rgba(255,255,255,0.1)",transform:"translateY(-50%)"}}/>
      {sl>0&&<div style={{position:"absolute",top:0,bottom:0,left:`${pos(sl)}%`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"2px",height:"100%",background:"var(--red)"}}/>
        <div style={{position:"absolute",bottom:"-18px",fontSize:"9px",color:"var(--red)",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>SL ${fmt(sl)}</div>
      </div>}
      {entry>0&&<div style={{position:"absolute",top:0,bottom:0,left:`${pos(entry)}%`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"2px",height:"100%",background:"#C9A84C"}}/>
        <div style={{position:"absolute",bottom:"-18px",fontSize:"9px",color:"#C9A84C",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>E ${fmt(entry)}</div>
      </div>}
      {allTPs.map((tp,i)=>{const p=parseFloat(tp.price)||0;if(!p)return null;const hit=tp.status==="hit";return(<div key={i} style={{position:"absolute",top:0,bottom:0,left:`${pos(p)}%`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"2px",height:"100%",background:hit?"var(--green)":"rgba(46,170,111,0.4)"}}/>
        <div style={{position:"absolute",top:"-18px",fontSize:"9px",color:hit?"var(--green)":"var(--text4)",fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>TP{i+1} ${fmt(p)}{hit&&" ✓"}</div>
      </div>);})}
    </div>
  </div>);
}

function App(){

  // v9: Laad trades uit IndexedDB bij start (migreer van localStorage indien nodig)
  useEffect(function(){
    idbLoadAllTrades().then(function(idbTrades){
      if(idbTrades&&idbTrades.length>0){
        // IndexedDB heeft data - gebruik dat
        setTrades(idbTrades.map(function(t){return Object.assign({},EMPTY_TRADE,t);}));
        setTradesLoaded(true);
      } else {
        // Geen IDB data - probeer localStorage (migratie)

            var parsed=JSON.parse(ls);

      }catch(e){}
      setTradesLoaded(true);
    });
  },[]);
  const[config,setConfig]=useState(()=>{try{const d=localStorage.getItem("tj_config");return d?JSON.parse(d):{defaultQuote:"USDT",exchanges:{},theme:"sync"}}catch(err){return{defaultQuote:"USDT",exchanges:{},theme:"sync"}}});

  const[dailyNotes,setDailyNotes]=useState(()=>{try{const d=localStorage.getItem("tj_daily_notes");return d?JSON.parse(d):{}}catch{return{}}});
  const[goals,setGoals]=useState(()=>{try{const d=localStorage.getItem("tj_goals");return migrateGoals(d?JSON.parse(d):null)}catch{return migrateGoals(null)}});
  useEffect(()=>{try{localStorage.setItem("tj_goals",JSON.stringify(goals))}catch{}},[goals]);
  const[cmdOpen,setCmdOpen]=useState(false);
  useEffect(()=>{const h=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setCmdOpen(true);}if(e.key==="Escape")setCmdOpen(false);};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h);},[]);
  useEffect(()=>{try{localStorage.setItem("tj_daily_notes",JSON.stringify(dailyNotes))}catch{}},[dailyNotes]);
  const[tradingRules,setTradingRules]=useState(()=>{try{const d=localStorage.getItem("tj_trading_rules");return d?JSON.parse(d):[
    {id:"r1",name:"Max 2% risk per trade",type:"max_risk_pct",value:2,enabled:true},
    {id:"r2",name:"Altijd stop-loss bij entry",type:"require_sl",value:null,enabled:true},
    {id:"r3",name:"Max 5 trades per dag",type:"max_trades_per_day",value:5,enabled:true},
    {id:"r4",name:"Pauze na 2 losses op dag",type:"max_losses_per_day",value:2,enabled:true},
    {id:"r5",name:"Pre-trade notitie ingevuld",type:"require_entry_note",value:null,enabled:true},
  ]}catch{return[]}});
  useEffect(()=>{try{localStorage.setItem("tj_trading_rules",JSON.stringify(tradingRules))}catch{}},[tradingRules]);
  const parseHash=()=>{
    const h=(window.location.hash||"#/dashboard").slice(1);
    const parts=h.split("/").filter(Boolean);
    return{view:parts[0]||"dashboard",tradeId:parts[1]==="edit"?parts[2]:null};
  };
  const isPopping=useRef(false);
  const safeHistory=(method,hash)=>{try{window.history[method](null,null,hash)}catch(e){}};
  const[tab,setTab]=useState(()=>parseHash().view||"dashboard");
  const[editTrade,setEditTrade]=useState(null);

  const[toast,setToast]=useState(null);
  const[mobileOpen,setMobileOpen]=useState(false);
  const[importDragOver,setImportDragOver]=useState(false);
  // v7 NEW: storage usage tracking
  const[storageUsage,setStorageUsage]=useState(()=>getStorageUsage());
  const[showPdf,setShowPdf]=useState(false);
  const[showWelcome,setShowWelcome]=useState(function(){try{return!localStorage.getItem("tj_welcomed");}catch(e){return false;}});

  const showToast=(msg,type="success",data=null)=>{setToast({msg,type,data,id:Date.now()});setTimeout(()=>setToast(null),5000)};

  const newEmptyTrade=()=>({...EMPTY_TRADE,id:uid(),date:new Date().toISOString().split("T")[0],time:new Date().toTimeString().slice(0,5)});

  // v9: IndexedDB als primaire opslag (onbeperkt), localStorage als fallback
  useEffect(()=>{
    if(!tradesLoaded)return;
    idbSaveAllTrades(trades).then(function(ok){
      if(!ok)console.warn("IndexedDB save mislukt, val terug op localStorage");
    });
    // Probeer ook localStorage als backup (faalt stil bij vol)
    try{
      var small=trades.map(function(t){return Object.assign({},t,{screenshot:null});});
      localStorage.setItem("tj_trades",JSON.stringify(small));
    }catch(e){}
    setStorageUsage(getStorageUsage());
  },[trades,tradesLoaded]);

  useEffect(()=>{try{localStorage.setItem("tj_config",JSON.stringify(config))}catch(err){}},[config]);

  // Auto-sync interval — alleen actief bij syncInterval>0 én minstens 1 gekoppelde exchange
  useEffect(()=>{
    const iv=config.syncInterval||0;
    if(!iv)return;
    const connected=Object.entries(config.exchanges||{}).filter(([k,c])=>c&&c.apiKey&&c.apiSecret&&ExchangeAPI[k]);
    if(!connected.length)return;
    const timer=setInterval(async()=>{
      if(document.hidden)return;
      for(const[key,cfg] of connected){
        try{
          const api=ExchangeAPI[key];
          const startTime=Date.now()-30*86400000;
          const fetched=api.needsPassphrase
            ?await api.fetchTrades(cfg.apiKey,cfg.apiSecret,cfg.passphrase,startTime)
            :await api.fetchTrades(cfg.apiKey,cfg.apiSecret,null,startTime);
          if(fetched&&fetched.length){
            setTrades(prev=>{const ex=new Set(prev.map(t=>t.id));const fresh=fetched.filter(t=>!ex.has(t.id));return fresh.length?[...fresh,...prev]:prev;});
          }
        }catch(e){console.warn("[auto-sync]",key,e.message)}
      }

    return()=>clearInterval(timer);
  },[config.syncInterval,config.exchanges]);
  useEffect(()=>{try{localStorage.setItem("tj_accounts",JSON.stringify(accounts))}catch(err){}},[accounts]);
  useEffect(()=>{try{localStorage.setItem("tj_tags",JSON.stringify(tagConfig))}catch(err){}},[tagConfig]);

  const navigate=(page,replace)=>{

    if(!isPopping.current)safeHistory(replace?"replaceState":"pushState",`#/${page}`);

  // Hash-routing init + popstate listener (back/forward knop werkt nu)
  useEffect(()=>{

      isPopping.current=false;
    };
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[tradesLoaded]);

  // v7 NEW: keyboard shortcuts
  useKeyboardShortcuts(navigate,setNewTrade,newEmptyTrade,editTrade);

  const saveTrade=(trade)=>{
    const isNew=!trades.find(t=>t.id===trade.id);
    // Auto-compute risk unless manually overridden
    const overrides=trade.manualOverrides||[];
    const risk=computeTradeRisk(trade,config,accounts);
    const enriched={...trade};
    if(risk.riskUsd!==undefined&&!overrides.includes("riskUsd"))enriched.riskUsd=risk.riskUsd;
    if(risk.riskPct!==undefined&&!overrides.includes("riskPct"))enriched.riskPct=risk.riskPct;
    if(isNew){const sessions=getSessionTags(enriched.date,enriched.time);if(sessions.length&&!(enriched.timeframeTags||[]).some(t=>["Tokyo","London","New York","Off-session","Weekend"].includes(t))){}}
    setTrades(p=>{if(isNew){return[enriched,...p]}else{return p.map(t=>t.id===enriched.id?enriched:t)}});
    setEditTrade(null);setNewTrade(null);
    showToast(isNew?"Trade opgeslagen ✓":"Trade bijgewerkt ✓");
    if(isNew&&tab==="new")setTab("trades");
  };

  const deleteTrade=(id)=>{const t=trades.find(x=>x.id===id);setTrades(p=>p.filter(x=>x.id!==id));showToast("Trade verwijderd","error",t)};
  const bulkDelete=(ids)=>setTrades(p=>p.filter(t=>!ids.includes(t.id)));
  const bulkTag=(ids,field,tag)=>setTrades(p=>p.map(t=>{if(!ids.includes(t.id))return t;const arr=t[field]||[];if(arr.includes(tag))return t;return{...t,[field]:[...arr,tag]}}));
  const importTrades=(newOnes)=>{setTrades(p=>{const ex=new Set(p.map(t=>t.id));const fresh=newOnes.filter(t=>!ex.has(t.id));return[...fresh,...p]});showToast(`${newOnes.length} trades geïmporteerd`)};

  const handleDrop=useCallback((e)=>{e.preventDefault();setImportDragOver(false);const f=e.dataTransfer.files[0];if(!f||!f.name.endsWith(".json"))return;const r=new FileReader();r.onload=ev=>{try{
    const d=JSON.parse(ev.target.result);const trList=d.trades||d;
    if(!Array.isArray(trList)){showToast("Ongeldig formaat","error");return}
    importTrades(trList.map(t=>({...EMPTY_TRADE,...t,id:t.id||uid(),highestPrice:t.highestPrice||"",lowestPrice:t.lowestPrice||""})));
    // Volledige backup? Herstel dan ook tags/accounts/config
    if(d.tagConfig&&typeof d.tagConfig==="object")setTagConfig(d.tagConfig);
    if(Array.isArray(d.accounts))setAccounts(d.accounts);
    if(d.config&&typeof d.config==="object")setConfig(p=>({...p,...d.config}));
  }catch(err){showToast("Fout bij importeren","error")}};r.readAsText(f)},[trades]);
  const handleDragOver=useCallback((e)=>{e.preventDefault();setImportDragOver(true)},[]);
  const handleDragLeave=useCallback(()=>setImportDragOver(false),[]);

  // Volledige backup: trades + tags + accounts + config (proxy-URL / thema / quote / sync-interval / exchange-keys)
  const exportTrades=()=>{
    const payload={version:12,schemaVersion:CURRENT_SCHEMA_VERSION,exportDate:new Date().toISOString(),trades,tagConfig,accounts,config};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;
    a.download=`syncjournal-backup-${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(url);
    showToast(`Backup geëxporteerd: ${trades.length} trades, ${(accounts||[]).length} accounts`);
  };

  const theme=["sync","classic","aurora","light"].includes(config.theme)?config.theme:"sync";
  const layout=config.layout==="premium"?"premium":"standard";
  useEffect(()=>{document.body.className=`theme-${theme} layout-${layout}`},[theme,layout]);

  const filteredTrades=applyFilters(trades,filters);

  const TABS=[
    {id:"dashboard",label:"Dashboard",icon:"📊"},
    {id:"trades",label:"Trades",icon:"📋"},
    {id:"analytics",label:"Analytics",icon:"📈"},
    {id:"review",label:"Review",icon:"🔍"},
    {id:"calendar",label:"Kalender",icon:"📅"},
    {id:"accounts",label:"Accounts",icon:"🔗"},
    {id:"tags",label:"Tags",icon:"🏷"},
    {id:"help",label:"Help",icon:"❓"},
  ];

  return(
    <div onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave} style={{minHeight:"100vh",position:"relative"}}>
      {showWelcome&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
        <div style={{background:"#0a0a0a",border:"1px solid rgba(201,168,76,0.3)",borderRadius:"16px",padding:"36px 32px",width:"100%",maxWidth:"520px",textAlign:"center"}}>
          <div style={{fontSize:"32px",marginBottom:"16px"}}>📊</div>
          <h2 style={{fontSize:"22px",fontWeight:800,color:"#C9A84C",marginBottom:"12px",fontFamily:"var(--font)"}}>Welkom bij de Morani Trading Journal</h2>
          <p style={{fontSize:"14px",color:"rgba(255,255,255,0.75)",lineHeight:1.7,marginBottom:"20px"}}>
            Jouw persoonlijke trading dashboard — gebouwd op de Morani methodologie. Log trades, analyseer patronen en word een consistentere trader.
          </p>
          <div style={{background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"10px",padding:"14px 18px",marginBottom:"20px",textAlign:"left"}}>
            <div style={{fontSize:"11px",color:"#C9A84C",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"10px"}}>Wat je moet weten</div>
            {[
              ["🔒","100% privé","Alle data blijft lokaal in jouw browser. Niemand anders kan jouw trades zien."],
              ["♾️","Onbeperkte opslag","Trades worden opgeslagen in IndexedDB — geen 5MB limiet meer. Log zoveel je wilt."],
              ["💾","Maak backups","Exporteer regelmatig via de Export-knop. Bij browserreset of nieuw apparaat heb je anders geen data."],
              ["🔗","Exchange koppeling","Koppel MEXC, Blofin of Kraken Futures via Accounts voor automatische import."]
            ].map(function(item){return(
              <div key={item[0]} style={{display:"flex",gap:"10px",marginBottom:"8px",alignItems:"flex-start"}}>
                <span style={{fontSize:"16px",flexShrink:0}}>{item[0]}</span>
                <div><div style={{fontSize:"12px",fontWeight:700,color:"rgba(255,255,255,0.9)",marginBottom:"2px"}}>{item[1]}</div><div style={{fontSize:"11px",color:"rgba(255,255,255,0.5)",lineHeight:1.5}}>{item[2]}</div></div>
              </div>
            );} )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
            <button onClick={function(){try{localStorage.setItem("tj_welcomed","1");}catch(e){}setShowWelcome(false);navigate("accounts");}} style={{padding:"12px 20px",borderRadius:"10px",border:"1px solid rgba(201,168,76,0.5)",background:"transparent",color:"var(--gold)",fontSize:"13px",fontWeight:700,cursor:"pointer",fontFamily:"var(--font)",letterSpacing:"0.02em",lineHeight:1.3}}>
              🔗 Koppel accounts<br/><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:500}}>Begin met exchange of handmatig</span>
            </button>
            <button onClick={function(){try{localStorage.setItem("tj_welcomed","1");}catch(e){}setShowWelcome(false);setNewTrade(newEmptyTrade());navigate("new");}} style={{padding:"12px 20px",borderRadius:"10px",border:"1px solid rgba(201,168,76,0.5)",background:"#C9A84C",color:"#000",fontSize:"13px",fontWeight:800,cursor:"pointer",fontFamily:"var(--font)",letterSpacing:"0.02em",lineHeight:1.3}}>
              ✍️ Log een trade<br/><span style={{fontSize:"10px",color:"rgba(0,0,0,0.55)",fontWeight:600}}>Handmatig invoeren</span>
            </button>
          </div>
          <button onClick={function(){try{localStorage.setItem("tj_welcomed","1");}catch(e){}setShowWelcome(false);}} style={{marginTop:"12px",padding:"6px 14px",borderRadius:"6px",border:"none",background:"transparent",color:"var(--text4)",fontSize:"11px",cursor:"pointer",fontFamily:"var(--font)"}}>
            Later kiezen →
          </button>
        </div>
      </div>}

      {/* Topbar */}
      <div className="tj-topbar" style={{position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"0"}}>
          <a className="morani-link" href="https://www.moranitraden.nl" target="_blank" rel="noopener noreferrer">
            <div className="tj-logo">
              <div style={{display:"flex",flexDirection:"column",gap:"2px"}}>
                <div style={{fontSize:"11px",fontWeight:700,letterSpacing:"0.18em",fontFamily:"var(--font)",color:"var(--tj-text-color,#ffffff)",textShadow:"var(--tj-text-shadow,0 0 12px rgba(201,168,76,0.5), 0 0 28px rgba(201,168,76,0.2))"}}>TRADING JOURNAL</div>
                <div style={{fontSize:"8px",color:"rgba(201,168,76,0.55)",letterSpacing:"0.14em",fontFamily:"var(--font)"}}>built by Zaratras · powered by Morani</div>
              </div>
            </div>
          </a>
          <nav className="tj-tabs" aria-label="Main navigation">
            {TABS.slice(0,5).map(t=>(<button key={t.id} className={`tj-tab${tab===t.id?" active":""}`} onClick={()=>navigate(t.id)}><span>{t.icon}</span>{t.label}</button>))}
            <button className={`tj-tab${["accounts","rules","tags","help"].includes(tab)?" active":""}`} onClick={()=>navigate("accounts")}><span>⚙</span>Instellingen</button>
          </nav>
        </div>
        <div className="tj-right-btns" style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <button onClick={()=>{setNewTrade(newEmptyTrade());navigate("new")}} style={{padding:"7px 14px",borderRadius:"var(--radius)",border:"1px solid var(--blue2)",background:"rgba(201,168,76,0.12)",color:"#C9A84C",fontSize:"12px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,display:"flex",alignItems:"center",gap:"6px"}}><span>+</span> Trade <span className="kbd" style={{fontSize:"9px",borderColor:"rgba(201,168,76,0.4)"}}>N</span></button>
          <button onClick={()=>setConfig(p=>({...p,theme:p.theme==="morani"?"purple":"morani"}))}>🌙</button>
          <div className="hamburger" onClick={()=>setMobileOpen(true)}>☰</div>
        </div>
      </div>

      {/* Mobile menu */}
      {mobileOpen&&<><div className="mobile-menu-overlay" onClick={()=>setMobileOpen(false)}/><div className="mobile-menu"><button className="mobile-menu-close" onClick={()=>setMobileOpen(false)}>✕</button><div className="mm-logo"></div>
        {TABS.map(t=>(<button key={t.id} className={`mm-item${tab===t.id?" active":""}`} onClick={()=>navigate(t.id)}>{t.icon} {t.label}</button>))}
        <div className="mm-sep"/>
        <button className="mm-item" onClick={()=>{setNewTrade(newEmptyTrade());navigate("new");setMobileOpen(false)}}>+ Nieuwe trade</button>
        <button className="mm-item" onClick={exportTrades}>↓ Export JSON</button>
      </div></>}

      {/* Toast */}
      <CommandPalette open={cmdOpen} onClose={()=>setCmdOpen(false)} trades={trades} navigate={navigate} setNewTrade={setNewTrade} newEmptyTrade={newEmptyTrade} exportTrades={exportTrades} setConfig={setConfig} config={config}/>
      {toast&&<div className={`tj-toast ${toast.type==="error"?"error":toast.type==="info"?"info":"success"}`} style={{position:"fixed",bottom:"24px",right:"24px",zIndex:9999}}>
        <span>{toast.type==="error"?"✕":toast.type==="info"?"ℹ":"✓"}</span>
        <span style={{flex:1}}>{toast.msg}</span>
        {toast.data&&<button onClick={()=>{setTrades(p=>[toast.data,...p]);setToast(null)}} style={{fontSize:"11px",color:"#C9A84C",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",padding:"0",textDecoration:"underline"}}>Ongedaan maken</button>}
        <button onClick={()=>setToast(null)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:"14px",padding:"0",lineHeight:1}}>✕</button>
        <div className="tj-toast-bar"/>
      </div>}

      {/* Content */}
      <div className="tj-content" style={{padding:"24px 28px",maxWidth:"1320px",margin:"0 auto"}}>
        {/* Filter bar for trade views */}
        {["trades","analytics","review","calendar"].includes(tab)&&!editTrade&&!newTrade&&<FilterBar trades={filteredTrades} allTrades={trades} filters={filters} setFilters={setFilters} config={config} accounts={accounts}/>}

        {/* Sub-nav for settings */}
        {["accounts","rules","goals","tags","help"].includes(tab)&&<div style={{display:"flex",gap:"4px",marginBottom:"16px"}}>
          {[["accounts","🔗 Accounts"],["rules","📏 Trading Rules"],["goals","🎯 Goals"],["tags","🏷 Tags"],["help","❓ Help"]].map(([id,label])=>(<button key={id} onClick={()=>setTab(id)} style={{padding:"6px 14px",borderRadius:"6px",border:"none",background:tab===id?"rgba(201,168,76,0.12)":"transparent",color:tab===id?"#C9A84C":"var(--text4)",fontSize:"12px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{label}</button>))}
        </div>}

        {/* New trade */}
        {(tab==="new"&&newTrade)&&<>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"}}>
            <div style={{fontSize:"16px",fontWeight:700}}>Nieuwe trade</div>
            <button onClick={()=>{setNewTrade(null);navigate("trades")}} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"14px"}}>✕</button>
          </div>
          <TradeForm trade={newTrade} setTrade={setNewTrade} onSave={()=>saveTrade(newTrade)} onCancel={()=>{setNewTrade(null);navigate("trades")}} tagConfig={tagConfig} config={config} accounts={accounts}/>
        </>}

        {/* Edit modal */}
        {editTrade&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,overflowY:"auto",padding:"20px",animation:"fadeIn .2s ease"}} onClick={e=>{if(e.target===e.currentTarget)setEditTrade(null)}}>
          <div style={{maxWidth:"760px",margin:"0 auto",position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
              <div style={{fontSize:"16px",fontWeight:700,color:"var(--text)"}}>Trade bewerken</div>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>{if(confirm("TP tijdlijn laden?")){}}} style={{display:"none"}}/>
                <button onClick={()=>setEditTrade(null)} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"14px",padding:"4px"}}>✕</button>
              </div>
            </div>
            <TradeForm trade={editTrade} setTrade={setEditTrade} onSave={()=>saveTrade(editTrade)} onCancel={()=>setEditTrade(null)} tagConfig={tagConfig} config={config} accounts={accounts}/>
            <TPTimeline trade={editTrade} config={config} setTrade={setEditTrade} showToast={showToast}/>
          </div>
        </div>}

        {/* Main content routing */}
        {tab==="dashboard"&&(layout==="premium"
          ?<DashboardPremium trades={filteredTrades} config={config} accounts={accounts} tradingRules={tradingRules} dailyNotes={dailyNotes} goals={goals} setTab={navigate} setNewTrade={setNewTrade} newEmptyTrade={newEmptyTrade} setFilters={setFilters}/>
          :<Dashboard trades={filteredTrades} config={config} accounts={accounts} onReport={()=>setShowPdf(true)} storageUsage={storageUsage} setFilters={setFilters} setTab={navigate}/>)}
        {tab==="trades"&&!editTrade&&<TradeList trades={filteredTrades} onEdit={setEditTrade} onDelete={deleteTrade} onBulkDelete={bulkDelete} onBulkTag={bulkTag} showToast={showToast} tagConfig={tagConfig} config={config} accounts={accounts}/>}
        {tab==="analytics"&&<Analytics trades={filteredTrades}/>}
        {tab==="review"&&<ReviewDashboard trades={filteredTrades}/>}
        {tab==="calendar"&&<Calendar trades={filteredTrades} setFilters={setFilters} setTab={setTab} dailyNotes={dailyNotes} setDailyNotes={setDailyNotes} tradingRules={tradingRules} onEdit={(t)=>{setEditTrade(t);setNewTrade({...EMPTY_TRADE,...t,tpLevels:t.tpLevels||[],layers:t.layers||[],links:t.links||[],manualOverrides:t.manualOverrides||[]});navigate("new");}}/>}
        {tab==="accounts"&&<AccountsHub config={config} setConfig={setConfig} accounts={accounts} setAccounts={setAccounts} showToast={showToast} trades={trades} importTrades={importTrades} exportTrades={exportTrades} setTagConfig={setTagConfig} tagConfig={tagConfig} tradingRules={tradingRules} setTradingRules={setTradingRules} goals={goals} setGoals={setGoals}/>}
        {tab==="rules"&&<TradingRulesPage tradingRules={tradingRules} setTradingRules={setTradingRules}/>}
        {tab==="goals"&&<GoalsPage goals={goals} setGoals={setGoals} trades={trades}/>}
        {tab==="tags"&&<TagManager tagConfig={tagConfig} setTagConfig={setTagConfig} trades={trades} setTrades={setTrades} showToast={showToast}/>}
        {tab==="help"&&<HelpPage/>}
      </div>

      {/* Footer hint */}
      <div style={{textAlign:"center",padding:"8px 0 16px",fontSize:"10px",color:"var(--text5)"}}>
        <span className="kbd">N</span> Nieuw &nbsp; <span className="kbd">T</span> Trades &nbsp; <span className="kbd">D</span> Dashboard &nbsp; Drag & drop JSON om te importeren
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  componentDidCatch(error, info) { this.setState({ error: error }); }
  static getDerivedStateFromError(error) { return { error: error }; }
  render() {
    if (this.state.error) {
      return React.createElement('div', {
        style: { position:'fixed', inset:0, background:'#0a0a0a', color:'#ff6b6b',
                 padding:'30px', fontFamily:'monospace', fontSize:'13px',
                 whiteSpace:'pre-wrap', overflow:'auto', zIndex:99999 }
      }, 'REACT ERROR:\n' + this.state.error.toString() + '\n\nStack:\n' + (this.state.error.stack || ''));
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
</html>
