        <button onClick={copyImage} disabled={busy} title="Kopieer afbeelding naar klembord (Ctrl+V in Discord)" style={{width:"100%",marginTop:"16px",padding:"11px",borderRadius:"8px",background:"rgba(201,168,76,.12)",color:"#C9A84C",border:"1px solid rgba(201,168,76,.45)",fontFamily:"inherit",fontSize:"13px",fontWeight:700,cursor:busy?"default":"pointer",opacity:busy?.6:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"}}>📋 Kopieer afbeelding</button>
        <button onClick={downloadPNG} disabled={busy} style={{width:"100%",marginTop:"8px",padding:"12px",borderRadius:"8px",background:"linear-gradient(135deg,#f0d57a,#C9A84C,#8c721c)",color:"#000",border:"none",fontFamily:"inherit",fontSize:"13px",fontWeight:700,cursor:busy?"default":"pointer",boxShadow:"0 6px 20px rgba(201,168,76,.35)",opacity:busy?.6:1}}>{busy?"⏳ Exporteren...":"📥 Download PNG"}</button>
        {copyStatus&&<div style={{marginTop:"10px",padding:"8px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:600,textAlign:"center",background:copyStatus.startsWith("✓")?"rgba(46,170,111,.15)":"rgba(224,85,85,.12)",color:copyStatus.startsWith("✓")?"#2eaa6f":"#e05555",border:`1px solid ${copyStatus.startsWith("✓")?"rgba(46,170,111,.35)":"rgba(224,85,85,.3)"}`}}>{copyStatus}</div>}
        <div style={{marginTop:"10px",padding:"8px 10px",borderRadius:"6px",background:"rgba(138,159,192,.06)",border:"1px solid rgba(138,159,192,.15)",fontSize:"10px",color:"var(--text4)",lineHeight:1.5}}>💡 <strong style={{color:"var(--text3)"}}>Discord tip:</strong> klik <em>Kopieer</em> en plak direct met Ctrl+V in je chat — geen download/upload nodig.</div>
      </div>
      {/* Preview */}
      <div style={{padding:"40px",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",overflow:"auto"}}>
        <div style={{transform:style==="ticker"?"scale(.6)":style==="story"?"scale(.8)":"scale(.9)",transformOrigin:"center"}}>
          {style==="classic"&&<Design1/>}
          {style==="ticker"&&<Design2/>}
          {style==="story"&&<Design4/>}
          {style==="minimal"&&<Design5/>}
          {style==="boss"&&<Design6/>}
        </div>
      </div>
    </div>
  </div>);
}

function Section({title,storeKey,defaultOpen=true,hint,children}){
  const[open,setOpen]=useState(()=>{const s=localStorage.getItem("tj_form_section_"+storeKey);return s===null?defaultOpen:s==="1"});
  const onToggle=(e)=>{const v=e.target.open;setOpen(v);localStorage.setItem("tj_form_section_"+storeKey,v?"1":"0")};
  return(<details className="tj-section" open={open} onToggle={onToggle}>
    <summary><span className="tj-sec-title">{title}</span>{hint&&<span className="tj-sec-hint">{hint}</span>}<span className="tj-sec-chev">▾</span></summary>
    <div className="tj-sec-body">{children}</div>
  </details>);
}

function TradeForm({trade,setTrade,onSave,onCancel,tagConfig,config,accounts}){
  const[showCard,setShowCard]=useState(false);
  const toggle=(f,tag)=>setTrade(p=>({...p,[f]:p[f].includes(tag)?p[f].filter(t=>t!==tag):[...p[f],tag]}));
  const fRef=useRef();
  const handleSS=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setTrade(p=>({...p,screenshot:ev.target.result}));r.readAsDataURL(f)};
  const gt=(k)=>tagConfig[k]||DEFAULT_TAGS[k]||[];
  const[sizeInputMode,setSizeInputMode]=useState(()=>localStorage.getItem("tj_sizeInputMode")||"usdt");
  const isOpen=(trade.status||"closed")==="open";

  const sourceOptions=[{id:"manual",label:"✏️ Handmatig",color:"var(--text3)"}];
  Object.entries(ExchangeAPI).forEach(([key,ex])=>{if(config?.exchanges?.[key]?.apiKey)sourceOptions.push({id:key,label:ex.name,color:ex.color})});
  (accounts||[]).forEach(a=>{if(!sourceOptions.find(s=>s.id===a.name))sourceOptions.push({id:a.name,label:"✏️ "+a.name,color:"var(--text3)"})});

  return(<div style={{animation:"fadeIn .3s ease",background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:"24px",border:"1px solid var(--glass-border)"}}>
    {/* Status toggle — primary control, drives conditional form sections */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px",padding:"10px 14px",background:isOpen?"rgba(201,168,76,0.08)":"rgba(42,46,57,0.3)",borderRadius:"8px",border:`1px solid ${isOpen?"rgba(201,168,76,0.3)":"var(--border2)"}`}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em"}}>Status</span>
        <div style={{display:"flex",gap:0,borderRadius:"6px",overflow:"hidden",border:"1px solid var(--border3)"}}>
          {["closed","open"].map(s=>(<button key={s} onClick={()=>setTrade(p=>({...p,status:s}))} style={{padding:"6px 16px",border:"none",fontSize:"11px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:trade.status===s?(s==="open"?"rgba(201,168,76,0.2)":"rgba(42,46,57,0.9)"):"transparent",color:trade.status===s?(s==="open"?"#C9A84C":"var(--text)"):"var(--text4)",display:"flex",alignItems:"center",gap:"5px"}}>{s==="open"&&trade.status==="open"&&<span style={{width:"6px",height:"6px",borderRadius:"50%",background:"#C9A84C",boxShadow:"0 0 6px #C9A84C"}}/>}{s==="open"?"Open":"Closed"}</button>))}
        </div>
      </div>
      <span style={{fontSize:"10px",color:"var(--text5)"}}>{isOpen?"Exit / PNL / fees pas in te vullen na sluiten":"Volledige trade — alle velden actief"}</span>
    </div>

    {/* Account selector */}
    <div style={{marginBottom:"1rem"}}>
      <div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>ACCOUNT / EXCHANGE</div>
      <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
        {sourceOptions.map(opt=>{const active=(trade.source||"manual")===opt.id;return(<button key={opt.id} onClick={()=>setTrade(p=>({...p,source:opt.id}))} style={{padding:"5px 12px",borderRadius:"6px",fontSize:"11px",fontWeight:600,border:`1px solid ${active?opt.color||"#C9A84C":"var(--border3)"}`,background:active?`${opt.color||"#C9A84C"}15`:"transparent",color:active?opt.color||"#C9A84C":"var(--text4)",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"5px"}}>{!opt.id.startsWith("✏")&&opt.id!=="manual"&&<ExchangeIcon name={opt.id} size={14}/>}{opt.label}</button>);})}
      </div>
    </div>

    {/* Date/Time/Pair */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"1rem"}}>
      <div><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>DATUM</div><input type="date" value={trade.date} onChange={e=>setTrade(p=>({...p,date:e.target.value}))} style={iStyle}/></div>
      <div><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>TIJD</div><input type="time" value={trade.time} onChange={e=>setTrade(p=>({...p,time:e.target.value}))} style={iStyle}/></div>
      <div><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>PAIR</div>
        <div style={{display:"flex",gap:0}}>
          <input type="text" value={(trade.pair||"").split("/")[0]||""} onChange={e=>{const base=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"");const quote=(trade.pair||"").split("/")[1]||config.defaultQuote||"USDT";setTrade(p=>({...p,pair:base+"/"+quote}))}} style={{...iStyle,borderRadius:"4px 0 0 4px",borderRight:"none",flex:1}} placeholder="BTC"/>
          <select value={(trade.pair||"").split("/")[1]||config.defaultQuote||"USDT"} onChange={e=>{const base=(trade.pair||"").split("/")[0]||"BTC";setTrade(p=>({...p,pair:base+"/"+e.target.value}))}} style={{...iStyle,borderRadius:"0 4px 4px 0",width:"80px",cursor:"pointer",color:"var(--gold)",fontWeight:600,fontSize:"11px"}}>
            <option value="USDT">USDT</option><option value="USDC">USDC</option><option value="USD">USD</option>
          </select>
        </div>
      </div>
    </div>

    {/* Direction */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,marginBottom:"1rem",borderRadius:"8px",overflow:"hidden",border:"1px solid rgba(54,58,69,0.7)"}}>
      {["long","short"].map(dir=>(<button key={dir} onClick={()=>setTrade(p=>({...p,direction:dir}))} style={{padding:"10px",border:"none",fontSize:"14px",fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:trade.direction===dir?(dir==="long"?"var(--green2)":"var(--red2)"):"transparent",color:trade.direction===dir?(dir==="long"?"var(--green)":"var(--red)"):"var(--text4)",boxShadow:trade.direction===dir?`inset 0 0 0 1px ${dir==="long"?"var(--green3)":"var(--red3)"}`:"none"}}>{dir.toUpperCase()}</button>))}
    </div>

    {/* Auto session tag */}
    {(()=>{const st=getSessionTags(trade.date,trade.time);return st.length>0?(<div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"1rem"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>Sessie</span>{st.map(s=>{const c=SESSION_COLORS[s]||SESSION_COLORS["Off-session"];return(<span key={s} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:600,border:`1px solid ${c.border}`,background:c.bg,color:c.text}}>{s}</span>)})}<span style={{fontSize:"9px",color:"var(--text5)",fontFamily:"var(--mono)",marginLeft:"4px"}}>auto (CET)</span></div>):null})()}

    {/* Entry/SL/Exit */}
    <div style={{display:"grid",gridTemplateColumns:isOpen?"1fr 1fr":"1fr 1fr 1fr",gap:"12px",marginBottom:"1rem"}}>
      {[["entry","ENTRY"],["stopLoss","STOP LOSS"],...(isOpen?[]:[["exit","EXIT"]])].map(([k,l])=>(<div key={k}><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>{l}</div><input type="text" value={trade[k]} onChange={e=>{const v=e.target.value;setTrade(p=>({...p,[k]:v,manualOverrides:[...new Set([...(p.manualOverrides||[]),k])]}))}} style={{...iStyle,color:isEmpty(trade[k])?"#4b5563":"var(--text)"}} placeholder="N/A"/></div>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:isOpen?"1fr":"1fr 1fr 1fr",gap:"12px",marginBottom:"12px"}}>
      {(()=>{
        const asset=(trade.pair||"BTC/USDT").split("/")[0]||"BTC";
        const toggleInput=()=>{const next=sizeInputMode==="usdt"?"asset":"usdt";setSizeInputMode(next);localStorage.setItem("tj_sizeInputMode",next)};
        const handleSizeChange=(v)=>{
          const entry=parseFloat(trade.entry);
          if(sizeInputMode==="usdt"){const updates={positionSize:v,manualOverrides:[...new Set([...(trade.manualOverrides||[]),"positionSize"])]};if(entry>0&&parseFloat(v)>0)updates.positionSizeAsset=String(parseFloat((parseFloat(v)/entry).toFixed(8)));setTrade(p=>({...p,...updates}));}
          else{const updates={positionSizeAsset:v,manualOverrides:[...new Set([...(trade.manualOverrides||[]),"positionSize"])]};if(entry>0&&parseFloat(v)>0)updates.positionSize=String(parseFloat((parseFloat(v)*entry).toFixed(2)));setTrade(p=>({...p,...updates}));}
        };
        return(<div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"6px"}}><div style={{fontSize:"11px",color:"var(--text3)",fontWeight:500}}>POSITIE ({sizeInputMode==="usdt"?"$":asset})</div><button onClick={toggleInput} style={{fontSize:"9px",padding:"2px 6px",borderRadius:"3px",border:"1px solid var(--border3)",background:"transparent",color:"var(--gold)",cursor:"pointer",fontFamily:"var(--mono)"}}>{sizeInputMode==="usdt"?"→ "+asset:"→ USDT"}</button></div><input type="text" value={sizeInputMode==="usdt"?(trade.positionSize||""):(trade.positionSizeAsset||"")} onChange={e=>handleSizeChange(e.target.value)} style={{...iStyle,color:isEmpty(sizeInputMode==="usdt"?trade.positionSize:trade.positionSizeAsset)?"#4b5563":"var(--text)"}} placeholder="N/A"/></div>);
      })()}
      {!isOpen&&[["pnl","PNL ($)"],["fees","FEES ($)"]].map(([k,l])=>(<div key={k}><div style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px",fontWeight:500}}>{l}</div><input type="text" value={trade[k]} onChange={e=>{const v=e.target.value;setTrade(p=>({...p,[k]:v,manualOverrides:[...new Set([...(p.manualOverrides||[]),k])]}))}} style={{...iStyle,color:isEmpty(trade[k])?"#4b5563":"var(--text)"}} placeholder="N/A"/></div>))}
    </div>

    {/* Live KPI strip — Risk / R:R / Qty real-time */}
    {(()=>{
      const e=parseFloat(trade.entry),s=parseFloat(trade.stopLoss),sz=parseFloat(trade.positionSize);
      const szAsset=parseFloat(trade.positionSizeAsset);
      const qty=sz>0&&e>0?sz/e:(szAsset>0?szAsset:null);
      const risk=(e>0&&s>0&&sz>0)?Math.abs(e-s)*sz/e:null;
      const tps=trade.tpLevels||[];
      const weightedRR=(()=>{
        if(!e||!s)return null;const riskDist=Math.abs(e-s);if(riskDist===0)return null;
        const rrs=tps.map(tp=>{const tpN=parseFloat(tp.price);const pct=parseFloat(tp.pct||0);return(tpN>0&&pct>0)?{rr:Math.abs(tpN-e)/riskDist,pct}:null}).filter(Boolean);
        if(rrs.length===0){const ex=parseFloat(trade.exit);if(!ex)return null;return Math.abs(ex-e)/riskDist}
        const sum=rrs.reduce((a,b)=>a+b.pct,0);return rrs.reduce((a,b)=>a+b.rr*b.pct,0)/(sum||1);
      })();
      const asset=(trade.pair||"BTC/USDT").split("/")[0]||"BTC";
      const capital=getCapitalForSource(trade.source,config,accounts);
      const riskPct=(risk!=null&&capital>0)?risk/capital*100:null;
      const riskPctColor=riskPct==null?"var(--text5)":riskPct<=1?"var(--green)":riskPct<=2?"var(--gold)":riskPct<=4?"var(--amber)":"var(--red)";
      return(<div className="tj-kpi-strip">
        <div className="tj-kpi"><span className="tj-kpi-label">Risk $</span><span className={"tj-kpi-val"+(risk==null?" muted":"")} style={risk!=null?{color:"var(--red)"}:{}}>{risk!=null?"$"+fmt(risk):"—"}</span></div>
        <div className="tj-kpi"><span className="tj-kpi-label">Risk %</span><span className={"tj-kpi-val"+(riskPct==null?" muted":"")} style={{color:riskPctColor}}>{riskPct!=null?riskPct.toFixed(2)+"%":"—"}</span></div>
        <div className="tj-kpi"><span className="tj-kpi-label">R:R</span><span className={"tj-kpi-val"+(weightedRR==null?" muted":"")} style={weightedRR!=null?{color:weightedRR>=1?"var(--green)":"var(--amber)"}:{}}>{weightedRR!=null?"1:"+weightedRR.toFixed(2):"—"}</span></div>
        <div className="tj-kpi"><span className="tj-kpi-label">Qty ({asset})</span><span className={"tj-kpi-val"+(qty==null?" muted":"")}>{qty!=null?qty.toFixed(6).replace(/\.?0+$/,""):"—"}</span></div>
      </div>);
    })()}

    {/* Auto PNL calc */}
    {!isOpen&&(()=>{const e=parseFloat(trade.entry);const ex=parseFloat(trade.exit);const sz=parseFloat(trade.positionSize);const fees=parseFloat(trade.fees)||0;if(e>0&&ex>0&&sz>0&&!(trade.manualOverrides||[]).includes("pnl")){const raw=trade.direction==="long"?(ex-e)*sz/e:(e-ex)*sz/e;const net2=raw-fees;if(trade.pnl!==""&&Math.abs(parseFloat(trade.pnl)-net2)>0.01||trade.pnl===""){return(<div style={{marginBottom:"12px"}}><button onClick={()=>setTrade(p=>({...p,pnl:net2.toFixed(2)}))} style={{fontSize:"10px",padding:"4px 12px",borderRadius:"5px",border:"1px solid var(--blue2)",background:"rgba(201,168,76,0.12)",color:"#C9A84C",cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>💡 PNL berekenen: {net2>=0?"+":""}${fmt(net2)} {fees>0?`(na $${fmt(fees)} fees)`:""} → Toepassen</button></div>)}}return null;})()}

    {/* TP Levels (multi-TP with percentages) — ported from v4_14 */}
    {(()=>{
      const tps=trade.tpLevels||[];
      const totalPct=tps.reduce((s,tp)=>s+parseFloat(tp.pct||0),0);
      const entryN=parseFloat(trade.entry);const slN=parseFloat(trade.stopLoss);const sizeN=parseFloat(trade.positionSize);
      const isLong=trade.direction==="long";

      const addTP=()=>{const remaining=Math.max(0,100-totalPct);setTrade(p=>({...p,tpLevels:[...(p.tpLevels||[]),{...EMPTY_TP,id:uid(),pct:String(remaining>0?Math.min(remaining,25):25)}]}))};
      const updateTP=(id,field,val)=>setTrade(p=>({...p,tpLevels:(p.tpLevels||[]).map(tp=>tp.id===id?{...tp,[field]:val}:tp)}));
      const removeTP=(id)=>setTrade(p=>({...p,tpLevels:(p.tpLevels||[]).filter(tp=>tp.id!==id)}));
      const toggleStatus=(id)=>setTrade(p=>({...p,tpLevels:(p.tpLevels||[]).map(tp=>tp.id===id?{...tp,status:tp.status==="hit"?"open":tp.status==="open"?"missed":"hit"}:tp)}));

      const calcProfit=(tp)=>{
        if(!entryN||!sizeN||!parseFloat(tp.price))return null;
        const pct=parseFloat(tp.pct||0)/100;const tpPrice=parseFloat(tp.price);
        return isLong?(tpPrice-entryN)*sizeN*pct/entryN:(entryN-tpPrice)*sizeN*pct/entryN;
      };
      const calcRR=(tp)=>{
        if(!entryN||!slN||!parseFloat(tp.price))return null;
        const risk=Math.abs(entryN-slN);if(risk===0)return null;
        return Math.abs(parseFloat(tp.price)-entryN)/risk;
      };

      return(<div style={{borderTop:"1px solid var(--border2)",paddingTop:"1.5rem",marginBottom:"1rem"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
          <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Take Profit niveaus</div>
          {tps.length<4&&<button onClick={addTP} style={{fontSize:"11px",padding:"4px 10px",borderRadius:"5px",border:"1px dashed var(--border5)",background:"transparent",color:"#C9A84C",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>+ TP toevoegen</button>}
        </div>

        {tps.length>0&&<>
          <div style={{display:"grid",gridTemplateColumns:"32px 1fr 70px 80px 70px 60px 28px",gap:"6px",marginBottom:"4px",padding:"0 2px"}}>
            <span style={{fontSize:"9px",color:"var(--text5)"}}></span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>Prijs</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>%</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>Winst</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>R:R</span>
            <span style={{fontSize:"9px",color:"var(--text4)",textTransform:"uppercase"}}>Status</span>
            <span></span>
          </div>

          {tps.map((tp,i)=>{
            const profit=calcProfit(tp);const rr=calcRR(tp);
            const statusColor=tp.status==="hit"?"var(--green)":tp.status==="missed"?"var(--red)":"var(--gold)";
            const statusIcon=tp.status==="hit"?<GlowCheck size={14}/>:tp.status==="missed"?<GlowCross size={14}/>:"◔";
            return(<div key={tp.id} style={{display:"grid",gridTemplateColumns:"32px 1fr 70px 80px 70px 60px 28px",gap:"6px",alignItems:"center",marginBottom:"4px"}}>
              <span style={{fontSize:"11px",fontWeight:700,color:"var(--gold)",textAlign:"center"}}>TP{i+1}</span>
              <input type="text" value={tp.price} onChange={e=>updateTP(tp.id,"price",e.target.value)} placeholder="Prijs" style={{...iStyle,padding:"6px 8px",fontSize:"12px"}}/>
              <div style={{position:"relative"}}>
                <input type="text" value={tp.pct} onChange={e=>updateTP(tp.id,"pct",e.target.value)} style={{...iStyle,padding:"6px 8px",fontSize:"12px",paddingRight:"18px"}}/>
                <span style={{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",fontSize:"10px",color:"var(--text4)"}}>%</span>
              </div>
              <span style={{fontSize:"11px",fontFamily:"var(--mono)",color:profit!==null?(profit>=0?"var(--green)":"var(--red)"):"var(--text5)"}}>{profit!==null?`${profit>=0?"+":""}$${fmt(profit)}`:<NA/>}</span>
              <span style={{fontSize:"11px",fontFamily:"var(--mono)",color:rr!==null?"var(--text2)":"var(--text5)"}}>{rr!==null?rr.toFixed(2)+"R":<NA/>}</span>
              <button onClick={()=>toggleStatus(tp.id)} style={{padding:"3px 8px",borderRadius:"5px",border:"none",background:tp.status==="hit"?"var(--green2)":tp.status==="missed"?"var(--red2)":"rgba(201,168,76,0.12)",color:statusColor,fontSize:"10px",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{statusIcon}</button>
              <button onClick={()=>removeTP(tp.id)} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"12px",padding:"2px"}}>✕</button>
            </div>);
          })}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"8px",padding:"8px 10px",background:"rgba(20,22,30,0.5)",borderRadius:"5px",fontSize:"10px"}}>
            <div style={{display:"flex",gap:"16px"}}>
              <span style={{color:totalPct===100?"var(--green)":totalPct>100?"var(--red)":"var(--gold)"}}>
                Totaal: {totalPct}% {totalPct!==100&&<span style={{fontSize:"9px"}}>{totalPct>100?"⚠ >100%":"⚠ <100%"}</span>}
              </span>
              {(()=>{const totalProfit=tps.reduce((s,tp)=>{const p=calcProfit(tp);return s+(p||0)},0);
                return totalProfit!==0&&<span style={{fontFamily:"var(--mono)",color:totalProfit>=0?"var(--green)":"var(--red)"}}>Verwacht: {totalProfit>=0?"+":""}${fmt(totalProfit)}</span>})()}
              {(()=>{const rrs=tps.map(tp=>({rr:calcRR(tp),pct:parseFloat(tp.pct||0)})).filter(x=>x.rr!==null);
                if(rrs.length===0)return null;const weighted=rrs.reduce((s,x)=>s+x.rr*x.pct,0)/rrs.reduce((s,x)=>s+x.pct,0);
                return <span style={{fontFamily:"var(--mono)",color:"var(--text2)"}}>Gem R:R: {weighted.toFixed(2)}R</span>})()}
            </div>
            <span style={{color:"var(--text4)"}}>{tps.filter(tp=>tp.status==="hit").length}/{tps.length} bereikt</span>
          </div>
        </>}

        {tps.length===0&&<div style={{fontSize:"11px",color:"var(--text4)",padding:"6px 0"}}>Klik "+ TP toevoegen" om take profit niveaus in te stellen.</div>}
      </div>);
    })()}

    {/* Setup & Psychologie — collapsible */}
    <Section title="📋 Setup & Psychologie" storeKey="setup" defaultOpen={true} hint={`${(trade.layers||[]).length} lagen${(trade.emotionTags||[]).length?` · ${(trade.emotionTags||[]).length} emoties`:""}${(trade.mistakeTags||[]).length?` · ${(trade.mistakeTags||[]).length} fouten`:""}`}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>Setup lagen (top-down)</div>
        <button onClick={()=>setTrade(p=>({...p,layers:[...(p.layers||[]),{...EMPTY_LAYER,id:uid()}]}))} style={{fontSize:"11px",padding:"4px 10px",borderRadius:"5px",border:"1px dashed var(--border5)",background:"transparent",color:"#C9A84C",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>+ Laag toevoegen</button>
      </div>
      {(trade.layers||[]).length===0&&<div style={{background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.15)",borderRadius:"8px",padding:"14px 16px",marginBottom:"12px",fontSize:"12px",color:"#C9A84C",lineHeight:1.6}}>Voeg setup lagen toe in top-down volgorde. Begin met het hoogste timeframe (bias) en eindig met je entry timeframe.</div>}
      {(trade.layers||[]).map((layer,i)=>{
        const tfIdx=TF_ORDER.indexOf(layer.timeframe);
        const prevTfIdx=i>0?TF_ORDER.indexOf((trade.layers||[])[i-1]?.timeframe):-1;
        const orderWarn=i>0&&tfIdx>=0&&prevTfIdx>=0&&tfIdx<prevTfIdx;
        return(<div key={layer.id||i} style={{background:orderWarn?"rgba(201,168,76,0.04)":"rgba(42,46,57,0.3)",borderRadius:"8px",border:`1px solid ${orderWarn?"rgba(201,168,76,0.2)":"var(--border2)"}`,padding:"12px",marginBottom:"6px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"8px"}}>
            <span style={{fontSize:"11px",color:"var(--text4)",fontWeight:700,fontFamily:"var(--mono)",width:"20px"}}>{i+1}.</span>
            {i>0&&<button onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];[l[i-1],l[i]]=[l[i],l[i-1]];return{...p,layers:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>▲</button>}
            {i<(trade.layers||[]).length-1&&<button onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];[l[i],l[i+1]]=[l[i+1],l[i]];return{...p,layers:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>▼</button>}
            <div style={{flex:1}}/>
            {orderWarn&&<span style={{fontSize:"10px",color:"var(--amber)",fontWeight:500}}>⚠ Niet top-down</span>}
            <button onClick={()=>setTrade(p=>({...p,layers:(p.layers||[]).filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"13px",padding:"2px"}}>✕</button>
          </div>
          <div style={{display:"grid",gap:"10px"}}>
            <div><div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>TIMEFRAME</div><div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{gt("timeframeTags").map(tf=>{const sel=layer.timeframe===tf;return(<button key={tf} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],timeframe:sel?"":tf};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#7c3aed":"var(--border3)"}`,background:sel?"rgba(124,58,237,0.2)":"transparent",color:sel?"#a78bfa":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{tf}</button>)})}</div></div>
            <div>
                <div style={{fontSize:"9px",color:"#C9A84C",marginBottom:"6px",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase"}}>Setup</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginBottom:"4px"}}>{gt("setupTags").map(s=>{const sel=layer.setup===s;return(<button key={s} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],setup:sel?"":s,fillPlayType:s!=="Fill Play"?undefined:l[i].fillPlayType};return{...p,layers:l}})} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"rgba(201,168,76,0.45)":"rgba(201,168,76,0.15)"}`,background:sel?"rgba(201,168,76,0.12)":"transparent",color:sel?"#C9A84C":"rgba(255,255,255,0.35)",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{s}</button>)})}</div>
                {layer.setup==="Fill Play"&&<div style={{marginTop:"6px",padding:"9px 12px",background:"rgba(201,168,76,0.05)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:"6px",borderLeft:"2px solid #C9A84C",borderTopLeftRadius:"0",borderBottomLeftRadius:"0"}}>
                  <div style={{fontSize:"9px",color:"#C9A84C",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:"7px"}}>Type</div>
                  <div style={{display:"flex",gap:"6px"}}>{["Directe Play","Backtest Play"].map(fp=>{const fsel=layer.fillPlayType===fp;return(<button key={fp} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],fillPlayType:fsel?undefined:fp};return{...p,layers:l}})} style={{padding:"5px 16px",borderRadius:"6px",fontSize:"11px",fontWeight:700,border:`1px solid ${fsel?"#C9A84C":"rgba(201,168,76,0.2)"}`,background:fsel?"#C9A84C":"transparent",color:fsel?"#000000":"rgba(201,168,76,0.6)",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{fp}</button>)})}</div>
                </div>}
              </div>
            <div><div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>CONFIRMATIE(S)</div><div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{gt("confirmationTags").map(c=>{const sel=(layer.confirmations||[layer.confirmation].filter(Boolean)).includes(c);return(<button key={c} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];const cur=l[i].confirmations||[l[i].confirmation].filter(Boolean);l[i]={...l[i],confirmations:sel?cur.filter(x=>x!==c):[...cur,c],confirmation:undefined};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#0d9488":"var(--border3)"}`,background:sel?"rgba(13,148,136,0.2)":"transparent",color:sel?"#2eaa6f":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{c}</button>)})}</div></div>
            <div><div style={{fontSize:"10px",color:"var(--text4)",marginBottom:"4px",fontWeight:500}}>ROL</div><div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>{ROLE_OPTIONS.map(r=>{const sel=layer.role===r;return(<button key={r} onClick={()=>setTrade(p=>{const l=[...(p.layers||[])];l[i]={...l[i],role:sel?"Bias":r};return{...p,layers:l}})} style={{padding:"3px 8px",borderRadius:"4px",fontSize:"10px",fontWeight:600,border:`1px solid ${sel?"#d97706":"var(--border3)"}`,background:sel?"rgba(201,168,76,0.2)":"transparent",color:sel?"#c9a84c":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{r}</button>)})}</div></div>
          </div>
        </div>);
      })}
      <div style={{marginTop:"16px"}}/>
      {/* Emotions */}
      <div style={{marginBottom:"1rem"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"8px"}}>Emoties</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          <div><div style={{fontSize:"10px",color:"var(--red)",fontWeight:600,marginBottom:"6px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCross size={14}/> Negatief</div><div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{gt("emotionTags").filter(t=>isNegEmotion(t)).map(tag=>{const a=(trade.emotionTags||[]).includes(tag);return(<button key={tag} onClick={()=>toggle("emotionTags",tag)} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:500,border:`1px solid ${a?"#dc2626":"rgba(54,58,69,0.7)"}`,background:a?"rgba(220,122,122,0.14)":"transparent",color:a?"#e05555":"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>{tag}</button>)})}</div></div>
          <div><div style={{fontSize:"10px",color:"var(--green)",fontWeight:600,marginBottom:"6px",display:"flex",alignItems:"center",gap:"5px"}}><GlowCheck size={14}/> Positief</div><div style={{display:"flex",flexWrap:"wrap",gap:"5px"}}>{gt("emotionTags").filter(t=>!isNegEmotion(t)).map(tag=>{const a=(trade.emotionTags||[]).includes(tag);return(<button key={tag} onClick={()=>toggle("emotionTags",tag)} style={{padding:"4px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:500,border:`1px solid ${a?"#059669":"rgba(54,58,69,0.7)"}`,background:a?"rgba(46,170,111,0.14)":"transparent",color:a?CHART_COLORS.win:"#9ca3af",cursor:"pointer",fontFamily:"inherit"}}>{tag}</button>)})}</div></div>
        </div>
      </div>
      <TagGroup label="Fouten" tags={gt("mistakeTags")} selected={trade.mistakeTags} onToggle={t=>toggle("mistakeTags",t)} color="orange"/>
      <div style={{marginTop:"14px"}}><div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"8px"}}>Trade kwaliteit</div><Stars value={trade.rating} onChange={r=>setTrade(p=>({...p,rating:r}))}/></div>
    </Section>

    {/* Media & Links — collapsible */}
    <Section title="📸 Media & Links" storeKey="media" defaultOpen={false} hint={`${trade.screenshot?"screenshot":"geen screenshot"} · ${(trade.links||[]).length} link${(trade.links||[]).length===1?"":"s"}`}>
      <div style={{marginBottom:"14px"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"8px"}}>Screenshot</div>
        <input type="file" ref={fRef} accept="image/*" onChange={handleSS} style={{display:"none"}}/>
        {trade.screenshot?(<div style={{position:"relative"}}><img src={trade.screenshot} alt="" style={{width:"100%",borderRadius:"8px",border:"1px solid var(--border2)"}}/><button onClick={()=>{setTrade(p=>({...p,screenshot:null}));fRef.current.value=""}} style={{position:"absolute",top:"8px",right:"8px",background:"rgba(0,0,0,0.7)",border:"none",color:"var(--red)",borderRadius:"6px",padding:"4px 10px",cursor:"pointer",fontSize:"12px",fontFamily:"inherit"}}>Verwijder</button></div>)
        :(<button onClick={()=>fRef.current.click()} style={{padding:"24px",width:"100%",borderRadius:"8px",border:"1px dashed var(--border5)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit",fontSize:"13px"}}>Klik om screenshot te uploaden (TradingView)</button>)}
      </div>
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
          <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>TradingView links</div>
          <button onClick={()=>setTrade(p=>({...p,links:[...(p.links||[]),{id:uid(),url:"",comment:""}]}))} style={{fontSize:"11px",padding:"4px 10px",borderRadius:"5px",border:"1px dashed var(--border5)",background:"transparent",color:"var(--teal)",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>+ Link toevoegen</button>
        </div>
        {(trade.links||[]).map((link,i)=>(
          <div key={link.id||i} style={{background:"rgba(42,46,57,0.3)",borderRadius:"8px",border:"1px solid var(--border2)",padding:"10px 12px",marginBottom:"6px"}}>
            <div style={{display:"flex",gap:"6px",alignItems:"center",marginBottom:"6px"}}>
              {i>0&&<button onClick={()=>setTrade(p=>{const l=[...(p.links||[])];[l[i-1],l[i]]=[l[i],l[i-1]];return{...p,links:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"14px",padding:"2px"}}>▲</button>}
              {i<(trade.links||[]).length-1&&<button onClick={()=>setTrade(p=>{const l=[...(p.links||[])];[l[i],l[i+1]]=[l[i+1],l[i]];return{...p,links:l}})} style={{background:"none",border:"none",color:"var(--text4)",cursor:"pointer",fontSize:"14px",padding:"2px"}}>▼</button>}
              <input value={link.url} onChange={e=>setTrade(p=>{const l=[...(p.links||[])];l[i]={...l[i],url:e.target.value};return{...p,links:l}})} placeholder="https://www.tradingview.com/chart/..." style={{...iStyle,padding:"7px 10px",fontSize:"12px",flex:1}}/>
              {link.url&&<a href={link.url} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} style={{fontSize:"11px",color:"var(--teal)",textDecoration:"none",padding:"4px 8px",borderRadius:"4px",border:"1px solid rgba(46,170,111,0.3)",whiteSpace:"nowrap"}}>Open ↗</a>}
              <button onClick={()=>setTrade(p=>({...p,links:(p.links||[]).filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:"var(--text5)",cursor:"pointer",fontSize:"14px",padding:"2px 4px"}}>✕</button>
            </div>
            <input value={link.comment||""} onChange={e=>setTrade(p=>{const l=[...(p.links||[])];l[i]={...l[i],comment:e.target.value};return{...p,links:l}})} placeholder="Opmerking (bijv. 4H setup, entry zone, weekly bias...)" style={{...iStyle,padding:"6px 10px",fontSize:"12px",fontFamily:"var(--font)"}}/>
          </div>
        ))}
        {(!trade.links||trade.links.length===0)&&<div style={{fontSize:"12px",color:"var(--text4)",padding:"8px 0"}}>Voeg TradingView chart links toe om je analyse te documenteren.</div>}
      </div>
    </Section>

    {/* Notities — collapsible */}
    <Section title="📝 Notities" storeKey="notes" defaultOpen={true} hint={`${trade.entryNote?"pre-trade ✓":"—"}${!isOpen?` · ${trade.notes?"post-trade ✓":"—"}`:""}`}>
      <div style={{marginBottom:isOpen?0:"14px"}}>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"8px"}}>Waarom ga ik erin?</div>
        <textarea value={trade.entryNote||""} onChange={e=>setTrade(p=>({...p,entryNote:e.target.value}))} placeholder="Je thesis vóór entry — setup, bias, trigger, risk, plan voor management..." rows={3} style={{...iStyle,fontFamily:"var(--font)",fontSize:"13px",resize:"vertical",lineHeight:"1.6"}}/>
      </div>
      {!isOpen&&<div>
        <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"8px"}}>Hoe ging het?</div>
        <textarea value={trade.notes} onChange={e=>setTrade(p=>({...p,notes:e.target.value}))} placeholder="Post-mortem — wat ging goed, wat kon beter, wat leer je?" rows={4} style={{...iStyle,fontFamily:"var(--font)",fontSize:"13px",resize:"vertical",lineHeight:"1.6"}}/>
      </div>}
    </Section>

    <div style={{marginBottom:"1rem"}}/>
    {/* Actions */}
    <div style={{display:"flex",gap:"12px"}}>
      <button onClick={onSave} style={{flex:1,padding:"12px",borderRadius:"8px",border:"none",fontSize:"14px",fontWeight:700,background:"#C9A84C",color:"#000000",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>Trade opslaan</button>
      {trade.pnl&&<button onClick={()=>setShowCard(true)} title="Deel als kaart" style={{padding:"12px 18px",borderRadius:"8px",border:"1px solid var(--gold-border)",background:"var(--gold-dim)",color:"var(--gold)",cursor:"pointer",fontFamily:"inherit",fontSize:"13px",fontWeight:600}}>📸 Deel kaart</button>}
      {showCard&&<TradeCardExport trade={trade} onClose={()=>setShowCard(false)}/>}
      {onCancel&&<button onClick={onCancel} style={{padding:"12px 24px",borderRadius:"8px",border:"1px solid var(--border4)",background:"transparent",color:"var(--text2)",cursor:"pointer",fontFamily:"inherit",fontSize:"14px"}}>Annuleren</button>}
    </div>
  </div>);
}


// ============ FILTER BAR ============
function FilterBar({trades,allTrades,filters,setFilters,config,accounts}){
  const at=allTrades||trades;
  const exchanges=config?.exchanges||{};
  const connectedSources=Object.keys(exchanges).filter(k=>(exchanges[k]||{}).apiKey);
  const manualSources=(accounts||[]).map(a=>a.name);
  const tradeSources=[...new Set((at||[]).map(t=>t.source||"manual"))];
  const sources=[...new Set([...tradeSources,...connectedSources,...manualSources])].sort();
  const pairs=[...new Set(at.map(t=>t.pair))].sort();
  const allSetups=[...new Set(at.flatMap(t=>t.setupTags||[]))].sort();
  const allConfs=[...new Set(at.flatMap(t=>t.confirmationTags||[]))].sort();
  const allEmotions=[...new Set(at.flatMap(t=>t.emotionTags||[]))].sort();
  const allMistakes=[...new Set(at.flatMap(t=>t.mistakeTags||[]))].sort();
  const activeCount=Object.values(filters).filter(v=>v&&v!=="all"&&(!Array.isArray(v)||v.length>0)&&v!=="").length;
  const[expanded,setExpanded]=useState(activeCount>0);
  const chip=(label,field,value)=>{const active=filters[field]===value;return <button key={value} onClick={()=>setFilters(p=>({...p,[field]:active?"all":value}))} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:500,border:`1px solid ${active?"#C9A84C":"var(--border3)"}`,background:active?"rgba(201,168,76,0.12)":"transparent",color:active?"#C9A84C":"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>{label}</button>};
  const multiChip=(label,field,value)=>{const arr=filters[field]||[];const active=arr.includes(value);return <button key={value} onClick={()=>setFilters(p=>{const cur=p[field]||[];return{...p,[field]:active?cur.filter(v=>v!==value):[...cur,value]}})} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:500,border:`1px solid ${active?"#C9A84C":"var(--border3)"}`,background:active?"rgba(201,168,76,0.12)":"transparent",color:active?"#C9A84C":"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>{label}</button>};
  const clearAll=()=>setFilters({source:"all",pair:"all",quote:"all",direction:"all",status:"all",dateFrom:"",dateTo:"",setupTags:[],confirmationTags:[],emotionTags:[],mistakeTags:[],timeframeTags:[],sessionTags:[],leverage:"all",result:"all"});
  // Quick-filter pill helpers
  const qPill=(label,field,value)=>{const active=filters[field]===value;return(<button key={field+value} onClick={()=>setFilters(p=>({...p,[field]:active?"all":value}))} className={"pill"+(active?" active":"")}>{label}</button>)};
  const qDate=(label,from)=>{const today=new Date().toISOString().split("T")[0];const active=filters.dateFrom===from&&filters.dateTo===today;return(<button key={label} onClick={()=>setFilters(p=>active?{...p,dateFrom:"",dateTo:""}:{...p,dateFrom:from,dateTo:today})} className={"pill"+(active?" active":"")}>{label}</button>)};
  const today=new Date().toISOString().split("T")[0];
  const day=new Date();const startWeek=new Date(day);startWeek.setDate(day.getDate()-((day.getDay()+6)%7));
  const startMonth=new Date(day.getFullYear(),day.getMonth(),1);
  // Account labels for quick-filter pills
  const labelPills=[];
  sources.forEach(s=>{const lbl=resolveAccountLabel(s,config,accounts);if(lbl&&!labelPills.find(x=>x.label===lbl))labelPills.push({source:s,label:lbl})});

  return(<div style={{background:"var(--glass)",backdropFilter:"var(--glass-blur)",WebkitBackdropFilter:"var(--glass-blur)",borderRadius:"var(--radius-lg)",padding:expanded?"16px":"10px 16px",marginBottom:"1.5rem",border:"1px solid var(--border1)",transition:"padding .2s"}}>
    {/* Quick-filter pills — always visible, 2 rows */}
    <div style={{marginBottom:"8px",paddingBottom:"8px",borderBottom:"1px solid var(--border1)"}}>
      {/* Row 1: Datum + richting + resultaat + pairs */}
      <div className="pill-bar" style={{marginBottom:"6px"}}>
        <input type="date" value={filters.dateFrom||""} onChange={e=>setFilters(p=>({...p,dateFrom:e.target.value}))} style={{padding:"5px 8px",borderRadius:"999px",border:"1px solid var(--border3)",background:"rgba(255,255,255,.03)",color:"var(--text)",fontSize:"11px",fontFamily:"var(--mono)",outline:"none",width:"125px",flexShrink:0}}/>
        <span style={{fontSize:"10px",color:"var(--text5)",flexShrink:0}}>t/m</span>
        <input type="date" value={filters.dateTo||""} onChange={e=>setFilters(p=>({...p,dateTo:e.target.value}))} style={{padding:"5px 8px",borderRadius:"999px",border:"1px solid var(--border3)",background:"rgba(255,255,255,.03)",color:"var(--text)",fontSize:"11px",fontFamily:"var(--mono)",outline:"none",width:"125px",flexShrink:0}}/>
        {qDate("Vandaag",today)}
        {qDate("Week",startWeek.toISOString().split("T")[0])}
        {qDate("Maand",startMonth.toISOString().split("T")[0])}
        <span style={{width:"1px",height:"20px",background:"var(--border1)",flexShrink:0}}/>
        {qPill("Long","direction","long")}
        {qPill("Short","direction","short")}
        {qPill("Winners","result","win")}
        {qPill("Losers","result","loss")}
        {pairs.length>0&&<span style={{width:"1px",height:"20px",background:"var(--border1)",flexShrink:0}}/>}
        {pairs.slice(0,5).map(p=>qPill(p,"pair",p))}
      </div>
      {/* Row 2: Exchanges + account-labels + reset */}
      <div className="pill-bar">
        {sources.map(s=>{const active=filters.source===s;const lbl=resolveAccountLabel(s,config,accounts);return(<button key={s} onClick={()=>setFilters(p=>({...p,source:active?"all":s}))} className={"pill"+(active?" active":"")} style={active?{}:{display:"inline-flex",alignItems:"center",gap:"5px"}}>{s!=="manual"&&<ExchangeIcon name={s} size={13}/>}<span>{exName(s)}{lbl?" · "+lbl:""}</span></button>)})}

    </div>

        {(()=>{const today=new Date().toISOString().split("T")[0];const mk=(label,from)=>{const active=filters.dateFrom===from&&filters.dateTo===today;return(<button key={label} onClick={()=>setFilters(p=>({...p,dateFrom:from,dateTo:today}))} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"10px",fontWeight:600,border:`1px solid ${active?"var(--gold)":"var(--border3)"}`,background:active?"var(--gold-dim)":"transparent",color:active?"var(--gold)":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>{label}</button>);};
          const day=new Date();const startWeek=new Date(day);startWeek.setDate(day.getDate()-((day.getDay()+6)%7));const startMonth=new Date(day.getFullYear(),day.getMonth(),1);
          const allActive=!filters.dateFrom&&!filters.dateTo;
          return(<>
            {mk("Vandaag",today)}
            {mk("Deze week",startWeek.toISOString().split("T")[0])}
            {mk("Deze maand",startMonth.toISOString().split("T")[0])}
            <button onClick={()=>setFilters(p=>({...p,dateFrom:"",dateTo:""}))} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"10px",fontWeight:600,border:`1px solid ${allActive?"var(--gold)":"var(--border3)"}`,background:allActive?"var(--gold-dim)":"transparent",color:allActive?"var(--gold)":"var(--text4)",cursor:"pointer",fontFamily:"inherit"}}>Alles</button>
          </>);})()}
      </div>
      {sources.length>0&&<div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Exchange</span>{chip("Alle","source","all")}{sources.map(s=>chip(<span style={{display:"inline-flex",alignItems:"center",gap:"5px"}}><ExchangeIcon name={s} size={14}/>{exName(s)}</span>,"source",s))}</div>}
      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Pair</span>{chip("Alle","pair","all")}{pairs.map(p=>chip(p,"pair",p))}</div>
      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Richting</span>{chip("Alle","direction","all")}{chip("Long","direction","long")}{chip("Short","direction","short")}</div>
      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Status</span>{chip("Alle","status","all")}<button onClick={()=>setFilters(p=>({...p,status:p.status==="open"?"all":"open"}))} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:500,border:`1px solid ${filters.status==="open"?"#C9A84C":"var(--border3)"}`,background:filters.status==="open"?"rgba(201,168,76,0.12)":"transparent",color:filters.status==="open"?"#C9A84C":"var(--text3)",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"5px"}}>{filters.status==="open"&&<span style={{width:"5px",height:"5px",borderRadius:"50%",background:"#C9A84C"}}/>}Open</button>{chip("Closed","status","closed")}</div>
      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Resultaat</span>{chip("Alle","result","all")}{chip("Winners","result","win")}{chip("Losers","result","loss")}</div>
      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Sessie</span>{ALL_SESSIONS.map(s=>{const arr=filters.sessionTags||[];const active=arr.includes(s);const c=SESSION_COLORS[s];return <button key={s} onClick={()=>setFilters(p=>{const cur=p.sessionTags||[];return{...p,sessionTags:active?cur.filter(v=>v!==s):[...cur,s]}})} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:500,border:`1px solid ${active?c.border:"var(--border3)"}`,background:active?c.bg:"transparent",color:active?c.text:"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>{s}</button>})}</div>
      {allSetups.length>0&&<div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Setup</span>{allSetups.map(s=>multiChip(s,"setupTags",s))}</div>}
      {allEmotions.length>0&&<div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Emoties</span>{allEmotions.map(e=>{const neg=isNegEmotion(e);const arr=filters.emotionTags||[];const active=arr.includes(e);return <button key={e} onClick={()=>setFilters(p=>{const cur=p.emotionTags||[];return{...p,emotionTags:active?cur.filter(v=>v!==e):[...cur,e]}})} style={{padding:"4px 10px",borderRadius:"5px",fontSize:"11px",fontWeight:500,border:`1px solid ${active?(neg?"#dc2626":"#059669"):"var(--border3)"}`,background:active?(neg?"rgba(220,122,122,0.14)":"rgba(46,170,111,0.14)"):"transparent",color:active?(neg?"#e05555":CHART_COLORS.win):"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .12s"}}>{e}</button>})}</div>}
      {allMistakes.length>0&&<div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}><span style={{fontSize:"10px",color:"var(--text4)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",minWidth:"65px"}}>Fouten</span>{allMistakes.map(m=>multiChip(m,"mistakeTags",m))}</div>}
    </div>}
  </div>);
}

function applyFilters(trades,filters){
  return trades.filter(t=>{
    if(filters.source&&filters.source!=="all"&&(t.source||"manual")!==filters.source)return false;
    if(filters.pair&&filters.pair!=="all"&&t.pair!==filters.pair)return false;
    if(filters.quote&&filters.quote!=="all"&&(t.pair||"").split("/")[1]!==filters.quote)return false;
    if(filters.direction&&filters.direction!=="all"&&t.direction!==filters.direction)return false;
    if(filters.status&&filters.status!=="all"&&(t.status||"closed")!==filters.status)return false;
    if(filters.dateFrom&&t.date<filters.dateFrom)return false;
    if(filters.dateTo&&t.date>filters.dateTo)return false;
    if(filters.result&&filters.result!=="all"){const pnl=parseFloat(t.pnl);if(isNaN(pnl))return false;if(filters.result==="win"&&pnl<=0)return false;if(filters.result==="loss"&&pnl>=0)return false;}
    if(filters.setupTags?.length>0&&!filters.setupTags.some(s=>(t.setupTags||[]).includes(s)))return false;
    if(filters.confirmationTags?.length>0&&!filters.confirmationTags.some(c=>(t.confirmationTags||[]).includes(c)))return false;
    if(filters.emotionTags?.length>0&&!filters.emotionTags.some(e=>(t.emotionTags||[]).includes(e)))return false;
    if(filters.mistakeTags?.length>0&&!filters.mistakeTags.some(m=>(t.mistakeTags||[]).includes(m)))return false;
    if(filters.sessionTags?.length>0){const st=getSessionTags(t.date,t.time);if(!filters.sessionTags.some(s=>st.includes(s)))return false}
    return true;
  });
}

// ============ CALENDAR ============
function Calendar({trades,setFilters,setTab,onEdit,dailyNotes,setDailyNotes,tradingRules}){
  const closed=trades.filter(t=>t.pnl!==""&&!isNaN(parseFloat(t.pnl)));
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [openDay,setOpenDay]=useState(null);
  const tipRef=useRef(null);

  const dayMap=useMemo(()=>{
    const m={};
    closed.forEach(t=>{
      if(!t.date||!t.date.startsWith(String(year)))return;
      const pnl=parseFloat(t.pnl)||0;
      if(!m[t.date])m[t.date]={pnl:0,n:0,wins:0,losses:0};
      m[t.date].pnl+=pnl;m[t.date].n++;
      if(pnl>0)m[t.date].wins++;else if(pnl<0)m[t.date].losses++;
    });
    return m;
  },[closed,year]);

  const stats=useMemo(()=>{
    const yt=closed.filter(t=>t.date.startsWith(String(year)));
    const pnl=yt.reduce((s,t)=>s+parseFloat(t.pnl),0);
    const list=Object.entries(dayMap);
    const greens=list.filter(([,d])=>d.pnl>0).length;
    const reds=list.filter(([,d])=>d.pnl<0).length;
    const wins=yt.filter(t=>parseFloat(t.pnl)>0).length;
    const wr=yt.length?wins/yt.length*100:0;
    const winnersAvg=(()=>{const w=yt.filter(t=>parseFloat(t.pnl)>0);return w.length?w.reduce((s,t)=>s+parseFloat(t.pnl),0)/w.length:0;})();
    const best=list.reduce((a,b)=>b[1].pnl>(a?.[1]?.pnl??-Infinity)?b:a,null);
    const sortedDays=list.sort((a,b)=>a[0].localeCompare(b[0]));
    let streak=0,maxStreak=0;
    sortedDays.forEach(([,d])=>{if(d.pnl>0){streak++;maxStreak=Math.max(maxStreak,streak);}else streak=0;});
    return{pnl,greens,reds,wr,winnersAvg,best,streak:maxStreak,total:yt.length};
  },[closed,dayMap,year]);

  const maxAbs=useMemo(()=>{const v=Object.values(dayMap).map(d=>Math.abs(d.pnl));return Math.max(...v,1);},[dayMap]);

  // ── Heatmap (jaar) ──
  const heatmapColor=(d)=>{
    if(!d||!d.pnl)return"rgba(255,255,255,.04)";
    const i=Math.min(Math.abs(d.pnl)/maxAbs,1);
    return d.pnl>=0?`rgba(46,170,111,${.18+i*.62})`:`rgba(224,85,85,${.18+i*.62})`;
  };
  const showTip=(e,date,d)=>{
    const tip=tipRef.current;if(!tip)return;
    if(!d){tip.classList.remove("show");return;}
    const rect=e.target.getBoundingClientRect();
    tip.style.left=Math.max(8,Math.min(window.innerWidth-200,rect.left+rect.width/2-90))+"px";
    tip.style.top=Math.max(8,rect.top-70)+"px";
    tip.innerHTML=`<div style="color:var(--gold);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:4px">${fmtNL(date)}</div><div style="font-size:16px;font-weight:800;color:${d.pnl>=0?"var(--green)":"var(--red)"};font-variant-numeric:tabular-nums">${d.pnl>=0?"+":""}$${fmt(d.pnl)}</div><div style="font-size:11px;color:var(--text3)">${d.n} trades · ${d.n?Math.round(d.wins/d.n*100):0}% win</div>`;
    tip.classList.add("show");
  };

  const monthsAbbr=["Jan","Feb","Mrt","Apr","Mei","Jun","Jul","Aug","Sep","Okt","Nov","Dec"];
  const dowAbbr=["Ma","Di","Wo","Do","Vr","Za","Zo"];
  const heatmapCells=[],heatmapMonths=[];
  const yStart=new Date(year,0,1);const startDow=(yStart.getDay()+6)%7;
  let prevMo=-1;
  for(let w=0;w<53;w++){
    for(let d=0;d<7;d++){
      const idx=w*7+d-startDow;
      const dt=new Date(year,0,idx+1);
      if(dt.getFullYear()!==year){heatmapCells.push(null);continue;}
      if(d===0&&dt.getMonth()!==prevMo){heatmapMonths.push({w,name:monthsAbbr[dt.getMonth()]});prevMo=dt.getMonth();}
      const iso=dt.toISOString().split("T")[0];
      heatmapCells.push({date:iso,...dayMap[iso]});
    }
  }
  const HW=53*14+30,HH=7*14+30;

  // ── Maandkalender ──
  const monthName=new Date(year,month).toLocaleString("nl-NL",{month:"long",year:"numeric"});
  const first=new Date(year,month,1);
  const sd=(first.getDay()+6)%7;
  const lastDay=new Date(year,month+1,0).getDate();
  const monthEntries=Object.entries(dayMap).filter(([d])=>d.startsWith(`${year}-${String(month+1).padStart(2,"0")}`));
  const bestOfMonth=monthEntries.reduce((a,b)=>b[1].pnl>(a?.[1]?.pnl??-Infinity)?b:a,null);
  const todayISO=today.toISOString().split("T")[0];
  const weeks=[];let week=Array(sd).fill(null);
  for(let dn=1;dn<=lastDay;dn++){
    const dt=new Date(year,month,dn);
    const iso=dt.toISOString().split("T")[0];
    week.push({day:dn,iso,info:dayMap[iso]||null,isWeekend:[5,6].includes((dt.getDay()+6)%7),isToday:iso===todayISO,isBest:bestOfMonth&&iso===bestOfMonth[0]});
    if(week.length===7){weeks.push(week);week=[];}
  }
  if(week.length){while(week.length<7)week.push(null);weeks.push(week);}
  const navMonth=(d)=>{let nm=month+d,ny=year;if(nm<0){nm=11;ny--;}else if(nm>11){nm=0;ny++;}setMonth(nm);setYear(ny);};

  // ── Side panel ──
  const sideTrades=openDay?closed.filter(t=>t.date===openDay).sort((a,b)=>(a.time||"").localeCompare(b.time||"")):[];
  const sideTotal=sideTrades.reduce((s,t)=>s+parseFloat(t.pnl),0);
  const sideWins=sideTrades.filter(t=>parseFloat(t.pnl)>0).length;
  const sideWr=sideTrades.length?sideWins/sideTrades.length*100:0;
  const openDt=openDay?new Date(openDay):null;
  const dayName=openDt?["Zondag","Maandag","Dinsdag","Woensdag","Donderdag","Vrijdag","Zaterdag"][openDt.getDay()]:"";

  const goToTrades=()=>{if(!openDay)return;setFilters(p=>({...p,dateFrom:openDay,dateTo:openDay}));setTab&&setTab("trades");setOpenDay(null);};

  return(<div style={{animation:"fadeIn .3s ease",position:"relative"}}>
    {tradingRules&&<TradingRulesWidget rules={tradingRules} trades={closed}/>}
    {/* Stats bar */}
    <div className="cal-stats">
      <div className="cal-stat"><div className="cal-stat-label">Net {year}</div><div className="cal-stat-value" style={{color:stats.pnl>=0?"var(--green)":"var(--red)"}}>{stats.pnl>=0?"+":"-"}${fmt(Math.abs(stats.pnl))}</div><div className="cal-stat-sub">{stats.total} trades</div></div>
      <div className="cal-stat"><div className="cal-stat-label">Best dag</div><div className="cal-stat-value" style={{color:"var(--gold)"}}>{stats.best?(stats.best[1].pnl>=0?"+":"")+"$"+fmt(stats.best[1].pnl):"–"}</div><div className="cal-stat-sub">{stats.best?fmtNL(stats.best[0]):""}</div></div>
      <div className="cal-stat"><div className="cal-stat-label">Win-rate</div><div className="cal-stat-value" style={{color:stats.wr>=50?"var(--green)":"var(--red)"}}>{stats.wr.toFixed(0)}%</div><div className="cal-stat-sub">{stats.greens}g / {stats.reds}r dagen</div></div>
      <div className="cal-stat"><div className="cal-stat-label">Gem. winst</div><div className="cal-stat-value" style={{color:"var(--green)"}}>${fmt(stats.winnersAvg)}</div><div className="cal-stat-sub">per winning trade</div></div>
      <div className="cal-stat"><div className="cal-stat-label">🔥 Streak</div><div className="cal-stat-value" style={{color:"var(--gold)"}}>{stats.streak}</div><div className="cal-stat-sub">winning days</div></div>
    </div>

    {/* Toolbar */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"12px"}}>
      <div style={{display:"flex",gap:"8px"}}>
        <button onClick={()=>setYear(y=>y-1)} style={{padding:"8px 14px",borderRadius:"8px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit",fontSize:"13px"}}>← {year-1}</button>
        <div style={{padding:"8px 16px",borderRadius:"8px",border:"1px solid var(--gold-border)",background:"var(--gold-dim)",color:"var(--gold)",fontSize:"14px",fontWeight:700}}>{year}</div>
        <button onClick={()=>setYear(y=>y+1)} style={{padding:"8px 14px",borderRadius:"8px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit",fontSize:"13px"}}>{year+1} →</button>
        <button onClick={()=>{const t=new Date();setYear(t.getFullYear());setMonth(t.getMonth());}} style={{padding:"8px 16px",borderRadius:"8px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text2)",cursor:"pointer",fontFamily:"inherit",fontSize:"12px",fontWeight:600,marginLeft:"8px"}}>Vandaag</button>
      </div>
    </div>

    {/* Jaarheatmap */}
    <div style={{background:"var(--glass)",borderRadius:"var(--radius-lg)",padding:"24px",marginBottom:"20px",border:"1px solid var(--border1)"}}>
      <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginBottom:"16px"}}>📊 Jaarheatmap — {year}</div>
      <svg className="cal-heatmap" viewBox={`0 0 ${HW} ${HH}`} style={{width:"100%",height:"auto",display:"block"}}>
        {heatmapMonths.map(m=>(<text key={m.w} x={m.w*14+30} y="10" style={{fontSize:"10px",fill:"var(--text4)",fontWeight:600}}>{m.name}</text>))}
        {dowAbbr.map((d,i)=>(i%2===0?<text key={d} x="0" y={(i+1)*14+18} style={{fontSize:"9px",fill:"var(--text5)"}}>{d}</text>:null))}
        {heatmapCells.map((c,i)=>c&&(
          <rect key={i} className="cell" x={Math.floor(i/7)*14+30} y={(i%7)*14+18} width="11" height="11" rx="2"
            fill={heatmapColor(c)}
            onMouseEnter={e=>showTip(e,c.date,c)} onMouseLeave={e=>showTip(e)} onClick={()=>setOpenDay(c.date)}/>
        ))}
      </svg>
      <div style={{display:"flex",alignItems:"center",gap:"14px",marginTop:"14px",fontSize:"11px",color:"var(--text4)"}}>
        <div>Minder ←</div>
        <div style={{display:"flex",gap:"2px",alignItems:"center"}}>
          {[0,.25,.5,.75,1].map(i=>(<div key={"l"+i} style={{width:"12px",height:"12px",borderRadius:"2px",background:`rgba(224,85,85,${.18+i*.62})`}}/>))}
          <div style={{width:"12px",height:"12px",borderRadius:"2px",background:"rgba(255,255,255,.04)"}}/>
          {[.25,.5,.75,1].map(i=>(<div key={"w"+i} style={{width:"12px",height:"12px",borderRadius:"2px",background:`rgba(46,170,111,${.18+i*.62})`}}/>))}
        </div>
        <div>→ Meer</div>
        <div style={{marginLeft:"auto"}}>Hover voor detail · klik voor dag-overzicht</div>
      </div>
    </div>

    {/* Maandkalender */}
    <div style={{background:"var(--glass)",borderRadius:"var(--radius-lg)",padding:"24px",border:"1px solid var(--border1)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
        <div style={{fontSize:"18px",fontWeight:700,letterSpacing:"-.02em",textTransform:"capitalize"}}>{monthName}</div>
        <div style={{display:"flex",gap:"4px"}}>
          <button onClick={()=>navMonth(-1)} style={{width:"32px",height:"32px",borderRadius:"8px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontSize:"16px"}}>‹</button>
          <button onClick={()=>navMonth(1)} style={{width:"32px",height:"32px",borderRadius:"8px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",cursor:"pointer",fontSize:"16px"}}>›</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr) 90px",gap:"6px"}}>
        {dowAbbr.map(d=>(<div key={d} style={{fontSize:"10px",color:"var(--text4)",textAlign:"center",textTransform:"uppercase",letterSpacing:".1em",fontWeight:600,padding:"4px 0"}}>{d}</div>))}
        <div style={{fontSize:"10px",color:"var(--gold)",textAlign:"center",textTransform:"uppercase",letterSpacing:".1em",fontWeight:600,padding:"4px 0"}}>Week</div>
        {weeks.map((wk,wi)=>{
          const wkPnl=wk.reduce((s,c)=>s+(c?.info?.pnl||0),0);
          const wkN=wk.filter(c=>c?.info).length;
          const wkT=wk.reduce((s,c)=>s+(c?.info?.count||c?.info?.n||0),0);
          return(<React.Fragment key={wi}>
            {wk.map((c,ci)=>{
              if(!c)return(<div key={ci} className="cal-day-cell empty"/>);
              const pnl=c.info?.pnl||0;
              const isWin=pnl>0,isLoss=pnl<0;
              const isBig=Math.abs(pnl)>100;

function Analytics({trades}){

    else if(r<=-1.5)rMultBuckets[1]++;
    else if(r<=-0.5)rMultBuckets[2]++;
    else if(r<0.25)rMultBuckets[3]++;
    else if(r<0.75)rMultBuckets[4]++;
    else if(r<1.25)rMultBuckets[5]++;
    else if(r<1.75)rMultBuckets[6]++;
    else if(r<2.5)rMultBuckets[7]++;

    else rMultBuckets[9]++;
  });
  const rMultHasData=rMultAll.length>0;

  // Expectancy

  // Long vs Short

  const longPnl=longs.reduce((s,t)=>s+parseFloat(t.pnl),0);const shortPnl=shorts.reduce((s,t)=>s+parseFloat(t.pnl),0);

  // Per pair
  const pairData={};closed.forEach(t=>{const p=(t.pair||"BTC/USDT").split("/")[0];if(!pairData[p])pairData[p]={n:0,pnl:0,w:0,l:0};pairData[p].n++;pairData[p].pnl+=parseFloat(t.pnl);parseFloat(t.pnl)>0?pairData[p].w++:pairData[p].l++});

  const lastIsWin=sortedClosed.length>0&&parseFloat(sortedClosed[sortedClosed.length-1].pnl)>0;

  // Layer analysis
  const layerSets={};const layerPairs={};const layerCounts={};
  closed.forEach(t=>{const layers=t.layers||[];if(layers.length>0){const summary=layers.map(l=>[l.timeframe,l.setup].filter(Boolean).join("+")).join(" → ");if(!layerSets[summary])layerSets[summary]={n:0,pnl:0,w:0};layerSets[summary].n++;layerSets[summary].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)layerSets[summary].w++}});

      <RMultDistChart trades={closed}/>
      {avgRMult!==null&&avgRMult<1&&<div style={{marginTop:"12px",padding:"8px 12px",background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.15)",borderRadius:"6px",fontSize:"11px",color:"var(--amber)"}}>💡 Gemiddeld R-multiple is onder 1R. Focus op het vasthouden van winnaars langer, of striktere SL op verliezers.</div>}
      {avgRMult!==null&&avgRMult>=2&&<div style={{marginTop:"12px",padding:"8px 12px",background:"rgba(46,170,111,0.08)",border:"1px solid rgba(46,170,111,0.15)",borderRadius:"6px",fontSize:"11px",color:"var(--green)"}}>✓ Uitstekend R-multiple gemiddelde. Je laat winnaars door.</div>}
    </div>)}

    {/* Rolling 20-trade edge — NEW */}
    {seq("rollingEdge",lp.rollingEdge!==false&&closed.length>=20,<div style={sectStyle}>
      {secH("Rolling 20-trade edge")}
      <div style={{marginBottom:"12px",fontSize:"12px",color:"var(--text3)"}}>Voortschrijdend gemiddelde over laatste 20 trades. Toont of je edge <strong>degradeert</strong> of <strong>verbetert</strong> — lifetime averages liegen.</div>
      <RollingEdgeChart trades={closed} window={20}/>
    </div>)}

    {/* Setup insights table — NEW, richer than old barchart */}
    {seq("setupInsights",lp.setupInsights!==false&&closed.length>0,<div style={sectStyle}>
      {secH("Setup insights · advies per setup")}
      <div style={{marginBottom:"12px",fontSize:"12px",color:"var(--text3)"}}>Minimaal 3 trades per setup. <em style={{color:"var(--text4)"}}>Klik op een rij om te filteren in Trades.</em></div>
      <SetupInsightsTable trades={closed}/>
    </div>)}



    {/* Long vs Short */}
    {seq("longShort",lp.longShort,<div style={sectStyle}>{secH("Long vs Short")}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
        {[["Long",longs,longPnl,"var(--green)"],["Short",shorts,shortPnl,"var(--red)"]].map(([label,ts,pnl2,color])=>{const w2=ts.filter(t=>parseFloat(t.pnl)>0).length;const l2=ts.filter(t=>parseFloat(t.pnl)<0).length;const wr2=ts.length?w2/ts.length*100:0;
          return(<div key={label} style={{background:"rgba(42,46,57,0.3)",borderRadius:"8px",padding:"16px",border:`1px solid ${color}25`}}>
            <div style={{fontSize:"12px",color,fontWeight:700,marginBottom:"8px"}}>{label}</div>
            <div style={{fontSize:"20px",fontFamily:"var(--mono)",fontWeight:700,color:pnl2>=0?"var(--green)":"var(--red)",marginBottom:"8px"}}>{pnl2>=0?"+":""}${fmt(pnl2)}</div>
            <div style={{fontSize:"11px",color:"var(--text3)"}}>{ts.length} trades · {wr2.toFixed(0)}% WR</div>
            <div style={{fontSize:"11px",color:"var(--text3)"}}>{w2}W / {l2}L</div>
          </div>);})}

    {/* Per day of week */}
    {seq("perDay",lp.perDay,<div style={sectStyle}>{secH("Performance per dag")}
      {(()=>{const maxAbs=Math.max(...Object.values(dayData).map(d=>Math.abs(d.pnl)),1);return Object.entries(dayData).filter(([,d])=>d.n>0).map(([day,d])=>barRow(day,d.w,d.l,d.pnl,maxAbs,"#C9A84C"))})()}
    </div>)}

    {/* Session performance */}
    {seq("sessionPerf",lp.sessionPerf&&Object.values(sessData).some(d=>d.n>0),<div style={sectStyle}>{secH("Sessie performance (CET)")}
      {(()=>{const maxAbs=Math.max(...Object.values(sessData).map(d=>Math.abs(d.pnl)),1);return ALL_SESSIONS.filter(s=>sessData[s].n>0).map(s=>{const d=sessData[s];const c=SESSION_COLORS[s];return barRow(s,d.w,d.l,d.pnl,maxAbs,c.text)})})()}

      {(()=>{

    {seq("streaks",lp.streaks,<div style={sectStyle}>{secH("Streaks")}

        <Stat label="Max. verliesreek" value={maxLoss+"×"} color="var(--red)"/>
        <Stat label="Consistentie" value={pct(closed.length?wins.length/closed.length*100:0)} sub="winrate overall"/>
      </div>
    </div>)}

    {/* R:R Analyse — ported from v4_14 */}
    {seq("rrAnalysis",lp.rrAnalysis,(()=>{
      const rrTrades=closed.filter(t=>{const e=parseFloat(t.entry);const sl=parseFloat(t.stopLoss);return e>0&&sl>0&&e!==sl}).map(t=>{
        const e=parseFloat(t.entry);const sl=parseFloat(t.stopLoss);const tp=parseFloat(t.takeProfit);const ex=parseFloat(t.exit);
        const risk=Math.abs(e-sl);const isLong=t.direction==="long";
        return{...t,plannedRR:tp>0?Math.abs(tp-e)/risk:null,realizedRR:ex>0?((isLong?ex-e:e-ex)/risk):null};
      });
      if(rrTrades.length<2)return(<div style={sectStyle}>{secH("R:R analyse")}<div style={{fontSize:"12px",color:"var(--text4)"}}>Vul entry + stop loss in op min. 2 trades om R:R-analyse te zien.</div></div>);
      const wP=rrTrades.filter(t=>t.plannedRR!==null);const wR=rrTrades.filter(t=>t.realizedRR!==null);
      const avgP=wP.length?wP.reduce((s,t)=>s+t.plannedRR,0)/wP.length:0;
      const avgR=wR.length?wR.reduce((s,t)=>s+t.realizedRR,0)/wR.length:0;
      const avgW=wR.filter(t=>t.realizedRR>0);const avgL=wR.filter(t=>t.realizedRR<=0);
      const avgRW=avgW.length?avgW.reduce((s,t)=>s+t.realizedRR,0)/avgW.length:0;
      const avgRL=avgL.length?avgL.reduce((s,t)=>s+t.realizedRR,0)/avgL.length:0;
      const rrBySetup={};rrTrades.forEach(t=>(t.setupTags||[]).forEach(s=>{if(!rrBySetup[s])rrBySetup[s]={n:0,realized:0,nR:0};rrBySetup[s].n++;if(t.realizedRR!==null){rrBySetup[s].realized+=t.realizedRR;rrBySetup[s].nR++}}));
      const rrByTF={};rrTrades.forEach(t=>(t.layers||[]).forEach(l=>{if(l.timeframe&&l.role==="Entry"){if(!rrByTF[l.timeframe])rrByTF[l.timeframe]={n:0,realized:0,nR:0};rrByTF[l.timeframe].n++;if(t.realizedRR!==null){rrByTF[l.timeframe].realized+=t.realizedRR;rrByTF[l.timeframe].nR++}}}));
      const rrRow=(label,avg,n)=>{const maxBar=4;const w=Math.min(Math.abs(avg)/maxBar,1)*100;const c=avg>=1.5?"var(--green)":avg>=1?"var(--amber)":avg>=0?"var(--gold)":"var(--red)";return(<div key={label} style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"6px"}}>
        <div style={{width:"90px",fontSize:"11px",color:"var(--text2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={label}>{label}</div>
        <div style={{flex:1,height:"20px",background:"rgba(255,255,255,0.06)",borderRadius:"3px",position:"relative",overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.max(w,3)}%`,background:`${c.replace("var(--","rgba(201,168,76,").replace(")",",0.3)")}`,borderRadius:"3px",background:c==="var(--green)"?"rgba(46,170,111,0.3)":c==="var(--red)"?"rgba(224,85,85,0.3)":"rgba(201,168,76,0.3)"}}/>
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:"8px",fontSize:"10px",fontFamily:"var(--mono)",color:c,fontWeight:700}}>{avg>=0?"+":""}{avg.toFixed(2)}R</div>
        </div>
        <div style={{width:"30px",fontSize:"9px",color:"var(--text4)",textAlign:"right",fontFamily:"var(--mono)"}}>{n}x</div>
      </div>)};
      return(<div style={sectStyle}>{secH("R:R analyse")}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"16px"}}>
          <Stat label="Gem. gepland" value={wP.length?avgP.toFixed(2)+"R":"–"} sub={wP.length+" trades"}/>
          <Stat label="Gem. gerealiseerd" value={wR.length?(avgR>=0?"+":"")+avgR.toFixed(2)+"R":"–"} color={avgR>=1?"var(--green)":avgR>=0?"var(--amber)":"var(--red)"} sub={wR.length+" trades"}/>
          <Stat label="Gem. Win R:R" value={avgW.length?"+"+avgRW.toFixed(2)+"R":"–"} color="var(--green)"/>
          <Stat label="Gem. Loss R:R" value={avgL.length?avgRL.toFixed(2)+"R":"–"} color="var(--red)"/>
        </div>
        {Object.keys(rrBySetup).filter(s=>rrBySetup[s].nR>0).length>0&&<div style={{marginBottom:"16px"}}>
          <div style={{fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",marginBottom:"8px",fontWeight:600}}>Per setup</div>
          {Object.entries(rrBySetup).filter(([,d])=>d.nR>0).sort((a,b)=>(b[1].realized/b[1].nR)-(a[1].realized/a[1].nR)).map(([s,d])=>rrRow(s,d.realized/d.nR,d.n))}
        </div>}
        {Object.keys(rrByTF).filter(s=>rrByTF[s].nR>0).length>0&&<div>
          <div style={{fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",marginBottom:"8px",fontWeight:600}}>Per entry-timeframe</div>
          {Object.entries(rrByTF).filter(([,d])=>d.nR>0).sort((a,b)=>(b[1].realized/b[1].nR)-(a[1].realized/a[1].nR)).map(([s,d])=>rrRow(s,d.realized/d.nR,d.n))}
        </div>}
      </div>);
    })())}

    {/* Holdtime analyse — ported from v4_14 */}
    {seq("holdtime",lp.holdtime&&tradeHold.length>0,(()=>{
      const buckets=[{l:"<15m",max:0.25},{l:"15m-1h",max:1},{l:"1-4h",max:4},{l:"4-24h",max:24},{l:">1d",max:Infinity}];
      const b=buckets.map(bk=>({...bk,n:0,pnl:0,w:0}));
      tradeHold.forEach(t=>{const idx=buckets.findIndex(bk=>t.h<=bk.max);const i=idx<0?buckets.length-1:idx;b[i].n++;b[i].pnl+=t.pnl;if(t.pnl>0)b[i].w++});
      const maxAbs=Math.max(...b.map(x=>Math.abs(x.pnl)),1);
      return(<div style={sectStyle}>{secH("Holdtijd analyse")}
        {b.filter(x=>x.n>0).map(x=>barRow(x.l,x.w,x.n-x.w,x.pnl,maxAbs,"#C9A84C"))}
      </div>);
    })())}

    {/* Uur heatmap — ported from v4_14 */}
    {seq("heatmap",lp.heatmap,(()=>{
      const hrs=Array(24).fill(0).map(()=>({n:0,pnl:0,w:0}));
      closed.forEach(t=>{const h=parseInt((t.time||"00:00").split(":")[0],10);if(isNaN(h))return;hrs[h].n++;hrs[h].pnl+=parseFloat(t.pnl);if(parseFloat(t.pnl)>0)hrs[h].w++});
      const maxAbs=Math.max(...hrs.map(h=>Math.abs(h.pnl)),1);
      return(<div style={sectStyle}>{secH("Uur heatmap (lokale tijd)")}
        <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:"3px"}}>
          {hrs.map((h,i)=>{const intensity=h.n>0?Math.min(Math.abs(h.pnl)/maxAbs,1):0;const bg=h.n===0?"rgba(255,255,255,0.03)":h.pnl>=0?`rgba(46,170,111,${0.15+intensity*0.5})`:`rgba(224,85,85,${0.15+intensity*0.5})`;const col=h.n===0?"var(--text5)":h.pnl>=0?"var(--green)":"var(--red)";return(
            <div key={i} title={`${String(i).padStart(2,"0")}:00 — ${h.n} trades${h.n?`, $${fmt(h.pnl)}, WR ${(h.w/h.n*100).toFixed(0)}%`:""}`} style={{height:"36px",borderRadius:"3px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontFamily:"var(--mono)",background:bg,color:col,fontWeight:h.n>0?600:400}}>{String(i).padStart(2,"0")}h</div>
          )})}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:"6px",fontSize:"9px",color:"var(--text4)"}}><span>Nacht</span><span>Ochtend</span><span>Middag</span><span>Avond</span></div>
      </div>);
    })())}

    {/* Layer analysis */}
    {seq("layerAnalysis",lp.layerAnalysis&&Object.keys(layerSets).length>0,<div style={sectStyle}>{secH("Setup lagen performance")}
      {(()=>{const maxAbs=Math.max(...Object.values(layerSets).map(d=>Math.abs(d.pnl)),1);return Object.entries(layerSets).sort((a,b)=>b[1].pnl-a[1].pnl).map(([summary,d])=>barRow(summary,d.w,d.n-d.w,d.pnl,maxAbs,"var(--purple)"))})()}
    </div>)}
    </div>
  </div>);
}

// ═══ Goals Progress Rings ═══
// Computes current-month metrics vs user-set goals; renders 3-4 animated SVG rings.
function GoalsRings({goals,trades,onEdit}){
  if(!goals)return null;
  const normalized=Array.isArray(goals.items)?goals:migrateGoals(goals);
  const items=(normalized.items||[]).filter(g=>g.enabled).map(g=>{
    const def=GOAL_METRICS.find(m=>m.id===g.metric)||GOAL_METRICS[0];
    const current=computeGoalMetric(g.metric,trades,g.period||"month");
    const target=parseFloat(g.target)||0;
    return{k:g.id,label:g.label||def.label,current,target,fmt:def.fmt,good:def.inverted?((c,t)=>c<=t):((c,t)=>c>=t),inverted:!!def.inverted};
  });
  if(items.length===0)return null;

  const Ring=({item})=>{
    const {current,target,inverted}=item;
    // Progress: normal = current/target. Inverted (DD): as current grows, progress goes down.
    let progress=target?(inverted?Math.max(0,1-current/target):Math.min(current/target,1.2)):0;
    if(progress<0)progress=0;
    const done=item.good(current,target);
    const cap=Math.min(progress,1);
    const color=done?"#2eaa6f":progress>.8?"#C9A84C":progress>.4?"#d4a853":"#e05555";
    const r=42,c=2*Math.PI*r;
    const offset=c*(1-cap);
    return(<div style={{flex:1,minWidth:"160px",background:"var(--glass)",border:"1px solid var(--border2)",borderRadius:"var(--radius-lg)",padding:"20px",textAlign:"center",position:"relative",overflow:"hidden",transition:"all .2s"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"1px",background:`linear-gradient(90deg,transparent,${color}80,transparent)`,opacity:.7}}/>
      <div style={{fontSize:"10px",color:"var(--text4)",textTransform:"uppercase",letterSpacing:".14em",fontWeight:700,marginBottom:"12px"}}>{item.label}</div>
      <div style={{position:"relative",width:"100px",height:"100px",margin:"0 auto 12px"}}>
        <svg viewBox="0 0 100 100" style={{width:"100%",height:"100%",transform:"rotate(-90deg)"}}>
          <circle cx="50" cy="50" r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="7"/>
          <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="7" strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset .6s cubic-bezier(.2,.8,.2,1),stroke .3s",filter:`drop-shadow(0 0 8px ${color}60)`}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{fontFamily:"var(--mono)",fontSize:"16px",fontWeight:800,color:color,lineHeight:1}}>{item.fmt(current)}</div>
          <div style={{fontSize:"9px",color:"var(--text5)",marginTop:"2px"}}>{done?"✓":Math.round(progress*100)+"%"}</div>
        </div>
      </div>
      <div style={{fontSize:"11px",color:"var(--text4)"}}>Doel: <span style={{color:"var(--text2)",fontFamily:"var(--mono)",fontWeight:600}}>{item.fmt(target||0)}</span></div>
    </div>);
  };

  return(<div style={{background:"var(--glass)",border:"1px solid var(--border2)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:"16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
      <div style={{fontSize:"11px",color:"var(--gold)",textTransform:"uppercase",letterSpacing:".12em",fontWeight:700}}>🎯 Maand-doelen</div>
      {onEdit&&<button onClick={onEdit} style={{padding:"4px 10px",borderRadius:"5px",border:"1px solid var(--border3)",background:"transparent",color:"var(--text3)",fontSize:"10px",fontWeight:600,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:".08em"}}>⚙ Bewerken</button>}
    </div>
    <div style={{display:"flex",gap:"12px",flexWrap:"wrap"}}>
      {items.map(it=>(<Ring key={it.k} item={it}/>))}
    </div>
  </div>);
}

// Animated number counter — counts up from 0 to value over 800ms
function AnimNum({value,prefix="",suffix="",abs=false,decimals}){
  const[display,setDisplay]=useState(0);
  const target=abs?Math.abs(value||0):(value||0);
  const dec=decimals!==undefined?decimals:(Math.abs(target)>=100?0:Math.abs(target)>=1?2:2);
  useEffect(()=>{
    let start=0,startTime=null,cancelled=false;
    const step=(ts)=>{
      if(!startTime)startTime=ts;
      const elapsed=ts-startTime;
      const progress=Math.min(elapsed/800,1);
      const eased=1-Math.pow(1-progress,3);
      setDisplay(start+(target-start)*eased);
      if(progress<1&&!cancelled)requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
    return()=>{cancelled=true};
  },[target]);
  return(<>{prefix}{display.toLocaleString("nl-NL",{minimumFractionDigits:dec,maximumFractionDigits:dec})}{suffix}</>);
}

function Sparkline({data,color="#2eaa6f"}){
  if(!data||data.length<2)return null;
  const min=Math.min(...data),max=Math.max(...data);
  const range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*60},${24-((v-min)/range)*22-1}`).join(" ");
  const ptsArea=`0,24 ${pts} 60,24`;
  return(<svg width="60" height="24" viewBox="0 0 60 24" style={{display:"block"}}>
    <polygon points={ptsArea} fill={color} opacity=".15"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5"/>
  </svg>);
}
