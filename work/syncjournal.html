<script>
/* ═══ Mock data (lifted from mock-data.js) ═══ */
const MOCK_TRADES = (() => {
  const pairs = ["EURUSD","GBPJPY","XAUUSD","BTCUSD","NAS100","US30","GBPUSD","ETHUSD","AUDUSD","SPX500"];
  const setups = ["Breakout","OB Retest","Range Fade","Trend Continuation","FVG Fill","Liquidity Sweep","VWAP Bounce","News Pop","H&S","Double Top"];
  const emotions = ["Kalm","Gefocust","FOMO","Ongeduld","Revenge","Zelfverzekerd","Twijfel","Euforie"];
  const sessions = ["Tokyo","London","NY","Off-session"];
  const list = [];
  const now = new Date("2026-04-24");
  for (let i = 0; i < 87; i++) {
    const d = new Date(now); d.setDate(d.getDate() - Math.floor(Math.random() * 45));
    const date = d.toISOString().split("T")[0];
    const rnd = Math.random();
    const isWin = rnd > 0.42;
    const pnl = isWin ? Math.round((Math.random() * 520 + 60)) : -Math.round((Math.random() * 280 + 40));
    const rr = isWin ? +(Math.random() * 2.5 + 0.8).toFixed(2) : +(-(Math.random() * 1 + 0.5)).toFixed(2);
    list.push({
      id: "t" + i,
      date,
      time: String(8 + Math.floor(Math.random() * 10)).padStart(2,"0")+":"+String(Math.floor(Math.random()*60)).padStart(2,"0"),
      pair: pairs[Math.floor(Math.random() * pairs.length)],
      side: Math.random() > 0.5 ? "long" : "short",
      pnl: String(pnl),
      rMultiple: rr,
      setupTags: [setups[Math.floor(Math.random() * setups.length)]],
      emotion: emotions[Math.floor(Math.random() * emotions.length)],
      session: sessions[Math.floor(Math.random() * sessions.length)],
      rating: Math.floor(Math.random() * 5) + 1,
      riskPct: +(Math.random() * 1.5 + 0.3).toFixed(2),
      notes: isWin ? "Plan gevolgd, entry op niveau." : "Te vroeg in, geen bevestiging afgewacht.",
    });
  }
  return list.sort((a,b) => (b.date+b.time).localeCompare(a.date+a.time));
})();

const fmt  = (n) => Math.abs(n).toLocaleString("nl-NL", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
const fmt2 = (n) => Math.abs(n).toLocaleString("nl-NL", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const pct  = (n) => n.toFixed(0) + "%";

function computeStats(trades) {
  const closed = trades.filter(t => t.pnl !== "" && !isNaN(parseFloat(t.pnl)));
  const wins = closed.filter(t => parseFloat(t.pnl) > 0);
  const losses = closed.filter(t => parseFloat(t.pnl) < 0);
  const totalPnl = closed.reduce((s,t) => s + parseFloat(t.pnl), 0);
  const gw = wins.reduce((s,t) => s + parseFloat(t.pnl), 0);
  const gl = Math.abs(losses.reduce((s,t) => s + parseFloat(t.pnl), 0));
  const wr = closed.length ? wins.length / closed.length * 100 : 0;
  const pf = gl > 0 ? gw / gl : (wins.length > 0 ? Infinity : 0);
  const avgWin = wins.length ? gw / wins.length : 0;
  const avgLoss = losses.length ? gl / losses.length : 0;
  const rr = avgLoss > 0 ? avgWin / avgLoss : 0;
  const expectancy = closed.length ? (wr/100 * avgWin) - ((1 - wr/100) * avgLoss) : 0;
  const byDay = {};
  closed.forEach(t => { byDay[t.date] = (byDay[t.date] || 0) + parseFloat(t.pnl); });
  const daysDesc = Object.keys(byDay).sort().reverse();
  let streak = 0;
  for (const d of daysDesc) { if (byDay[d] > 0) streak++; else break; }
  const daysAsc = Object.keys(byDay).sort();
  let cum = 0;
  const equity = daysAsc.map(d => { cum += byDay[d]; return { date: d, cum }; });
  const now = new Date("2026-04-24");
  const thisMonth = closed.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  });
  const monthPnl = thisMonth.reduce((s,t) => s + parseFloat(t.pnl), 0);
  const setupMap = {};
  closed.forEach(t => (t.setupTags || []).forEach(s => {
    if (!setupMap[s]) setupMap[s] = { n:0, w:0, pnl:0 };
    setupMap[s].n++;
    setupMap[s].pnl += parseFloat(t.pnl);
    if (parseFloat(t.pnl) > 0) setupMap[s].w++;
  }));
  const setupList = Object.entries(setupMap).map(([k,v]) => ({ name:k, ...v, wr: v.n ? v.w/v.n*100 : 0 })).sort((a,b) => b.pnl - a.pnl);
  return { closed, wins, losses, totalPnl, gw, gl, wr, pf, avgWin, avgLoss, rr, expectancy, byDay, equity, streak, thisMonth, monthPnl, setupList };
}

function greeting() {
  const h = new Date().getHours();
  return h < 12 ? "Goedemorgen" : h < 18 ? "Goedemiddag" : "Goedenavond";
}

function sparklinePath(data, w, h, pad = 2) {
  if (!data || data.length < 2) return "";
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = (w - pad*2) / (data.length - 1);
  return data.map((v, i) => {
    const x = pad + i * step;
    const y = h - pad - ((v - min) / range) * (h - pad*2);
    return (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);
  }).join(" ");
}
</script>

<script type="text/babel" data-presets="react">
/* ═══ Components — all inline, single scope ═══ */
const { useState, useEffect, useRef, useContext, useMemo, createContext } = React;

// ──────────────── Sparkline ───────────────────
function Sparkline({ data, width = 120, height = 32, color = "#C9A84C", fill = true }) {
  if (!data || data.length < 2) return null;
  const path = sparklinePath(data, width, height, 3);
  const last = data[data.length-1];
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = (width - 6) / (data.length - 1);
  const lastX = 3 + (data.length-1) * step;
  const lastY = height - 3 - ((last - min) / range) * (height - 6);
  const gradId = "sg-" + Math.random().toString(36).slice(2,8);
  return (
    <svg width={width} height={height} style={{display:"block"}}>
      {fill && (
        <>
          <defs>
            <linearGradient id={gradId} x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={path + ` L${(width-3).toFixed(1)},${height-3} L3,${height-3} Z`} fill={`url(#${gradId})`}/>
        </>
      )}
      <path d={path} stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={lastX} cy={lastY} r="2.5" fill={color}/>
    </svg>
  );
}

// ──────────────── EquityChart ───────────────────
function EquityChart({ data, height = 220, accent = "#C9A84C" }) {
  const ref = useRef(null);
  const [w, setW] = useState(600);
  useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(entries => { for (const e of entries) setW(e.contentRect.width); });
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);
  if (!data || data.length < 2) return null;
  const vals = data.map(d => d.cum);
  const min = Math.min(0, ...vals), max = Math.max(0, ...vals);
  const range = max - min || 1;
  const pad = { l: 44, r: 16, t: 16, b: 28 };
  const plotW = Math.max(100, w - pad.l - pad.r);
  const plotH = height - pad.t - pad.b;
  const step = plotW / (data.length - 1);
  const toY = v => pad.t + plotH - ((v - min) / range) * plotH;
  const path = data.map((d,i) => (i===0 ? "M" : "L") + (pad.l + i*step).toFixed(1) + "," + toY(d.cum).toFixed(1)).join(" ");
  const zeroY = toY(0);
  const gridTicks = 4;
  const tickVals = Array.from({length:gridTicks+1}, (_,i) => min + (range * i / gridTicks));
  return (
    <div ref={ref} style={{width:"100%"}}>
      <svg width={w} height={height} style={{display:"block"}}>
        <defs>
          <linearGradient id="eq-fill" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor={accent} stopOpacity="0.22"/>
            <stop offset="100%" stopColor={accent} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {tickVals.map((v,i) => (
          <g key={i}>
            <line x1={pad.l} x2={pad.l+plotW} y1={toY(v)} y2={toY(v)} stroke="rgba(255,255,255,.04)" strokeDasharray="2 4"/>
            <text x={pad.l-8} y={toY(v)+3} fill="rgba(255,255,255,.3)" fontSize="9.5" textAnchor="end" fontFamily="var(--mono)">{(v>=0?"+":"-")+"$"+fmt(Math.abs(v))}</text>
          </g>
        ))}
        {min < 0 && <line x1={pad.l} x2={pad.l+plotW} y1={zeroY} y2={zeroY} stroke="rgba(255,255,255,.12)"/>}
        <path d={path + ` L${(pad.l+plotW).toFixed(1)},${zeroY.toFixed(1)} L${pad.l.toFixed(1)},${zeroY.toFixed(1)} Z`} fill="url(#eq-fill)"/>
        <path d={path} stroke={accent} strokeWidth="1.75" fill="none" strokeLinejoin="round" strokeLinecap="round"/>
        {data.map((d,i) => i % Math.max(1, Math.floor(data.length/6)) === 0 && (
          <text key={i} x={pad.l + i*step} y={height-8} fill="rgba(255,255,255,.3)" fontSize="9" textAnchor="middle" fontFamily="var(--mono)">{d.date.slice(5).replace("-","/")}</text>
        ))}
      </svg>
    </div>
  );
}

// ──────────────── Shell hooks ───────────────────
const DemoContext = createContext(null);

function useBtcTicker() {
  const [btc, setBtc] = useState(() => ({
    price: 67420.50, change: 0, pct: 0, flash: null,
    history: Array.from({length:30},(_,i)=>67200 + Math.sin(i/4)*180 + Math.random()*60),
  }));
  useEffect(() => {
    const id = setInterval(() => {
      setBtc(prev => {
        const drift = (Math.random() - 0.48) * 85;
        const next = Math.max(65000, Math.min(70000, prev.price + drift));
        const dir = next > prev.price ? "up" : next < prev.price ? "down" : null;
        return {
          price: next,
          change: next - 67420.50,
          pct: ((next - 67420.50)/67420.50) * 100,
          history: [...prev.history.slice(-29), next],
          flash: dir,
        };
      });
    }, 1500);
    return () => clearInterval(id);
  }, []);
  return btc;
}

function useLiveClock() {
  const [t, setT] = useState(() => new Date());
  useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return t;
}

// Session detector based on UTC hour (Tokyo / London / NY / Off)
function getSession(date) {
  const h = date.getUTCHours();
  if (h >= 0 && h < 7) return "TOKYO";
  if (h >= 7 && h < 12) return "LONDON";
  if (h >= 12 && h < 21) return "NEW YORK";
  return "OFF-SESSION";
}

// ──────────────── Nav items (horizontal topbar tabs) ───────────────────
const NAV = [
  { id:"dashboard", label:"Dashboard" },
  { id:"trades", label:"Trades" },
  { id:"new", label:"Nieuwe trade", accent:true },
  { id:"calendar", label:"Kalender" },
  { id:"analytics", label:"Analyse" },
  { id:"goals", label:"Doelen" },
  { id:"mindset", label:"Mindset" },
  { id:"accounts", label:"Accounts" },
];

// ──────────────── Status bar ───────────────────
function AppStatusBar() {
  const btc = useBtcTicker();
  const time = useLiveClock();
  const btcUp = btc.change >= 0;
  const [pulse, setPulse] = useState(true);
  useEffect(()=>{ const id = setInterval(()=>setPulse(p=>!p), 800); return ()=>clearInterval(id); },[]);
  const timeStr = time.toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const dateStr = time.toLocaleDateString("nl-NL",{day:"2-digit",month:"short",year:"numeric"}).toUpperCase();
  const session = getSession(time);

  return (
    <div style={{height:32,display:"flex",alignItems:"center",gap:0,padding:"0 24px",borderBottom:"1px solid rgba(201,168,76,.14)",background:"rgba(10,12,18,.9)",fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)",overflow:"hidden",whiteSpace:"nowrap"}}>
      <span style={{color:"#2eaa6f",fontWeight:700,marginRight:14,opacity:pulse?1:.45,transition:"opacity .3s"}}>● LIVE</span>
      <span style={{marginRight:22}}>{timeStr} CET · {dateStr}</span>
      <span style={{marginRight:22}}>SESSION <span style={{color:"#C9A84C"}}>{session}</span></span>
      <span style={{marginRight:22}}>BAL <span style={{color:"#fff"}}>$14,827</span></span>
      <span style={{marginRight:22}}>DD <span style={{color:"#e05555"}}>-$340</span></span>
      <span style={{marginRight:22}}>RISK TODAY <span style={{color:"#C9A84C"}}>1.2%</span></span>
      <span style={{marginRight:22,display:"inline-flex",alignItems:"center",gap:6}}>
        <span style={{color:"#f7931a",fontWeight:700}}>₿ BTC</span>
        <span className="mono" style={{color:btc.flash==="up"?"#2eaa6f":btc.flash==="down"?"#e05555":"#fff",fontWeight:700,transition:"color .2s"}}>${btc.price.toLocaleString("en-US",{maximumFractionDigits:0})}</span>
        <span style={{color:btcUp?"#2eaa6f":"#e05555",fontSize:10}}>{btcUp?"▲":"▼"} {btc.pct.toFixed(2)}%</span>
      </span>
      <span style={{marginRight:22,display:"inline-flex",alignItems:"center",gap:6,opacity:.8}}>
        <span style={{color:"#627eea",fontWeight:700}}>Ξ ETH</span>
        <span className="mono" style={{color:"#fff",fontWeight:600}}>$3,248</span>
        <span style={{color:"#2eaa6f",fontSize:10}}>▲ 1.12%</span>
      </span>
      <span style={{marginLeft:"auto",color:"#C9A84C"}}>⚡ 2 opens · 1 pending</span>
    </div>

<script type="text/babel" data-presets="react">
/* ═══ TRADES ═══ */
function ScreenTrades() {
  const { setTab } = useContext(DemoContext);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all");
  const [sortField, setSortField] = useState("date");
  const [sortDir, setSortDir] = useState("desc");
  const [selected, setSelected] = useState(new Set());

  let list = MOCK_TRADES.filter(t => t.pnl !== "" && !isNaN(parseFloat(t.pnl)));
  if (filter === "wins") list = list.filter(t => parseFloat(t.pnl) > 0);
  if (filter === "losses") list = list.filter(t => parseFloat(t.pnl) < 0);
  if (filter === "long") list = list.filter(t => t.side === "long");
  if (filter === "short") list = list.filter(t => t.side === "short");
  if (search) list = list.filter(t =>
    t.pair.toLowerCase().includes(search.toLowerCase()) ||
    (t.setupTags||[]).some(x=>x.toLowerCase().includes(search.toLowerCase()))
  );
  list = [...list].sort((a,b) => {
    let av, bv;
    if (sortField === "date") { av=a.date+a.time; bv=b.date+b.time; }
    else if (sortField === "pnl") { av=parseFloat(a.pnl); bv=parseFloat(b.pnl); }
    else if (sortField === "r") { av=a.rMultiple; bv=b.rMultiple; }
    else if (sortField === "pair") { av=a.pair; bv=b.pair; }
    else { av=a[sortField]; bv=b[sortField]; }
    if (av < bv) return sortDir==="desc" ? 1 : -1;
    if (av > bv) return sortDir==="desc" ? -1 : 1;
    return 0;
  });
  const totalPnl = list.reduce((s,t)=>s+parseFloat(t.pnl),0);
  const wins = list.filter(t=>parseFloat(t.pnl)>0).length;
  const wr = list.length ? wins/list.length*100 : 0;
  const toggleSort = (f) => {
    if (sortField === f) setSortDir(d => d==="desc"?"asc":"desc");
    else { setSortField(f); setSortDir("desc"); }
  };
  const toggleSelect = (id) => setSelected(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const FILTER_CHIPS = [
    { k:"all", l:"Alle", c:list.length },
    { k:"wins", l:"Winners", c:MOCK_TRADES.filter(t=>parseFloat(t.pnl)>0).length },
    { k:"losses", l:"Losers", c:MOCK_TRADES.filter(t=>parseFloat(t.pnl)<0).length },
    { k:"long", l:"Long", c:MOCK_TRADES.filter(t=>t.side==="long").length },
    { k:"short", l:"Short", c:MOCK_TRADES.filter(t=>t.side==="short").length },
  ];
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        <SumCard label="TOTAL P&L" value={(totalPnl>=0?"+":"-")+"$"+fmt(Math.abs(totalPnl))} color={totalPnl>=0?"#2eaa6f":"#e05555"}/>
        <SumCard label="TRADES" value={list.length} color="#fff"/>
        <SumCard label="WIN RATE" value={wr.toFixed(1)+"%"} color={wr>=50?"#2eaa6f":"#e05555"}/>
        <SumCard label="SELECTED" value={selected.size} color="#C9A84C" sub={selected.size?"bulk actions →":"klik om trades te selecteren"}/>
      </div>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {FILTER_CHIPS.map(f => (
            <button key={f.k} onClick={()=>setFilter(f.k)} style={{padding:"7px 13px",borderRadius:9,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",background:filter===f.k?"rgba(201,168,76,.16)":"rgba(255,255,255,.02)",border:"1px solid "+(filter===f.k?"rgba(201,168,76,.35)":"rgba(255,255,255,.06)"),color:filter===f.k?"#C9A84C":"var(--text3)"}}>
              {f.l} <span style={{fontFamily:"var(--mono)",fontSize:10,opacity:.7,marginLeft:4}}>{f.c}</span>
            </button>
          ))}

<script type="text/babel" data-presets="react">
/* ═══ CALENDAR ═══ */
function ScreenCalendar() {
  const { setTab } = useContext(DemoContext);
  const [monthOffset, setMonthOffset] = useState(0);
  const [selectedDay, setSelectedDay] = useState(null);
  const s = computeStats(MOCK_TRADES);
  const today = new Date("2026-04-24");
  const view = new Date(today);
  view.setMonth(view.getMonth() + monthOffset);
  const year = view.getFullYear(), month = view.getMonth();
  const monthName = view.toLocaleString("nl-NL",{month:"long",year:"numeric"});
  const firstDay = new Date(year, month, 1);
  const startDow = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const byDay = {};
  s.closed.forEach(t => { byDay[t.date] = (byDay[t.date]||0) + parseFloat(t.pnl); });
  const countByDay = {};
  s.closed.forEach(t => { countByDay[t.date] = (countByDay[t.date]||0) + 1; });
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    cells.push({ d, dateStr, pnl: byDay[dateStr]||0, n: countByDay[dateStr]||0 });
  }
  while (cells.length % 7 !== 0) cells.push(null);
  const monthCells = cells.filter(c=>c);
  const monthPnl = monthCells.reduce((s,c)=>s+c.pnl,0);
  const monthTrades = monthCells.reduce((s,c)=>s+c.n,0);
  const winDays = monthCells.filter(c=>c.pnl>0).length;
  const tradingDays = monthCells.filter(c=>c.n>0).length;
  const colorFor = (pnl) => {
    if (pnl === 0) return { bg:"rgba(255,255,255,.02)", border:"rgba(255,255,255,.04)" };
    if (pnl > 0) { const a = Math.min(0.35, 0.08 + pnl/1500); return { bg:`rgba(46,170,111,${a})`, border:"rgba(46,170,111,.35)" }; }
    const a = Math.min(0.35, 0.08 + Math.abs(pnl)/1200);
    return { bg:`rgba(224,85,85,${a})`, border:"rgba(224,85,85,.35)" };
  };
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:16}}>
        <SumCard label="MAAND P&L" value={(monthPnl>=0?"+":"-")+"$"+fmt(Math.abs(monthPnl))} color={monthPnl>=0?"#2eaa6f":"#e05555"}/>
        <SumCard label="TRADING DAYS" value={tradingDays} color="#fff" sub={`van ${daysInMonth} dagen`}/>
        <SumCard label="GROENE DAGEN" value={winDays+"/"+tradingDays} color="#2eaa6f"/>
        <SumCard label="TRADES" value={monthTrades} color="#C9A84C"/>
        <SumCard label="AVG/DAY" value={tradingDays?(monthPnl/tradingDays>=0?"+":"-")+"$"+fmt(Math.abs(monthPnl/tradingDays)):"—"} color={monthPnl>=0?"#2eaa6f":"#e05555"}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 280px",gap:14}}>
        <div className="card-accent" style={{background:"rgba(14,17,24,.72)",border:"1px solid rgba(201,168,76,.12)",borderRadius:12,padding:"18px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={()=>setMonthOffset(m=>m-1)} className="tjv-btn ghost" style={{padding:"5px 10px",fontSize:12}}>‹</button>
              <div style={{fontFamily:"var(--display)",fontSize:20,fontWeight:700,textTransform:"capitalize",minWidth:200,textAlign:"center"}}>{monthName}</div>
              <button onClick={()=>setMonthOffset(m=>m+1)} className="tjv-btn ghost" style={{padding:"5px 10px",fontSize:12}}>›</button>
              <button onClick={()=>setMonthOffset(0)} className="tjv-btn ghost" style={{padding:"5px 10px",fontSize:11}}>Vandaag</button>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,fontSize:10,color:"var(--text4)",fontFamily:"var(--mono)"}}>
              <span>Legenda:</span>
              <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"rgba(46,170,111,.35)",borderRadius:2}}/>winst</span>
              <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:"rgba(224,85,85,.35)",borderRadius:2}}/>verlies</span>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:6}}>
            {["Ma","Di","Wo","Do","Vr","Za","Zo"].map(d => (<div key={d} style={{textAlign:"center",fontSize:10,color:"var(--text4)",fontFamily:"var(--mono)",letterSpacing:".15em",fontWeight:700,padding:"4px 0"}}>{d}</div>))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
            {cells.map((c,i)=>{
              if (!c) return <div key={i} style={{aspectRatio:"1.15",background:"rgba(255,255,255,.01)",borderRadius:8}}/>;
              const color = colorFor(c.pnl);
              const isToday = c.dateStr === "2026-04-24";
              const isSelected = selectedDay === c.dateStr;
              return (
                <button key={i} onClick={()=>setSelectedDay(c.dateStr)} style={{aspectRatio:"1.15",background:color.bg,border:"1px solid "+(isSelected?"#C9A84C":isToday?"#C9A84C":color.border),borderRadius:8,padding:"6px 8px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",color:"#fff",display:"flex",flexDirection:"column",justifyContent:"space-between",position:"relative",transition:"all .15s",boxShadow:isSelected?"0 0 0 2px rgba(201,168,76,.25)":undefined}}>
                  <div style={{fontSize:12,fontWeight:isToday?800:600,color:isToday?"#C9A84C":"#fff"}}>{c.d}</div>
                  {c.n > 0 && (
                    <div>
                      <div className="mono" style={{fontSize:11,fontWeight:700,color:c.pnl>=0?"#2eaa6f":"#e05555"}}>{(c.pnl>=0?"+":"-")+"$"+fmt(Math.abs(c.pnl))}</div>
                      <div style={{fontSize:9,color:"var(--text5)",fontFamily:"var(--mono)",marginTop:2}}>{c.n} trade{c.n!==1?"s":""}</div>
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {selectedDay ? (() => {
            const dayTrades = s.closed.filter(t => t.date === selectedDay);

</script>

<script type="text/babel" data-presets="react">
/* ═══ ROOT APP ═══ */
const SCREENS = {
  dashboard: ScreenDashboard,
  trades:    ScreenTrades,
  new:       ScreenNewTrade,
  calendar:  ScreenCalendar,
  analytics: ScreenAnalytics,
  goals:     ScreenGoals,
  mindset:   ScreenMindset,
  accounts:  ScreenAccounts,
};

function App(){
  const [tab, setTab] = useState("dashboard");
  const S = SCREENS[tab] || SCREENS.dashboard;
  const ctx = useMemo(()=>({tab, setTab}),[tab]);
  return (
    <DemoContext.Provider value={ctx}>
      <AppTopbar/>
      <AppStatusBar/>
      <div className="app-scroll" key={tab}>
        <div className="screen-fade">
          {S ? <S/> : <div style={{color:"#888",padding:40,fontFamily:"var(--mono)"}}>Screen "{tab}" not found.</div>}
        </div>
      </div>
    </DemoContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
