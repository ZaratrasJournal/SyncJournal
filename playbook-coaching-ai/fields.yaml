# Field-definities voor research per item (journal of framework).
# detail_level: brief = 1-zin / moderate = 2-4 zinnen / detailed = paragraaf
# uncertain: vul tijdens deep-research als dit dimension lastig te verifieren is

categories:
  # ─── 1. BASIS INFO (alleen voor journals) ───
  basis:
    label: "Basis"
    fields:
      - name: founded
        description: "Jaartal launch"
        detail_level: brief
      - name: target_market
        description: "Pro-traders / retail / educatie / hybride. Geographic focus."
        detail_level: brief
      - name: pricing_model
        description: "Free / freemium / subscription / one-time. Prijspunten."
        detail_level: moderate

  # ─── 2. AI-FEATURES (kern) ───
  ai_features:
    label: "AI-Features"
    fields:
      - name: feature_name
        description: "Naam zoals gemarket (Cypher AI / Edge Finder / Zella AI / etc)."
        detail_level: brief
      - name: ai_scope
        description: "Per-trade / per-period / per-playbook / per-portfolio. Welke unit krijgt analyse?"
        detail_level: moderate
      - name: ai_proactive_vs_reactive
        description: "Push (scheduled/auto-trigger) / pull (user-prompted button) / hybrid. Cruciaal voor onze UX-keuze."
        detail_level: moderate
      - name: ai_minimum_trade_threshold
        description: "Minimum sample size voor zinvolle output. Cold-start probleem!"
        detail_level: brief
      - name: ai_underlying_tech
        description: "Claude API / OpenAI / own-LLM / classical-ML / niet bekend. Affecteert privacy + portability."
        detail_level: brief
      - name: output_format
        description: "Text / structured-cards / charts / voice / chat. Hoe presenteert het AI z'n output?"
        detail_level: moderate
      - name: notable_prompts
        description: "Voorbeelden van AI-vraagstellingen die de tool uitvoert. Bron voor onze eigen prompt-design."
        detail_level: detailed
        uncertain: true   # vaak alleen via marketing-pagina zichtbaar

  # ─── 3. PLAYBOOK & SETUP-LEVEL (DE GAP) ───
  playbook_depth:
    label: "Playbook & Setup-Level"
    fields:
      - name: playbook_concept_maturity
        description: "enum: none / tag-only / named-strategy / structured-rules / rule-adherence-scored / AI-coached. Maturiteit van het playbook-systeem."
        detail_level: moderate
      - name: setup_level_ai
        description: "Doet de AI iets unique op setup-niveau (niet alleen per-trade)? Concrete voorbeelden?"
        detail_level: detailed
      - name: rule_adherence_scoring
        description: "Heeft het journal 'did you follow your playbook?' als gequantificeerde metric? Hoe?"
        detail_level: moderate
      - name: pre_trade_validation
        description: "Pressure-test setup VÓÓR entry (niet post-mortem). Green-field of bestaat al?"
        detail_level: moderate
      - name: playbook_template_library
        description: "Pre-built playbook templates (FVG, VWAP bounce, etc) shipped?"
        detail_level: brief

  # ─── 4. PRIVACY & STACK ───
  privacy_stack:
    label: "Privacy & Stack"
    fields:
      - name: privacy_model
        description: "Own_API_key supported / vendor_hosted only / hybrid. Data-residency."
        detail_level: moderate
      - name: data_residency
        description: "Waar slaat het trade-data op? Cloud / lokaal / own-server?"
        detail_level: brief
      - name: cost_per_month_user
        description: "Wat betaalt USER netto voor AI-features? (incl. eigen API-key kosten als die nodig zijn)"
        detail_level: moderate

  # ─── 5. CRYPTO-FIT (defensible niche) ───
  crypto_fit:
    label: "Crypto-Fit"
    fields:
      - name: crypto_perp_exchange_support
        description: "Lijst native exchanges. Hyperliquid? Blofin? MEXC? OKX? Bybit? Binance?"
        detail_level: moderate
      - name: multi_asset
        description: "Stocks / futures / forex / crypto-spot / crypto-perp / opties — welke?"
        detail_level: brief
      - name: partial_close_awareness
        description: "Begrijpt het AI-systeem multi-TP partial-closes? First-class concept of edge-case?"
        detail_level: moderate
      - name: funding_rate_context
        description: "Voedt funding-rate / liquidation-context in per-setup analyse? (crypto-specific)"
        detail_level: brief
      - name: gap_session_breakdown_per_setup
        description: "Berekent 'BOS+FVG: 62% WR London vs 38% NY' automatisch per playbook? KILLER feature."
        detail_level: moderate

  # ─── 6. COACHING DIEPTE ───
  coaching_depth:
    label: "Coaching Depth"
    fields:
      - name: coaching_depth_level
        description: "surface_metrics (alleen cijfers) vs deep_pattern_analysis (causale verklaring + actie)."
        detail_level: moderate
      - name: psychology_metrics
        description: "Lijst: Tiltmeter / emotion-tags / discipline-score / revenge-detection / FOMO-tag / etc."
        detail_level: moderate
      - name: voice_journaling
        description: "Voice-input voor pre-/post-trade reflectie?"
        detail_level: brief
      - name: mentor_mode
        description: "Kunnen coaches / community-leden andermans stats reviewen?"
        detail_level: brief

  # ─── 7. COMMUNITY ───
  community:
    label: "Community"
    fields:
      - name: community_driven_ai
        description: "Gebruiken users dezelfde AI-features collectief? Templates delen, shared insights?"
        detail_level: moderate
      - name: changelog_ai_velocity
        description: "Datum laatste AI-feature-release. Hoe actief ontwikkelen ze AI?"
        detail_level: brief

  # ─── 8. FRAMEWORK-SPECIFIEK (alleen voor coaching-framework items) ───
  framework_specifics:
    label: "Framework (alleen frameworks-items)"
    fields:
      - name: author
        description: "Author + key book/work"
        detail_level: brief
      - name: core_principle
        description: "Kern-idee in 2-3 zinnen. Wat probeert dit framework op te lossen?"
        detail_level: moderate
      - name: translation_to_ai_prompts
        description: "Hoe vertaal je dit framework naar concrete AI-prompts? Specifieke vragen die de AI moet stellen."
        detail_level: detailed
      - name: best_fit_scope
        description: "Per-trade / periodic / setup-level. Welke scope past dit framework het beste?"
        detail_level: moderate

uncertain_fields_global:
  # Velden die vaak lastig publiek te verifieren zijn — markeer in deep-research als bekend
  - notable_prompts
  - ai_underlying_tech
  - cost_per_month_user
  - changelog_ai_velocity
