topic: "Playbook-coaching AI in trading journals — concurrent-analyse + framework-translatie voor TradeJournal v1-spec"

items:
  # ─── Tier 1: TOP-RELEVANT (directe competitors / inspiration) ───
  - name: TradeOS
    url: https://wyckofflabs.com/
    tier: 1
    why: "Meest directe concurrent — exact dezelfde crypto-perp exchanges als Denny (Blofin, Hyperliquid, MEXC, FTMO). AI is per-trade — playbook-niveau is hun gap."

  - name: JournalPlus
    url: https://journalplus.co/
    tier: 1
    why: "Sterkste playbook-AI implementatie gevonden. Playbook attach + rule-compliance scored + NL-chat. CSV-only, geen crypto-perp."

  - name: TraderSync (Cypher AI)
    url: https://tradersync.com/cypher/
    tier: 1
    why: "Enige journal met geshipte proactive AI-coach (Elite $79.95/mo). Per-strategy WR/expectancy + push-notificaties. Vereist 100+ trades."

  - name: TradeJournal.AI
    url: https://tradejournal.ai/
    tier: 1
    why: "Enige met pre-trade pressure-test knop ('Ask AI op deze setup vóór entry'). Green-field opportunity die niemand anders heeft."

  - name: RizeTrade
    url: https://rizetrade.com/
    tier: 1
    why: "Playbook als checklist + rule-follow scoring per trade. Geen AI, maar de foundation die elke AI nodig heeft."

  - name: MRT Journal
    url: https://mrtjournal.com/
    tier: 1
    why: "Enige journal die expliciet Claude API gebruikt. Inspiration voor onze stack-keuze (eigen API-key vs shared Worker)."

  - name: Tradingtick
    url: https://tradingtick.com/
    tier: 1
    why: "Free forever met Playbook Builder + pre-launch AI. 101 psychology quizzes + XP-streaks gamification. Lifetime-pro early bird model."

  # ─── Tier 2: GOOD CONTEXT (gevestigde spelers + AI-claims) ───
  - name: Tradezella
    url: https://www.tradezella.com/
    tier: 2
    why: "Marktleider. Zella AI is gepromoot maar nog niet geshipped (waitlist mei 2026). Zella Score + playbook-templates relevant."

  - name: Edgewonk
    url: https://edgewonk.com/
    tier: 2
    why: "Edge Finder (algorithmic pattern detection, weekly email Jan 2026). Tiltmeter voor psychology. Geen generative AI."

  - name: TradesViz
    url: https://www.tradesviz.com/
    tier: 2
    why: "Hyperliquid native support (zeldzaam). AI Chat + AI Q&A (NL→DB queries). 600+ stats. Analyst-style i.p.v. coaching."

  - name: Trader's Second Brain (TSB)
    url: https://traderssecondbrain.com/
    tier: 2
    why: "TSB Expert markets AI Trading Coach met setup-specific pattern recognition. Onafhankelijke claim, te verifieren."

  - name: Plancana
    url: https://plancana.com/
    tier: 2
    why: "iOS-first (4.7★). AI-generated rules + emotional pattern detection. Psychology-focused alternatief."

  - name: Process Trader
    url: https://processtrader.com/
    tier: 2
    why: "'First AI journal that cares about why you trade'. Voice transcription + pre-market routines + hard rules. Process-discipline angle."

  # ─── Tier 3: REFERENCE (compleetheid) ───
  - name: Tradervue
    url: https://www.tradervue.com/
    tier: 3
    why: "Gevestigde tag-based, beperkte AI. Goede referentie voor traditionele journaling-flows."

  - name: Chartlog
    url: https://chartlog.com/
    tier: 3
    why: "Strategy rules + AI-feedback. Minder pubblicke detail, snelle scan."

  - name: MM Platinum
    url: https://www.minervini.com/mm-platinum
    tier: 3
    why: "Mark Minervini's journal, methodology-driven. US-stocks focus."

  - name: Deltalytix
    url: https://www.deltalytix.app/
    tier: 3
    why: "Nieuwere AI-native speler met open GitHub repo (interesse: hoe bouwen ze AI?)."

  - name: TradeFuse
    url: https://tradefuse.app/
    tier: 3
    why: "Real-time broker import + Compare & Conquer multi-metric. Freemium. AI-insights light."

  - name: Trader Sage
    url: https://tradersage.ai/
    tier: 3
    why: "US-broker focus (IBKR/Schwab/Fidelity/Tasty). Generic AI-insights."

  - name: Tradexis
    url: https://www.tradexis.ai/
    tier: 3
    why: "R-multiple en expectancy optimization focus. Beperkt publiek detail."

  # ─── Coaching Frameworks (vertaalbron voor AI-prompts) ───
  - name: Mark Douglas — Trading in the Zone
    url: https://www.amazon.com/Trading-Zone-Confidence-Discipline-Attitude/dp/0735201447
    tier: 1
    why: "Probabilities mindset + emotional consistency. AI-prompts kunnen probabilistische framing afdwingen."

  - name: Van Tharp — System Development
    url: https://www.vantharp.com/
    tier: 2
    why: "R-multiples, position sizing, system development. Quantitative coaching-framework dat goed past bij AI-analyse."

  - name: Brett Steenbarger — Solution-focused
    url: https://traderfeed.blogspot.com/
    tier: 1
    why: "Best Trade of Week / solution-focused reviews. AI-prompt-template: 'wat maakte dit pivotal?'. Past op onze backlog 🧠-features."

  - name: Mike Bellafiore — One Good Trade (SMB)
    url: https://www.smbtraining.com/
    tier: 2
    why: "Big Picture / Tape / Intuition framework. Drie-laagse pre-trade-validatie die we al deels in playbook hebben."

  # ─── AI/LLM Patronen (gap-analyse) ───
  - name: Per-trade autopsy pattern
    tier: 2
    why: "Bestaande implementaties: TraderSync, TradeJournal.AI, MRT. Onze 🥇 backlog. Wat is de stand van de art?"

  - name: Setup/playbook-level coaching pattern
    tier: 1
    why: "DE GAP die we onderzoeken. Wie doet wat? Welke proactive-vs-reactive aanpak? Pre-trade vs post-trade?"

  - name: Pre-trade validation pattern
    tier: 1
    why: "Alleen TradeJournal.AI heeft het. Green-field opportunity. Hoe zou een 'pressure-test deze setup' UX er uitzien?"

  - name: Crypto-perp playbook-AI (gap quadrant)
    tier: 1
    why: "Niemand combineert dit. Onze defensible niche. Concretiseer wat 'partial-close awareness' + 'funding-rate context' + 'session-aware cadence' in een AI-coach betekent."

execution:
  batch_size: 3                  # 3 parallel research-agents
  items_per_agent: 10            # ~10 items per agent (28 items / 3 = ~10)
  output_dir: ./results          # per-item findings hier
